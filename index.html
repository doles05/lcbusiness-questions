around and pricing.","bold_terms":["product range, fast turnaround and pricing"]},{"heading":"Competitive advantage to capitalise on","body":"Zara's USP is its speed to market, designing collections faster than rivals. Strengthening this protects its differentiation and market share.","bold_terms":["USP","speed to market","differentiation","market share"]}],"biz":"Zara"},{"code":"2.6-HL-04","strand":2,"chapter":"2.6","lo":"11.2","lo_text":"Use Porter’s five forces model to identify and analyse competition in the market and use these findings to identify the competitive advantage of a business","level":"HL","verb":"ANALYSE","qnum":"4","q":"Using Porter's Five Forces model, apply any three forces of your choice to analyse Fulfil Nutrition's competitive environment.","stimulus":{"type":"business","business":"Fulfil Nutrition","headline":"Irish protein-bar brand defending its market share","body":"Fulfil Nutrition is an Irish protein bar company that has grown rapidly. It faces competition from international brands such as Grenade and Quest, plus indirect competitors in snacks and confectionery stocked by supermarkets, gyms and convenience stores."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":5},"answer":[{"heading":"Threat of substitutes","body":"Cereal bars, chocolate and yoghurt are cheaper, widely available substitutes. Fulfil must stress its health benefits to reduce switching.","bold_terms":[]},{"heading":"Bargaining power of customers","body":"Large supermarkets such as Tesco can demand lower prices or switch to rivals. This gives buyers significant influence over Fulfil.","bold_terms":[]},{"heading":"Competitive rivalry","body":"Rivalry is intense, with brands such as Grenade and Quest competing hard. Fulfil must differentiate through flavour innovation and strong Irish branding.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-05","strand":2,"chapter":"2.6","lo":"11.2","lo_text":"Use Porter’s five forces model to identify and analyse competition in the market and use these findings to identify the competitive advantage of a business","level":"HL","verb":"EXPLAIN","qnum":"5","q":"Using Porter's Five Forces model, explain how the following three forces affect Brown Thomas Arnotts' competitive position: Threat of Substitutes; Bargaining Power of Customers; Competitive Rivalry.","stimulus":{"type":"business","business":"Brown Thomas Arnotts","headline":"Irish department-store group facing online competition","body":"Brown Thomas Arnotts is a leading Irish department store group facing intense competition from international online retailers such as ASOS and Zalando, as well as luxury global brands, as more Irish consumers shop online."},"fmt":{"type":"labelled_box","labels":["Threat","1","Bargaining","1","Competitive","1"],"lines_per_label":[0,5,0,5,0,5]},"answer":[{"heading":"Threat of substitutes","body":"Mid-market retailers and resale platforms offer cheaper alternatives. These reduce demand for luxury purchases at BTA.","bold_terms":[]},{"heading":"Bargaining power of customers","body":"Online platforms such as ASOS let customers compare prices instantly. This raises buyer power, as shoppers can switch if BTA is dearer.","bold_terms":[]},{"heading":"Competitive rivalry","body":"Rivalry is strong in luxury retail, both online and offline. BTA must compete through exclusive brands and superior service.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-06","strand":2,"chapter":"2.6","lo":"11.2","lo_text":"Use Porter’s five forces model to identify and analyse competition in the market and use these findings to identify the competitive advantage of a business","level":"HL","verb":"EXPLAIN","qnum":"6","q":"(i) Explain the following two of Porter's Five Forces: Bargaining Power of Customers; Threat of New Entrants. (ii) For each force, outline one factor affecting it.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(i) Two forces","(ii) One factor each"],"lines_per_label":[7,7]},"answer":[{"heading":"(i) Bargaining power of customers","body":"This is the influence buyers have over a market. It is high if customers can easily switch, are price-sensitive, or have many competitors to choose from.","bold_terms":[]},{"heading":"(i) Threat of new entrants","body":"This is the likelihood of new firms entering the industry. It is higher when barriers such as start-up costs or brand loyalty are low.","bold_terms":[]},{"heading":"(ii) Factor: price sensitivity","body":"If customers focus heavily on price, their bargaining power increases.","bold_terms":[]},{"heading":"(ii) Factor: economies of scale","body":"Large existing firms enjoy cost advantages that make entry harder for new businesses.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-07","strand":2,"chapter":"2.6","lo":"11.3","lo_text":"Outline the strategies employed by a business to adapt or expand","level":"HL","verb":"EXPLAIN","qnum":"7","q":"Explain three adaptation strategies a business could use to stay competitive.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":5},"answer":[{"heading":"Update products or services","body":"A business can redesign or improve products to meet changing needs. This keeps its offering relevant as customer demand shifts.","bold_terms":[]},{"heading":"Enter new customer segments","body":"Targeting new groups of customers spreads risk and lifts sales. It opens fresh demand beyond the firm's existing base.","bold_terms":[]},{"heading":"Reduce costs through automation","body":"Technology can replace repetitive tasks and lower costs. This frees staff for higher-value work and protects margins.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-08","strand":2,"chapter":"2.6","lo":"11.3","lo_text":"Outline the strategies employed by a business to adapt or expand","level":"HL","verb":"OUTLINE","qnum":"8","q":"Outline two advantages and two challenges of franchising as a method of expansion for the franchisor.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Advantages","1","2","Challenges","1","2"],"lines_per_label":[0,3,3,0,3,3]},"answer":[{"heading":"Advantage: lower capital investment","body":"The franchisee funds each new outlet, reducing the franchisor's financial risk. This allows growth without heavy capital outlay.","bold_terms":[]},{"heading":"Advantage: faster growth","body":"Franchising enables rapid expansion across regions. The franchisor does not have to manage every outlet directly.","bold_terms":[]},{"heading":"Challenge: reputation risk","body":"Poor service or quality at one franchise can damage the whole brand. The franchisor's image depends on every outlet.","bold_terms":[]},{"heading":"Challenge: training and supervision costs","body":"The franchisor must provide ongoing support and training. This is time-consuming and expensive.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-09","strand":2,"chapter":"2.6","lo":"11.3","lo_text":"Outline the strategies employed by a business to adapt or expand","level":"HL","verb":"OUTLINE","qnum":"9","q":"Outline three strategies a business could use to expand organically.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Widen the product range or enter new markets","body":"A business can add new products or open in new locations. This grows sales using its own resources.","bold_terms":[]},{"heading":"Expand through e-commerce","body":"Selling online reaches more customers without new physical outlets. A local shop can serve a national or wider market online.","bold_terms":[]},{"heading":"Franchising","body":"The franchisor licenses its brand and systems to franchisees who run outlets. This grows the brand while franchisees fund expansion.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-10","strand":2,"chapter":"2.6","lo":"11.3","lo_text":"Outline the strategies employed by a business to adapt or expand","level":"HL","verb":"EXPLAIN","qnum":"10","q":"(i) Explain what is meant by inorganic expansion. (ii) Outline two methods of inorganic expansion a business could use.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(i) Inorganic expansion","(ii) Method 1","(ii) Method 2"],"lines_per_label":[7,7,7]},"answer":[{"heading":"(i) Inorganic expansion uses other businesses to grow","body":"It is when a firm grows by acquiring or combining with another business rather than using internal resources. It is often faster but more expensive and risky.","bold_terms":[]},{"heading":"(ii) Takeover or acquisition","body":"One business takes control of another by buying more than half its shares. Meta, for example, acquired Instagram and WhatsApp.","bold_terms":[]},{"heading":"(ii) Merger","body":"Two firms voluntarily combine to form a new legal entity for mutual benefit. Kraft and Heinz merged to form Kraft Heinz.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-11","strand":2,"chapter":"2.6","lo":"11.3","lo_text":"Outline the strategies employed by a business to adapt or expand","level":"HL","verb":"OUTLINE","qnum":"11","q":"Outline two benefits and two risks of a merger for a business.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Benefits","1","2","Risks","1","2"],"lines_per_label":[0,3,3,0,3,3]},"answer":[{"heading":"Benefit: faster access to markets or technology","body":"A merger gives immediate entry to new markets or technology. The firm avoids developing these internally.","bold_terms":[]},{"heading":"Benefit: diversification reduces risk","body":"Merging with a firm in a different market spreads risk. This reduces reliance on a single product or area.","bold_terms":[]},{"heading":"Risk: industrial relations issues","body":"Mergers can create job duplication and redundancies. This may cause staff resistance and low morale.","bold_terms":[]},{"heading":"Risk: clash of cultures","body":"Differences in values and management systems can cause conflict. This reduces efficiency in the merged business.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-12","strand":2,"chapter":"2.6","lo":"11.4","lo_text":"Appreciate the potential of technology to support adaption and expansion","level":"HL","verb":"OUTLINE","qnum":"12","q":"Using the case of Glanbia, outline three ways technology can support adaptation and expansion.","stimulus":{"type":"business","business":"Glanbia","headline":"Irish nutrition company using technology to expand globally","body":"Glanbia is an Irish nutrition company selling protein powders and supplements globally. It has invested heavily in e-commerce, data analytics and digital marketing to expand into new markets and adapt to changing consumer trends."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"E-commerce platforms widen reach","body":"Glanbia sells directly to consumers worldwide through platforms such as Shopify and Amazon. This opens international markets without opening physical stores.","bold_terms":[]},{"heading":"Data analytics guide product decisions","body":"Analytics and CRM tools show which products sell best in each region. This supports new flavours and adapts the product mix to local tastes.","bold_terms":[]},{"heading":"Social media advertising targets new audiences","body":"Tools on Instagram and TikTok target health-conscious young adults. This builds awareness and drives traffic to its online stores.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-13","strand":2,"chapter":"2.6","lo":"11.5","lo_text":"Conduct a cost-benefit analysis to analyse the implications of business expansion","level":"HL","verb":"COST-BENEFIT ANALYSIS","qnum":"13","q":"Conduct a cost-benefit analysis of the proposed acquisition of FreshStop by SPAR Ireland.","stimulus":{"type":"headline","business":null,"headline":"SPAR Ireland to acquire FreshStop in 80 million euro cross-border expansion","body":null},"fmt":{"type":"labelled_box","labels":["Benefits","1","2","Costs","1","2"],"lines_per_label":[0,5,5,0,5,5]},"answer":[{"heading":"Benefit: increased market share","body":"SPAR gains immediate access to 120 stores in Northern Ireland. This widens its customer base and strengthens its brand across the island.","bold_terms":[]},{"heading":"Benefit: economies of scale","body":"Merging operations cuts per-unit costs through larger orders and shared logistics. This boosts efficiency and bargaining power with suppliers.","bold_terms":[]},{"heading":"Cost: integration challenges","body":"Differences in systems and workplace culture could cause disruption. Poor integration risks inefficiency and lost staff morale.","bold_terms":[]},{"heading":"Cost: regulatory scrutiny","body":"The deal may face competition authority review. This could delay it or impose conditions, raising costs.","bold_terms":[]},{"heading":"Conclusion","body":"In my opinion, the benefits outweigh the costs. The gains in market share and scale support SPAR's goal of becoming Ireland's leading retailer. I would recommend proceeding while preparing carefully for regulatory review.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-14","strand":2,"chapter":"2.6","lo":"11.6","lo_text":"Outline strategies that a business may employ to adapt based on their marketing mix and/or business model","level":"HL","verb":"OUTLINE","qnum":"14","q":"A market report shows younger consumers choosing affordable, inclusive skincare over luxury labels. Outline one way a traditional skincare brand could adjust its marketing mix and one way it could adapt its business model to remain financially sustainable.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Marketing","1","Business","1"],"lines_per_label":[0,3,0,3]},"answer":[{"heading":"Marketing mix: product","body":"The brand could launch a budget-friendly range aimed at younger consumers. Clean ingredients and inclusive marketing would meet demand for affordability while keeping brand presence.","bold_terms":[]},{"heading":"Business model: subscription","body":"The brand could add a personalised subscription with recurring deliveries. This meets demand for convenience and creates predictable, loyal revenue.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-15","strand":2,"chapter":"2.6","lo":"11.6","lo_text":"Outline strategies that a business may employ to adapt based on their marketing mix and/or business model","level":"HL","verb":"EXPLAIN","qnum":"15","q":"A local hardware chain has seen footfall fall as customers prefer to order online and collect in store. Explain one way the business could adjust its place or process strategy, and one model it could adopt to respond to this change.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Place","1","Business","1"],"lines_per_label":[0,5,0,5]},"answer":[{"heading":"Place: click-and-collect","body":"The chain could add an online ordering platform with local collection. This meets demand for speed and flexibility without large delivery logistics.","bold_terms":[]},{"heading":"Business model: marketplace","body":"The chain could host third-party local sellers on its platform. This widens product range without holding more stock and drives online traffic.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-16","strand":2,"chapter":"2.6","lo":"11.6","lo_text":"Outline strategies that a business may employ to adapt based on their marketing mix and/or business model","level":"HL","verb":"EXPLAIN","qnum":"16","q":"Explain how changes in customer demographics may require a business to adapt both its marketing mix and its business model.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Marketing","1","Business","1"],"lines_per_label":[0,5,0,5]},"answer":[{"heading":"Marketing mix: promotion","body":"As younger consumers become dominant, firms shift promotion to digital channels. They favour social media and short-form video over traditional advertising to reach the right audience.","bold_terms":[]},{"heading":"Business model: subscription or affiliate","body":"Younger customers value flexibility and convenience. A firm might move to a subscription model or use affiliate marketing to build loyalty and recurring income.","bold_terms":[]}],"biz":null},{"code":"2.6-OL-01","strand":2,"chapter":"2.6","lo":"11.1","lo_text":"Demonstrate an understanding of the importance of identifying competition in the market","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline two reasons why it is important for a business to identify its competitive advantage.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"It allows the business to differentiate","body":"Knowing its competitive advantage shows how it differs from rivals. This makes it easier to attract customers and win sales.","bold_terms":[]},{"heading":"It supports loyalty and survival","body":"Focusing on what customers value most builds loyalty. This increases repeat sales and supports long-term survival.","bold_terms":[]}],"biz":null},{"code":"2.6-OL-02","strand":2,"chapter":"2.6","lo":"11.2","lo_text":"Use Porter’s five forces model to identify and analyse competition in the market and use these findings to identify the competitive advantage of a business","level":"OL","verb":"EXPLAIN","qnum":"2","q":"Choose a business of your choice. Using two of Porter's Five Forces, explain how these forces affect the business's level of competition.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Bargaining power of customers","body":"This is how much influence buyers have. Customers can easily switch to McDonald's or Burger King if prices rise, giving them high power.","bold_terms":["influence buyers have","switch","high power"]},{"heading":"Competitive rivalry","body":"This is the level of competition between existing firms. Supermac's faces strong rivalry from global chains and local takeaways, pushing it to compete on price and promotions.","bold_terms":["level of competition between existing firms","price and promotions"]}],"biz":"Supermac's"},{"code":"2.6-OL-03","strand":2,"chapter":"2.6","lo":"11.2","lo_text":"Use Porter’s five forces model to identify and analyse competition in the market and use these findings to identify the competitive advantage of a business","level":"OL","verb":"NAME","qnum":"3","q":"Porter's Five Forces model includes Competitive Rivalry, Bargaining Power of Suppliers and Threat of Substitutes. Name the two remaining forces.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":1},"answer":[{"heading":"Threat of New Entrants","body":"The risk of new firms entering the market.","bold_terms":[]},{"heading":"Bargaining Power of Customers","body":"The influence buyers have over price and choice.","bold_terms":[]}],"biz":null},{"code":"2.6-OL-04","strand":2,"chapter":"2.6","lo":"11.2","lo_text":"Use Porter’s five forces model to identify and analyse competition in the market and use these findings to identify the competitive advantage of a business","level":"OL","verb":"MATCH","qnum":"4","q":"Match each description to the correct force. Write the correct number in each box.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["OPTIONSA.  Bargaining Power of Suppliers      B.  Bargaining Power of Customers      C.  Competitive Rivalry      D.  Threat of New Entrants"],"lines_per_label":[0]},{"type":"labelled_box","labels":["Description Letter","1.  Customers can easily switch to rival brands if prices rise.","2.  A business faces difficulty entering the market due to high start-up costs.","3.  Many companies compete with similar products, making rivalry intense.","4.  Suppliers have control over prices when there are only a few of them."],"lines_per_label":[0,0,0,0,0]}]},"answer":[{"heading":"Answer","body":"(a) = 2 (Bargaining Power of Customers); (b) = 4 (Threat of New Entrants); (c) = 3 (Competitive Rivalry); (d) = 1 (Bargaining Power of Suppliers).","bold_terms":[]}],"biz":null},{"code":"2.6-OL-05","strand":2,"chapter":"2.6","lo":"11.3","lo_text":"Outline the strategies employed by a business to adapt or expand","level":"OL","verb":"OUTLINE","qnum":"5","q":"Outline one benefit and one challenge of franchising for the franchisor.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Benefits","1","Challenges","1"],"lines_per_label":[0,3,0,3]},"answer":[{"heading":"Benefit: faster expansion","body":"The franchisor can expand quickly without providing all the capital. The franchisee invests in each new outlet.","bold_terms":[]},{"heading":"Challenge: reputation risk","body":"Poor performance by one franchisee can damage the whole brand. The franchisor's image depends on every outlet.","bold_terms":[]}],"biz":null},{"code":"2.6-OL-06","strand":2,"chapter":"2.6","lo":"11.3","lo_text":"Outline the strategies employed by a business to adapt or expand","level":"OL","verb":"OUTLINE","qnum":"6","q":"Outline one benefit and one challenge of a merger.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Benefits","1","Challenges","1"],"lines_per_label":[0,3,0,3]},"answer":[{"heading":"Benefit: economies of scale","body":"The merged business can share resources and order in bulk. This reduces costs per unit.","bold_terms":[]},{"heading":"Challenge: clash of cultures","body":"Differences in business culture can cause conflict. This may reduce efficiency in the merged firm.","bold_terms":[]}],"biz":null},{"code":"2.6-OL-07","strand":2,"chapter":"2.6","lo":"11.3","lo_text":"Outline the strategies employed by a business to adapt or expand","level":"OL","verb":"OUTLINE","qnum":"7","q":"Outline two methods a business can use to expand.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Merger","body":"Two businesses join together voluntarily to form one new business. This combines their resources and markets.","bold_terms":[]},{"heading":"Takeover or acquisition","body":"One business buys a majority of another's shares and takes control. This gives it immediate access to the other firm's operations.","bold_terms":[]}],"biz":null},{"code":"2.6-OL-08","strand":2,"chapter":"2.6","lo":"11.3","lo_text":"Outline the strategies employed by a business to adapt or expand","level":"OL","verb":"TICK","qnum":"8","q":"For each description below, tick the correct method of expansion.","stimulus":null,"fmt":{"type":"tick_table","headers":["Description","Merger","Takeover","Franchise","Strategic Alliance"],"rows":[["One business buys a majority of shares in another and takes control.","","","",""],["Two businesses agree to join together to form one new business.","","","",""],["A business allows another person to set up under its brand and model.","","","",""],["Two businesses work together on a project but remain separate companies.","","","",""]]},"answer":[{"heading":"Answer","body":"(a) Takeover; (b) Merger; (c) Franchise; (d) Strategic Alliance.","bold_terms":[]}],"biz":null},{"code":"2.6-OL-09","strand":2,"chapter":"2.6","lo":"11.5","lo_text":"Conduct a cost-benefit analysis to analyse the implications of business expansion","level":"OL","verb":"IDENTIFY","qnum":"9","q":"Identify one benefit and one cost of Little Paws' decision to expand.","stimulus":{"type":"business","business":"Little Paws Pet Stores","headline":"Family-run Cork pet business planning to expand across Munster","body":"Little Paws, a family-run pet supply business with three shops in Cork, plans to open five more outlets in Munster next year. The owners believe this will grow the business, but they know it could be expensive and risky."},"fmt":{"type":"labelled_box","labels":["Benefits","1","Costs","1"],"lines_per_label":[0,3,0,3]},"answer":[{"heading":"Benefit: more customers and sales","body":"Opening more shops can bring in new customers. This may lead to higher sales and profits.","bold_terms":[]},{"heading":"Cost: rising expenses and risk","body":"Expansion will cost money for rent and staff. If sales do not grow as planned, the business could lose money.","bold_terms":[]}],"biz":null},{"code":"2.6-OL-10","strand":2,"chapter":"2.6","lo":"11.6","lo_text":"Outline strategies that a business may employ to adapt based on their marketing mix and/or business model","level":"OL","verb":"SUGGEST","qnum":"10","q":"Suggest one way GlamBeauty could change its marketing mix and one way it could adapt its business model.","stimulus":{"type":"business","business":"GlamBeauty","headline":"Cosmetics business adapting to younger, online customers","body":"GlamBeauty, a cosmetics business, has noticed that younger customers prefer affordable skincare and buy online more often. It wants to respond to this change."},"fmt":{"type":"labelled_box","labels":["Marketing","1","Business","1"],"lines_per_label":[0,3,0,3]},"answer":[{"heading":"Marketing mix: sell online","body":"GlamBeauty could sell its products through a new online shop. This lets younger customers browse and buy from their phones, suiting their habits.","bold_terms":[]},{"heading":"Business model: monthly subscription","body":"GlamBeauty could offer a monthly box of skincare for a set price. This gives customers value and the business steady, loyal income.","bold_terms":[]}],"biz":null},{"code":"2.6-OL-11","strand":2,"chapter":"2.6","lo":"11.6","lo_text":"Outline strategies that a business may employ to adapt based on their marketing mix and/or business model","level":"OL","verb":"SUGGEST","qnum":"11","q":"Suggest one change FlyeFit could make to its pricing or promotion, and explain one way it could change its business model to keep its current members.","stimulus":{"type":"business","business":"FlyeFit","headline":"Irish gym chain facing a new low-cost competitor","body":"FlyeFit, a popular gym chain in Ireland, is losing members to a new low-cost gym opening nearby. It wants to keep its current members."},"fmt":{"type":"labelled_box","labels":["Pricing","1","Business","1"],"lines_per_label":[0,3,0,3]},"answer":[{"heading":"Pricing or promotion: discount plans","body":"FlyeFit could introduce cheaper off-peak or student memberships. This makes it more affordable for members tempted by a cheaper rival.","bold_terms":[]},{"heading":"Business model: flexible membership","body":"FlyeFit could offer short-term or pay-as-you-go memberships. This gives members more control and shows FlyeFit is adapting to their needs.","bold_terms":[]}],"biz":null},{"code":"2.7-HL-01","strand":2,"chapter":"2.7","lo":"12.1","lo_text":"Outline the challenges and risks associated with enterprise and entrepreneurship","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline two challenges Rascals Brewing Co. may face as it seeks to expand, and explain how the business could address each challenge.","stimulus":{"type":"business","business":"Rascals Brewing Co.","headline":"Dublin craft brewer plans major expansion","body":"Rascals Brewing Co., based in Inchicore, Dublin, has grown steadily since 2014 and now employs over 25 people. The management team is planning to open a second production facility and launch a new range of low-alcohol beers in response to changing consumer tastes."},"fmt":{"type":"labelled_box","labels":["Challenge 1","How to address this challenge","Challenge 2","How to address this challenge"],"lines_per_label":[2,2,2,1]},"answer":[{"heading":"Challenge 1 – Raising Finance:","body":"Securing finance can be difficult at expansion stage due to limited collateral or trading history. Rascals may struggle to fund a second production facility.","bold_terms":[]},{"heading":"How to address:","body":"Rascals could prepare a detailed business plan with realistic cash flow forecasts to increase lender and investor confidence.","bold_terms":[]},{"heading":"Challenge 2 – Competition:","body":"New and existing firms compete for brand loyalty and market share. Rascals faces pressure from international craft brands entering the Irish market.","bold_terms":[]},{"heading":"How to address:","body":"Rascals could develop a clear USP around its Dublin craft identity and low-alcohol range to stand out in a competitive market.","bold_terms":[]}],"biz":null},{"code":"2.7-HL-02","strand":2,"chapter":"2.7","lo":"12.1","lo_text":"Outline the challenges and risks associated with enterprise and entrepreneurship","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline three risks associated with enterprise and entrepreneurship.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[3,3,2]},"answer":[{"heading":"1. Financial and Personal Risk:","body":"Entrepreneurs risk losing personal savings or incurring debt if the business underperforms. The risk is greater for sole traders due to unlimited liability.","bold_terms":[]},{"heading":"2. Operational Risk:","body":"Internal operations may not function effectively. Supplier failure, staff shortages, or equipment breakdowns can disrupt production or service delivery.","bold_terms":[]},{"heading":"3. External and Economic Risk:","body":"Entrepreneurs are exposed to factors outside their control. Economic downturns, inflation, or changes in consumer spending can negatively affect profitability.","bold_terms":[]}],"biz":null},{"code":"2.7-HL-03","strand":2,"chapter":"2.7","lo":"12.1","lo_text":"Outline the challenges and risks associated with enterprise and entrepreneurship","level":"HL","verb":"IDENTIFY","qnum":"3","q":"(i) Identify one challenge associated with enterprise and entrepreneurship.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":2},{"type":"numbered_box","points":2,"lines_per_point":[4,3]}]},"answer":[{"heading":"(i)","body":"Legal and Regulatory Compliance.","bold_terms":[]},{"heading":"(ii) 1. Risk of Business Failure:","body":"The business may cease trading if it is not financially viable. Poor cash flow, weak demand, or ineffective management can lead to insolvency.","bold_terms":[]},{"heading":"2. Reputational Risk:","body":"Entrepreneurs face the risk of damage to the business's reputation. Poor customer service or negative publicity can reduce consumer trust and sales.","bold_terms":[]}],"biz":null},{"code":"2.7-HL-04","strand":2,"chapter":"2.7","lo":"12.2","lo_text":"Outline the importance of assessing and managing risks in business","level":"HL","verb":"EXPLAIN","qnum":"1","q":"Explain two reasons why it is important for Ryanair to assess and manage risks.","stimulus":{"type":"business","business":"Ryanair","headline":"Dublin-based airline manages operations across Europe","body":"Ryanair, headquartered in Swords, Co. Dublin, is Europe's largest airline by passenger numbers. The business operates across more than 200 airports and handles fleets, fuel contracts, staffing, and IT systems on a huge scale. Management regularly reviews how the business assesses and manages risk."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":[4,3]},"answer":[{"heading":"1. Reduces Financial Loss:","body":"Identifying risks early and putting controls in place helps limit damage to profits and cash flow. Ryanair can protect revenue from events such as fuel price shocks or IT outages.","bold_terms":[]},{"heading":"2. Improves Business Continuity:","body":"Risk management helps a business keep operating when unexpected events occur. Ryanair can reduce downtime from supply disruptions or system failures that would otherwise ground flights.","bold_terms":[]}],"biz":null},{"code":"2.7-HL-05","strand":2,"chapter":"2.7","lo":"12.2","lo_text":"Outline the importance of assessing and managing risks in business","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline the steps involved in the risk management process.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Step 1","Step 2","Step 3","Step 4"],"lines_per_label":[3,3,3,2]},"answer":[{"heading":"Step 1 – Identify the Risk:","body":"The business identifies potential risks it may face, such as financial, operational, or health and safety risks.","bold_terms":[]},{"heading":"Step 2 – Assess the Risk:","body":"Each risk is assessed based on how likely it is to occur and the level of damage it could cause.","bold_terms":[]},{"heading":"Step 3 – Control or Reduce the Risk:","body":"The business takes action to reduce the likelihood or impact of the risk, for example through insurance, training, or safety procedures.","bold_terms":[]},{"heading":"Step 4 – Monitor and Review:","body":"Risks are reviewed regularly to ensure controls remain effective and new risks are identified.","bold_terms":[]}],"biz":null},{"code":"2.7-HL-06","strand":2,"chapter":"2.7","lo":"12.2","lo_text":"Outline the importance of assessing and managing risks in business","level":"HL","verb":"EXPLAIN","qnum":"3","q":"Explain two reasons why it is important for a business to assess and manage risks.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[4,3]},"answer":[{"heading":"1. Supports Better Decision-Making:","body":"Risk assessment allows managers to make informed decisions based on potential consequences. Understanding the likelihood and impact of risks helps prioritise actions and allocate resources effectively.","bold_terms":[]},{"heading":"2. Ensures Legal and Regulatory Compliance:","body":"Risk management helps businesses meet legal and regulatory requirements. Failure to manage risks can result in fines, legal action, or forced closure by regulators.","bold_terms":[]}],"biz":null},{"code":"2.7-HL-07","strand":2,"chapter":"2.7","lo":"12.3","lo_text":"Analyse a range of risk management strategies that can be used to respond to the challenges and risks in business","level":"HL","verb":"ANALYSE","qnum":"1","q":"Analyse two risk management strategies Boojum could use to respond to potential risks.","stimulus":{"type":"business","business":"Boojum","headline":"Irish burrito chain expands across UK and Ireland","body":"Boojum, founded in Belfast in 2007, now operates more than 20 outlets across Ireland and the UK. The business handles daily food preparation, cash and card transactions, customer data and staff across multiple locations. Management is reviewing how it responds to the range of risks facing the business."},"fmt":{"type":"labelled_box","labels":["Strategy 1","Strategy 2"],"lines_per_label":[5,4]},"answer":[{"heading":"Strategy 1 – Prevention:","body":"Prevention involves taking action to stop risks occurring in the first place, such as staff training or safety checks. Boojum could provide food safety and manual handling training to kitchen staff to reduce the risk of incidents. This protects customers and also lowers the chance of reputational damage from a food safety scandal.","bold_terms":[]},{"heading":"Strategy 2 – Insurance:","body":"Insurance transfers part of the financial risk to an insurer in return for a premium. Boojum could take out public liability insurance to cover injury claims from customers in its restaurants. While premiums are an ongoing cost, this cover protects the business from potentially large legal or compensation claims.","bold_terms":[]}],"biz":null},{"code":"2.7-HL-08","strand":2,"chapter":"2.7","lo":"12.3","lo_text":"Analyse a range of risk management strategies that can be used to respond to the challenges and risks in business","level":"HL","verb":"DISCUSS","qnum":"2","q":"Discuss four risk management strategies a business can use to respond to potential risks.","stimulus":null,"fmt":{"type":"numbered_box","points":4,"lines_per_point":[4,4,4,3]},"answer":[{"heading":"1. Avoidance:","body":"Avoidance means identifying a risk and choosing not to engage in the activity at all. For example, Aer Lingus suspended flights to Tel Aviv during the 2024 Middle East conflict to avoid operating in a war zone.","bold_terms":[]},{"heading":"2. Spread (Diversification):","body":"Spread involves reducing reliance on a single product, supplier or market. Ornua (Kerrygold) sells to over 110 countries, so a downturn in one region does not threaten the overall business.","bold_terms":[]},{"heading":"3. Prevention:","body":"Prevention involves taking steps to stop risks occurring, such as training, CCTV or maintenance. Dunnes Stores installs CCTV and provides staff training to reduce theft and workplace injuries.","bold_terms":[]},{"heading":"4. Insurance:","body":"Insurance transfers part of the financial risk to an insurer in return for a premium. Croke Park takes out public liability insurance to cover injury claims during matches and concerts.","bold_terms":[]}],"biz":null},{"code":"2.7-HL-09","strand":2,"chapter":"2.7","lo":"12.3","lo_text":"Analyse a range of risk management strategies that can be used to respond to the challenges and risks in business","level":"HL","verb":"OUTLINE","qnum":"3","q":"(i) Outline two factors that affect the cost of an insurance premium for a business.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"numbered_box","points":2,"lines_per_point":[3,1]},{"type":"plain_box","lines":3}]},"answer":[{"heading":"(i) 1. Level of risk:","body":"A higher-risk business, such as a construction firm, will pay higher premiums than a lower-risk business, such as an accountancy practice.","bold_terms":[]},{"heading":"2. Past claims history:","body":"A business that has made frequent claims will usually face higher premiums, as insurers view it as higher risk.","bold_terms":[]},{"heading":"(ii)","body":"Underinsurance is where an asset is insured for less than its true value. If a claim is made, the insurer will only pay a proportionate amount, leaving the business to cover the shortfall from its own funds.","bold_terms":[]}],"biz":null},{"code":"2.7-OL-01","strand":2,"chapter":"2.7","lo":"12.1","lo_text":"Outline the challenges and risks associated with enterprise and entrepreneurship","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline two challenges Murphy's Ice Cream may face as it grows, and explain how the business could address each challenge.","stimulus":{"type":"business","business":"Murphy's Ice Cream","headline":"Kerry-based artisan ice cream brand grows nationwide following","body":"Murphy's Ice Cream, founded by brothers Seán and Kieran Murphy in Dingle, Co. Kerry in 2000, makes artisan ice cream using milk from Kerry cows. The business now has shops in Dingle, Killarney, Galway and Dublin and sells through selected supermarkets across Ireland."},"fmt":{"type":"labelled_box","labels":["Challenge 1","How Murphy's could address this","Challenge 2","How Murphy's could address this"],"lines_per_label":[2,2,2,1]},"answer":[{"heading":"Challenge 1 – Operational Capacity:","body":"Day-to-day operations can become overstretched as a business grows. Murphy's may face service delays and inconsistent quality across its outlets.","bold_terms":[]},{"heading":"How Murphy's could address this:","body":"Careful planning of resources and systems can help ensure operations support continued growth.","bold_terms":[]},{"heading":"Challenge 2 – Competition:","body":"Established supermarket brands have strong brand loyalty and greater resources. Murphy's may find it harder to protect its market share.","bold_terms":[]},{"heading":"How Murphy's could address this:","body":"Developing a clear USP around its Kerry origins and artisan quality can help it stand out and attract repeat customers.","bold_terms":[]}],"biz":null},{"code":"2.7-OL-02","strand":2,"chapter":"2.7","lo":"12.1","lo_text":"Outline the challenges and risks associated with enterprise and entrepreneurship","level":"OL","verb":"IDENTIFY","qnum":"2","q":"Identify three risks associated with starting a new business.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[2,2,1]},"answer":[{"heading":"1.","body":"Financial and personal risk.","bold_terms":[]},{"heading":"2.","body":"Operational risk.","bold_terms":[]},{"heading":"3.","body":"External and economic risk.","bold_terms":[]}],"biz":null},{"code":"2.7-OL-03","strand":2,"chapter":"2.7","lo":"12.1","lo_text":"Outline the challenges and risks associated with enterprise and entrepreneurship","level":"OL","verb":"OUTLINE","qnum":"3","q":"(i) Outline one challenge an entrepreneur might face when setting up a new business.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":3},{"type":"plain_box","lines":3}]},"answer":[{"heading":"(i) Market Acceptance:","body":"Customer demand for new products or services is uncertain. Poor demand can result in low sales and difficulty establishing the business.","bold_terms":[]},{"heading":"(ii)","body":"The entrepreneur could carry out market research and a feasibility study before launch to test customer needs and reduce the risk of misjudging demand.","bold_terms":[]}],"biz":null},{"code":"2.7-OL-04","strand":2,"chapter":"2.7","lo":"12.2","lo_text":"Outline the importance of assessing and managing risks in business","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline two reasons why it is important for Supermac's to assess and manage risks.","stimulus":{"type":"business","business":"Supermac's","headline":"Irish fast food chain operates over 100 outlets nationwide","body":"Supermac's, founded by Pat McDonagh in Ballinasloe, Co. Galway, now operates over 100 restaurants across Ireland. The business employs thousands of staff and handles food preparation, deliveries and customer data every day. Management wants to make sure the business is managing the risks it faces."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":[4,3]},"answer":[{"heading":"1. Protects Employees and Customers:","body":"Managing risks protects health and safety. Supermac's must prevent kitchen accidents and food safety incidents that could affect staff or diners.","bold_terms":[]},{"heading":"2. Protects the Business's Reputation:","body":"Managing risks helps avoid incidents that could damage how the business is seen. Supermac's could lose customer trust quickly if it had a food safety scandal.","bold_terms":[]}],"biz":null},{"code":"2.7-OL-05","strand":2,"chapter":"2.7","lo":"12.2","lo_text":"Outline the importance of assessing and managing risks in business","level":"OL","verb":"IDENTIFY","qnum":"2","q":"Identify the four steps involved in the risk management process.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Step 1","Step 2","Step 3","Step 4"],"lines_per_label":[1,1,1,1]},"answer":[{"heading":"Step 1.","body":"Identify the risk.","bold_terms":[]},{"heading":"Step 2.","body":"Assess the risk.","bold_terms":[]},{"heading":"Step 3.","body":"Control or reduce the risk.","bold_terms":[]},{"heading":"Step 4.","body":"Monitor and review.","bold_terms":[]}],"biz":null},{"code":"2.7-OL-06","strand":2,"chapter":"2.7","lo":"12.2","lo_text":"Outline the importance of assessing and managing risks in business","level":"OL","verb":"OUTLINE","qnum":"3","q":"(i) Outline one reason why a business should manage risk.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":3},{"type":"plain_box","lines":3}]},"answer":[{"heading":"(i) Reduces Financial Loss:","body":"Identifying risks early and putting controls in place helps limit damage to profits and cash flow.","bold_terms":[]},{"heading":"(ii)","body":"The business looks at each risk and decides how likely it is to occur and the level of damage it could cause. This helps the business prioritise which risks to deal with first.","bold_terms":[]}],"biz":null},{"code":"2.7-OL-07","strand":2,"chapter":"2.7","lo":"12.3","lo_text":"Analyse a range of risk management strategies that can be used to respond to the challenges and risks in business","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline three suitable types of insurance McKenna's Hardware should consider to protect the business from potential risks.","stimulus":{"type":"business","business":"McKenna's Hardware","headline":"Family-run hardware store plans to expand online","body":"McKenna's Hardware is a family-run business based in Cavan town. The shop employs eight staff, operates two delivery vans, and is planning to launch an online store to sell to customers across Ireland. The owner, Ciara McKenna, wants to review the insurance cover the business will need."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":[4,4,3]},"answer":[{"heading":"1. Public liability insurance:","body":"This covers injury to a customer or damage to their property while on the business premises. McKenna's could be protected if a customer slipped in the shop.","bold_terms":[]},{"heading":"2. Motor insurance:","body":"This is legally required for the delivery vans. It covers damage to the vans, staff and third parties in the event of a road traffic accident.","bold_terms":[]},{"heading":"3. Cyber insurance:","body":"This covers losses from cyberattacks or data breaches. With the new online store, McKenna's will hold customer payment and personal data that must be protected.","bold_terms":[]}],"biz":null},{"code":"2.7-OL-08","strand":2,"chapter":"2.7","lo":"12.3","lo_text":"Analyse a range of risk management strategies that can be used to respond to the challenges and risks in business","level":"OL","verb":"IDENTIFY","qnum":"2","q":"Identify the four main risk management strategies a business can use.","stimulus":null,"fmt":{"type":"numbered_box","points":4,"lines_per_point":[2,2,2,1]},"answer":[{"heading":"1.","body":"Avoidance.","bold_terms":[]},{"heading":"2.","body":"Spread (diversification).","bold_terms":[]},{"heading":"3.","body":"Prevention.","bold_terms":[]},{"heading":"4.","body":"Insurance.","bold_terms":[]}],"biz":null},{"code":"2.7-OL-09","strand":2,"chapter":"2.7","lo":"12.3","lo_text":"Analyse a range of risk management strategies that can be used to respond to the challenges and risks in business","level":"OL","verb":"OUTLINE","qnum":"3","q":"(i) Outline what is meant by the risk management strategy of spread.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":3},{"type":"labelled_box","labels":["Benefit","Drawback"],"lines_per_label":[4,3]}]},"answer":[{"heading":"(i) Spread:","body":"Spread involves reducing reliance on a single product, supplier or market by diversifying across several. If one underperforms, the business can continue operating using the others.","bold_terms":[]},{"heading":"(ii) Benefit:","body":"Spread reduces the impact of problems in any one area, as the business is not dependent on a single source of income.","bold_terms":[]},{"heading":"Drawback:","body":"If the business spreads too widely, it may lose focus on its core product or confuse customers about its brand identity.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-01","strand":3,"chapter":"3.1","lo":"13.1","lo_text":"Distinguish between leadership and management in organisations","level":"HL","verb":"DISTINGUISH","qnum":"1","q":"Distinguish between the roles of a 'Leader' and a 'Manager' at Cully & Sully.","stimulus":{"type":"business","business":"Cully & Sully","headline":"Co-founders still shape direction at the Cork soup-makers","body":"Cully & Sully was founded in 2004 by Cullen Allen and Colum O'Sullivan in Cork. The founders continue to drive the company's vision around simple, natural food, while operational managers oversee production, supply and retail distribution across Ireland and the UK."},"fmt":{"type":"labelled_box","labels":["Leader","Manager"],"lines_per_label":[4,3]},"answer":[{"heading":"Leader:","body":"A leader provides the vision for the business. At Cully & Sully, the co-founders continue to drive the vision around simple, natural food, inspiring staff and shaping long-term direction.","bold_terms":[]},{"heading":"Manager:","body":"A manager organises resources to meet day-to-day objectives. At Cully & Sully, operational managers oversee production, supply and retail distribution so the business runs efficiently each day.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-02","strand":3,"chapter":"3.1","lo":"13.1","lo_text":"Distinguish between leadership and management in organisations","level":"HL","verb":"EXAMINE","qnum":"2","q":"Examine three differences between leadership and management in organisations.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[5,5,4]},"answer":[{"heading":"1. Vision vs objectives:","body":"A leader provides the vision for the future direction of the business and inspires staff. A manager focuses on achieving short-term objectives by planning and organising daily operations.","bold_terms":[]},{"heading":"2. Innovation vs implementation:","body":"Leaders promote creative thinking and drive change. Managers focus on implementing ideas, tracking progress, and ensuring plans are followed.","bold_terms":[]},{"heading":"3. Risk-taking vs risk control:","body":"Leaders are willing to take risks and accept that failure may occur. Managers control risk and aim to maintain stability in operations.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-03","strand":3,"chapter":"3.1","lo":"13.2","lo_text":"Analyse the significance of organisational culture and innovation in successful organisations","level":"HL","verb":"ANALYSE","qnum":"1","q":"Analyse three benefits for Uniquely of having a strong organisational culture.","stimulus":{"type":"business","business":"Uniquely","headline":"Dublin consultancy named one of Ireland's Best Workplaces 2024","body":"Uniquely, a Dublin-based sales consultancy, was named one of Ireland's Best Workplaces 2024 by Great Place To Work. Judges praised the company's open culture, collaborative approach, and strong commitment to employee development."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":[5,5,4]},"answer":[{"heading":"1. Employee wellbeing and engagement:","body":"A strong culture helps employees feel valued and included. Uniquely's open culture means staff feel listened to and supported, leading to higher motivation and lower turnover in the business.","bold_terms":[]},{"heading":"2. Collaboration and innovation:","body":"Cultures that encourage teamwork make it easier for staff to share ideas. Uniquely's collaborative approach strengthens problem-solving on client projects and produces better sales strategies for customers.","bold_terms":[]},{"heading":"3. Positive brand reputation:","body":"A recognised positive culture enhances a company's public image. Being named a Best Workplace helps Uniquely attract new clients and skilled staff who want to work for a trusted employer.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-04","strand":3,"chapter":"3.1","lo":"13.2","lo_text":"Analyse the significance of organisational culture and innovation in successful organisations","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline two ways that innovation can contribute to the long-term success of a business.","stimulus":{"type":"business","business":"The Irish Times report on innovation","headline":"Innovative firms shown to be more resilient during downturns","body":"A 2024 report by The Irish Times highlighted that firms with innovative work practices were more resilient during economic downturns. The report argued that innovation helped businesses retain customers and protect profitability when consumer spending fell."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":[4,3]},"answer":[{"heading":"1. Sustaining customer demand:","body":"Introducing new or improved products helps a business keep up with customer needs. Netflix sustained long-term growth by innovating from DVD rentals to streaming, securing a global customer base.","bold_terms":[]},{"heading":"2. Protecting profitability:","body":"Process innovation reduces costs and makes operations more efficient. Ryanair's cost-saving innovations in scheduling and fuel efficiency ensured its long-term success as Europe's leading low-cost airline.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-05","strand":3,"chapter":"3.1","lo":"13.2","lo_text":"Analyse the significance of organisational culture and innovation in successful organisations","level":"HL","verb":"MATCH","qnum":"3","q":"Column 1 is a list of benefits of a strong organisational culture. Column 2 is a list of business examples. (One example does not refer to any of the benefits.)","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["","Column 1:  Terms","","Column 2:  Explanations"],"rows":[["1","Shared values and purpose","A","ICE Group (Galway) operates a permanent four-day working week for all staff."],["2","Improved wellbeing and work-life balance","B","Intercom runs 'demo days' where any employee can pitch an idea to the team."],["3","Collaboration and innovation","C","A business cuts its advertising spend by 20% during a downturn."],["4","Employee loyalty and retention","D","Kerry Group invests heavily in internal training and promotes staff from within."],["","","E","Primark applies the same pricing standards and customer service approach across every store."]]},{"type":"labelled_box","labels":["1 2 3 4"],"lines_per_label":[1]}]},"answer":[{"heading":"","body":"1 = E   (consistent standards across stores illustrate shared values and purpose)","bold_terms":[]},{"heading":"","body":"2 = A   (four-day week illustrates wellbeing and work-life balance)","bold_terms":[]},{"heading":"","body":"3 = B   (demo days illustrate collaboration and innovation)","bold_terms":[]},{"heading":"","body":"4 = D   (internal promotion illustrates employee loyalty and retention)","bold_terms":[]},{"heading":"","body":"Option C is the one that does not match any of the benefits.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-06","strand":3,"chapter":"3.1","lo":"13.3","lo_text":"Outline how leadership styles foster organisational culture and organisational innovation","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline how two leadership styles you have studied foster organisational innovation.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Democratic Leadership:","body":"A democratic leader involves staff in decision-making and trusts their employees. This creates a culture of intrapreneurship where employees are actively encouraged to be creative, leading to higher levels of innovation in the business.","bold_terms":[]},{"heading":"2. Laissez-faire Leadership:","body":"A laissez-faire leader takes a hands-off approach and gives staff independence to manage their own work. With skilled and self-motivated employees, this freedom can drive strong innovation and original ideas.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-07","strand":3,"chapter":"3.1","lo":"13.3","lo_text":"Outline how leadership styles foster organisational culture and organisational innovation","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline how two leadership styles you have studied impact on organisational culture.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Autocratic Leadership:","body":"An autocratic leader makes decisions alone and expects staff to follow instructions. This creates a culture of top-down control where employees know their roles but feel less engaged, which can lower morale over time.","bold_terms":[]},{"heading":"2. Democratic Leadership:","body":"A democratic leader involves staff in decision-making and maintains open communication. This creates a culture of trust and collaboration where employees feel listened to and are more willing to contribute ideas.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-08","strand":3,"chapter":"3.1","lo":"13.3","lo_text":"Outline how leadership styles foster organisational culture and organisational innovation","level":"HL","verb":"IDENTIFY","qnum":"3","q":"(i) Identify the leadership style demonstrated by Mary Flahavan and outline how it shapes the organisational culture at Flahavan's.","stimulus":{"type":"business","business":"Flahavan's","headline":"Seventh-generation family business in Waterford","body":"Flahavan's is a family-run oat milling business in Kilmacthomas, Co. Waterford. Mary Flahavan, one of the current family directors, regularly consults staff before making major decisions and encourages ideas for new product lines from across the workforce. Many employees have been with the business for decades."},"fmt":{"type":"labelled_box","labels":["Leadership style","How it shapes organisational culture"],"lines_per_label":[2,3]},"answer":[{"heading":"Leadership style:","body":"Democratic leadership.","bold_terms":[]},{"heading":"How it shapes culture:","body":"A democratic leader involves staff in decision-making and maintains open communication. At Flahavan's, Mary consulting staff before major decisions creates a culture of trust and collaboration, which helps explain why many employees have stayed with the business for decades.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-09","strand":3,"chapter":"3.1","lo":"13.4","lo_text":"Appreciate the range of reasons for conflict in the workplace and demonstrate an understanding of how conflict may impact on the workplace","level":"HL","verb":"EXPLAIN","qnum":"1","q":"Explain three reasons why conflict may arise in the workplace.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[4,4,3]},"answer":[{"heading":"1. Disputes over pay:","body":"Conflict arises when wages or pensions do not reflect rising living costs or workload. If pay claims are rejected, workers may feel undervalued and pursue industrial action.","bold_terms":[]},{"heading":"2. Disputes over working conditions:","body":"Issues such as new duties, new technology, or return-to-office mandates can cause disputes, especially if changes are imposed without consultation or proper training.","bold_terms":[]},{"heading":"3. Redundancies:","body":"Conflict can occur if redundancy payments are low or the selection process is seen as unfair. Using a fair method such as Last In, First Out (LIFO) can help reduce disputes.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-10","strand":3,"chapter":"3.1","lo":"13.4","lo_text":"Appreciate the range of reasons for conflict in the workplace and demonstrate an understanding of how conflict may impact on the workplace","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline three possible impacts this type of conflict could have on An Post as a business.","stimulus":{"type":"business","business":"An Post","headline":"Dispute over service changes threatens delivery operations","body":"An Post employs thousands of staff across Ireland delivering mail and parcels. Management have proposed significant changes to delivery routes and shift patterns, which have been rejected by some unions. Industrial action has been threatened at sorting offices in the run-up to the busy Christmas season."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":[4,4,3]},"answer":[{"heading":"1. Loss of sales and revenue:","body":"Industrial action disrupts service delivery. Strikes at sorting offices before Christmas would mean undelivered mail and parcels, lost revenue, and customers turning to competitors such as DPD or Fastway.","bold_terms":[]},{"heading":"2. Poor customer service and reputation:","body":"Delays and missed deliveries damage customer trust. For An Post, this weakens its brand and could discourage business customers from renewing contracts.","bold_terms":[]},{"heading":"3. Lower staff morale and productivity:","body":"Unresolved conflict lowers motivation. At An Post, staff may become less engaged and more likely to take sick days, reducing output across sorting offices.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-11","strand":3,"chapter":"3.1","lo":"13.4","lo_text":"Appreciate the range of reasons for conflict in the workplace and demonstrate an understanding of how conflict may impact on the workplace","level":"HL","verb":"CLASSIFICATION","qnum":"3","q":"Indicate whether each of the following is a reason for conflict in the workplace or an impact of conflict on the workplace. Tick (✓) the correct column for each statement.","stimulus":null,"fmt":{"type":"data_table","headers":["Statement","Reason","Impact"],"rows":[["A dispute over a cost-of-living pay claim","",""],["Employees starting to take more sick days than usual","",""],["Deadlines being missed due to staff avoiding each other","",""],["Management introducing new shift patterns without consultation","",""],["A group of staff feeling they have been treated less favourably on holidays","",""]]},"answer":[{"heading":"","body":"Cost-of-living pay claim → Reason","bold_terms":[]},{"heading":"","body":"Staff taking more sick days → Impact","bold_terms":[]},{"heading":"","body":"Deadlines missed due to staff avoidance → Impact","bold_terms":[]},{"heading":"","body":"Management introducing shift patterns without consultation → Reason","bold_terms":[]},{"heading":"","body":"Staff feeling treated less favourably on holidays → Reason (demarcation issue)","bold_terms":[]}],"biz":null},{"code":"3.1-HL-12","strand":3,"chapter":"3.1","lo":"13.5","lo_text":"Analyse how both employees and employers may deal with conflict internally","level":"HL","verb":"ANALYSE","qnum":"1","q":"Analyse two internal methods Tesco Ireland's management could use to resolve these workplace conflicts.","stimulus":{"type":"business","business":"Tesco Ireland","headline":"Workers protest over changes to contracts","body":"Tesco Ireland has faced disputes with staff over proposed changes to contracts and working hours. Management want to resolve these issues before they escalate into further protest and risk disrupting stores nationwide."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Meet and talk:","body":"Management can hold direct meetings with staff or their shop stewards to discuss concerns. At Tesco, such meetings would allow the issues with the proposed contracts to be clarified and could reduce tension before action escalates.","bold_terms":[]},{"heading":"2. Negotiation or bargaining:","body":"Both sides compromise to reach a middle ground, each giving something up to reach an agreement. Tesco could offer more flexible shift options in return for staff accepting some of the new contract terms, settling the dispute without disrupting stores.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-13","strand":3,"chapter":"3.1","lo":"13.5","lo_text":"Analyse how both employees and employers may deal with conflict internally","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline three internal methods that a business can use to deal with workplace conflict.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[4,4,3]},"answer":[{"heading":"1. Meet and talk:","body":"The employee and employer meet directly to discuss the issue. Many issues can be resolved through clarification and honest communication.","bold_terms":[]},{"heading":"2. Use of a formal grievance procedure:","body":"If informal talks fail, the employee raises a written grievance that the employer must investigate and respond to within set timeframes.","bold_terms":[]},{"heading":"3. Internal mediation by HR:","body":"A neutral person inside the business (such as HR) facilitates a structured conversation between the two sides to help them reach their own agreement.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-14","strand":3,"chapter":"3.1","lo":"13.5","lo_text":"Analyse how both employees and employers may deal with conflict internally","level":"HL","verb":"EXPLAIN","qnum":"3","q":"(i) Explain the role of a shop steward in dealing with workplace conflict.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":3},{"type":"numbered_box","points":2,"lines_per_point":[3,2]}]},"answer":[{"heading":"(i)","body":"A shop steward is the elected trade union representative in a workplace. They raise issues with management on behalf of employees, which takes pressure off individual staff and draws on the union's experience in resolving disputes.","bold_terms":[]},{"heading":"(ii) 1. Encourage open communication:","body":"Create an open environment where employees feel comfortable raising concerns early, before they escalate.","bold_terms":[]},{"heading":"2. Provide clear grievance procedures:","body":"Set out a written process for raising issues so staff know they will be treated fairly and consistently.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-15","strand":3,"chapter":"3.1","lo":"13.6","lo_text":"Outline different external approaches to conflict resolution","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline three external approaches to conflict resolution in the workplace.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[4,4,3]},"answer":[{"heading":"1. Mediation:","body":"A third party becomes involved to open communication between the two sides. The mediator does not offer any recommendation; the parties reach their own agreement.","bold_terms":[]},{"heading":"2. Conciliation:","body":"A trusted third party may offer a suggestion for the parties to consider. The parties normally agree in advance to accept any suggestion made.","bold_terms":[]},{"heading":"3. Arbitration:","body":"An independent third party listens to both sides and issues a formal recommendation. Arbitration can be binding or non-binding.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-16","strand":3,"chapter":"3.1","lo":"13.6","lo_text":"Outline different external approaches to conflict resolution","level":"HL","verb":"DISTINGUISH","qnum":"2","q":"Distinguish between conciliation and arbitration as external methods of conflict resolution.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Conciliation","Arbitration"],"lines_per_label":[4,3]},"answer":[{"heading":"Conciliation:","body":"A trusted third party encourages both sides to communicate and may suggest possible solutions. The final decision rests with the parties themselves.","bold_terms":[]},{"heading":"Arbitration:","body":"An independent third party listens to both sides and issues a formal recommendation. Arbitration may be binding (both sides must accept) or non-binding.","bold_terms":[]},{"heading":"Key difference:","body":"Conciliation leaves the final choice to the parties, while arbitration can involve a binding decision imposed on them.","bold_terms":[]}],"biz":null},{"code":"3.1-HL-17","strand":3,"chapter":"3.1","lo":"13.6","lo_text":"Outline different external approaches to conflict resolution","level":"HL","verb":"MATCH","qnum":"3","q":"Column 1 is a list of external conflict resolution approaches. Column 2 is a list of possible descriptions. (One description does not refer to any of the approaches.)","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["","Column 1:  Terms","","Column 2:  Explanations"],"rows":[["1","Mediation","A","A third party issues a formal recommendation that both parties agreed in advance to accept without exception."],["2","Conciliation","B","A trusted third party opens communication and may suggest a solution; the parties had agreed in advance to accept any suggestion made."],["3","Arbitration","C","A third party sits in with the parties to open communication but does not offer any recommendation."],["","","D","A neutral person inside the business facilitates a structured conversation between the two sides."]]},{"type":"labelled_box","labels":["1 2 3"],"lines_per_label":[1]}]},"answer":[{"heading":"","body":"1 = C   (mediation — third party opens communication, no recommendation)","bold_terms":[]},{"heading":"","body":"2 = B   (conciliation — may suggest a solution, agreed in advance)","bold_terms":[]},{"heading":"","body":"3 = A   (arbitration — formal recommendation)","bold_terms":[]},{"heading":"","body":"Option D is the one that does not match; it describes internal mediation, which is not an external approach.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-01","strand":3,"chapter":"3.1","lo":"13.1","lo_text":"Distinguish between leadership and management in organisations","level":"OL","verb":"DISTINGUISH","qnum":"1","q":"Distinguish between the roles of a 'Leader' and a 'Manager' at Barry's Tea.","stimulus":{"type":"business","business":"Barry's Tea","headline":"Cork family business balances founder's vision with daily operations","body":"Barry's Tea is a family business based in Cork, now in its third generation of family leadership. The family directors set the long-term direction and brand vision, while operations managers run the daily blending, packing and distribution."},"fmt":{"type":"labelled_box","labels":["Leader","Manager"],"lines_per_label":[4,3]},"answer":[{"heading":"Leader:","body":"A leader provides the vision for the business. At Barry's Tea, the family directors set the long-term direction and brand vision.","bold_terms":[]},{"heading":"Manager:","body":"A manager organises resources to meet day-to-day objectives. At Barry's Tea, operations managers run the daily blending, packing and distribution of the product.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-02","strand":3,"chapter":"3.1","lo":"13.1","lo_text":"Distinguish between leadership and management in organisations","level":"OL","verb":"IDENTIFY","qnum":"2","q":"Identify two differences between the role of a leader and the role of a manager.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[3,2]},"answer":[{"heading":"1.","body":"A leader provides a vision for the future, while a manager focuses on meeting day-to-day objectives.","bold_terms":[]},{"heading":"2.","body":"A leader is willing to take risks to try new things, while a manager controls risk to keep operations stable.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-03","strand":3,"chapter":"3.1","lo":"13.2","lo_text":"Analyse the significance of organisational culture and innovation in successful organisations","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline two benefits for Workhuman of having a strong organisational culture.","stimulus":{"type":"business","business":"Workhuman","headline":"Dublin tech company ranked among Ireland's Best Workplaces 2024","body":"Workhuman, a Dublin-based tech company specialising in employee recognition software, was ranked as one of Ireland's Best Workplaces 2024. The company is known for promoting recognition, open communication and strong team culture."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":[4,3]},"answer":[{"heading":"1. Motivated employees:","body":"A positive culture makes staff feel valued. For Workhuman, this means higher productivity and fewer employees leaving the company, reducing recruitment costs.","bold_terms":[]},{"heading":"2. Better reputation:","body":"Being known as a great place to work improves the company's public image. For Workhuman, the award helps attract new customers and skilled tech workers.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-04","strand":3,"chapter":"3.1","lo":"13.2","lo_text":"Analyse the significance of organisational culture and innovation in successful organisations","level":"OL","verb":"IDENTIFY","qnum":"2","q":"Identify three ways innovation can help a business succeed.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[2,2,1]},"answer":[{"heading":"1.","body":"Helps the business stand out from competitors.","bold_terms":[]},{"heading":"2.","body":"Allows the business to adapt to changes in customer needs or technology.","bold_terms":[]},{"heading":"3.","body":"Opens up new markets or customer segments.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-05","strand":3,"chapter":"3.1","lo":"13.2","lo_text":"Analyse the significance of organisational culture and innovation in successful organisations","level":"OL","verb":"COMPLETE THE SENTENCES","qnum":"3","q":"Complete each sentence below using the most suitable word from the box. Each word may be used once only. Two words will not be used.","stimulus":null,"fmt":{"type":"labelled_box","labels":["values  |  innovation  |  productivity  |  redundancy  |  culture  |  pay  |  turnover"],"lines_per_label":[0]},"answer":[{"heading":"","body":"1. culture","bold_terms":[]},{"heading":"","body":"2. values","bold_terms":[]},{"heading":"","body":"3. innovation","bold_terms":[]},{"heading":"","body":"4. turnover","bold_terms":[]},{"heading":"","body":"(Not used: productivity, redundancy, pay)","bold_terms":[]}],"biz":null},{"code":"3.1-OL-06","strand":3,"chapter":"3.1","lo":"13.3","lo_text":"Outline how leadership styles foster organisational culture and organisational innovation","level":"OL","verb":"STATE","qnum":"1","q":"State the leadership style shown in the stimulus and explain one advantage of it for Meta.","stimulus":{"type":"business","business":"Meta","headline":"Zuckerberg on employee ownership","body":"Mark Zuckerberg has said that Meta employees are expected to take ownership of their projects and work independently, with managers trusting staff to make their own decisions on many projects."},"fmt":{"type":"labelled_box","labels":["Leadership style","One advantage for Meta"],"lines_per_label":[2,3]},"answer":[{"heading":"Leadership style:","body":"Laissez-faire leadership.","bold_terms":[]},{"heading":"Advantage:","body":"This style gives employees freedom to be creative and take responsibility. For Meta, this can lead to new ideas and innovative features that keep the company competitive in the tech industry.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-07","strand":3,"chapter":"3.1","lo":"13.3","lo_text":"Outline how leadership styles foster organisational culture and organisational innovation","level":"OL","verb":"EXPLAIN","qnum":"2","q":"Explain one way a leadership style can affect the organisational culture of a business.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Builds a culture of trust:","body":"A democratic leadership style involves staff in decisions, which shows that employees' opinions are valued. This creates a culture of trust and openness where people feel engaged and more loyal to the business.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-08","strand":3,"chapter":"3.1","lo":"13.3","lo_text":"Outline how leadership styles foster organisational culture and organisational innovation","level":"OL","verb":"IDENTIFY","qnum":"3","q":"Identify the three main leadership styles you have studied.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[2,2,1]},"answer":[{"heading":"1.","body":"Autocratic leadership.","bold_terms":[]},{"heading":"2.","body":"Democratic leadership.","bold_terms":[]},{"heading":"3.","body":"Laissez-faire leadership.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-09","strand":3,"chapter":"3.1","lo":"13.4","lo_text":"Appreciate the range of reasons for conflict in the workplace and demonstrate an understanding of how conflict may impact on the workplace","level":"OL","verb":"IDENTIFY","qnum":"1","q":"Identify one reason for workplace conflict shown in the stimulus and explain how it could affect a business.","stimulus":{"type":"business","business":"Irish workplace survey","headline":"Return-to-office rules the biggest flashpoint","body":"A recent survey of Irish employees found that the biggest cause of workplace conflict in 2024 was disagreement over returning to the office full-time after a period of hybrid working. Some staff reported increased stress and a loss of trust in their employer."},"fmt":{"type":"labelled_box","labels":["Reason","Effect on the business"],"lines_per_label":[3,3]},"answer":[{"heading":"Reason – Disputes over working conditions:","body":"Conflict may arise where employees are required to return to the office after working from home.","bold_terms":[]},{"heading":"Effect:","body":"This can lower morale and reduce job satisfaction, leading to higher staff turnover and reduced productivity in the business.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-10","strand":3,"chapter":"3.1","lo":"13.4","lo_text":"Appreciate the range of reasons for conflict in the workplace and demonstrate an understanding of how conflict may impact on the workplace","level":"OL","verb":"EXPLAIN","qnum":"2","q":"Explain two impacts that conflict may have on a business.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[4,3]},"answer":[{"heading":"1. Lower morale:","body":"Conflict makes employees feel undervalued or unfairly treated. This reduces job satisfaction and can lead to higher staff turnover.","bold_terms":[]},{"heading":"2. Reduced productivity:","body":"When staff are in conflict they may be less motivated and less focused on their tasks. This lowers output and harms business performance.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-11","strand":3,"chapter":"3.1","lo":"13.4","lo_text":"Appreciate the range of reasons for conflict in the workplace and demonstrate an understanding of how conflict may impact on the workplace","level":"OL","verb":"TRUE/FALSE","qnum":"3","q":"Indicate whether each of the following statements is True or False by ticking (✓) the correct column.","stimulus":null,"fmt":{"type":"true_false","rows":["Statement","Disputes over pay are a common reason for workplace conflict.","Conflict in the workplace always results in a negative outcome for a business.","A shop steward is a representative of the employer in a workplace.","Unresolved conflict can lead to increased staff turnover."]},"answer":[{"heading":"","body":"1. True","bold_terms":[]},{"heading":"","body":"2. False (conflict can sometimes lead to positive outcomes such as improved problem-solving)","bold_terms":[]},{"heading":"","body":"3. False (a shop steward represents the employees, not the employer)","bold_terms":[]},{"heading":"","body":"4. True","bold_terms":[]}],"biz":null},{"code":"3.1-OL-12","strand":3,"chapter":"3.1","lo":"13.5","lo_text":"Analyse how both employees and employers may deal with conflict internally","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline two internal methods that a business could use to resolve workplace conflict.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[4,3]},"answer":[{"heading":"1. Meet and talk:","body":"The employer and employee meet directly to discuss the issue. Many issues can be resolved through clear communication between the two sides.","bold_terms":[]},{"heading":"2. Negotiation:","body":"Both sides compromise to reach a middle ground. Each side gives up something in order to reach a fair agreement.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-13","strand":3,"chapter":"3.1","lo":"13.5","lo_text":"Analyse how both employees and employers may deal with conflict internally","level":"OL","verb":"EXPLAIN","qnum":"2","q":"Explain two internal methods managers at Emerald Park could use to resolve these complaints.","stimulus":{"type":"business","business":"Tayto Park / Emerald Park","headline":"Seasonal staff concerns at Meath theme park","body":"Emerald Park (formerly Tayto Park) in Meath hires hundreds of seasonal staff each summer. Management has been dealing with complaints from some staff about rosters and shift changes, and wants to resolve them before they affect the busy season."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":[4,3]},"answer":[{"heading":"1. Meet and talk:","body":"Managers can meet directly with staff to discuss the roster concerns. At Emerald Park, listening to staff could help identify a scheduling fix that works for both sides.","bold_terms":[]},{"heading":"2. Negotiation:","body":"Both sides compromise. Managers could offer some flexibility on shift patterns in return for staff accepting the busy season roster.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-14","strand":3,"chapter":"3.1","lo":"13.6","lo_text":"Outline different external approaches to conflict resolution","level":"OL","verb":"IDENTIFY","qnum":"1","q":"Identify two external approaches a business could use to resolve a dispute between management and staff.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[3,2]},"answer":[{"heading":"1. Mediation:","body":"An independent third party helps both sides communicate but does not make d
