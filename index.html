ngthens long-term customer connections.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-10","strand":2,"chapter":"2.3","lo":"8.4","lo_text":"Identify the key elements of the business model canvas and outline the role of business models in successful enterprises","level":"HL","verb":"IDENTIFY","qnum":"10","q":"Identify four key elements of the Business Model Canvas for Domino's Pizza.","stimulus":{"type":"business","business":"Domino's Pizza","headline":"Global pizza-delivery chain operating company-owned and franchised outlets","body":"Domino's Pizza operates company-owned and franchised outlets in Ireland, with most sales through its app and website. It competes on quick delivery, consistent quality and frequent online promotions, partnering with drivers, franchisees and suppliers."},"fmt":{"type":"numbered_box","points":4,"lines_per_point":3},"answer":[{"heading":"Customer Segments","body":"Domino's targets students, families and young professionals who value fast delivery. This lets it tailor promotions such as student discounts and family deals.","bold_terms":[]},{"heading":"Value Proposition","body":"Domino's offers quick delivery, consistent quality and easy online ordering. This sets it apart from smaller takeaways and builds loyalty.","bold_terms":[]},{"heading":"Key Partners","body":"Franchisees, ingredient suppliers and delivery drivers are vital partners. They expand reach, ensure quality and deliver on the promise of speed.","bold_terms":[]},{"heading":"Revenue Streams","body":"Most income comes from online and app orders supported by deals. Meal bundles and loyalty schemes add recurring revenue.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-11","strand":2,"chapter":"2.3","lo":"8.4","lo_text":"Identify the key elements of the business model canvas and outline the role of business models in successful enterprises","level":"HL","verb":"OUTLINE","qnum":"11","q":"Outline two reasons why a business model is important to a successful organisation.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"It clarifies how value is created and delivered","body":"The model shows how the firm creates value and gets it to customers. Streaming firms, for example, use it to show how content and technology retain subscribers.","bold_terms":[]},{"heading":"It explains how income is generated","body":"It sets out how the business captures value in return, such as through sales or subscriptions. This gives managers and investors a clear picture of revenue.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-12","strand":2,"chapter":"2.3","lo":"8.5","lo_text":"Identify and compare the most common business models","level":"HL","verb":"COMPARE","qnum":"12","q":"Compare the subscription and affiliate business models in terms of (a) how income is generated and (b) how value is delivered to customers.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(a) Income","(b) Value"],"lines_per_label":[5,5]},"answer":[{"heading":"(a) Income: subscription earns recurring fees","body":"Income comes from regular payments such as a monthly or annual fee. Netflix, for example, charges subscribers each month for continued access.","bold_terms":[]},{"heading":"(a) Income: affiliate earns commission","body":"Income comes from commission when a referral leads to a sale. A travel blogger earns a percentage on hotel bookings made through their links.","bold_terms":[]},{"heading":"(b) Value: subscription gives ongoing access","body":"Customers gain continuous access and convenience, often with premium features. Spotify Premium users enjoy unlimited, ad-free music.","bold_terms":[]},{"heading":"(b) Value: affiliate gives guidance and deals","body":"Customers benefit from recommendations and discounts from the affiliate. A deals website can steer customers to the best offers, saving time and money.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-13","strand":2,"chapter":"2.3","lo":"8.5","lo_text":"Identify and compare the most common business models","level":"HL","verb":"IDENTIFY","qnum":"13","q":"(i) Identify the business model used by Spotify. (ii) Compare this business model with the retail business model in terms of how income is generated and how value is delivered to customers.","stimulus":{"type":"business","business":"Spotify","headline":"Global music platform using a paid and ad-supported model","body":"Spotify is one of the world's largest music platforms, charging customers a monthly fee for premium access while also offering a free service supported by advertising."},"fmt":{"type":"labelled_box","labels":["(i) Spotify's model","(ii) Income","(ii) Value"],"lines_per_label":[5,5,5]},"answer":[{"heading":"(i) Spotify uses a subscription model","body":"Spotify charges a monthly fee for premium access, supported by advertising on its free tier.","bold_terms":[]},{"heading":"(ii) Income: subscription versus retail","body":"Subscription earns recurring monthly fees and some advertising income. Retail earns revenue from one-off sales of physical goods.","bold_terms":[]},{"heading":"(ii) Value: subscription versus retail","body":"Subscription gives on-demand access, convenience and choice. Retail gives tangible goods the customer can use or consume immediately.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-14","strand":2,"chapter":"2.3","lo":"8.6","lo_text":"Outline how digital technology is a driver of change in business","level":"HL","verb":"EXPLAIN","qnum":"14","q":"Explain three ways digital technology is a driver of change in business.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":5},"answer":[{"heading":"Artificial intelligence automates and personalises","body":"Firms use AI to handle customer service and tailor content. Chatbots cut costs while personalising recommendations for customers.","bold_terms":[]},{"heading":"Cloud computing makes firms more adaptable","body":"Cloud services let firms scale IT resources quickly without heavy infrastructure. This makes the business more flexible and responsive to change.","bold_terms":[]},{"heading":"E-commerce platforms open global trade","body":"Platforms such as Shopify let even small firms sell online and track customers. This lowers barriers to international expansion.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-15","strand":2,"chapter":"2.3","lo":"8.6","lo_text":"Outline how digital technology is a driver of change in business","level":"HL","verb":"OUTLINE","qnum":"15","q":"Outline two internal drivers and two external drivers of digital technology use in a business.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Internal","1","2","External","1","2"],"lines_per_label":[0,3,3,0,3,3]},"answer":[{"heading":"Internal: the drive to innovate","body":"Firms must keep updating their products and services to stay relevant. Digital tools let them deliver new and personalised offerings.","bold_terms":[]},{"heading":"Internal: efficiency and automation","body":"Automated systems speed up processes and cut errors. This lowers costs across operations such as stock control and delivery.","bold_terms":[]},{"heading":"External: evolving consumer behaviour","body":"Digital tools change how customers shop and engage with brands. Firms adopt technology to meet these new expectations.","bold_terms":[]},{"heading":"External: competitive pressure","body":"New entrants disrupt markets using digital tools. Established firms must respond with their own technology to keep up.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-16","strand":2,"chapter":"2.3","lo":"8.7","lo_text":"Identify and compare a number of technology-driven business models and outline the key characteristics of each model","level":"HL","verb":"OUTLINE","qnum":"16","q":"(i) Outline what is meant by a Marketplace business model. (ii) Outline two key characteristics of each of the following technology-driven models: Crowdfunding and Subscription.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(i) Marketplace","(ii) Crowdfunding","(ii) Subscription"],"lines_per_label":[5,5,5]},"answer":[{"heading":"(i) A Marketplace connects buyers and sellers online","body":"It is an online platform that lets buyers and sellers trade without the platform owning the products. It earns income by charging fees or commission on each sale, as Vinted and Airbnb do.","bold_terms":[]},{"heading":"(ii) Crowdfunding: how it raises money and builds support","body":"Revenue: it raises small amounts from many people online, often before launch. Engagement: campaign updates and reward tiers build a community of backers.","bold_terms":[]},{"heading":"(ii) Subscription: how it earns and what customers get","body":"Revenue: income comes from regular recurring payments such as a monthly fee. Access: customers get continuous access to the service for as long as they pay.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-17","strand":2,"chapter":"2.3","lo":"8.7","lo_text":"Identify and compare a number of technology-driven business models and outline the key characteristics of each model","level":"HL","verb":"COMPARE","qnum":"17","q":"Using any two of the headings below, compare a Marketplace business model (e.g. Vinted, Airbnb) with a Crowdfunding business model (e.g. Kickstarter). Headings: Revenue generation; Consumer access and cost; Scalability and growth.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Revenue generation","body":"A Marketplace earns income by charging sellers fees or commission on transactions. Crowdfunding raises money upfront from many backers before the product launches.","bold_terms":[]},{"heading":"Consumer access and cost","body":"Marketplace users usually access the platform free, paying only when buying or selling. Crowdfunding backers contribute voluntarily, often for rewards or early access.","bold_terms":[]},{"heading":"Scalability and growth","body":"Marketplaces scale quickly as more buyers and sellers join, owning no stock. Crowdfunding can reach global audiences but depends on each campaign's appeal.","bold_terms":[]}],"biz":null},{"code":"2.3-OL-01","strand":2,"chapter":"2.3","lo":"8.1","lo_text":"Appreciate the importance of having a business plan and outline the key functions of a business plan","level":"OL","verb":"EXPLAIN","qnum":"1","q":"Explain one reason why a business should have a business plan.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"A business plan helps attract finance","body":"It shows banks or investors how the business will make a profit. This reassures them their money is safe and makes funding more likely.","bold_terms":[]}],"biz":null},{"code":"2.3-OL-02","strand":2,"chapter":"2.3","lo":"8.1","lo_text":"Appreciate the importance of having a business plan and outline the key functions of a business plan","level":"OL","verb":"OUTLINE","qnum":"2","q":"Outline one way a business plan can help at the start-up stage.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"It sets clear objectives for the new business","body":"The plan gives the start-up goals such as sales targets or a breakeven point. This helps the entrepreneur stay focused and measure early progress.","bold_terms":[]}],"biz":null},{"code":"2.3-OL-03","strand":2,"chapter":"2.3","lo":"8.2","lo_text":"Outline the importance of ethics and sustainability when planning in business","level":"OL","verb":"OUTLINE","qnum":"3","q":"Outline one benefit to a business of considering ethics and sustainability when planning.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"It improves reputation and brand loyalty","body":"Including sustainability in the plan, such as cutting packaging waste, shows customers the firm cares. This improves its reputation and encourages repeat custom.","bold_terms":[]}],"biz":null},{"code":"2.3-OL-04","strand":2,"chapter":"2.3","lo":"8.4","lo_text":"Identify the key elements of the business model canvas and outline the role of business models in successful enterprises","level":"OL","verb":"TRUE/FALSE","qnum":"4","q":"The following statements are about the Business Model Canvas. State whether each one is True or False.","stimulus":null,"fmt":{"type":"true_false_inline","statements":["(a) Customer Segments describe the different groups of customers a business serves. True / False","(b) Key Partners refers to how the business makes money. True / False","(c) The Cost Structure outlines the main expenses a business will face. True / False","(d) Channels describe how a business delivers its product or service to customers. True / False"]},"answer":[{"heading":"Answer","body":"(a) True: Customer Segments are the groups of customers the business serves. (b) False: Key Partners are the suppliers and organisations that help the business, while Revenue Streams describe how it makes money. (c) True: the Cost Structure lists the main expenses. (d) True: Channels describe how products reach customers.","bold_terms":[]}],"biz":null},{"code":"2.3-OL-05","strand":2,"chapter":"2.3","lo":"8.5","lo_text":"Identify and compare the most common business models","level":"OL","verb":"MATCH","qnum":"5","q":"Match each business model (A-D) with the correct description (1-4). Write the correct letter in each box.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["OPTIONSA.  Subscription Model      B.  Affiliate Model      C.  Retail Model      D.  Franchising"],"lines_per_label":[0]},{"type":"labelled_box","labels":["Description Letter","1.  An entrepreneur opens a fast-food outlet under the McDonald's brand, paying fees to the parent company.","2.  Customers pay a monthly fee to stream TV shows and films on demand (e.g. Netflix).","3.  A travel website earns commission by directing customers to hotel booking sites.","4.  A supermarket sells groceries directly to customers in-store and online (e.g. Tesco)."],"lines_per_label":[0,0,0,0,0]}]},"answer":[{"heading":"Answer","body":"1 = D (Franchising); 2 = A (Subscription); 3 = B (Affiliate); 4 = C (Retail).","bold_terms":[]}],"biz":null},{"code":"2.3-OL-06","strand":2,"chapter":"2.3","lo":"8.6","lo_text":"Outline how digital technology is a driver of change in business","level":"OL","verb":"OUTLINE","qnum":"6","q":"Outline two ways digital technology can be a driver of change in business.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"E-commerce platforms widen the market","body":"Online platforms such as Shopify let businesses sell worldwide. This makes it easier to reach new customers beyond the local area.","bold_terms":[]},{"heading":"Automation improves efficiency","body":"Digital tools such as warehouse robots speed up processes. This reduces delivery times and cuts mistakes.","bold_terms":[]}],"biz":null},{"code":"2.3-OL-07","strand":2,"chapter":"2.3","lo":"8.7","lo_text":"Identify and compare a number of technology-driven business models and outline the key characteristics of each model","level":"OL","verb":"IDENTIFY","qnum":"7","q":"Indicate with a tick the business model that best describes each of the online businesses listed below.","stimulus":null,"fmt":{"type":"data_table","headers":["Online business","Marketplace","Subscription","Advertising-supported"],"rows":[["YouTube","","",""],["Depop","","",""],["Spotify","","",""]]},"answer":[{"heading":"Answer","body":"YouTube = Advertising-supported; Depop = Marketplace; Spotify = Subscription.","bold_terms":[]}],"biz":null},{"code":"2.3-OL-08","strand":2,"chapter":"2.3","lo":"8.7","lo_text":"Identify and compare a number of technology-driven business models and outline the key characteristics of each model","level":"OL","verb":"OUTLINE","qnum":"8","q":"Outline any one of the following business models: Marketplace, Subscription, Advertising-supported.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"A Marketplace connects buyers and sellers online","body":"An online platform lets buyers and sellers trade, and earns income from fees or commission on transactions. It is usually low-cost for users and can scale quickly as more people join, as with Vinted or Depop.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-01","strand":2,"chapter":"2.4","lo":"9.1","lo_text":"Appreciate the importance of market research in identifying the target market and discuss how businesses conduct market research","level":"HL","verb":"EXPLAIN","qnum":"1","q":"(i) Explain the term target market. (ii) Outline two reasons why it is important that a business uses market research to identify its target market.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(i) Target market","(ii) Reason 1","(ii) Reason 2"],"lines_per_label":[7,7,7]},"answer":[{"heading":"(i) The target market is the group a business aims at","body":"It is the specific group of customers a business directs its products and marketing at. It is usually defined by traits such as age, income, lifestyle or location.","bold_terms":[]},{"heading":"(ii) It makes marketing more effective","body":"Research shows who the right customers are and how best to reach them. This avoids wasted spending on unsuitable audiences.","bold_terms":[]},{"heading":"(ii) It raises customer satisfaction and loyalty","body":"Understanding the target market lets a firm tailor products and messages. This leads to repeat sales and stronger brand loyalty.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-02","strand":2,"chapter":"2.4","lo":"9.1","lo_text":"Appreciate the importance of market research in identifying the target market and discuss how businesses conduct market research","level":"HL","verb":"DISCUSS","qnum":"2","q":"Discuss how a business conducts market research.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":5},"answer":[{"heading":"Primary (field) research gathers new data directly","body":"The business collects fresh data from consumers through surveys, observation and focus groups. It is specific and up to date but costly and slow. Lidl uses smiley-face buttons at store exits to gather instant feedback.","bold_terms":[]},{"heading":"Secondary (desk) research uses existing data","body":"The business analyses data that already exists, such as CSO statistics and trade reports. It is quick and cheap but may be dated or available to rivals. Bord Bia reports help food firms track market trends.","bold_terms":[]},{"heading":"Digital tools have widened how research is done","body":"Online surveys, analytics and social listening capture customer behaviour in real time. This gives faster, lower-cost insight than traditional methods. Meta Business Suite lets small firms track audience response cheaply.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-03","strand":2,"chapter":"2.4","lo":"9.1","lo_text":"Appreciate the importance of market research in identifying the target market and discuss how businesses conduct market research","level":"HL","verb":"OUTLINE","qnum":"3","q":"Outline three reasons why a business carries out market research.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"It identifies the target market","body":"Research shows who the ideal customers are by age, income and lifestyle. Products and marketing can then be tailored to the right audience.","bold_terms":[]},{"heading":"It analyses competitors","body":"Research reveals rivals' products, pricing and market share. This helps the firm position itself and stay competitive.","bold_terms":[]},{"heading":"It reduces the risk of failure","body":"Testing ideas and gathering feedback shows what customers really want. This cuts the chance of wasting resources on an unwanted product.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-04","strand":2,"chapter":"2.4","lo":"9.2","lo_text":"Outline the elements of the marketing mix and explain their significance for a business and how they are influenced by the target market","level":"HL","verb":"OUTLINE","qnum":"4","q":"Outline how the target market influences the Product and Price elements of the marketing mix.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Product","1","Price","1"],"lines_per_label":[0,3,0,3]},"answer":[{"heading":"Product: features and quality follow the target market","body":"The design and quality of a product depend on who it is aimed at. A retailer targeting teenagers offers trendy fast fashion, while a luxury brand offers exclusive, high-quality items.","bold_terms":[]},{"heading":"Price: the target market sets what can be charged","body":"Pricing reflects the target market's ability and willingness to pay. Budget-conscious families favour discount retailers, while premium consumers expect higher prices.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-05","strand":2,"chapter":"2.4","lo":"9.2","lo_text":"Outline the elements of the marketing mix and explain their significance for a business and how they are influenced by the target market","level":"HL","verb":"OUTLINE","qnum":"5","q":"Outline the significance of Promotion and Place in reaching a business's target market.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Promotion","1","Place","1"],"lines_per_label":[0,3,0,3]},"answer":[{"heading":"Promotion: it communicates with the right audience","body":"The promotion method chosen depends on the target market. A firm targeting young adults may use influencers, while one targeting older consumers may use print.","bold_terms":[]},{"heading":"Place: it puts the product where customers want it","body":"Place ensures the product is available where and when the target market shops. Some customers expect fast online delivery, while others prefer to buy in store.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-06","strand":2,"chapter":"2.4","lo":"9.2","lo_text":"Outline the elements of the marketing mix and explain their significance for a business and how they are influenced by the target market","level":"HL","verb":"EXPLAIN","qnum":"6","q":"Explain the significance of three elements of the marketing mix for a business.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":5},"answer":[{"heading":"Product: it must meet customer needs","body":"A high-quality, innovative product attracts and retains customers. This builds brand loyalty and supports repeat sales.","bold_terms":[]},{"heading":"Price: it must match the target market and earn profit","body":"Pricing must reflect what customers will pay while still leaving a margin. Competitive pricing wins custom, while premium pricing signals quality.","bold_terms":[]},{"heading":"Promotion: it raises awareness and drives sales","body":"Promotion communicates the product's value and builds recognition. This persuades customers to buy and keeps the brand visible.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-07","strand":2,"chapter":"2.4","lo":"9.3","lo_text":"Develop a marketing mix for a product and a service of choice and provide a USP analysis for each","level":"HL","verb":"DEVELOP","qnum":"7","q":"(a) Develop the 7Ps marketing mix for a product or service of your choice. (b) Provide a USP analysis for it.","stimulus":null,"fmt":{"type":"plain_box","lines":30},"answer":[{"heading":"Product","body":"Ad-free streaming with offline listening and curated playlists. This positions it as a premium offering above the free version and rivals such as Apple Music.","bold_terms":["positions","premium"]},{"heading":"Price","body":"A tiered subscription with individual, family and student plans. This makes the service accessible across income groups.","bold_terms":["tiered subscription","accessible across income groups"]},{"heading":"Place","body":"Delivered digitally through mobile and desktop apps worldwide. This gives instant access with no physical distribution.","bold_terms":["digitally","instant access","distribution"]},{"heading":"Promotion Targeted","body":"social campaigns, influencer deals and free-trial offers. These convert free users into paying subscribers.","bold_terms":["convert"]},{"heading":"People Support and technical teams","body":"keep the service running for subscribers. Their role is vital to customer satisfaction during payment or playback issues.","bold_terms":["customer satisfaction"]},{"heading":"Process","body":"Sign-up, billing and playlist generation are seamless and automated. This creates a hassle-free experience that builds loyalty.","bold_terms":["seamless and automated","hassle-free experience","loyalty"]},{"heading":"Physical Evidence","body":"Strong branding through the green-and-black design and recognisable app. Personalised playlists give tangible proof of quality.","bold_terms":["branding","tangible proof of quality"]},{"heading":"USP analysis","body":"Customers want convenient, affordable, personalised streaming. Spotify's USP is personalisation at scale, with algorithm-driven playlists rivals cannot match.","bold_terms":["USP","personalisation at scale"]}],"biz":"Spotify Premium"},{"code":"2.4-HL-08","strand":2,"chapter":"2.4","lo":"9.3","lo_text":"Develop a marketing mix for a product and a service of choice and provide a USP analysis for each","level":"HL","verb":"DEVELOP","qnum":"8","q":"(a) Apply four elements of the 7Ps marketing mix to a product or service of your choice. (b) Provide a USP analysis for it.","stimulus":null,"fmt":{"type":"plain_box","lines":24},"answer":[{"heading":"Product","body":"Premium Irish crisps made with locally grown potatoes. The quality drives its positioning above standard crisps.","bold_terms":["positioning"]},{"heading":"Price","body":"Priced higher than average to reflect quality. This supports the premium positioning.","bold_terms":["higher than average","premium positioning"]},{"heading":"Place","body":"Stocked across Irish supermarkets and exported widely. This gives wide distribution at home and abroad.","bold_terms":["distribution"]},{"heading":"Promotion","body":"Social media campaigns highlighting Irish heritage and family farming. This builds an authentic, distinctive brand image.","bold_terms":["brand image"]},{"heading":"USP analysis","body":"Customers want tasty, authentic, premium crisps. Keogh's USP is its 'crop to crisp' Irish family-farm production, a clear point of differentiation rivals such as Tayto cannot claim.","bold_terms":["USP","differentiation"]}],"biz":"Keogh's Crisps"},{"code":"2.4-HL-09","strand":2,"chapter":"2.4","lo":"9.4","lo_text":"Evaluate and suggest ways of improving an existing marketing mix","level":"HL","verb":"EVALUATE","qnum":"9","q":"Choose a business of your choice. (a) Evaluate four elements of its existing marketing mix. (b) Suggest and justify two improvements that would make the marketing mix more effective.","stimulus":null,"fmt":{"type":"plain_box","lines":30},"answer":[{"heading":"(a) Product","body":"Netflix offers a huge library including original shows. The variety is a strength, but Disney+ exclusives are growing competition.","bold_terms":["variety","strength","competition"]},{"heading":"(a) Price Tiered subscriptions","body":"suit different budgets. However, price rises and account-sharing limits frustrate customers.","bold_terms":["frustrate customers"]},{"heading":"(a) Place","body":"Global digital distribution through apps is seamless. This is a clear advantage over traditional television.","bold_terms":["digital distribution","advantage"]},{"heading":"(a) Promotion","body":"It relies heavily on online buzz and social media. Its limited traditional advertising is a weakness against rivals.","bold_terms":["online buzz and social media","weakness"]},{"heading":"(b) Improvement: a low-cost ad-supported plan","body":"Adding a cheaper ad-supported tier would attract price-sensitive customers. This is justified because it opens emerging markets without cutting premium revenue.","bold_terms":["ad-supported tier","price-sensitive customers","justified","emerging markets"]},{"heading":"(b) Improvement: more local content","body":"Investing in local content would match cultural tastes. This is justified because it helps it compete where rivals produce local content.","bold_terms":["local content","justified","compete"]},{"heading":"Evaluation","body":"In my opinion, Netflix's marketing mix is strong overall. This is because its content range and global distribution outweigh its pricing concerns. I would recommend launching the ad-supported tier to protect its lead in price-sensitive markets.","bold_terms":["strong overall","outweigh","recommend"]}],"biz":"Netflix"},{"code":"2.4-HL-10","strand":2,"chapter":"2.4","lo":"9.4","lo_text":"Evaluate and suggest ways of improving an existing marketing mix","level":"HL","verb":"EVALUATE","qnum":"10","q":"(a) Evaluate the four elements of Innocent Drinks' existing marketing mix in the European market. (b) Suggest and justify improvements to support expansion into Asia.","stimulus":{"type":"business","business":"Innocent Drinks","headline":"Natural-drinks brand expanding from Europe into Asia","body":"Innocent Drinks sells 100% natural smoothies and juices, priced at a premium across Europe with strong supermarket distribution and playful, eco-friendly branding. It is now planning expansion into Asia to compete with Coca-Cola and Pepsi."},"fmt":{"type":"plain_box","lines":30},"answer":[{"heading":"(a) Product","body":"Innocent's natural drinks are well regarded in Europe. Asian consumers may want different flavours, so the same range could limit success abroad.","bold_terms":[]},{"heading":"(a) Price","body":"Premium pricing works in Europe where many can afford it. In Asia it may exclude a large share of the market.","bold_terms":[]},{"heading":"(a) Place","body":"Supermarket distribution makes Innocent easy to find in Europe. Building similar networks in Asia will be difficult and slow.","bold_terms":[]},{"heading":"(a) Promotion","body":"Playful, eco-friendly branding is effective in Europe. It may have less impact in Asian markets where value and taste matter more.","bold_terms":[]},{"heading":"(b) Improvement: local flavours","body":"Developing flavours such as green tea or mango blends would suit local tastes. This is justified because relevance drives trial in new markets.","bold_terms":[]},{"heading":"(b) Improvement: a lower-priced range","body":"Adding a cheaper range alongside premium juices would widen reach. This is justified because it makes Innocent competitive with Coca-Cola and Pepsi.","bold_terms":[]},{"heading":"Evaluation","body":"I believe Innocent's current mix is too premium to succeed in Asia unchanged. This is because price and flavour are the main barriers to entry there. I would recommend leading the Asian launch with a value range tailored to local tastes.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-11","strand":2,"chapter":"2.4","lo":"9.5","lo_text":"Demonstrate an understanding of the disruptive impact* and influence of digital technology on market research and marketing","level":"HL","verb":"EXPLAIN","qnum":"11","q":"Explain three ways digital technology has changed the way businesses carry out market research.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":5},"answer":[{"heading":"It gives access to real-time data","body":"Online surveys, polls and social listening capture instant feedback. Firms can adjust quickly rather than wait for traditional reports.","bold_terms":[]},{"heading":"It allows analysis of large data sets","body":"AI and big data let firms examine search trends, reviews and online behaviour. This gives more accurate insight into what customers want.","bold_terms":[]},{"heading":"It lowers the cost of research","body":"Tools such as Google Analytics are cheap and accessible. This lets small firms run research once limited to large budgets.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-12","strand":2,"chapter":"2.4","lo":"9.6","lo_text":"Evaluate the influence of ethics and sustainability on marketing","level":"HL","verb":"DISCUSS","qnum":"12","q":"Discuss how sustainability can create opportunities for businesses to market their products.","stimulus":{"type":"headline","business":null,"headline":"Sustainability is no longer optional for brands, it is expected (Marketing Week, 2024)","body":null},"fmt":{"type":"numbered_box","points":3,"lines_per_point":5},"answer":[{"heading":"It builds trust and loyalty","body":"Promoting practices such as recyclable packaging earns customer trust. This drives repeat purchases and positive word of mouth. Many shoppers now favour brands that visibly reduce waste.","bold_terms":[]},{"heading":"It differentiates the brand","body":"Sustainability helps a firm stand out in a crowded market. Eco-friendly production can justify premium pricing. Carbon-neutral claims can set a brand apart from rivals.","bold_terms":[]},{"heading":"It expands the target market","body":"Rising climate awareness appeals to a wide customer base. Younger consumers actively seek out ethical brands. This opens access to new, growing audiences.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-13","strand":2,"chapter":"2.4","lo":"9.6","lo_text":"Evaluate the influence of ethics and sustainability on marketing","level":"HL","verb":"OUTLINE","qnum":"13","q":"Outline three ways ethics is an important consideration when designing a marketing strategy.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Honesty in advertising","body":"Advertisements must be truthful and not misleading. Claiming a product is '100% natural' when it is not would be unethical and damage trust.","bold_terms":[]},{"heading":"Respect for consumer rights","body":"Ethical marketing protects privacy and avoids exploitative targeting. Misusing customer data or targeting vulnerable groups harms reputation.","bold_terms":[]},{"heading":"Fairness in pricing and promotion","body":"Firms should avoid hidden charges and false offers. Genuine promotions and clear pricing build goodwill and loyalty.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-14","strand":2,"chapter":"2.4","lo":"9.7","lo_text":"Use a power interest grid* to analyse customer interest and adjust the marketing mix as necessary","level":"HL","verb":"ANALYSE","qnum":"14","q":"Zara is planning a new sustainable clothing range aimed at younger consumers. Place the customer groups on the power-interest grid below, then analyse how Zara should adjust its marketing mix for its highest-priority group.","stimulus":{"type":"business","business":"Zara","headline":"Global fashion retailer using a power-interest grid for a new range","body":"Zara is planning to launch a new sustainable clothing range aimed at younger consumers. Before deciding how to market it, Zara uses a power-interest grid to analyse different customer groups and decide where to focus its effort."},"fmt":{"type":"multi","parts":[{"type":"power_interest_grid","labelled":false},{"type":"plain_box","lines":14}]},"answer":[{"heading":"High power and high interest is the priority group","body":"Fashion-conscious young adults who shop at Zara often and influence others online sit here. They have both the spending power and the engagement to shape the range's success.","bold_terms":[]},{"heading":"The marketing mix should focus on this group","body":"Promotion should target them through social media and influencers, the channels they use. Product and place should reflect their demand for sustainable, trend-led, app-based shopping.","bold_terms":[]},{"heading":"Lower-priority groups need less marketing effort","body":"Low-power, low-interest customers are monitored but not prioritised. Concentrating effort on the high-power, high-interest group avoids treating all customers equally.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-15","strand":2,"chapter":"2.4","lo":"9.8","lo_text":"Conduct a STEEPLE analysis* to develop greater understanding of the external environment and identify issues of concern for a business","level":"HL","verb":"STEEPLE ANALYSIS","qnum":"15","q":"Conduct a STEEPLE analysis for Lululemon, focusing on any three factors of your choice. Identify any issues of concern the business should consider.","stimulus":{"type":"business","business":"Lululemon","headline":"Athleisure brand balancing global expansion with ethics and sustainability","body":"Lululemon faces growing pressure to expand globally while balancing sustainability and ethical supply-chain demands. It is using a STEEPLE analysis to understand its external environment."},"fmt":{"type":"plain_box","lines":24},"answer":[{"heading":"Economic: income and economic conditions","body":"As a premium brand, Lululemon benefits from rising disposable incomes. Inflation and recession can push consumers toward cheaper athleisure rivals. Issue of concern: a downturn could cut demand for its high-priced products.","bold_terms":[]},{"heading":"Environmental: sustainability pressures","body":"Consumers increasingly demand sustainable fabrics and low-impact production. Lululemon has pledged improvements but still relies on synthetic materials. Issue of concern: slow progress on eco-practices could damage its brand.","bold_terms":[]},{"heading":"Ethical: supply chain and labour","body":"Expansion requires ethical sourcing and fair labour across the supply chain. Past criticism of factory conditions highlights ongoing risk. Issue of concern: negative publicity on labour rights could slow international growth.","bold_terms":[]}],"biz":null},{"code":"2.4-HL-16","strand":2,"chapter":"2.4","lo":"9.8","lo_text":"Conduct a STEEPLE analysis* to develop greater understanding of the external environment and identify issues of concern for a business","level":"HL","verb":"STEEPLE ANALYSIS","qnum":"16","q":"Conduct a full STEEPLE analysis for a business of your choice. In your answer, identify any issues of concern for the business.","stimulus":null,"fmt":{"type":"plain_box","lines":28},"answer":[{"heading":"Social Active lifestyles","body":"and athleisure fashion support the brand. Issue of concern: a shift away from athleisure could cut demand.","bold_terms":["Issue of concern"]},{"heading":"Technological Social media and online shopping","body":"connect it to global customers. Issue of concern: falling behind in e-commerce could weaken its appeal.","bold_terms":["Issue of concern"]},{"heading":"Economic Premium pricing","body":"works when incomes are strong. Issue of concern: inflation or a downturn could reduce sales.","bold_terms":["Issue of concern"]},{"heading":"Environmental","body":"It promotes eco-conscious ranges, but expectations keep rising. Issue of concern: a gap between claims and action could harm its reputation.","bold_terms":["eco-conscious","Issue of concern"]},{"heading":"Political","body":"It relies on imports, exposing it to tariffs and trade disruption. Issue of concern: trade instability could hit stock and pricing.","bold_terms":["imports","tariffs and trade disruption","Issue of concern"]},{"heading":"Legal","body":"Supplier factories must meet safety and labour laws. Issue of concern: supplier breaches could bring fines and damage.","bold_terms":["safety and labour laws","Issue of concern"]},{"heading":"Ethical Ethical sourcing","body":"and fair treatment of workers are vital. Issue of concern: any link to unethical practices could damage trust.","bold_terms":["Issue of concern"]}],"biz":"Gym+Coffee"},{"code":"2.4-OL-01","strand":2,"chapter":"2.4","lo":"9.1","lo_text":"Appreciate the importance of market research in identifying the target market and discuss how businesses conduct market research","level":"OL","verb":"TICK","qnum":"1","q":"Tick the correct box to show whether each of the following is primary or secondary research.","stimulus":null,"fmt":{"type":"tick_table","headers":["Description","Primary","Secondary"],"rows":[["A Bord Bia report on food trends","",""],["A customer survey in a supermarket","",""],["CSO population statistics","",""],["A focus group for a new product launch","",""]]},"answer":[{"heading":"Answer","body":"Bord Bia report = Secondary; customer survey = Primary; CSO statistics = Secondary; focus group = Primary.","bold_terms":[]}],"biz":null},{"code":"2.4-OL-02","strand":2,"chapter":"2.4","lo":"9.1","lo_text":"Appreciate the importance of market research in identifying the target market and discuss how businesses conduct market research","level":"OL","verb":"TRUE/FALSE","qnum":"2","q":"Indicate whether each of the following statements about market research is True or False.","stimulus":null,"fmt":{"type":"true_false_inline","statements":["(a) Market research helps a business identify its target market. True / False","(b) Secondary research is always more accurate than primary research. True / False","(c) A customer survey is an example of primary research. True / False","(d) Analysing CSO population data is an example of secondary research. True / False","(e) Market research reduces the risk of business failure. True / False"]},"answer":[{"heading":"Answer","body":"(a) True; (b) False; (c) True; (d) True; (e) True.","bold_terms":[]}],"biz":null},{"code":"2.4-OL-03","strand":2,"chapter":"2.4","lo":"9.1","lo_text":"Appreciate the importance of market research in identifying the target market and discuss how businesses conduct market research","level":"OL","verb":"EXPLAIN","qnum":"3","q":"Explain one reason why a business should carry out market research.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"It reduces the risk of failure","body":"Testing ideas and gathering feedback shows what customers actually want. This reduces the chance of wasting resources on an unsuccessful product.","bold_terms":[]}],"biz":null},{"code":"2.4-OL-04","strand":2,"chapter":"2.4","lo":"9.2","lo_text":"Outline the elements of the marketing mix and explain their significance for a business and how they are influenced by the target market","level":"OL","verb":"OUTLINE","qnum":"4","q":"Outline one way the target market can influence the Price of a product.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Income level shapes the price charged","body":"The target market's income affects what a business can charge. A market with lower disposable income often needs lower, affordable prices.","bold_terms":[]}],"biz":null},{"code":"2.4-OL-05","strand":2,"chapter":"2.4","lo":"9.2","lo_text":"Outline the elements of the marketing mix and explain their significance for a business and how they are influenced by the target market","level":"OL","verb":"OUTLINE","qnum":"5","q":"Outline two ways the target market might influence the Product element of the marketing mix.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Customer preferences shape product design","body":"The target market's tastes influence a product's features. A phone maker may design larger screens to suit young people who stream video.","bold_terms":[]},{"heading":"Customer values shape the type of product","body":"If customers value sustainability, the firm may use eco-friendly materials. This adapts the product to what the target market cares about.","bold_terms":[]}],"biz":null},{"code":"2.4-OL-06","strand":2,"chapter":"2.4","lo":"9.2","lo_text":"Outline the elements of the marketing mix and explain their significance for a business and how they are influenced by the target market","level":"OL","verb":"IDENTIFY","qnum":"6","q":"Write the correct element of the marketing mix beside each statement about Supermac's (Product, Price, Place, Promotion, People, Packaging, Process, Physical Evidence).","stimulus":null,"fmt":{"type":"labelled_box","labels":["Statement about Supermac's Element","Supermac's introduces a new plant-based burger to meet customer demand.","Supermac's offers a student discount on meal deals.","Supermac's uses its website and app for online orders and delivery.","Supermac's runs TV adverts highlighting its sponsorship of GAA teams.","Staff are trained to provide quick, friendly customer service.","Food is served in branded compostable packaging.","Customers can order at the counter, on the app, or via drive-thru.","Supermac's restaurants are clean, bright and well laid out."],"lines_per_label":[0,0,0,0,0,0,0,0,0]},"answer":[{"heading":"Answer","body":"Product = plant-based burger; Price = student discount; Place = website and app orders; Promotion = TV adverts and GAA sponsorship; People = trained staff; Packaging = compostable packaging; Process = order at counter, app or drive-thru; Physical Evidence = clean, bright restaurants.","bold_terms":[]}],"biz":null},{"code":"2.4-OL-07","strand":2,"chapter":"2.4","lo":"9.3","lo_text":"Develop a marketing mix for a product and a service of choice and provide a USP analysis for each","level":"OL","verb":"DESCRIBE","qnum":"7","q":"(a) Describe three elements of the marketing mix (7Ps) for a product or service of your choice. (b) Explain one unique selling point (USP) of it.","stimulus":null,"fmt":{"type":"plain_box","lines":20},"answer":[{"heading":"Product","body":"Domino's offers a wide variety of pizzas, sides and desserts. Customers can customise orders, which increases choice and satisfaction.","bold_terms":["variety","customise","choice and satisfaction"]},{"heading":"Price","body":"It uses special offers and student discounts. This attracts value-conscious customers and encourages repeat orders.","bold_terms":["special offers","value-conscious customers","repeat orders"]},{"heading":"Place","body":"It delivers to homes and offers collection in stores. Its app makes ordering quick and convenient.","bold_terms":["quick and convenient"]},{"heading":"USP","body":"Domino's USP is fast, reliable delivery. This sets it apart from smaller local takeaways.","bold_terms":["USP","fast, reliable delivery"]}],"biz":"Domino's"},{"code":"2.4-OL-08","strand":2,"chapter":"2.4","lo":"9.3","lo_text":"Develop a marketing mix for a product and a service of choice and provide a USP analysis for each","level":"OL","verb":"MATCH","qnum":"8","q":"Write the correct element of the 7Ps marketing mix beside each example.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Example 7Ps Element","Helpful and friendly staff serve customers at the checkout.","A phone company charges €20 per month for unlimited calls.","Clothes are available in-store and online for home delivery.","A supermarket runs a TV advertising campaign.","A hotel gives customers branded toiletries and room key cards.","An airline introduces online check-in for passengers.","A coffee shop introduces dairy-free milk options."],"lines_per_label":[0,0,0,0,0,0,0,0]},"answer":[{"heading":"Answer","body":"People = friendly staff at the checkout; Price = €20 per month for unlimited calls; Place = clothes in-store and online; Promotion = TV advertising campaign; Physical Evidence = branded toiletries and key cards; Process = online check-in; Product = dairy-free milk options.","bold_terms":[]}],"biz":null},{"code":"2.4-OL-09","strand":2,"chapter":"2.4","lo":"9.3","lo_text":"Develop a marketing mix for a product and a service of choice and provide a USP analysis for each","level":"OL","verb":"DEVELOP","qnum":"9","q":"Complete a USP analysis for a product of your choice.","stimulus":null,"fmt":{"type":"plain_box","lines":16},"answer":[{"heading":"What the customer wants Affordable, fashionable","body":"clothes that change quickly with trends.","bold_terms":["trends"]},{"heading":"What the business does well","body":"Penneys offers fast fashion at low prices, with huge variety and frequent new stock.","bold_terms":["fast fashion","variety"]},{"heading":"What competitors do well","body":"Rivals such as H&M and Zara offer similar trends at slightly higher quality.","bold_terms":["higher quality"]},{"heading":"USP","body":"Penneys stands out as the most affordable option on the high street, a clear USP for students and young adults.","bold_terms":["most affordable","USP"]}],"biz":"Penneys"},{"code":"2.4-OL-10","strand":2,"chapter":"2.4","lo":"9.4","lo_text":"Evaluate and suggest ways of improving an existing marketing mix","level":"OL","verb":"SUGGEST","qnum":"10","q":"Suggest two improvements the cafe could make to its marketing mix.","stimulus":{"type":"business","business":"Local cafe","headline":"Small cafe reviewing its marketing mix","body":"A local cafe has a small menu with limited vegetarian options. Its prices are higher than nearby competitors, it advertises mainly with posters in the window, and its staff are friendly and welcoming."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Product: widen the menu","body":"The cafe could add more vegetarian and vegan options. This would attract a broader range of customers.","bold_terms":[]},{"heading":"Promotion: use social media","body":"The cafe could advertise on social media instead of relying on window posters. This would reach a much wider audience.","bold_terms":[]}],"biz":null},{"code":"2.4-OL-11","strand":2,"chapter":"2.4","lo":"9.8","lo_text":"Conduct a STEEPLE analysis* to develop greater understanding of the external environment and identify issues of concern for a business","level":"OL","verb":"LIST","qnum":"11","q":"List three factors of a STEEPLE analysis and give one example of each.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":1},"answer":[{"heading":"Social","body":"Lifestyle trends and demographics, e.g. more people choosing healthier food options.","bold_terms":[]},{"heading":"Technological","body":"Innovation and digital tools, e.g. online shopping apps helping retailers reach customers.","bold_terms":[]},{"heading":"Economic","body":"Income levels and economic conditions, e.g. higher interest rates reducing consumer spending.","bold_terms":[]}],"biz":null},{"code":"2.4-OL-12","strand":2,"chapter":"2.4","lo":"9.8","lo_text":"Conduct a STEEPLE analysis* to develop greater understanding of the external environment and identify issues of concern for a business","level":"OL","verb":"MATCH","qnum":"12","q":"Match each STEEPLE factor to the correct example. Write the correct letter (A, B, C or D) in each box.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["OPTIONSA.  Social      B.  Technological      C.  Environmental      D.  Legal"],"lines_per_label":[0]},{"type":"labelled_box","labels":["Description Letter","1.  Growth in healthy lifestyle trends.","2.  Use of mobile apps for ordering.","3.  Ban on plastic packaging in retail.","4.  Minimum wage legislation."],"lines_per_label":[0,0,0,0,0]}]},"answer":[{"heading":"Answer","body":"1 = B (Social); 2 = C (Technological); 3 = A (Environmental); 4 = D (Legal).","bold_terms":[]}],"biz":null},{"code":"2.5-HL-01","strand":2,"chapter":"2.5","lo":"10.1","lo_text":"Outline the main elements that are key to the operational model of a business and explain why these may change over time","level":"HL","verb":"OUTLINE","qnum":"1","q":"(a) Outline the three key elements of the operational model of a business. (b) Explain two reasons why each of these elements may change over time.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(a) Key elements","(b) Why each changes"],"lines_per_label":[7,7]},"answer":[{"heading":"(a) Key Partners","body":"The external organisations a business works with to operate, such as suppliers and distributors. They allow the firm to deliver its product without doing everything itself.","bold_terms":[]},{"heading":"(a) Key Activities","body":"The essential tasks a business must perform to deliver value, such as production, logistics and customer service. These are the core actions the business is built around.","bold_terms":[]},{"heading":"(a) Key Resources","body":"The assets a business needs to function, including machinery, staff, finance and brands. Without them the business cannot deliver its value proposition.","bold_terms":[]},{"heading":"(b) Partners change with growth and ethics","body":"As a firm expands it may outgrow original suppliers and need larger partners. Shifting customer expectations may also push it toward fair-trade or eco-friendly suppliers.","bold_terms":[]},{"heading":"(b) Activities change with technology and demand","body":"Advances in AI or e-commerce can add or replace core activities, such as online sales. New customer needs may require services like app ordering or click-and-collect.","bold_terms":[]},{"heading":"(b) Resources change with wear and finance","body":"Machinery and technology date and must be upgraded or replaced. A start-up funded by crowdfunding may later rely on retained earnings or loans.","bold_terms":[]}],"biz":null},{"code":"2.5-HL-02","strand":2,"chapter":"2.5","lo":"10.1","lo_text":"Outline the main elements that are key to the operational model of a business and explain why these may change over time","level":"HL","verb":"EXPLAIN","qnum":"2","q":"Explain how changes in technology, partnerships and sustainability goals might impact Starbucks' operational model.","stimulus":{"type":"business","business":"Starbucks","headline":"Global coffee chain announcing a major digital and sustainability shift","body":"Starbucks plans to integrate AI-driven recommendations into its app, expand delivery partnerships with Uber Eats and Deliveroo, and shift toward reusable packaging to meet sustainability targets."},"fmt":{"type":"labelled_box","labels":["Technology","1","Partnerships","1","Sustainability","1"],"lines_per_label":[0,5,0,5,0,5]},"answer":[{"heading":"Technology adds new activities and resources","body":"AI-driven app recommendations add a key activity of building and running digital platforms. This needs new resources such as skilled IT staff and investment in data systems.","bold_terms":[]},{"heading":"New partners widen reach but add dependency","body":"Delivery partners such as Uber Eats extend Starbucks beyond its own stores. However, they introduce risks such as high fees and loss of direct customer contact.","bold_terms":[]},{"heading":"Sustainability reshapes resources and activities","body":"Reusable packaging requires new eco-friendly materials and recycling systems. It also adds activities such as staff training and may need new packaging partners.","bold_terms":[]}],"biz":null},{"code":"2.5-HL-03","strand":2,"chapter":"2.5","lo":"10.1","lo_text":"Outline the main elements that are key to the operational model of a business and explain why these may change over time","level":"HL","verb":"OUTLINE","qnum":"3","q":"Choose a business you are familiar with. Outline one example each of its key partners, key activities and key resources, and explain how one of these may need to change in the future.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Key partners, activities and resources (one example each)","1","2","3","How one element may need to change","1"],"lines_per_label":[0,4,4,4,0,4]},"answer":[{"heading":"Key Partner","body":"Global sports brands such as Nike, Adidas and Puma that supply its products. These partners stock Elverys with the goods it sells.","bold_terms":["partners"]},{"heading":"Key Activity Retailing","body":"through physical stores and online, with campaigns tied to major sporting events. This is how Elverys reaches and serves customers.","bold_terms":["reaches and serves customers"]},{"heading":"Key Resource","body":"Its strong brand reputation in Ireland as a trusted sports retailer. This brand strength draws repeat custom.","bold_terms":["brand reputation","brand strength"]},{"heading":"How an element may change Retailing","body":"may shift further online as more consumers shop digitally. To stay competitive, Elverys must invest in its e-commerce platform and digital marketing.","bold_terms":["online","e-commerce platform"]}],"biz":"Elverys Sports"},{"code":"2.5-HL-04","strand":2,"chapter":"2.5","lo":"10.2","lo_text":"Identify the key costs and sources of finance for a business and explore why these may change over the lifecycle of the product or service","level":"HL","verb":"IDENTIFY","qnum":"4","q":"Identify three short-term sources of finance Ryanair could use to cover its variable costs, such as fuel and wages.","stimulus":{"type":"business","business":"Ryanair","headline":"Low-cost airline managing short-term cash needs","body":"Ryanair faces large variable costs such as fuel and wages that must be paid regularly. It is reviewing short-term sources of finance to manage its cash flow."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Bank overdraft","body":"This lets a business withdraw more than is in its account for quick cash. Ryanair could use it to pay fuel bills when cash flow is tight.","bold_terms":[]},{"heading":"Trade credit","body":"This is when suppliers allow delayed payment for goods or services. Ryanair could pay catering or engineering firms later, freeing up cash.","bold_terms":[]},{"heading":"Accrued expenses","body":"These are costs recorded but not yet paid, such as airport fees. Delaying them briefly lets Ryanair cover urgent costs like wages and fuel.","bold_terms":[]}],"biz":null},{"code":"2.5-HL-05","strand":2,"chapter":"2.5","lo":"10.2","lo_text":"Identify the key costs and sources of finance for a business and explore why these may change over the lifecycle of the product or service","level":"HL","verb":"IDENTIFY","qnum":"5","q":"(i) Identify two short-term sources of finance Innocent Drinks could have used at start-up. (ii) Identify two medium-term sources it might now use during growth. (iii) State one reason why a business's choice of finance changes as it moves from start-up to growth.","stimulus":{"type":"business","business":"Innocent Drinks","headline":"Smoothie brand moving from market stalls to supermarkets","body":"Innocent Drinks started selling at festivals in London. After proving demand it moved into supermarkets, which required investment in equipment and delivery vans."},"fmt":{"type":"labelled_box","labels":["(i) Short-term","(ii) Medium-term","(iii) Reason"],"lines_per_label":[5,5,5]},"answer":[{"heading":"(i) Short-term: bank overdraft","body":"Immediate access to cash by withdrawing more than is in the account. Innocent could pay for fruit and stall fees before sales income arrived.","bold_terms":[]},{"heading":"(i) Short-term: trade credit","body":"Paying suppliers at a later date. Innocent could buy fruit and packaging on credit and pay once smoothie sales came in.","bold_terms":[]},{"heading":"(ii) Medium-term: leasing","body":"Renting an asset for a period rather than buying it outright. Innocent could lease delivery vans to expand distribution without tying up capital.","bold_terms":[]},{"heading":"(ii) Medium-term: hire purchase","body":"Buying an asset in instalments, owning it after the final payment. Innocent could acquire juicing machinery this way, matching payments to growing sales.","bold_terms":[]},{"heading":"(iii) Why the choice changes","body":"Financial needs grow as the business expands. Start-up needs small, short-term finance for daily costs, while growth needs larger, medium-term finance for vans and equipment.","bold_terms":[]}],"biz":null},{"code":"2.5-HL-06","strand":2,"chapter":"2.5","lo":"10.2","lo_text":"Identify the key costs and sources of finance for a business and explore why these may change over the lifecycle of the product or service","level":"HL","verb":"IDENTIFY","qnum":"6","q":"(i) Identify one fixed cost and one variable cost for Pret A Manger at the start. (ii) Identify one way its variable costs are likely to change during growth. (iii) State one reason why the balance between fixed and variable costs changes from start-up to growth.","stimulus":{"type":"business","business":"Pret A Manger","headline":"Cafe chain growing from a single London shop","body":"Pret A Manger began with a single London shop, with main costs of rent and small amounts of food stock. As demand grew, it hired more staff and ordered supplies in bulk."},"fmt":{"type":"labelled_box","labels":["(i) Fixed and variable cost","(ii) Change in variable costs","(iii) Reason balance changes"],"lines_per_label":[5,5,5]},"answer":[{"heading":"(i) Fixed cost: rent","body":"A fixed cost stays the same regardless of output. Pret had to pay shop rent even on quiet days.","bold_terms":[]},{"heading":"(i) Variable cost: ingredients","body":"A variable cost rises and falls with sales. Pret's spending on bread, milk and coffee rose only as more was sold.","bold_terms":[]},{"heading":"(ii) Variable costs rise but unit cost can fall","body":"Food and wage costs would increase as sales grew. However, bulk purchasing could lower the cost per item through economies of scale.","bold_terms":[]},{"heading":"(iii) Fixed costs grow with expansion","body":"Expansion adds fixed costs that do not depend on sales, such as extra leases and salaried managers. These become a larger share of total costs than variable costs.","bold_terms":[]}],"biz":null},{"code":"2.5-HL-07","strand":2,"chapter":"2.5","lo":"10.2","lo_text":"Identify the key costs and sources of finance for a business and explore why these may change over the lifecycle of the product or service","level":"HL","verb":"IDENTIFY","qnum":"7","q":"Apart from subscriptions, identify two other revenue streams Duolingo could use.","stimulus":{"type":"business","business":"Duolingo","headline":"Online language-learning business diversifying its income","body":"Duolingo is an online subscription business offering language learning. It is exploring revenue streams beyond subscriptions."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Advertising","body":"Income from companies placing ads on the free version of the app. This earns revenue from users who do not pay.","bold_terms":[]},{"heading":"Service fees","body":"Income from extra features such as one-to-one tutoring. This provides another source of income alongside subscriptions.","bold_terms":[]}],"biz":null},{"code":"2.5-HL-08","strand":2,"chapter":"2.5","lo":"10.2","lo_text":"Identify the key costs and sources of finance for a business and explore why these may change over the lifecycle of the product or service","level":"HL","verb":"IDENTIFY","qnum":"8","q":"Identify one revenue stream a gym might rely on at start-up, and briefly explain how additional revenue streams could be developed during growth.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Start-up","1","Growth","1"],"lines_per_label":[0,5,0,5]},"answer":[{"heading":"Membership fees at start-up","body":"At start-up the gym's main income is monthly or annual membership fees. These pay for access to its facilities.","bold_terms":[]},{"heading":"Additional streams during growth","body":"In growth the gym could add personal training, branded merchandise or online classes. These diversify income and reduce reliance on memberships alone.","bold_terms":[]}],"biz":null},{"code":"2.5-HL-09","strand":2,"chapter":"2.5","lo":"10.2","lo_text":"Identify the key costs and sources of finance for a business and explore why these may change over the lifecycle of the product or service","level":"HL","verb":"EXPLAIN","qnum":"9","q":"Briefly explain three revenue streams a business may have.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":5},"answer":[{"heading":"Product sales","body":"Revenue earned from selling goods, such as a retailer selling clothing. This is often the main income source for a business.","bold_terms":[]},{"heading":"Service fees","body":"Income from providing services, such as a gym charging for personal training. This adds income alongside core sales.","bold_terms":[]},{"heading":"Subscriptions","body":"Regular recurring payments, such as a monthly streaming fee. This stream provides predictable, steady cash flow.","bold_terms":[]}],"biz":null},{"code":"2.5-HL-10","strand":2,"chapter":"2.5","lo":"10.2","lo_text":"Identify the key costs and sources of finance for a business and explore why these may change over the lifecycle of the product or service","level":"HL","verb":"EXPLAIN","qnum":"10","q":"Briefly explain two reasons why a business might adjust its revenue streams over time.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Changing consumer behaviour","body":"Firms adapt revenue streams when customer preferences shift. Newspapers, for example, added digital subscriptions as print sales fell.","bold_terms":[]},{"heading":"Spreading risk","body":"Relying on one revenue stream is risky, so firms diversify. A cafe might add online delivery to reduce dependence on walk-in sales.","bold_terms":[]}],"biz":null},{"code":"2.5-HL-11","strand":2,"chapter":"2.5","lo":"10.3","lo_text":"Analyse the cashflow of a business and recommend a suitable course of action for the business to address the issues arising from the analysis","level":"HL","verb":"ANALYSE","qnum":"11","q":"Examine the cashflow forecast for FreshBrew Coffee Ltd below. (i) Identify the month with the largest cash deficit. (ii) Analyse one likely reason for this deficit. (iii) Recommend two actions the owner could take to address this cashflow issue.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["All figures EUR","Jan","Feb","Mar","Apr","Total"],"rows":[["RECEIPTS","","","","",""],["Sales","45,000","42,000","48,000","52,000","187,000"],["Catering/Events","5,000","4,000","6,000","5,000","20,000"],["Total Receipts","50,000","46,000","54,000","57,000","207,000"],["PAYMENTS","","","","",""],["Rent","8,000","8,000","8,000","8,000","32,000"],["Stock","22,000","24,000","26,000","23,000","95,000"],["Wages","14,000","15,000","16,000","15,000","60,000"],["Utilities","2,000","2,000","2,000","2,000","8,000"],["Equipment","-","-","25,000","-","25,000"],["Total Payments","46,000","49,000","77,000","48,000","220,000"],["Net Cash","+4,000","-3,000","-23,000","+9,000","-13,000"],["Opening Cash","4,000","8,000","5,000","-18,000","4,000"],["Closing Cash","8,000","5,000","-18,000","-9,000","-9,000"]]},{"type":"labelled_box","labels":["(i) Largest deficit","(ii) Analysis","(iii) Two actions"],"lines_per_label":[3,6,6]}]},"answer":[{"heading":"(i) Largest deficit","body":"March, with a closing cash position of minus 18,000 euro, the most negative month.","bold_terms":[]},{"heading":"(ii) Likely reason","body":"A one-off equipment purchase of 25,000 euro in March pushed total payments to 77,000 euro. This drove net cash to minus 23,000 euro and the month into deficit, even though sales were steady.","bold_terms":[]},{"heading":"(iii) Recommended actions","body":"Spread the cost by leasing or hire purchase so the large payment becomes smaller monthly repayments. Arrange a short-term overdraft to cover the shortfall while receipts recover in April, monitoring cash weekly.","bold_terms":[]}],"biz":null},{"code":"2.5-HL-12","strand":2,"chapter":"2.5","lo":"10.3","lo_text":"Analyse the cashflow of a business and recommend a suitable course of action for the business to address the issues arising from the analysis","level":"HL","verb":"ANALYSE","qnum":"12","q":"Examine the cashflow forecast below. (i) Identify one month of surplus and one of deficit. (ii) Analyse the impact of the cash deficit on suppliers or employees. (iii) Recommend one course of action to improve the future cash position.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["All figures EUR","Mar","Apr","May","Jun","Total"],"rows":[["RECEIPTS","","","","",""],["Sales","35,000","48,000","60,000","38,000","181,000"],["Service Income","3,000","4,000","5,000","4,000","16,000"],["Total Receipts","38,000","52,000","65,000","42,000","197,000"],["PAYMENTS","","","","",""],["Stock Purchases","24,000","28,000","32,000","29,000","113,000"],["Wages","12,000","12,500","13,000","13,000","50,500"],["Marketing","12,000","-","-","-","12,000"],["Loan Repayment","3,000","3,000","3,000","3,000","12,000"],["Utilities & Other","2,000","2,000","2,000","2,000","8,000"],["Total Payments","53,000","45,500","50,000","47,000","195,500"],["Net Cash","-15,000","+6,500","+15,000","-5,000","+1,500"],["Opening Cash","6,000","-9,000","-2,500","12,500","6,000"],["Closing Cash","-9,000","-2,500","12,500","7,500","7,500"]]},{"type":"labelled_box","labels":["(i) Surplus and deficit","(ii) Impact","(iii) Action"],"lines_per_label":[3,6,5]}]},"answer":[{"heading":"(i) Surplus and deficit","body":"Surplus: May, with closing cash of 12,500 euro. Deficit: March, with closing cash of minus 9,000 euro.","bold_terms":[]},{"heading":"(ii) Impact on stakeholders","body":"March's deficit risks late payment of stock invoices to suppliers. This could damage credit terms, cost early-payment discounts and even interrupt supply if trust is lost.","bold_terms":[]},{"heading":"(iii) Recommended action","body":"Arrange a bank overdraft, a short-term source of finance covering temporary shortfalls. This would cover March and April and ensure suppliers are paid on time.","bold_terms":[]}],"biz":null},{"code":"2.5-OL-01","strand":2,"chapter":"2.5","lo":"10.1","lo_text":"Outline the main elements that are key to the operational model of a business and explain why these may change over time","level":"OL","verb":"LIST","qnum":"1","q":"For a business of your choice, list one key partner, one key activity and one key resource.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":1},"answer":[{"heading":"Key partner","body":"Phone makers such as Apple and Samsung, whose products Vodafone sells (its key suppliers).","bold_terms":["key suppliers"]},{"heading":"Key activity","body":"Providing mobile, broadband and data services to customers.","bold_terms":["mobile, broadband and data services"]},{"heading":"Key resource","body":"Its network infrastructure, including masts and data centres across Ireland.","bold_terms":["network infrastructure"]}],"biz":"Vodafone"},{"code":"2.5-OL-02","strand":2,"chapter":"2.5","lo":"10.1","lo_text":"Outline the main elements that are key to the operational model of a business and explain why these may change over time","level":"OL","verb":"STATE","qnum":"2","q":"State two examples of key resources a business might have.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"A premises","body":"A retail store or building from which the business operates.","bold_terms":[]},{"heading":"Skilled employees","body":"Trained staff whose expertise helps the business run.","bold_terms":[]}],"biz":null},{"code":"2.5-OL-03","strand":2,"chapter":"2.5","lo":"10.1","lo_text":"Outline the main elements that are key to the operational model of a business and explain why these may change over time","level":"OL","verb":"EXPLAIN","qnum":"3","q":"Explain what is meant by a 'key activity' in a business. Give one example.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"A key activity is an essential task the business must perform","body":"It is one of the core tasks needed to deliver value and meet objectives, such as production or marketing. For Vodafone, a key activity is providing mobile and broadband services to customers.","bold_terms":[]}],"biz":null},{"code":"2.5-OL-04","strand":2,"chapter":"2.5","lo":"10.1","lo_text":"Outline the main elements that are key to the operational model of a business and explain why these may change over time","level":"OL","verb":"MATCH","qnum":"4","q":"Match each element to the correct description. Write the correct letter (A, B or C) in each box.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["OPTIONSA.  Key Partners      B.  Key Activities      C.  Key Resources"],"lines_per_label":[0]},{"type":"labelled_box","labels":["Description Letter","1.  Tasks that the business must carry out to operate successfully.","2.  External organisations or individuals the business works with.","3.  Assets such as staff, finance or equipment."],"lines_per_label":[0,0,0,0]}]},"answer":[{"heading":"Answer","body":"1 = B (Key Partners); 2 = A (Key Activities); 3 = C (Key Resources).","bold_terms":[]}],"biz":null},{"code":"2.5-OL-05","strand":2,"chapter":"2.5","lo":"10.2","lo_text":"Identify the key costs and sources of finance for a business and explore why these may change over the lifecycle of the product or service","level":"OL","verb":"IDENTIFY","qnum":"5","q":"Identify one variable cost for a bakery and explain why it changes depending on sales.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Flour is a variable cost","body":"The more bread and cakes the bakery makes, the more flour it must buy. If sales fall, less flour is needed, so the cost decreases.","bold_terms":[]}],"biz":null},{"code":"2.5-OL-06","strand":2,"chapter":"2.5","lo":"10.2","lo_text":"Identify the key costs and sources of finance for a business and explore why these may change over the lifecycle of the product or service","level":"OL","verb":"STATE","qnum":"6","q":"State one medium-term source of finance a business could use to buy a van and give one reason for your choice.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Hire purchase","body":"This lets a business pay for an asset in instalments over a few years, owning it at the end. It suits a van because the cost is spread out, making it affordable.","bold_terms":[]}],"biz":null},{"code":"2.5-OL-07","strand":2,"chapter":"2.5","lo":"10.2","lo_text":"Identify the key costs and sources of finance for a business and explore why these may change over the lifecycle of the product or service","level":"OL","verb":"STATE","qnum":"7","q":"State one way fixed costs might increase as a business grows.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Extra rent","body":"As a business expands into new premises, it must pay more rent. This is a fixed cost because it stays the same each month, regardless of sales.","bold_terms":[]}],"biz":null},{"code":"2.5-OL-08","strand":2,"chapter":"2.5","lo":"10.2","lo_text":"Identify the key costs and sources of finance for a business and explore why these may change over the lifecycle of the product or service","level":"OL","verb":"IDENTIFY","qnum":"8","q":"Identify one reason why a business might add new revenue streams as it expands.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"To reduce risk","body":"Adding streams, such as a cafe adding online delivery, makes the firm less reliant on one income source. This protects it if sales fall in one area.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-01","strand":2,"chapter":"2.6","lo":"11.1","lo_text":"Demonstrate an understanding of the importance of identifying competition in the market","level":"HL","verb":"IDENTIFY","qnum":"1","q":"(i) Identify two competitors of Boojum in the Irish fast-casual food market. (ii) Outline three reasons why it is important for Boojum to identify its competitors.","stimulus":{"type":"business","business":"Boojum","headline":"Irish fast-casual Mexican chain competing across several cities","body":"Boojum is an Irish-owned fast-casual restaurant chain specialising in Mexican-style food such as burritos and tacos. It has outlets in Dublin, Cork, Limerick and Belfast and competes with a range of takeaway and casual dining businesses."},"fmt":{"type":"labelled_box","labels":["(i) Two competitors","(ii) Reason 1","(ii) Reason 2","(ii) Reason 3"],"lines_per_label":[5,5,5,5]},"answer":[{"heading":"(i) Tolteca and Chopped","body":"Tolteca is a direct competitor in the Mexican fast-casual sector. Chopped is an indirect competitor attracting health-conscious customers seeking quick meals.","bold_terms":[]},{"heading":"(ii) It can learn from competitors","body":"Analysing rivals lets Boojum benchmark its operations and adopt best practice. This helps it stay competitive and avoid falling behind.","bold_terms":[]},{"heading":"(ii) It can spot changing customer preferences","body":"Competitor activity reveals emerging trends such as plant-based diets. Boojum can then adapt its menu to keep meeting customer needs.","bold_terms":[]},{"heading":"(ii) It can identify opportunities and threats","body":"Awareness of rivals highlights threats such as new entrants or price cutting. It also reveals openings, such as new locations, before competitors take them.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-02","strand":2,"chapter":"2.6","lo":"11.2","lo_text":"Use Porter’s five forces model to identify and analyse competition in the market and use these findings to identify the competitive advantage of a business","level":"HL","verb":"EXPLAIN","qnum":"2","q":"(i) Explain two reasons why it is important for Glossier to identify its competitive advantage. (ii) Outline two ways Glossier could capitalise on its competitive advantage to keep growing.","stimulus":{"type":"business","business":"Glossier","headline":"Online-first beauty brand competing with global and niche rivals","body":"Glossier is a fast-growing beauty and skincare brand built on online sales, minimalist branding and strong social media marketing. It faces competition from both global beauty giants and smaller niche brands."},"fmt":{"type":"labelled_box","labels":["(i) Reason 1","(i) Reason 2","(ii) Way 1","(ii) Way 2"],"lines_per_label":[6,6,6,6]},"answer":[{"heading":"(i) It allows the brand to differentiate","body":"Knowing its USP of community-driven marketing sets Glossier apart from global giants. This makes it easier to attract and hold customers.","bold_terms":[]},{"heading":"(i) It supports long-term survival","body":"Understanding its advantage lets Glossier build strategies rivals cannot easily copy. This protects loyalty and supports lasting growth.","bold_terms":[]},{"heading":"(ii) Strengthen the marketing mix","body":"Glossier can use its online community to shape new products and social media promotion. This reinforces its USP and builds loyalty.","bold_terms":[]},{"heading":"(ii) Reinvest in distinctive branding","body":"Glossier could deepen its minimalist, community-led branding. Strong branding protects its advantage against larger competitors.","bold_terms":[]}],"biz":null},{"code":"2.6-HL-03","strand":2,"chapter":"2.6","lo":"11.2","lo_text":"Use Porter’s five forces model to identify and analyse competition in the market and use these findings to identify the competitive advantage of a business","level":"HL","verb":"ANALYSE","qnum":"3","q":"Use Porter's Five Forces model to analyse the competitive environment of a business of your choice. Based on your analysis, identify one competitive advantage the business could capitalise on.","stimulus":null,"fmt":{"type":"plain_box","lines":30},"answer":[{"heading":"Threat of new entrants is low","body":"High barriers to entry, such as supply chains, scale and logistics, deter new firms. This protects Zara's position in fast fashion.","bold_terms":["barriers to entry","deter new firms"]},{"heading":"Bargaining power of suppliers is low","body":"Zara owns much of its production and sources from many suppliers. This vertical integration keeps supplier power low.","bold_terms":["vertical integration","supplier power"]},{"heading":"Bargaining power of customers is high","body":"Customers can easily switch to rivals such as H&M or Shein. Price sensitivity increases their influence over Zara.","bold_terms":["switch to rivals","Price sensitivity","influence"]},{"heading":"Threat of substitutes is rising Substitutes","body":"such as second-hand and sustainable alternatives are growing in popularity. These pose an increasing threat.","bold_terms":["increasing threat"]},{"heading":"Competitive rivalry is intense Rivalry","body":"is strong, with competitors such as H&M, ASOS and Shein. Zara must compete through product range, fast turn
