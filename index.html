r":[{"heading":"1. Manages change:","body":"Communicating quickly and clearly during a recall reduces uncertainty and stops rumour spreading. At Kerry Group, internal briefings to staff and a clear public statement kept everyone working from the same information.","bold_terms":[]},{"heading":"2. Supports collaboration:","body":"Open communication channels let teams across the business share information and act together. At Kerry Group, coordinated briefings allowed production and customer-service teams to respond as one unit.","bold_terms":[]},{"heading":"3. Avoids conflict:","body":"Honest and timely messaging stops customers and partners feeling misled when something goes wrong. At Kerry Group, the clear public notice limited disputes with retailers and protected long-term relationships.","bold_terms":[]}],"biz":null},{"code":"3.3-HL-02","strand":3,"chapter":"3.3","lo":"15.1","lo_text":"Explain the importance of communication in an organisation","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline two reasons why clear communication is important during organisational change in a business.","stimulus":{"type":"business","business":"Klarna","headline":"2024 — announcing an internal restructure","body":"Klarna, the Swedish buy-now-pay-later fintech with a major Dublin office, announced a restructure of its product teams in 2024 as part of a wider efficiency drive. Staff were briefed by team leads ahead of any external press coverage. (Klarna press release, 2024)"},"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"1. Manages change:","body":"Clear communication explains why the change is happening and what staff should expect. This reduces uncertainty and the resistance that grows when staff are left to fill gaps with rumour.","bold_terms":[]},{"heading":"2. Increases engagement:","body":"When leaders explain decisions openly, staff feel respected and stay involved with the business. Engaged staff are more likely to support a restructure rather than disengage from it.","bold_terms":[]}],"biz":null},{"code":"3.3-HL-03","strand":3,"chapter":"3.3","lo":"15.1","lo_text":"Explain the importance of communication in an organisation","level":"HL","verb":"TICK-BOX","qnum":"3","q":"For each of the following statements about effective communication, indicate which principle it best illustrates by placing a tick (✓) in the correct column.","stimulus":null,"fmt":{"type":"data_table","headers":["Statement","Timing","Confidentiality","Use of visuals"],"rows":[["1. A pie chart is used to summarise quarterly sales results in a board meeting.","☐","☐","☐"],["2. A salary review letter is sent in a sealed envelope marked private.","☐","☐","☐"],["3. A site safety alert is issued to all staff within minutes of an incident.","☐","☐","☐"],["4. A flowchart is used to show staff the steps in a new returns procedure.","☐","☐","☐"],["5. A press release is timed to land just before the markets open on Monday.","☐","☐","☐"],["6. Customer card details are shared only with the staff processing the refund.","☐","☐","☐"]]},"answer":[{"heading":"","body":"1. Use of visuals    ·    2. Confidentiality    ·    3. Timing    ·    4. Use of visuals    ·    5. Timing    ·    6. Confidentiality","bold_terms":[]}],"biz":null},{"code":"3.3-HL-04","strand":3,"chapter":"3.3","lo":"15.2","lo_text":"Identify different modes of communication and analyse the efficacy of each mode as an approach within an organisation","level":"HL","verb":"IDENTIFY","qnum":"4","q":"For each scenario below, identify the most appropriate mode of communication and briefly justify your choice.","stimulus":{"type":"business","business":"Three Ireland","headline":"2024 — updating its customer-care team","body":"Three Ireland, the mobile network operator, runs a busy customer-care centre at its Dublin offices. The team handles a mix of fast-moving operational updates and detailed coaching conversations during shifts. (company information)"},"fmt":{"type":"labelled_box","labels":["Scenario 1: Notifying all agents about a sudden network outage that customers are calling about","Scenario 2: A team leader giving an agent personal performance feedback after a difficult call"],"lines_per_label":[5,5]},"answer":[{"heading":"Scenario 1: Written — instant message to all agents.","body":"A written message reaches every agent at once and gives a record they can read back during the call. At Three Ireland, this keeps every agent on the same script while the outage is live.","bold_terms":[]},{"heading":"Scenario 2: Verbal — face-to-face conversation.","body":"Performance feedback is sensitive and benefits from tone and eye contact. At Three Ireland, holding the conversation in private protects the agent’s dignity and lets the team leader see how the message is being received.","bold_terms":[]}],"biz":null},{"code":"3.3-HL-05","strand":3,"chapter":"3.3","lo":"15.2","lo_text":"Identify different modes of communication and analyse the efficacy of each mode as an approach within an organisation","level":"HL","verb":"ANALYSE","qnum":"5","q":"Analyse the efficacy of non-verbal communication for floor staff in a busy retail setting like Smyths Toys.","stimulus":{"type":"business","business":"Smyths Toys","headline":"2024 — busy in-store customer service","body":"Smyths Toys, the Galway-founded retailer with stores across Ireland, the UK and Europe, sees peak customer footfall every weekend. Floor staff often communicate across busy aisles, at checkouts, and with families approaching for help finding products. (company information)"},"fmt":{"type":"labelled_box","labels":["Benefit 1","Benefit 2","Challenge"],"lines_per_label":[5,5,5]},"answer":[{"heading":"Benefit 1 — Communicates without interrupting:","body":"Floor staff can use eye contact and a smile to acknowledge a customer instantly, without breaking off the current conversation. This signals attention and keeps the experience smooth on a busy weekend.","bold_terms":[]},{"heading":"Benefit 2 — Crosses language barriers:","body":"Gestures and facial expressions are understood by customers regardless of nationality or first language. At Smyths Toys, with shoppers from many backgrounds, non-verbal cues let staff guide a customer to the right aisle even when speech alone would not.","bold_terms":[]},{"heading":"Challenge — Open to misinterpretation:","body":"Non-verbal signals can mean different things to different people, and a gesture seen as friendly by one customer may seem dismissive to another. This means non-verbal communication works best when paired with short verbal exchanges to confirm meaning.","bold_terms":[]}],"biz":null},{"code":"3.3-HL-06","strand":3,"chapter":"3.3","lo":"15.2","lo_text":"Identify different modes of communication and analyse the efficacy of each mode as an approach within an organisation","level":"HL","verb":"MATCH","qnum":"6","q":"Column 1 is a list of communication modes. Column 2 is a list of business scenarios. (One scenario does not match any of the modes.)","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["","Column 1:  Modes","","Column 2:  Scenarios"],"rows":[["1","Verbal — face-to-face","A","A weekly all-hands meeting connects head office with five regional offices, using shared slides on screen so everyone can see the presentation together."],["2","Verbal — written email","B","A manager nods to acknowledge a customer who is waiting at the till, without speaking."],["3","Verbal — video call","C","An HR officer issues a formal warning that must be kept on file as a permanent written record."],["4","Non-verbal — body language","D","Two managers meet in a private office to discuss a sensitive performance issue with the employee sitting opposite them."],["5","Verbal — phone call","E","A duty manager makes a one-to-one voice call from the warehouse floor to chase an urgent missing delivery from a single supplier."],["","","F","A finance team uses spreadsheets to project next quarter’s cash flow."]]},{"type":"labelled_box","labels":["1 2 3 4 5"],"lines_per_label":[1]}]},"answer":[{"heading":"","body":"1 = D    ·    2 = C    ·    3 = A    ·    4 = B    ·    5 = E","bold_terms":[]}],"biz":null},{"code":"3.3-HL-07","strand":3,"chapter":"3.3","lo":"15.3","lo_text":"Discuss how technology enables communication in organisations","level":"HL","verb":"DISCUSS","qnum":"7","q":"Discuss three ways technology enables communication for a distributed team like the one at Revolut.","stimulus":{"type":"business","business":"Revolut","headline":"2024 — fully distributed engineering team","body":"Revolut, the global financial-app group with offices in Dublin, runs an engineering team that is split across multiple time zones. Engineers in Dublin frequently collaborate with colleagues in London, Kraków and Singapore on the same code releases each week. (company information)"},"fmt":{"type":"numbered_box","points":3,"lines_per_point":6},"answer":[{"heading":"1. Increases collaboration:","body":"Cloud platforms let team members edit the same file together and see each other’s changes live. This closes the gap between time zones. At Revolut, engineers in Dublin and Singapore can hand off code mid-release using shared repositories like GitHub.","bold_terms":[]},{"heading":"2. Increases speed of communication:","body":"Async tools deliver updates to the whole team in seconds rather than waiting for a meeting. This keeps a project moving even when half the team is offline. At Revolut, short Loom video updates let the Dublin team brief Singapore overnight.","bold_terms":[]},{"heading":"3. Improves access to information:","body":"Cloud-stored documents and chat logs can be opened from any office or device with a login. Staff in any time zone can find the latest decision instantly. At Revolut, internal Confluence wikis hold the agreed answer to common engineering questions.","bold_terms":[]}],"biz":null},{"code":"3.3-HL-08","strand":3,"chapter":"3.3","lo":"15.3","lo_text":"Discuss how technology enables communication in organisations","level":"HL","verb":"OUTLINE","qnum":"8","q":"Outline two ways digital tools can improve communication in an organisation.","stimulus":{"type":"business","business":"Decathlon","headline":"2024 — connecting store managers across Europe","body":"Decathlon, the French-headquartered sports retailer with over 1,700 stores worldwide, runs a regular cycle of operational updates between head office and store managers in many countries. Store managers report on local sales and stock issues weekly. (company information)"},"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"1. Increases speed of communication:","body":"Digital tools push messages to the whole team in seconds rather than waiting for the next meeting or printed memo. This means decisions can be made and acted on much faster, which matters when operations move quickly.","bold_terms":[]},{"heading":"2. Improves access to information:","body":"Cloud-stored documents can be opened from any office or device with a login. Staff can find the latest update wherever they are, instead of waiting for someone to forward an email.","bold_terms":[]}],"biz":null},{"code":"3.3-HL-09","strand":3,"chapter":"3.3","lo":"15.3","lo_text":"Discuss how technology enables communication in organisations","level":"HL","verb":"MATCH","qnum":"9","q":"Column 1 is a list of digital communication tools. Column 2 is a list of business uses. (One business use does not match any of the tools.)","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["","Column 1:  Tools","","Column 2:  Business uses"],"rows":[["1","Cloud document editor (e.g. shared word-processor)","A","A manager updates a status column to show a task has been completed."],["2","Project-management board","B","A finance officer adds a comment to a draft report and assigns the next reviewer."],["3","Video-conferencing platform","C","Three colleagues hold a face-to-face meeting from three different cities."],["4","Instant messaging app","D","A new employee signs a contract from home before their first day."],["5","Digital signature platform","E","A duty manager pings the team to flag a customer issue happening right now."],["","","F","A sales rep mails a printed brochure to a long-standing customer."]]},{"type":"labelled_box","labels":["1 2 3 4 5"],"lines_per_label":[1]}]},"answer":[{"heading":"","body":"1 = B    ·    2 = A    ·    3 = C    ·    4 = E    ·    5 = D","bold_terms":[]}],"biz":null},{"code":"3.3-HL-10","strand":3,"chapter":"3.3","lo":"15.4","lo_text":"Discuss how communication might be improved in an organisation","level":"HL","verb":"DISCUSS","qnum":"10","q":"Discuss three ways communication might be improved in an organisation.","stimulus":{"type":"business","business":"Musgrave Group","headline":"2024 — internal communication audit findings","body":"Musgrave Group, the Cork-headquartered wholesaler that supplies Centra, MACE and other retail groups, ran an internal communication audit of its head-office teams in 2024. The audit reported that staff were receiving too much email and not enough face-to-face contact with senior leaders. (company information)"},"fmt":{"type":"numbered_box","points":3,"lines_per_point":6},"answer":[{"heading":"1. Set clear goals for each message:","body":"Every message should open with the action the receiver needs to take. When the goal is obvious, staff act on the message instead of clarifying it. For example, the Defence Forces opens daily briefings with the action required from each unit.","bold_terms":[]},{"heading":"2. Listen actively:","body":"Managers should give the speaker full attention and reflect key points back before responding. This catches misunderstandings while they are still small. For example, an FBD Insurance team leader paraphrases customer concerns back to staff in 1-to-1s to confirm meaning.","bold_terms":[]},{"heading":"3. Ensure ongoing two-way engagement:","body":"Replacing top-down announcements with regular check-ins lets staff raise concerns in real time. Issues are flagged before they escalate. For example, Iarnród Éireann holds depot briefings where crews raise rota and safety issues directly with managers.","bold_terms":[]}],"biz":null},{"code":"3.3-HL-11","strand":3,"chapter":"3.3","lo":"15.4","lo_text":"Discuss how communication might be improved in an organisation","level":"HL","verb":"OUTLINE","qnum":"11","q":"Outline two ways Avoca could improve communication with its café staff.","stimulus":{"type":"business","business":"Avoca","headline":"2024 — staff feedback summary","body":"Avoca, the Wicklow-founded café and homewares retailer, surveyed its café staff in 2024. Many staff reported that important rota changes and menu updates were being missed because they were posted only on a back-of-house noticeboard. (company information)"},"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"1. Choose the correct mode:","body":"A team messaging app pushes rota changes straight to staff phones, where they will be seen. At Avoca, this would replace the back-of-house noticeboard for time-critical updates and stop staff missing rota swaps.","bold_terms":[]},{"heading":"2. Ensure ongoing engagement:","body":"A short pre-shift huddle gives the duty manager a chance to walk through key updates face to face. At Avoca, this would catch any staff member not on the messaging app and confirm everyone has heard the same message.","bold_terms":[]}],"biz":null},{"code":"3.3-HL-12","strand":3,"chapter":"3.3","lo":"15.4","lo_text":"Discuss how communication might be improved in an organisation","level":"HL","verb":"EXPLAIN","qnum":"12","q":"For each communication barrier identified at Greencore, name the barrier and explain one practical solution.","stimulus":{"type":"business","business":"Greencore","headline":"2024 — communication issues on the production line","body":"Greencore, the Irish-founded convenience-food manufacturer, identified two recurring communication issues at one of its UK production sites in 2024. Detailed line-change instructions were being sent in a long email full of technical terms, and night-shift staff were reporting they had not been told about updates discussed during the day. (company information)"},"fmt":{"type":"labelled_box","labels":["Barrier 1","Solution 1","Barrier 2","Solution 2"],"lines_per_label":[1,5,1,5]},"answer":[{"heading":"Barrier 1:","body":"Use of jargon and over-complicated technical terms.","bold_terms":[]},{"heading":"Solution 1 — Use plain language:","body":"Greencore could replace long technical emails with a short briefing template in plain English. This makes instructions accessible to every staff member on the line and cuts the chance a critical step is missed during a fast change-over.","bold_terms":[]},{"heading":"Barrier 2:","body":"Information not reaching night-shift staff.","bold_terms":[]},{"heading":"Solution 2 — Ensure ongoing engagement:","body":"Greencore could introduce a structured shift-handover meeting where the outgoing leader briefs the incoming leader on every update. This ensures night-shift staff get the same information as the day shift.","bold_terms":[]}],"biz":null},{"code":"3.3-OL-01","strand":3,"chapter":"3.3","lo":"15.1","lo_text":"Explain the importance of communication in an organisation","level":"OL","verb":"IDENTIFY","qnum":"1","q":"Identify one reason why communication is important in a business and briefly explain your answer.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Supports collaboration:","body":"Clear communication makes sure every staff member knows their role. This helps teams work together and finish tasks on time.","bold_terms":[]}],"biz":null},{"code":"3.3-OL-02","strand":3,"chapter":"3.3","lo":"15.1","lo_text":"Explain the importance of communication in an organisation","level":"OL","verb":"DISCUSS","qnum":"2","q":"Discuss two reasons why communication is important in an organisation.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":4},"answer":[{"heading":"1. Avoids conflict:","body":"Clear, respectful messages stop small misunderstandings becoming bigger problems. For example, a manager who explains a rota change clearly avoids resentment among staff.","bold_terms":[]},{"heading":"2. Manages change:","body":"Explaining why a change is happening helps staff feel involved and reduces resistance. For example, telling staff in advance about a new till system makes the change-over go more smoothly.","bold_terms":[]}],"biz":null},{"code":"3.3-OL-03","strand":3,"chapter":"3.3","lo":"15.2","lo_text":"Identify different modes of communication and analyse the efficacy of each mode as an approach within an organisation","level":"OL","verb":"OUTLINE","qnum":"3","q":"Outline two modes of communication used in business and give an example of each.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":4},"answer":[{"heading":"1. Verbal communication:","body":"Communication using spoken or written words. An example is a team meeting where the manager and staff discuss the week ahead.","bold_terms":[]},{"heading":"2. Non-verbal communication:","body":"Communication without words, using body language and facial expressions. An example is a manager nodding to acknowledge a staff member during a busy meeting.","bold_terms":[]}],"biz":null},{"code":"3.3-OL-04","strand":3,"chapter":"3.3","lo":"15.2","lo_text":"Identify different modes of communication and analyse the efficacy of each mode as an approach within an organisation","level":"OL","verb":"MATCH","qnum":"4","q":"Match each communication mode in Column 1 to the correct example in Column 2.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["","Column 1:  Modes","","Column 2:  Examples"],"rows":[["A","Verbal — face-to-face meeting","1","A staff member smiles to greet a customer entering the shop."],["B","Verbal — written email","2","A team holds a weekly catch-up in the boardroom."],["C","Verbal — phone call","3","A formal record of a complaint is sent to head office."],["D","Non-verbal — body language","4","A duty manager rings a supplier to query a delivery."]]},{"type":"match","descriptions":["A"]}]},"answer":[{"heading":"","body":"A = 2    ·    B = 3    ·    C = 4    ·    D = 1","bold_terms":[]}],"biz":null},{"code":"3.3-OL-05","strand":3,"chapter":"3.3","lo":"15.3","lo_text":"Discuss how technology enables communication in organisations","level":"OL","verb":"OUTLINE","qnum":"5","q":"Outline two ways technology can help communication in a business.","stimulus":{"type":"business","business":"DAA","headline":"2024 — communicating across a busy airport","body":"DAA, the operator of Dublin and Cork airports, uses a wide range of digital tools to keep its staff informed about flight changes and shift updates throughout the day. (company information)"},"fmt":{"type":"numbered_box","points":2,"lines_per_point":4},"answer":[{"heading":"1. Increases speed:","body":"Email and instant messaging let a business send updates to many staff at the same time. Messages reach everybody quickly, without waiting for a meeting.","bold_terms":[]},{"heading":"2. Improves access:","body":"Cloud documents can be opened from any office or device with a login. Staff can find the latest version wherever they are, instead of waiting for an email.","bold_terms":[]}],"biz":null},{"code":"3.3-OL-06","strand":3,"chapter":"3.3","lo":"15.4","lo_text":"Discuss how communication might be improved in an organisation","level":"OL","verb":"OUTLINE","qnum":"6","q":"Outline two ways Lego could improve internal communication.","stimulus":{"type":"business","business":"Lego","headline":"2024 — communication review at head office","body":"Lego, the Danish toy manufacturer, reviewed its internal communication in 2024 after staff at its design centres said important updates were sometimes lost in long email threads. (company information)"},"fmt":{"type":"numbered_box","points":2,"lines_per_point":4},"answer":[{"heading":"1. Set clear goals for each message:","body":"Lego could ask managers to start every email with a clear summary of what action is needed. This would help staff act on important updates instead of losing them in long email threads.","bold_terms":[]},{"heading":"2. Ensure ongoing engagement:","body":"Lego could introduce a short weekly team huddle. This gives staff a regular chance to hear key updates face to face and ask questions, instead of relying only on email.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-01","strand":3,"chapter":"3.4","lo":"16.1","lo_text":"Outline the internal and external changes that organisations encounter through their lifetime","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline three external changes that have impacted a business such as Boojum in recent years.","stimulus":{"type":"business","business":"Boojum","headline":"2024 — opening new outlets across Ireland","body":"Boojum, the Belfast-founded burrito chain with over 20 outlets across the island of Ireland, opened three new restaurants in 2024 in response to rising consumer demand for fast-casual Mexican food. The business has also faced higher minimum-wage costs and tougher competition from new street-food operators in city centres. (Boojum press release, 2024)"},"fmt":{"type":"numbered_box","points":3,"lines_per_point":6},"answer":[{"heading":"1. Social trends and consumer expectations:","body":"Customer demand has shifted toward fresh, fast-casual food eaten on the go. At Boojum, this drove the decision to open three new outlets in 2024 to capture growing demand.","bold_terms":[]},{"heading":"2. Economic trends:","body":"Recent minimum-wage increases have pushed up the cost of every shift, squeezing margins across the hospitality sector. Boojum has had to absorb or pass on these higher labour costs.","bold_terms":[]},{"heading":"3. Competitors' innovations:","body":"New street-food operators have entered Irish city centres with sharper menus and lower price points. This forces Boojum to keep refreshing its menu and brand to hold onto customers.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-02","strand":3,"chapter":"3.4","lo":"16.1","lo_text":"Outline the internal and external changes that organisations encounter through their lifetime","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline two internal changes a business such as Supermac's may face.","stimulus":{"type":"business","business":"Supermac's","headline":"2024 — internal modernisation","body":"Supermac's, the Galway-founded Irish fast-food chain led by Pat McDonagh, announced a phased internal modernisation in 2024. New self-order kiosks are being rolled out across its motorway Plazas, and the management team has been restructured to support a planned franchise expansion. (Supermac's company update, 2024)"},"fmt":{"type":"numbered_box","points":2,"lines_per_point":6},"answer":[{"heading":"1. Adoption of new technology:","body":"Businesses introduce new equipment to improve efficiency and service speed. At Supermac's, self-order kiosks across the Plazas reduce queues and free up counter staff for kitchen work.","bold_terms":[]},{"heading":"2. Change in business model or strategy:","body":"A business may rethink how it grows by moving into new operating models such as franchising. At Supermac's, the planned franchise expansion is a shift in strategy that will reshape how the business runs and reaches new customers.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-03","strand":3,"chapter":"3.4","lo":"16.1","lo_text":"Outline the internal and external changes that organisations encounter through their lifetime","level":"HL","verb":"FOR","qnum":"3","q":"For each of the following changes that affect a business, indicate whether it is an internal change or an external change by placing a tick (✓) in the correct column.","stimulus":null,"fmt":{"type":"data_table","headers":["Statement","Internal","External"],"rows":[["1. A new CEO is appointed and introduces a shift in company strategy.","☐","☐"],["2. The Government raises VAT on hospitality from 9% to 13.5%.","☐","☐"],["3. Staff move to a four-day working week pilot at head office.","☐","☐"],["4. A new GDPR ruling forces changes to how customer data is stored.","☐","☐"],["5. A competitor launches a rival mobile app with same-day delivery.","☐","☐"],["6. The marketing department merges with the customer-experience team.","☐","☐"]]},"answer":[{"heading":"","body":"1. Internal  ·  2. External  ·  3. Internal  ·  4. External  ·  5. External  ·  6. Internal","bold_terms":[]}],"biz":null},{"code":"3.4-HL-04","strand":3,"chapter":"3.4","lo":"16.2","lo_text":"Analyse the reasons for resistance to change in an organisation","level":"HL","verb":"ANALYSE","qnum":"4","q":"Analyse three reasons why employees at a business such as Brennan's Bread may resist a change like the introduction of automated production lines.","stimulus":{"type":"business","business":"Brennan's Bread","headline":"2024 — automation at the Walkinstown bakery","body":"Brennan's Bread, the Dublin-based family bakery, began introducing automated packaging lines at its Walkinstown plant in 2024 to keep pace with supermarket demand. Some long-serving staff have raised concerns at union meetings about how the changes will affect their day-to-day roles. (SIPTU bakery branch briefing, 2024)"},"fmt":{"type":"numbered_box","points":3,"lines_per_point":7},"answer":[{"heading":"1. Fear of job losses:","body":"When automation is introduced, employees often assume their roles are at risk, even if no redundancies are planned. At Brennan's, packaging-line workers may fear the new machines will replace them. This means resistance can persist long after the rollout, since trust takes time to rebuild.","bold_terms":[]},{"heading":"2. Fear of failure:","body":"Staff may worry they lack the technical skills needed for the new automated systems. At Brennan's, long-serving workers used to manual processes may feel exposed in front of younger colleagues. As a result, the success of the change depends as much on staff confidence as on the technology.","bold_terms":[]},{"heading":"3. No clear benefit communicated:","body":"If management has not explained how automation benefits staff, workers may see it only as a threat. At Brennan's, raising concerns at union meetings suggests the case for change has not been made convincingly. This means change often fails not because it is wrong but because the reasoning was not shared openly.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-05","strand":3,"chapter":"3.4","lo":"16.3","lo_text":"Identify the practices that promote innovation and entrepreneurial/intrapreneurial thinking","level":"HL","verb":"IDENTIFY","qnum":"5","q":"Identify two practices that promote innovation in an organisation such as Workhuman and briefly explain each.","stimulus":{"type":"business","business":"Workhuman","headline":"2024 — building a culture of new ideas","body":"Workhuman, the Irish-founded HR technology company headquartered in Dublin, runs an internal 'idea-pitch' programme that lets any employee present a product idea to senior leadership each quarter. The strongest pitches are given budget and engineering time to be developed into prototypes. (Workhuman engineering blog, 2024)"},"fmt":{"type":"numbered_box","points":2,"lines_per_point":6},"answer":[{"heading":"1. Provide time and resources to develop ideas:","body":"Businesses must give staff the budget and engineering time needed to turn ideas into real products. At Workhuman, the strongest pitches receive both funding and engineering support, so good ideas are not lost at the concept stage.","bold_terms":[]},{"heading":"2. Recognition and rewards for innovation:","body":"Publicly acknowledging staff who contribute ideas signals that innovation is genuinely valued. At Workhuman, presenting to senior leadership and being selected for development is itself a form of recognition that motivates others to pitch.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-06","strand":3,"chapter":"3.4","lo":"16.4","lo_text":"Outline a range of approaches which may help to overcome resistance to change","level":"HL","verb":"OUTLINE","qnum":"6","q":"Outline three approaches daa could use to overcome staff resistance to changes at Terminal 1.","stimulus":{"type":"business","business":"daa","headline":"2024 — modernising Dublin Airport's Terminal 1","body":"daa, the operator of Dublin Airport, began a major modernisation of Terminal 1 in 2024 to handle record passenger numbers. The works include redesigned security screening lanes and changes to staff rotas across the terminal. Some workers and their unions have raised concerns about the disruption to long-standing routines. (daa operational update, 2024)"},"fmt":{"type":"numbered_box","points":3,"lines_per_point":6},"answer":[{"heading":"1. Open communication and consultation:","body":"Explaining why a change is happening and consulting staff before decisions are finalised reduces fear and builds trust. At daa, briefing security and ground-handling teams on the reasons behind the new screening layout would help reduce resistance from the start.","bold_terms":[]},{"heading":"2. Training and resource support:","body":"Providing the tools and training staff need raises confidence and lowers anxiety about new systems. At daa, retraining staff on the new screening lanes before they go live would give workers a clear path through the change rather than being thrown in unprepared.","bold_terms":[]},{"heading":"3. Employee empowerment:","body":"Giving staff genuine ownership over their part in the change increases engagement. At daa, letting terminal teams shape parts of the new rota themselves would help them feel part of the change rather than something done to them.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-07","strand":3,"chapter":"3.4","lo":"16.5","lo_text":"Outline what is meant by strategic planning and appreciate the importance of strategic planning as an ongoing process","level":"HL","verb":"OUTLINE","qnum":"7","q":"(i) Outline what is meant by strategic planning in a business context. (ii) Outline one reason why strategic planning must be an ongoing process.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(i)","(ii)"],"lines_per_label":[6,6]},"answer":[{"heading":"(i) Strategic planning:","body":"Strategic planning is the ongoing process of defining a business's long-term goals and deciding the best way to achieve them, taking account of the internal and external environment. It is owned by senior management and usually covers a period of five to ten years.","bold_terms":[]},{"heading":"(ii) The external environment never stands still:","body":"Consumer behaviour, competitors, technology and the economy all shift continuously. The plan must be reread against current conditions and updated where its original assumptions no longer hold.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-08","strand":3,"chapter":"3.4","lo":"16.6","lo_text":"Describe the benefit of strategic planning for an organisation","level":"HL","verb":"DESCRIBE","qnum":"8","q":"Describe three benefits of strategic planning for a business such as Glenisk.","stimulus":{"type":"business","business":"Glenisk","headline":"2024 — long-term sustainability strategy","body":"Glenisk, the Offaly-based family-owned dairy producer, published a long-term strategic plan in 2024 setting out goals for sustainable packaging, reduced emissions across its supplier farms, and expansion into the UK organic yogurt market. The plan is to be reviewed by the board every six months. (Glenisk corporate plan, 2024)"},"fmt":{"type":"numbered_box","points":3,"lines_per_point":7},"answer":[{"heading":"1. Strategic planning gives the business clear direction:","body":"A strategic plan gives a business a clear long-term goal that everyone can work towards, reducing confusion and short-term thinking. At Glenisk, the goals on sustainable packaging and emissions give every team a single target to design decisions around.","bold_terms":[]},{"heading":"2. Strategic planning improves the use of resources:","body":"A strategic plan helps a business decide where to spend its money, time and staff so that resources are directed at the priorities that drive the long-term goal. At Glenisk, the plan focuses investment on supplier-farm emissions and UK market entry rather than spreading spend thinly across less critical projects.","bold_terms":[]},{"heading":"3. Strategic planning makes the business better at managing change:","body":"Businesses with a plan are more prepared when conditions shift, because the plan provides a structure to fall back on rather than reacting in panic. At Glenisk, the six-month board review allows the strategy to be adjusted as energy costs or UK trade rules change.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-09","strand":3,"chapter":"3.4","lo":"16.7","lo_text":"Explain the importance of planning for change and discuss how a force-field analysis could support strategically planning for change in an organisation","level":"HL","verb":"EXPLAIN","qnum":"9","q":"Explain three reasons why planning for change is important for an organisation such as Spotify.","stimulus":{"type":"business","business":"Spotify","headline":"2024 — restructuring its podcast division","body":"Spotify, the Stockholm-headquartered audio streaming company, announced a major restructure of its podcast division in 2024 after years of heavy investment. The company gave teams a clear three-phase timeline and assigned senior leaders to manage communication with affected staff at every step. (Spotify investor update, 2024)"},"fmt":{"type":"numbered_box","points":3,"lines_per_point":6},"answer":[{"heading":"1. Reduces uncertainty and risk:","body":"A plan forces a business to think through what could go wrong before a change begins. At Spotify, the three-phase timeline meant problems with team transitions could be anticipated and prepared for, keeping the wider streaming business stable through the restructure.","bold_terms":[]},{"heading":"2. Increases the chance of successful change:","body":"Change is more likely to succeed when it is broken into manageable steps with clear roles and timelines. At Spotify, splitting the restructure into three phases gives every team a shared roadmap to follow rather than running into chaos midway through.","bold_terms":[]},{"heading":"3. Supports staff buy-in:","body":"Staff are far more open to change when they understand the reason for it and know the business has thought it through. At Spotify, assigning senior leaders to communicate at every step shows staff the disruption has been planned, which reduces resistance.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-10","strand":3,"chapter":"3.4","lo":"16.7","lo_text":"Explain the importance of planning for change and discuss how a force-field analysis could support strategically planning for change in an organisation","level":"HL","verb":"CONDUCT","qnum":"10","q":"Conduct a Force-Field Analysis of Pinergy's decision to enter the public EV charging market. Identify two driving forces and two restraining forces and reach a conclusion.","stimulus":{"type":"business","business":"Pinergy","headline":"2024 — considering entry into the public EV charging market","body":"Pinergy, the independent Irish electricity supplier, is considering entering the public electric vehicle (EV) charging market by installing rapid chargers at retail and motorway sites across Ireland. EV sales have grown sharply, but several competitors are already established and the up-front capital cost of installation is significant. (Pinergy strategy briefing, 2024)"},"fmt":{"type":"labelled_box","labels":["Driving 1","Driving 2","Restraining 1","Restraining 2","Conclusion"],"lines_per_label":[4,4,4,4,4]},"answer":[{"heading":"Driving forces (in favour of entry):","body":"","bold_terms":[]},{"heading":"1. Growing EV demand (5/5):","body":"EV sales in Ireland have risen sharply, creating a clear and expanding customer base for public charging. Entering now lets Pinergy capture market share before demand fully matures.","bold_terms":[]},{"heading":"2. Brand fit with existing customers (4/5):","body":"Pinergy already supplies electricity to Irish households and businesses, so public charging is a natural extension of its core offer that builds on an existing trusted brand.","bold_terms":[]},{"heading":"Restraining forces (against entry):","body":"","bold_terms":[]},{"heading":"1. High up-front capital cost (5/5):","body":"Installing rapid chargers at retail and motorway sites requires major capital spending before any revenue is earned, which would stretch Pinergy's cashflow during the rollout.","bold_terms":[]},{"heading":"2. Established competition (4/5):","body":"Several rivals are already operating networks at scale, with prime motorway sites locked in. Late entry makes it harder for Pinergy to secure the best locations and win driver loyalty.","bold_terms":[]},{"heading":"Conclusion:","body":"Driving forces total 9 and restraining forces total 9, making this a finely balanced decision. Pinergy should proceed but stage the rollout, starting with a small number of high-traffic sites to test demand before committing to nationwide expansion.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-11","strand":3,"chapter":"3.4","lo":"16.8","lo_text":"Explain what is meant by contingency planning in terms of crisis management in an organisation","level":"HL","verb":"EXPLAIN","qnum":"11","q":"(i) Explain what is meant by contingency planning. (ii) Explain one reason why contingency planning is important for a business such as CRH.","stimulus":{"type":"business","business":"CRH","headline":"2024 — global building-materials operations","body":"CRH, the Irish-founded global building-materials group with operations in over 25 countries, faces a wide range of operational risks including cyberattacks on its IT systems and weather disruption to its quarries and concrete plants. The group keeps detailed contingency plans for each of its main operating regions. (CRH annual report, 2024)"},"fmt":{"type":"labelled_box","labels":["(i)","(ii)"],"lines_per_label":[6,6]},"answer":[{"heading":"(i) Contingency planning:","body":"A contingency plan is a pre-prepared set of actions a business will take if a serious unexpected event disrupts normal operations. It is built before the crisis happens, so the business can act quickly to protect staff, customers, finances and reputation when things go wrong.","bold_terms":[]},{"heading":"(ii) It enables a fast, organised response:","body":"Without a plan, the first hours of a crisis are spent deciding what to do rather than doing it. At CRH, a cyberattack on its IT systems triggers pre-agreed steps to isolate affected systems and notify customers, containing the breach in hours rather than days.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-12","strand":3,"chapter":"3.4","lo":"16.9","lo_text":"Discuss the factors that should be considered when developing a contingency plan","level":"HL","verb":"DISCUSS","qnum":"12","q":"Discuss three factors that should be considered when developing a contingency plan for a business such as Diageo Ireland.","stimulus":{"type":"business","business":"Diageo Ireland","headline":"2024 — supply chain disruption at St James's Gate","body":"Diageo Ireland, the producer of Guinness at the historic St James's Gate brewery in Dublin, faced a short supply chain disruption in 2024 when one of its barley suppliers was affected by severe weather. The contingency plan in place allowed the brewery to switch to an alternative supplier within days, with no impact on export shipments. (Diageo Ireland operations update, 2024)"},"fmt":{"type":"numbered_box","points":3,"lines_per_point":7},"answer":[{"heading":"1. Cost:","body":"A contingency plan requires up-front spending on alternative supplier contracts, training and back-up arrangements before any crisis has happened. The business must balance what it can afford now against the far larger cost of being caught unprepared. At Diageo Ireland, maintaining ready-to-activate supplier contracts costs money but prevented a far larger loss when the weather disruption hit.","bold_terms":[]},{"heading":"2. Time:","body":"The plan must specify how quickly each step has to happen, since some crises demand response within hours while others allow days. At Diageo Ireland, the supply contingency was structured so an alternative barley supplier could be switched on within days, protecting the brewing schedule and export deadlines.","bold_terms":[]},{"heading":"3. Risk:","body":"Businesses prioritise risks based on how likely they are and how damaging they would be, with the deepest plans for high-probability and high-impact threats. At Diageo Ireland, barley supply disruption is both likely (weather-dependent harvests) and highly damaging to a brewery dependent on a steady supply, so it earns a detailed plan.","bold_terms":[]}],"biz":null},{"code":"3.4-HL-13","strand":3,"chapter":"3.4","lo":"16.9","lo_text":"Discuss the factors that should be considered when developing a contingency plan","level":"HL","verb":"COLUMN","qnum":"13","q":"Column 1 is a list of benefits of strategic planning. Column 2 is a list of business actions. (One business action does not match any of the benefits.)","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["","Column 1: Benefits","","Column 2: Business actions"],"rows":[["1","Gives the business clear direction","A","A coastal hotel rescores its risk register every six months as storm forecasts change."],["2","Improves the use of resources","B","A logistics firm cuts haulage spend after a STEEPLE review shows fuel costs will keep rising."],["3","Makes the business better at managing change","C","A fashion retailer publishes a 2030 goal of fully recyclable packaging that shapes every supplier contract it signs."],["4","Builds a competitive advantage","D","A bakery donates day-old bread to a local food bank every evening."],["","","E","A pharmacy chain uses early customer-survey data to spot a gap in own-brand skincare before larger rivals notice."]]},{"type":"labelled_box","labels":["1 2 3 4"],"lines_per_label":[1]}]},"answer":[{"heading":"","body":"1 = C   ·   2 = B   ·   3 = A   ·   4 = E","bold_terms":[]},{"heading":"","body":"Option D (donating day-old bread) does not match any of the listed benefits of strategic planning.","bold_terms":[]}],"biz":null},{"code":"3.4-OL-01","strand":3,"chapter":"3.4","lo":"16.1","lo_text":"Outline the internal and external changes that organisations encounter through their lifetime","level":"OL","verb":"IDENTIFY","qnum":"1","q":"Identify one internal change and one external change that may impact a business. Briefly explain each.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Internal","External"],"lines_per_label":[5,5]},"answer":[{"heading":"Internal change — Leadership changes:","body":"A new CEO can bring a different vision and lead to changes in strategy. For example, when a founder steps back, the new leader may rethink the product range or how the business operates.","bold_terms":[]},{"heading":"External change — Legal and regulatory changes:","body":"New laws often require a business to update how it operates and to spend money on training and new systems. For example, GDPR forced Irish firms to change how customer data is stored.","bold_terms":[]}],"biz":null},{"code":"3.4-OL-02","strand":3,"chapter":"3.4","lo":"16.2","lo_text":"Analyse the reasons for resistance to change in an organisation","level":"OL","verb":"OUTLINE","qnum":"2","q":"Outline two reasons why employees may resist change in a business.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":6},"answer":[{"heading":"1. Fear of job losses:","body":"When new technology is introduced, employees may worry their jobs will be at risk. Even if no losses are planned, staff often assume the worst when communication is unclear.","bold_terms":[]},{"heading":"2. Fear of failure:","body":"Employees may worry they do not have the skills needed for new systems. Without proper training, they resist to protect themselves from feeling exposed in front of colleagues.","bold_terms":[]}],"biz":null},{"code":"3.4-OL-03","strand":3,"chapter":"3.4","lo":"16.4","lo_text":"Outline a range of approaches which may help to overcome resistance to change","level":"OL","verb":"OUTLINE","qnum":"3","q":"Outline two ways Tirlán could overcome resistance to the new digital reporting system.","stimulus":{"type":"business","business":"Tirlán","headline":"2024 — new on-farm digital reporting system","body":"Tirlán, the Irish-owned dairy and grain co-operative, asked its supplier farmers in 2024 to start using a new digital app to record on-farm data. Some farmers have been slow to adopt the system and prefer paper records they have used for years. (Tirlán supplier update, 2024)"},"fmt":{"type":"numbered_box","points":2,"lines_per_point":6},"answer":[{"heading":"1. Training and resource support:","body":"Tirlán could offer practical training sessions on the new app at local mart days. This would help farmers feel set up to use it rather than thrown in unprepared.","bold_terms":[]},{"heading":"2. Open communication and consultation:","body":"Tirlán could explain clearly why the change is needed and listen to farmer concerns. When suppliers understand the benefits, they are far more likely to make the switch.","bold_terms":[]}],"biz":null},{"code":"3.4-OL-04","strand":3,"chapter":"3.4","lo":"16.5","lo_text":"Outline what is meant by strategic planning and appreciate the importance of strategic planning as an ongoing process","level":"OL","verb":"OUTLINE","qnum":"4","q":"(i) Outline what is meant by strategic planning. (ii) Outline one benefit of strategic planning for a business.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(i)","(ii)"],"lines_per_label":[5,5]},"answer":[{"heading":"(i) Strategic planning:","body":"Strategic planning is the ongoing process of setting a business's long-term goals and deciding the best way to achieve them. It is usually owned by senior management and covers a period of five to ten years.","bold_terms":[]},{"heading":"(ii) Strategic planning gives clear direction:","body":"A strategic plan gives a business a clear long-term goal that everyone can work towards. This helps managers and staff make decisions that all push in the same direction.","bold_terms":[]}],"biz":null},{"code":"3.4-OL-05","strand":3,"chapter":"3.4","lo":"16.7","lo_text":"Explain the importance of planning for change and discuss how a force-field analysis could support strategically planning for change in an organisation","level":"OL","verb":"IDENTIFY","qnum":"5","q":"Identify one driving force and one restraining force for The Happy Pear in deciding whether to open a second café. Briefly explain each.","stimulus":{"type":"business","business":"The Happy Pear","headline":"2024 — considering opening a second café","body":"The Happy Pear, the Wicklow-based plant-based café and food brand founded by Stephen and David Flynn, is considering opening a second café in Galway. The brand has a loyal customer base, but the founders are aware of rising rents in Irish city centres and the operational pressure that comes with running multiple sites. (The Happy Pear company update, 2024)"},"fmt":{"type":"labelled_box","labels":["Driving force","Restraining force"],"lines_per_label":[5,5]},"answer":[{"heading":"1. Driving force — Loyal customer base:","body":"The Happy Pear already has a strong brand and loyal followers across Ireland. A second café in Galway could quickly attract local fans of the brand and grow revenue.","bold_terms":[]},{"heading":"2. Restraining force — Rising rents:","body":"Rents in Irish city centres are climbing, raising the fixed costs of any new site. Higher rent in Galway would put pressure on the new café's margin from day one.","bold_terms":[]}],"biz":null},{"code":"3.4-OL-06","strand":3,"chapter":"3.4","lo":"16.8","lo_text":"Explain what is meant by contingency planning in terms of crisis management in an organisation","level":"OL","verb":"OUTLINE","qnum":"6","q":"Outline what is meant by contingency planning and give one example of when it would be used.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Meaning","Example"],"lines_per_label":[5,5]},"answer":[{"heading":"Meaning:","body":"Contingency planning is preparing a back-up plan in advance for unexpected events that could disrupt the business. It allows the business to act quickly and limit damage when a crisis happens.","bold_terms":[]},{"heading":"Example:","body":"A retail shop could prepare a back-up plan for a power cut during a busy weekend. Pre-agreed steps such as a back-up generator and a manual sales record would let the shop keep trading until power returns.","bold_terms":[]}],"biz":null},{"code":"3.4-OL-07","strand":3,"chapter":"3.4","lo":"16.9","lo_text":"Discuss the factors that should be considered when developing a contingency plan","level":"OL","verb":"DISCUSS","qnum":"7","q":"Discuss one factor that should be considered when developing a contingency plan for Aldi Ireland.","stimulus":{"type":"business","business":"Aldi Ireland","headline":"2024 — preparing for severe weather across stores","body":"Aldi Ireland operates over 160 stores across the country. The retailer reviews its contingency plans every autumn before the winter storm season, focusing on staff safety, getting deliveries through, and protecting fresh-food stock when stores are closed at short notice. (Aldi Ireland operations review, 2024)"},"fmt":{"type":"numbered_box","points":1,"lines_per_point":7},"answer":[{"heading":"1. Cost:","body":"A contingency plan requires up-front spending on back-up equipment, generators and staff training before any crisis happens. The business must balance this against the larger cost of being caught unprepared. At Aldi Ireland, investing in back-up power and standby delivery routes costs money but protects sales and fresh-food stock when a winter storm forces stores to close at short notice.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-01","strand":4,"chapter":"4.1","lo":"17.1","lo_text":"Investigate the rights and responsibilities of consumers using current relevant consumer legislation","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline three main functions of the Competition and Consumer Protection Commission (CCPC).","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":4},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Enforce consumer legislation:","body":"The CCPC investigates businesses breaking consumer law. It can enter premises with Garda support, issue on-the-spot fines of €300, and refer serious breaches to the Director of Public Prosecutions.","bold_terms":[]},{"heading":"2. Advise and inform consumers:","body":"The CCPC provides clear information on consumer rights through its website, publications and helpline, and advises government on proposed consumer laws.","bold_terms":[]},{"heading":"3. Investigate mergers and takeovers:","body":"The CCPC assesses proposed deals to ensure they do not substantially lessen competition in Irish markets. It can block, approve, or approve with conditions.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-02","strand":4,"chapter":"4.1","lo":"17.1","lo_text":"Investigate the rights and responsibilities of consumers using current relevant consumer legislation","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline two consumer rights Currys has breached under the Consumer Rights Act 2022, and explain the redress Niamh is entitled to.","stimulus":{"type":"business","business":"Currys Ireland","headline":"Customer reports faulty laptop within three weeks of purchase","body":"Niamh buys a laptop advertised with 16GB of RAM and a two-year battery life from Currys in Liffey Valley. Within three weeks the laptop will not hold a charge for more than 90 minutes, and a system check shows the unit has 8GB of RAM, not the advertised 16GB."},"fmt":{"type":"labelled_box","labels":["Right breached 1","Right breached 2","Redress Niamh is entitled to"],"lines_per_label":[4,4,5]},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"Right 1 – Match any description or sample:","body":"Under the CRA 2022 a product must match the description provided before sale. Currys advertised 16GB of RAM but supplied 8GB, breaching this right.","bold_terms":[]},{"heading":"Right 2 – Last for a reasonable time:","body":"A product must last as long as a consumer would normally expect for the price paid. A new laptop losing battery life within three weeks falls well short of that.","bold_terms":[]},{"heading":"Redress – Full refund within 30 days:","body":"Because the fault appeared within 30 days, Niamh has the right to a full refund. The refund must be issued within 14 days of Currys receiving the returned laptop.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-03","strand":4,"chapter":"4.1","lo":"17.1","lo_text":"Investigate the rights and responsibilities of consumers using current relevant consumer legislation","level":"HL","verb":"OUTLINE","qnum":"3","q":"Outline three ways an Irish consumer's rights are reduced when buying from outside the EU.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":4},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Loss of the 14-day cooling-off period:","body":"Inside the EU a consumer can cancel a distance contract within 14 days. Outside the EU this right does not apply, including the UK and Northern Ireland post-Brexit.","bold_terms":[]},{"heading":"2. No automatic 2-year legal guarantee:","body":"Inside the EU a consumer is entitled to a 2-year legal guarantee on goods. Outside the EU the level of cover depends on the seller's country and policy.","bold_terms":[]},{"heading":"3. No access to Small Claims procedures:","body":"Inside the EU a consumer can use the Irish Small Claims Court or the European Small Claims Procedure. Neither route is available against UK or non-EU sellers.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-04","strand":4,"chapter":"4.1","lo":"17.2","lo_text":"Demonstrate how consumer behaviour might be informed by ethical and sustainability concerns","level":"HL","verb":"OUTLINE","qnum":"4","q":"Outline three ethical concerns that inform consumer behaviour.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":4},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Fair treatment of workers:","body":"Consumers worry about exploitation in factories and farms. They look for fair-trade labels to be confident workers were paid and treated properly. Example: Lidl's Way to Go! chocolate.","bold_terms":[]},{"heading":"2. Animal welfare:","body":"Consumers concerned about animal testing or intensive farming switch away from brands that test on animals and choose labelled alternatives. Example: Lush markets every product as 100% cruelty-free.","bold_terms":[]},{"heading":"3. Data protection and online privacy:","body":"Consumers worried about how personal data is collected and tracked shift to services that limit data sharing. Example: Apple's App Tracking Transparency blocks tracking across apps.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-05","strand":4,"chapter":"4.1","lo":"17.2","lo_text":"Demonstrate how consumer behaviour might be informed by ethical and sustainability concerns","level":"HL","verb":"DESCRIBE","qnum":"5","q":"Describe the consequences of participation in the shadow economy for the consumer, the business, and the economy.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Consumer","Business","Economy"],"lines_per_label":[4,4,4]},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"Consumer:","body":"Goods may be cheaper but are unregulated, meaning unsafe, faulty or counterfeit. The consumer has no legal redress under the CRA 2022 if something goes wrong.","bold_terms":[]},{"heading":"Business:","body":"Legitimate tax-compliant businesses are undercut on price and put at a competitive disadvantage. This can force them to cut staff or close down entirely.","bold_terms":[]},{"heading":"Economy:","body":"The state loses tax revenue on profits, VAT and wages, while also spending more on enforcement through Revenue, the CCPC and customs.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-06","strand":4,"chapter":"4.1","lo":"17.2","lo_text":"Demonstrate how consumer behaviour might be informed by ethical and sustainability concerns","level":"HL","verb":"OUTLINE","qnum":"6","q":"Outline three ways Niamh's behaviour contributes to the circular economy.","stimulus":{"type":"business","business":"Niamh — circular consumer","headline":"Dublin teacher shifts spending toward second-hand and refillable","body":"Niamh, a 24-year-old teacher in Dublin, buys most of her clothes second-hand on Vinted and brings reusable bags to the supermarket. She also returns her plastic bottles and cans through the Re-turn Deposit Return Scheme each week."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":4},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Buying pre-owned items:","body":"Niamh extends the life of clothes already produced by buying second-hand on Vinted. This keeps usable items out of landfill and reduces demand for new production.","bold_terms":[]},{"heading":"2. Returning packaging through dedicated schemes:","body":"Niamh feeds materials back into the cycle by returning bottles and cans through the Re-turn Deposit Return Scheme. The 15c or 25c per container is recovered as a refund.","bold_terms":[]},{"heading":"3. Improving habits to reduce waste:","body":"Niamh prevents waste at the point of purchase by bringing reusable bags rather than using single-use plastic. This stops waste being created in the first place.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-07","strand":4,"chapter":"4.1","lo":"17.3","lo_text":"Investigate how digital technology impacts on consumer behaviour","level":"HL","verb":"OUTLINE","qnum":"7","q":"Outline three positive impacts of digital technology on consumer behaviour.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":4},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Increased convenience:","body":"Mobile apps and one-click purchasing have removed the steps between wanting a product and buying it. Consumers can complete a purchase in under 30 seconds via Amazon or Revolut.","bold_terms":[]},{"heading":"2. Better access to product information:","body":"Online comparison tools let consumers compare providers side by side on price, features and reviews. This has shifted consumer behaviour from staying loyal toward actively switching deals.","bold_terms":[]},{"heading":"3. Increased choice:","body":"Consumers can buy from small Irish brands and overseas retailers via Instagram, Etsy and AliExpress. They are no longer limited to what the local high street offers.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-08","strand":4,"chapter":"4.1","lo":"17.3","lo_text":"Investigate how digital technology impacts on consumer behaviour","level":"HL","verb":"EXPLAIN","qnum":"8","q":"Explain two negative impacts of digital technology on consumers like Aoife.","stimulus":{"type":"business","business":"Aoife — TikTok shopper","headline":"College student spending more time on social platforms","body":"Aoife, a 19-year-old college student, uses TikTok every evening. The platform serves her ads based on her browsing and watch history, often for products she had searched for earlier that day. Aoife has made several impulse purchases recently and feels her screen time is climbing."},"fmt":{"type":"labelled_box","labels":["Negative impact 1","Negative impact 2"],"lines_per_label":[5,5]},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Increased impulse buying:","body":"Platforms serve ads based on browsing history, letting consumers buy directly inside the apps they use for entertainment. For Aoife this removes the pause that physical retail used to provide before buying.","bold_terms":[]},{"heading":"2. Increased screen time and digital addiction:","body":"Shopping is always one tap away, often late at night while a consumer is on another platform. For Aoife this contributes to higher screen time and more buying decisions made when judgement is worst.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-09","strand":4,"chapter":"4.1","lo":"17.4","lo_text":"Investigate how personal data is protected by European regulation","level":"HL","verb":"OUTLINE","qnum":"9","q":"Outline three rights of a data subject under GDPR.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":4},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Right to access, correction and erasure:","body":"Data subjects can request a copy of their personal data, have any inaccurate information corrected, and have data erased by the data controller where appropriate.","bold_terms":[]},{"heading":"2. Right to a human review of automated decisions:","body":"Data subjects can ask for a person to review an automated decision rather than accepting the algorithm's output. Example: an Irish bank's loan algorithm refusal.","bold_terms":[]},{"heading":"3. Right to complain to the DPC:","body":"If a data subject believes a controller has broken GDPR, they can lodge a formal complaint with the Data Protection Commission. The DPC received over 11,000 complaints in 2023.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-10","strand":4,"chapter":"4.1","lo":"17.4","lo_text":"Investigate how personal data is protected by European regulation","level":"HL","verb":"EXPLAIN","qnum":"10","q":"Explain two duties Bank of Ireland must meet under GDPR as a data controller.","stimulus":{"type":"business","business":"Bank of Ireland","headline":"Cyberattack exposes customer data","body":"Bank of Ireland confirms it has been the victim of a cyberattack that has exposed customer email addresses and account numbers. The breach was discovered on Tuesday morning and the bank is now contacting affected customers."},"fmt":{"type":"labelled_box","labels":["Duty 1","Duty 2"],"lines_per_label":[5,5]},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Report data breaches within 72 hours:","body":"Bank of Ireland must notify the Data Protection Commission within 72 hours of becoming aware of the breach. Affected customers must also be notified without undue delay.","bold_terms":[]},{"heading":"2. Keep personal data safe and secure:","body":"Bank of Ireland must use technical and organisational measures such as encryption, access controls and staff training. The protection must match the sensitivity of the data held.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-11","strand":4,"chapter":"4.1","lo":"17.4","lo_text":"Investigate how personal data is protected by European regulation","level":"HL","verb":"OUTLINE","qnum":"11","q":"Outline three functions of the Data Protection Commission (DPC).","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":4},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Investigates complaints from data subjects:","body":"The DPC examines individual complaints about data controllers, such as data losses, use without consent, or refused erasure requests. It received over 11,000 complaints in 2023.","bold_terms":[]},{"heading":"2. Issues fines for non-compliance:","body":"The DPC can impose fines of up to €20 million or 4% of global turnover. It fined Meta €1.2 billion in 2023 over data transfers to the US.","bold_terms":[]},{"heading":"3. Advises government on data-protection policy:","body":"The DPC provides expert input on proposed Irish and EU laws that touch on personal data, ensuring privacy implications are considered before legislation passes.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-12","strand":4,"chapter":"4.1","lo":"17.5","lo_text":"Appreciate the importance of making informed consumer decisions and use this understanding to discuss consumer-related stories in the news and media","level":"HL","verb":"OUTLINE","qnum":"12","q":"Outline three reasons why it is important for consumers to make informed decisions.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":4},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Financial wellbeing:","body":"Consumers who compare prices, switch providers and avoid impulse purchases make their money go further over a lifetime. Comparison tools like Bonkers.ie make this easier than ever.","bold_terms":[]},{"heading":"2. Personal safety:","body":"Informed consumers buy from regulated sellers, check recall notices and avoid the shadow economy for safety-critical items. The CCPC publishes recall notices regularly on its website.","bold_terms":[]},{"heading":"3. Legal protection:","body":"Consumers who know their rights under the CRA 2022 and CPA 2007 are far more likely to get a refund, repair or replacement when something goes wrong.","bold_terms":[]}],"biz":null},{"code":"4.1-HL-13","strand":4,"chapter":"4.1","lo":"17.5","lo_text":"Appreciate the importance of making informed consumer decisions and use this understanding to discuss consumer-related stories in the news and media","level":"HL","verb":"DISCUSS","qnum":"13","q":"Discuss this consumer-related story using the 4-step framework: Identify, Link, Apply, View.","stimulus":{"type":"business","business":"CCPC 2025 Helpline Report","headline":"Ryanair tops complaints list as faulty goods continue to dominate (RTÉ, April 2026)","body":"Ryanair was the most-complained-about company in Ireland in 2025, followed by Carlow garden retailer Rathwood. The CCPC received 42,791 complaints in total. Faulty goods and services was the top issue for the fifth year running, and online-purchase complaints rose 14%."},"fmt":{"type":"labelled_box","labels":["1. Identify","2. Link","3. Apply","4. View"],"lines_per_label":[3,3,4,4]},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Identify:","body":"The CCPC's 2025 Helpline Report shows nearly 43,000 complaints from Irish consumers. Faulty goods and services was the most common issue and online complaints rose 14%.","bold_terms":[]},{"heading":"2. Link:","body":"The story touches LO 17.1 (rights and redress under the CRA 2022) and LO 17.3 (the rise in online complaints reflects shifting consumer behaviour).","bold_terms":[]},{"heading":"3. Apply:","body":"Under the CRA 2022 the seller, not the manufacturer, must resolve faulty-goods issues. Consumers can escalate via the Small Claims Court for €25 with claims up to €2,000.","bold_terms":[]},{"heading":"4. View:","body":"The system is being used but the rise in online complaints suggests enforcement needs to scale. The proposed Consumer Protection Bill 2026 would give the CCPC larger fines.","bold_terms":[]}],"biz":null},{"code":"4.1-OL-01","strand":4,"chapter":"4.1","lo":"17.1","lo_text":"Investigate the rights and responsibilities of consumers using current relevant consumer legislation","level":"OL","verb":"IDENTIFY","qnum":"1","q":"Identify three main functions of the Competition and Consumer Protection Commission (CCPC).","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":1},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"","body":"1. Enforcing consumer law.","bold_terms":[]},{"heading":"","body":"2. Advising and informing consumers.","bold_terms":[]},{"heading":"","body":"3. Investigating mergers and takeovers.","bold_terms":[]}],"biz":null},{"code":"4.1-OL-02","strand":4,"chapter":"4.1","lo":"17.1","lo_text":"Investigate the rights and responsibilities of consumers using current relevant consumer legislation","level":"OL","verb":"OUTLINE","qnum":"2","q":"Outline one consumer right Dunnes Stores has breached, and explain the redress Eoin is entitled to.","stimulus":{"type":"business","business":"Dunnes Stores","headline":"Customer returns faulty kettle two weeks after purchase","body":"Eoin buys a kettle from Dunnes Stores in Cornelscourt for €35. After two weeks of use the kettle stops heating water. Eoin returns to the store with his receipt looking for a refund."},"fmt":{"type":"labelled_box","labels":["Right breached","Redress Eoin is entitled to"],"lines_per_label":[3,3]},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"Right breached – Last for a reasonable time:","body":"Under the CRA 2022 a product must last as long as a consumer would normally expect. A kettle failing after two weeks does not meet this standard.","bold_terms":[]},{"heading":"Redress – Full refund:","body":"Because the fault appeared within 30 days, Eoin is entitled to a full refund. The refund must be issued within 14 days of Dunnes receiving the returned kettle.","bold_terms":[]}],"biz":null},{"code":"4.1-OL-03","strand":4,"chapter":"4.1","lo":"17.2","lo_text":"Demonstrate how consumer behaviour might be informed by ethical and sustainability concerns","level":"OL","verb":"IDENTIFY","qnum":"3","q":"Identify three ethical or sustainability concerns that influence consumer behaviour.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":1},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"","body":"1. Fair treatment of workers.","bold_terms":[]},{"heading":"","body":"2. Animal welfare.","bold_terms":[]},{"heading":"","body":"3. Packaging waste.","bold_terms":[]}],"biz":null},{"code":"4.1-OL-04","strand":4,"chapter":"4.1","lo":"17.3","lo_text":"Investigate how digital technology impacts on consumer behaviour","level":"OL","verb":"DISTINGUISH","qnum":"4","q":"Distinguish between one positive and one negative impact of digital technology on consumer behaviour.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Positive impact","Negative impact"],"lines_per_label":[3,3]},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"Positive – Increased convenience:","body":"Mobile apps and one-click purchasing let consumers complete a purchase in under 30 seconds, removing the friction of visiting a store.","bold_terms":[]},{"heading":"Negative – Increased impulse buying:","body":"Platforms serve ads based on browsing history, letting consumers buy directly inside the apps they use for entertainment. This bypasses the pause physical retail provided.","bold_terms":[]}],"biz":null},{"code":"4.1-OL-05","strand":4,"chapter":"4.1","lo":"17.4","lo_text":"Investigate how personal data is protected by European regulation","level":"OL","verb":"IDENTIFY","qnum":"5","q":"Identify three rights of a data subject under GDPR.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":1},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"","body":"1. Right to access, correction and erasure of personal data.","bold_terms":[]},{"heading":"","body":"2. Right to a human review of automated decisions.","bold_terms":[]},{"heading":"","body":"3. Right to complain to the Data Protection Commission.","bold_terms":[]}],"biz":null},{"code":"4.1-OL-06","strand":4,"chapter":"4.1","lo":"17.4","lo_text":"Investigate how personal data is protected by European regulation","level":"OL","verb":"OUTLINE","qnum":"6","q":"Outline two duties of a data controller under GDPR.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Report data breaches within 72 hours:","body":"Controllers must notify the Data Protection Commission within 72 hours of becoming aware of a breach. Affected individuals must also be notified without undue delay.","bold_terms":[]},{"heading":"2. Keep personal data safe and secure:","body":"Controllers must use technical and organisational measures such as encryption, access controls and staff training. The protection must match the sensitivity of the data held.","bold_terms":[]}],"biz":null},{"code":"4.1-OL-07","strand":4,"chapter":"4.1","lo":"17.5","lo_text":"Appreciate the importance of making informed consumer decisions and use this understanding to discuss consumer-related stories in the news and media","level":"OL","verb":"OUTLINE","qnum":"7","q":"Outline two reasons why it is important for consumers to make informed decisions.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"","body":"","bold_terms":[]},{"heading":"1. Financial wellbeing:","body":"Consumers who compare prices and switch providers make their money go further. Comparison tools like Bonkers.ie show big differences between providers in minutes.","bold_terms":[]},{"heading":"2. Personal safety:","body":"Informed consumers buy from regulated sellers and check recall notices. The CCPC publishes regular product recall notices for unsafe goods.","bold_terms":[]}],"biz":null},{"code":"4.2-HL-01","strand":4,"chapter":"4.2","lo":"18.1","lo_text":"Examine the factors to be considered with saving, investing, and borrowing","level":"HL","verb":"EXPLAIN","qnum":"1","q":"Explain three factors a person should consider before choosing a savings account.","stimulus":{"type":"business","business":"An Post Money","headline":"State-owned provider expands its savings range","body":"An Post Money offers a range of savings accounts and personal loans to customers across Ireland. A customer is deciding where to place money they will not need for several years."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Annual Equivalent Rate (AER):","body":"The AER shows the real yearly return on savings once interest is compounded. A higher AER means the saver earns more, so it is worth comparing the AER offered by different providers.","bold_terms":[]},{"heading":"Access to the money:","body":"Some accounts offer a better rate in return for locking funds away for a fixed term. The saver should check how quickly they could withdraw the money in an emergency before committing.","bold_terms":[]},{"heading":"Deposit protection:","body":"Bank deposits in Ireland are protected up to €100,000 per person under the Deposit Guarantee Scheme. A saver should check the provider is covered so their money is safe even if the institution fails.","bold_terms":[]}],"biz":null},{"code":"4.2-HL-02","strand":4,"chapter":"4.2","lo":"18.2","lo_text":"Explain risk tolerance from a consumer perspective and investigate risks facing consumers of financial products and identifying reliable sources","level":"HL","verb":"EXPLAIN","qnum":"1","q":"Explain what is meant by risk tolerance, and explain one reason it is important when choosing an investment.","stimulus":{"type":"business","business":"Plynk","headline":"Irish app targets first-time investors","body":"Plynk is an Irish investment app designed to help people start investing with small amounts. A new user is asked about their goals before they choose any products."},"fmt":{"type":"labelled_box","labels":["Risk tolerance","Why it is important"],"lines_per_label":[3,3]},"answer":[{"heading":"Risk tolerance:","body":"Risk tolerance is the level of risk a person is willing and able to take with their money. It depends on factors such as their age, income, and how soon they will need the money.","bold_terms":[]},{"heading":"Why it is important:","body":"Matching an investment to your risk tolerance avoids taking on more risk than you can handle. An investor close to retirement would choose safer products than a young investor who has time to recover any losses.","bold_terms":[]}],"biz":null},{"code":"4.2-HL-03","strand":4,"chapter":"4.2","lo":"18.3","lo_text":"Outline the importance of considering switching between financial product providers","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline two reasons why it can be important for a consumer to switch financial provider.","stimulus":{"type":"business","business":"Avant Money","headline":"Lender competes on mortgage switching","body":"Avant Money entered the Irish market offering mortgages and personal loans. It encourages homeowners to review whether their current provider still offers the best deal."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":2},"answer":[{"heading":"Lower cost:","body":"Switching can secure a lower interest rate or reduce fees. On a long-term product such as a mortgage, even a small cut in the rate can save a large sum over time.","bold_terms":[]},{"heading":"Better terms or service:","body":"A different provider may offer more flexible features or better customer service. Reviewing options regularly helps ensure the product still suits the consumer's needs.","bold_terms":[]}],"biz":null},{"code":"4.2-HL-04","strand":4,"chapter":"4.2","lo":"18.4","lo_text":"Explain how technology impacts financial products and outline the benefits and challenges of fintech","level":"HL","verb":"EXPLAIN","qnum":"1","q":"Explain one benefit and one challenge of fintech for consumers.","stimulus":{"type":"business","business":"Revolut","headline":"Digital banking app continues rapid growth in Ireland","body":"Revolut allows customers to bank, pay, and budget from a single app on their phone. Millions of people in Ireland now use fintech services like it for everyday money management."},"fmt":{"type":"labelled_box","labels":["Benefit","Challenge"],"lines_per_label":[3,3]},"answer":[{"heading":"Convenience:","body":"Fintech apps let consumers bank, pay, and budget instantly from a phone without visiting a branch. This saves time and often reduces the fees charged on everyday transactions.","bold_terms":[]},{"heading":"Security risk:","body":"Storing money and personal da
