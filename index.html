"headline","business":null,"headline":"In 2025, the EU introduced new rules to make all phones use the same type of charger","body":null},"fmt":{"type":"labelled_box","labels":["(a) Type of instrument","(b) Difference in response"],"lines_per_label":[2,5]},"answer":[{"heading":"(a):","body":"A directive.","bold_terms":[]},{"heading":"(b):","body":"For a regulation the government need not act, as it becomes law automatically. For a directive, Ireland must pass its own law within a set time.","bold_terms":[]}],"biz":null},{"code":"1.4-OL-11","strand":1,"chapter":"1.4","lo":"4.5","lo_text":"Distinguish between European regulations, directives, and opinions","level":"OL","verb":"OUTLINE","qnum":"11","q":"(a) Name one benefit of this change for consumers. (b) Outline one challenge it might create for businesses. (c) How does this change impact sustainable business practices?","stimulus":{"type":"business","business":"SCENARIO","headline":"Ireland has introduced a law making USB-C chargers the standard for phones and other devices. This law is based on an EU directive.","body":null},"fmt":{"type":"labelled_box","labels":["(a) Benefit for consumers","(b) Challenge for businesses","(c) Impact on sustainability"],"lines_per_label":[5,5,5]},"answer":[{"heading":"(a) Benefit for consumers:","body":"Consumers need only one charger for multiple devices, which saves money and reduces hassle when buying new phones or tablets.","bold_terms":[]},{"heading":"(b) Challenge for businesses:","body":"Electronics firms may need to redesign products to include USB-C ports, which costs money and takes time to change manufacturing.","bold_terms":[]},{"heading":"(c) Impact on sustainability:","body":"It helps businesses be more sustainable by reducing electronic waste and encouraging reuse of chargers, supporting environmental goals.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-01","strand":1,"chapter":"1.5","lo":"5.1","lo_text":"Explain what is meant by a trading bloc and discuss why these are important for businesses in the Irish economy","level":"HL","verb":"EXPLAIN","qnum":"1","q":"(i) Explain what is meant by a trading bloc. (ii) Discuss three benefits of trading blocs for businesses in the Irish economy.","stimulus":{"type":"headline","business":null,"headline":"Ireland exports over €200 billion in goods and services a year, most of it to the EU (CSO, 2023)","body":null},"fmt":{"type":"labelled_box","labels":["(i) Trading bloc","(ii) Benefit 1","(ii) Benefit 2","(ii) Benefit 3"],"lines_per_label":[6,6,6,6]},"answer":[{"heading":"(i) A trading bloc is a group of countries that trade on agreed preferential terms:","body":"Members reduce or remove tariffs on goods traded between them. This makes trade cheaper and encourages closer economic cooperation.","bold_terms":[]},{"heading":"Tariff-free access widens the customer base:","body":"Irish firms can sell into other member states without extra taxes. This opens a market far larger than Ireland alone. Irish dairy exporters, for example, sell across the EU duty-free.","bold_terms":[]},{"heading":"Removing tariffs on inputs lowers costs:","body":"Materials can be imported from member states without duties. This protects margins and keeps Irish firms price-competitive in sectors such as food production.","bold_terms":[]},{"heading":"Common standards remove duplicate paperwork:","body":"One set of product and safety rules applies across the bloc. Goods approved in Ireland can then be sold in every member state without redesign.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-02","strand":1,"chapter":"1.5","lo":"5.2","lo_text":"Identify the trading blocs most relevant for Irish businesses","level":"HL","verb":"IDENTIFY","qnum":"2","q":"Identify two trading blocs that are most relevant to Irish businesses, and discuss two reasons why membership of, or trade links with, these blocs benefit the Irish economy.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"The European Union gives tariff-free access to over 450 million consumers:","body":"Membership removes customs costs and paperwork for Irish exporters. Common rules across member states let Irish firms scale quickly into other EU markets.","bold_terms":[]},{"heading":"Trade links with Mercosur secure competitively priced imports:","body":"Ireland is not a member, but the bloc is a major source of imports such as animal feed. Sourcing these inputs cheaply supports food processing and agri-business at home.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-03","strand":1,"chapter":"1.5","lo":"5.3","lo_text":"Evaluate Ireland’s membership of the EU from the perspective of the economy, businesses, and consumers","level":"HL","verb":"EVALUATE","qnum":"3","q":"Evaluate the overall impact of Ireland's membership of the EU on Irish businesses. Support your answer with examples.","stimulus":{"type":"headline","business":null,"headline":"Irish businesses benefit from frictionless access to the EU market, but not without obligations (Financial Times, 2024)","body":null},"fmt":{"type":"plain_box","lines":28},"answer":[{"heading":"Tariff-free Single Market access boosts exports:","body":"Irish firms trade across the EU with no tariffs or border delays. Agri-food and pharma exporters rely on these routes, supporting jobs nationwide.","bold_terms":[]},{"heading":"Free movement of labour widens the talent pool:","body":"Firms can recruit across the EU to fill shortages. This keeps roles staffed in healthcare, hospitality and construction.","bold_terms":[]},{"heading":"Common EU regulation raises compliance costs:","body":"Meeting rules on product safety, data protection and employment adds cost. The burden falls hardest on smaller firms with fewer resources.","bold_terms":[]},{"heading":"Evaluation","body":"In my opinion, EU membership is clearly positive for Irish business. This is because tariff-free access to over 450 million consumers far outweighs the cost of meeting EU rules. I would recommend that firms build regulatory expertise so compliance becomes a competitive strength.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-04","strand":1,"chapter":"1.5","lo":"5.3","lo_text":"Evaluate Ireland’s membership of the EU from the perspective of the economy, businesses, and consumers","level":"HL","verb":"OUTLINE","qnum":"4","q":"Outline three ways EU membership has supported the Irish economy.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Tariff-free exporting has lifted trade volumes:","body":"Ireland sells goods into other EU countries without tariffs. The higher volumes raise national income and support jobs.","bold_terms":[]},{"heading":"EU access has attracted foreign investment:","body":"Many multinationals locate here to reach the EU market. This has driven job creation and regional development.","bold_terms":[]},{"heading":"EU funding has modernised key sectors:","body":"Ireland has received EU investment in roads, rural development and farming through the CAP. This has upgraded infrastructure and supported agriculture.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-05","strand":1,"chapter":"1.5","lo":"5.3","lo_text":"Evaluate Ireland’s membership of the EU from the perspective of the economy, businesses, and consumers","level":"HL","verb":"DISCUSS","qnum":"5","q":"Discuss two ways EU membership has improved conditions for consumers in Ireland.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Greater choice and lower prices:","body":"Tariff-free access lets consumers buy from across the EU. Stronger competition pushes prices down and widens choice. Platforms such as Vinted give shoppers more options.","bold_terms":[]},{"heading":"Stronger consumer rights:","body":"Common EU rules cover data protection, labelling and refunds. These apply across the bloc, so people can shop with confidence at home and abroad. GDPR protects Irish shoppers buying online.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-06","strand":1,"chapter":"1.5","lo":"5.4","lo_text":"Outline the factors to be considered when trading internationally","level":"HL","verb":"OUTLINE","qnum":"6","q":"Outline three factors Vivid Roots should consider before expanding into international markets.","stimulus":{"type":"business","business":"Vivid Roots","headline":"Galway organic herbal tea producer eyeing Germany and Canada","body":"Founded in 2019, Vivid Roots is a Galway business producing organic herbal teas from native Irish botanicals. With wellness demand growing across Europe and North America, it is exploring distribution in Germany and Canada while protecting its reputation for authenticity and sustainability."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Taxes and tariffs raise the cost of selling abroad:","body":"Customs duties in non-EU markets such as Canada add to the price. This can squeeze margins or force a price rise.","bold_terms":[]},{"heading":"International trade brings extra operating costs:","body":"Shipping, insurance and compliance all add to expenses. Packaging may also need adapting to each market's rules.","bold_terms":[]},{"heading":"Cultural and language differences shape success:","body":"Branding that works in Ireland may not transfer. Vivid Roots may need to adjust its messaging to suit local consumers.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-07","strand":1,"chapter":"1.5","lo":"5.4","lo_text":"Outline the factors to be considered when trading internationally","level":"HL","verb":"OUTLINE","qnum":"8","q":"Outline two cost-related challenges an Irish business may face when entering global markets.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Higher transport and distribution costs:","body":"Exporting brings shipping, customs and storage charges, especially outside the EU. These added costs reduce profit margins.","bold_terms":[]},{"heading":"Increased marketing and localisation costs:","body":"Packaging, advertising and labelling must be adapted to each market. This means extra spending on design and campaigns.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-08","strand":1,"chapter":"1.5","lo":"5.5","lo_text":"Explain why Irish businesses trade globally with reference to Ireland’s open economy and compare the challenges and benefits of trading in an international environment","level":"HL","verb":"EXPLAIN","qnum":"7","q":"Explain how exchange rate fluctuations can affect a business like McHale when trading outside the Eurozone.","stimulus":{"type":"business","business":"McHale Farm Machinery","headline":"Ballinrobe baling and wrapping manufacturer exporting to 50+ countries","body":"McHale, a global leader in baling and wrapping machinery, is headquartered in Ballinrobe, Co. Mayo, and exports to over 50 countries including the UK, Australia and South Africa. It prices many exports in local currencies and closely monitors exchange-rate trends."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"A stronger euro makes exports dearer:","body":"When the euro rises, McHale's machinery costs more for buyers abroad. Demand can fall, leaving it exposed to local and UK rivals.","bold_terms":[]},{"heading":"A weaker euro lifts earnings but raises import costs:","body":"A falling euro means more euro earned on each foreign sale. However, imported components become dearer, which can erode margins.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-09","strand":1,"chapter":"1.5","lo":"5.5","lo_text":"Explain why Irish businesses trade globally with reference to Ireland’s open economy and compare the challenges and benefits of trading in an international environment","level":"HL","verb":"OUTLINE","qnum":"9","q":"Outline two benefits and two challenges for Loughshore Cyber when trading internationally.","stimulus":{"type":"business","business":"Loughshore Cyber","headline":"Mayo cybersecurity firm now exporting to the Netherlands, Canada and Singapore","body":"Loughshore Cyber, a Mayo-based cybersecurity company, grew rapidly at home but its founders saw the limits of a market of just over five million people. In 2024 it began exporting to the Netherlands, Canada and Singapore, aiming for long-term profitability and protection against a domestic downturn."},"fmt":{"type":"labelled_box","labels":["Benefits","1","2","Challenges","1","2"],"lines_per_label":[0,3,3,0,3,3]},"answer":[{"heading":"Benefit: access to far larger markets","body":"Ireland's small population limits domestic growth. Selling into Canada and Singapore lifts revenue and reaches more customers.","bold_terms":[]},{"heading":"Benefit: reduced risk through diversification","body":"Trading across several economies spreads risk. A home slowdown can be offset by overseas sales.","bold_terms":[]},{"heading":"Challenge: regulatory differences","body":"Data and cybersecurity laws vary by country. The firm must meet different compliance rules, which adds cost.","bold_terms":[]},{"heading":"Challenge: exchange rate fluctuations","body":"Selling outside the eurozone brings currency risk. A stronger euro makes the firm's services dearer abroad.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-10","strand":1,"chapter":"1.5","lo":"5.6","lo_text":"Distinguish between balance of payments and balance of trade and calculate both based on figures given","level":"HL","verb":"DISTINGUISH","qnum":"10","q":"Distinguish between the balance of trade and the balance of payments.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":4},"answer":[{"heading":"Balance of trade: visible goods only","body":"It is the difference between a country's exports and imports of goods. A surplus means exports exceed imports; a deficit means the reverse.","bold_terms":[]},{"heading":"Balance of payments: all transactions","body":"It records all financial dealings with the rest of the world. This includes services, income and investment, not just goods.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-11","strand":1,"chapter":"1.5","lo":"5.6","lo_text":"Distinguish between balance of payments and balance of trade and calculate both based on figures given","level":"HL","verb":"CALCULATE","qnum":"11","q":"Calculate the balance of trade and state whether it is a surplus or a deficit.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["FIGURES PROVIDEDVisible exports:  €120bnVisible imports:  €95bn"],"lines_per_label":[0]},{"type":"plain_box","lines":4}]},"answer":[{"heading":"Formula:","body":"Balance of Trade = Visible Exports − Visible Imports.","bold_terms":[]},{"heading":"Working:","body":"€120bn − €95bn = €25bn.","bold_terms":[]},{"heading":"Result:","body":"€25bn surplus (exports exceed imports).","bold_terms":[]}],"biz":null},{"code":"1.5-HL-12","strand":1,"chapter":"1.5","lo":"5.6","lo_text":"Distinguish between balance of payments and balance of trade and calculate both based on figures given","level":"HL","verb":"CALCULATE","qnum":"12","q":"(a) Calculate the balance of trade. (b) Calculate the balance of payments. (c) State whether each result is a surplus or a deficit.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["FIGURES PROVIDEDVisible exports:  €85bnVisible imports:  €90bnInvisible exports:  €40bnInvisible imports:  €35bn"],"lines_per_label":[0]},{"type":"labelled_box","labels":["(a) Balance of trade","(b) Balance of payments","(c) Surplus or deficit"],"lines_per_label":[5,5,5]}]},"answer":[{"heading":"(a) Balance of trade:","body":"Visible Exports − Visible Imports = €85bn − €90bn = €5bn deficit.","bold_terms":[]},{"heading":"(b) Balance of payments:","body":"(€85bn + €40bn) − (€90bn + €35bn) = €125bn − €125bn = €0, i.e. balanced.","bold_terms":[]},{"heading":"(c) Result:","body":"Balance of trade is a €5bn deficit; balance of payments is balanced.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-13","strand":1,"chapter":"1.5","lo":"5.6","lo_text":"Distinguish between balance of payments and balance of trade and calculate both based on figures given","level":"HL","verb":"CALCULATE","qnum":"13","q":"Calculate the balance of trade using the following information.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["FIGURES PROVIDEDTotal exports:  €112bnInvisible exports:  €30bnInvisible imports:  €42bnTotal imports:  €104bn"],"lines_per_label":[0]},{"type":"plain_box","lines":5}]},"answer":[{"heading":"Find visible exports:","body":"Total exports − invisible exports = €112bn − €30bn = €82bn.","bold_terms":[]},{"heading":"Find visible imports:","body":"Total imports − invisible imports = €104bn − €42bn = €62bn.","bold_terms":[]},{"heading":"Balance of trade:","body":"€82bn − €62bn = €20bn surplus.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-14","strand":1,"chapter":"1.5","lo":"5.6","lo_text":"Distinguish between balance of payments and balance of trade and calculate both based on figures given","level":"HL","verb":"CALCULATE","qnum":"14","q":"Complete the following table.","stimulus":null,"fmt":{"type":"data_table","headers":["Year","Visible Exports (€bn)","Visible Imports (€bn)","Balance of Trade"],"rows":[["2022","","€90","€25 surplus"],["2023","€110","","€20 deficit"],["2024","€85","€70",""]]},"answer":[{"heading":"2022 visible exports:","body":"€90bn + €25bn surplus = €115bn.","bold_terms":[]},{"heading":"2023 visible imports:","body":"€110bn + €20bn deficit = €130bn.","bold_terms":[]},{"heading":"2024 balance of trade:","body":"€85bn − €70bn = €15bn surplus.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-15","strand":1,"chapter":"1.5","lo":"5.7","lo_text":"Evaluate the impact of Irish organisations trading internationally, with a focus on both positive and negative impacts and the social and environmental impact of globalisation","level":"HL","verb":"EVALUATE","qnum":"15","q":"Evaluate the positive and negative impacts of globalisation on Irish businesses.","stimulus":null,"fmt":{"type":"plain_box","lines":28},"answer":[{"heading":"Access to new markets drives growth:","body":"Irish firms can export beyond the home economy. This lifts sales and profit, often the biggest single gain for an exporter.","bold_terms":[]},{"heading":"Economies of scale cut unit costs:","body":"Higher production volumes lower the cost per unit. This helps Irish firms compete with larger rivals.","bold_terms":[]},{"heading":"Currency exposure creates financial risk:","body":"Trading across currencies invites exchange-rate swings. A weaker foreign currency can wipe out profit on conversion.","bold_terms":[]},{"heading":"Cultural barriers can damage reputation:","body":"Branding and negotiation styles do not always transfer. Misjudging local norms can cause offence and harm a firm abroad.","bold_terms":[]},{"heading":"Evaluation","body":"I believe globalisation benefits Irish business more than it harms it. This is because access to global markets drives growth the home economy cannot deliver. I would recommend that firms hedge currency risk to protect those gains.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-16","strand":1,"chapter":"1.5","lo":"5.7","lo_text":"Evaluate the impact of Irish organisations trading internationally, with a focus on both positive and negative impacts and the social and environmental impact of globalisation","level":"HL","verb":"EXPLAIN","qnum":"16","q":"Explain, using examples, two benefits Irish businesses may experience from operating in a globalised economy.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Access to far larger markets lifts revenue:","body":"Selling abroad reaches many more customers than the home market. This supports higher profit and growth. Butlers Chocolates exports to over 40 countries.","bold_terms":[]},{"heading":"Global competition spurs innovation:","body":"Competing abroad pushes firms to adopt new technology and improve products. Glen Dimplex has used global R&D to advance its appliances.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-17","strand":1,"chapter":"1.5","lo":"5.7","lo_text":"Evaluate the impact of Irish organisations trading internationally, with a focus on both positive and negative impacts and the social and environmental impact of globalisation","level":"HL","verb":"DISCUSS","qnum":"17","q":"Discuss two challenges Irish businesses may face as a result of globalisation.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Financial risk from exchange rates and tariffs:","body":"Currency swings on non-euro sales can cut profit. Tariffs add costs that make Irish exports dearer abroad. Brexit raised costs for UK-facing exporters.","bold_terms":[]},{"heading":"Political and legal risk disrupts trade:","body":"Sudden changes to trade rules can break supply chains. This adds cost and uncertainty. Brexit brought new checks and delays for Irish exporters.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-18","strand":1,"chapter":"1.5","lo":"5.7","lo_text":"Evaluate the impact of Irish organisations trading internationally, with a focus on both positive and negative impacts and the social and environmental impact of globalisation","level":"HL","verb":"ANALYSE","qnum":"18","q":"Analyse two social consequences of globalisation for Irish businesses.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Job losses can weaken local communities:","body":"Firms may move operations abroad to cut costs. This strips jobs from towns reliant on one employer. The fall in local spending often outlasts the original saving.","bold_terms":[]},{"heading":"Cultural homogenisation dilutes local identity:","body":"Adopting global branding can erode what makes Irish firms distinctive. This changes how customers relate to local businesses. Over time it can weaken the loyalty smaller firms rely on.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-19","strand":1,"chapter":"1.5","lo":"5.7","lo_text":"Evaluate the impact of Irish organisations trading internationally, with a focus on both positive and negative impacts and the social and environmental impact of globalisation","level":"HL","verb":"OUTLINE","qnum":"19","q":"Outline three environmental consequences of globalisation for Irish businesses.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Higher transport emissions:","body":"Exporting relies on long-distance shipping and air freight. This raises carbon emissions and enlarges a firm's footprint.","bold_terms":[]},{"heading":"Pressure on natural resources:","body":"Meeting global demand can intensify production. This strains local water, land and raw materials.","bold_terms":[]},{"heading":"Damage in overseas supply chains:","body":"Materials may come from countries with weak environmental rules. This links a firm to pollution abroad, even if it operates cleanly at home.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-20","strand":1,"chapter":"1.5","lo":"5.8","lo_text":"Explain how globalisation can increase interdependence* and evaluate the consequences of this for both businesses and consumers","level":"HL","verb":"EXPLAIN","qnum":"20","q":"Explain the concept of interdependence in a globalised economy.","stimulus":null,"fmt":{"type":"plain_box","lines":6},"answer":[{"heading":"Interdependence means firms rely on each other across borders:","body":"Irish firms depend on international suppliers, workers and markets to operate. Activity in one country can directly affect firms in another, as when a delay shipping parts from Asia halts production here.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-21","strand":1,"chapter":"1.5","lo":"5.8","lo_text":"Explain how globalisation can increase interdependence* and evaluate the consequences of this for both businesses and consumers","level":"HL","verb":"EVALUATE","qnum":"21","q":"Evaluate the consequences of globalisation for Irish consumers.","stimulus":null,"fmt":{"type":"plain_box","lines":28},"answer":[{"heading":"Wider choice of products:","body":"Consumers can buy goods from around the world. This raises living standards and brings new products to the market.","bold_terms":[]},{"heading":"Lower prices:","body":"Global competition and low-cost imports reduce prices. This stretches consumers' purchasing power.","bold_terms":[]},{"heading":"Environmental concerns:","body":"Long-distance transport adds emissions and waste. Imports often carry a higher carbon footprint than local goods.","bold_terms":[]},{"heading":"Evaluation","body":"In my opinion, globalisation is positive for Irish consumers. This is because the gains in choice and lower prices outweigh the environmental cost. I would recommend that consumers buy local where possible to limit that impact.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-22","strand":1,"chapter":"1.5","lo":"5.8","lo_text":"Explain how globalisation can increase interdependence* and evaluate the consequences of this for both businesses and consumers","level":"HL","verb":"EVALUATE","qnum":"22","q":"Evaluate the impact of increased interdependence due to globalisation on Irish businesses.","stimulus":{"type":"headline","business":null,"headline":"One ship stuck in Asia, and we're out of stock in Dublin (Irish Times, 2023)","body":null},"fmt":{"type":"plain_box","lines":28},"answer":[{"heading":"Access to cheaper inputs and labour:","body":"Firms can source materials and services from lower-cost countries. This improves margins and supports growth abroad.","bold_terms":[]},{"heading":"Exposure to global disruption:","body":"When one link breaks, operations can stall. A disaster or shipping delay abroad can halt production here, as seen during COVID-19.","bold_terms":[]},{"heading":"Reputational risk:","body":"Outsourcing invites criticism if suppliers treat workers or the environment poorly. This can damage trust with Irish consumers.","bold_terms":[]},{"heading":"Evaluation","body":"I believe increased interdependence is more of a risk than a benefit for Irish business. This is because over-reliance on global supply chains exposes firms to disruption they cannot control. I would recommend that firms diversify their suppliers to reduce this risk.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-23","strand":1,"chapter":"1.5","lo":"5.9","lo_text":"Evaluate the role of technology in globalisation","level":"HL","verb":"DISCUSS","qnum":"23","q":"Discuss two ways technology has influenced work practices for Irish businesses operating internationally.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Greater remote collaboration across borders:","body":"Video-conferencing lets Irish teams work with colleagues abroad. Staff can contribute from any location. Tools such as Zoom and Google Meet have made this routine.","bold_terms":[]},{"heading":"New, more flexible working models:","body":"Technology enables freelancing, remote start-ups and gig roles. These give workers more autonomy and access to international work. Platforms such as Upwork connect Irish workers to global clients.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-24","strand":1,"chapter":"1.5","lo":"5.9","lo_text":"Evaluate the role of technology in globalisation","level":"HL","verb":"EXPLAIN","qnum":"24","q":"Explain how technology has changed how businesses operate in a globalised economy.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"It enables real-time collaboration across countries:","body":"Shared online tools let teams in different countries work as one. Irish staff can contribute to global operations without relocating.","bold_terms":[]},{"heading":"It opens direct access to international clients:","body":"Platforms such as Fiverr and Upwork let Irish freelancers serve clients abroad from home. This creates flexible new income streams.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-25","strand":1,"chapter":"1.5","lo":"5.10","lo_text":"Explain what is meant by Foreign Direct Investment and investigate how the Irish government promotes Foreign Direct Investment","level":"HL","verb":"EXPLAIN","qnum":"25","q":"(a) Explain what is meant by Foreign Direct Investment. (b) Outline two reasons why Ireland is an attractive location for FDI.","stimulus":{"type":"headline","business":null,"headline":"Ireland ranked among the top five countries globally for attracting foreign direct investment (UNCTAD, 2024)","body":null},"fmt":{"type":"labelled_box","labels":["(a) Foreign Direct Investment","(b) Reason 1","(b) Reason 2"],"lines_per_label":[7,7,7]},"answer":[{"heading":"(a) FDI is direct investment by a firm in another country:","body":"It occurs when a company sets up or buys operations abroad, such as a new plant. It involves long-term commitment and brings jobs and innovation to the host economy.","bold_terms":[]},{"heading":"(b) A skilled, educated workforce:","body":"Strong universities and training give Ireland a deep talent pool. This attracts multinationals in tech, pharma and finance.","bold_terms":[]},{"heading":"(b) Barrier-free access to the EU market:","body":"EU membership gives firms here tariff-free access to over 400 million consumers. This makes Ireland a favoured English-speaking base for serving Europe.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-26","strand":1,"chapter":"1.5","lo":"5.10","lo_text":"Explain what is meant by Foreign Direct Investment and investigate how the Irish government promotes Foreign Direct Investment","level":"HL","verb":"OUTLINE","qnum":"26","q":"Outline two ways the Irish government's pro-enterprise policy supports foreign direct investment.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"A low corporation tax rate attracts investment:","body":"Ireland's 12.5% rate is among the lowest in the EU. This raises after-tax profitability for firms deciding where to locate.","bold_terms":[]},{"heading":"State agencies actively support investors:","body":"IDA Ireland offers grants, property solutions and advice. This reduces the risk and cost of setting up here.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-27","strand":1,"chapter":"1.5","lo":"5.10","lo_text":"Explain what is meant by Foreign Direct Investment and investigate how the Irish government promotes Foreign Direct Investment","level":"HL","verb":"OUTLINE","qnum":"27","q":"Outline two roles of the IDA in attracting foreign direct investment.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Promoting Ireland and providing information:","body":"The IDA markets Ireland's strengths to potential investors. It also supplies data on sectors, property and regions so firms can decide with confidence.","bold_terms":[]},{"heading":"Supporting investors through local links:","body":"The IDA connects investors with industry, government and service contacts. It also links universities to firms so the talent and research they need are available.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-28","strand":1,"chapter":"1.5","lo":"5.11","lo_text":"Outline the contribution of Foreign Direct Investment to the Irish economy","level":"HL","verb":"OUTLINE","qnum":"28","q":"(a) Outline two revenue-related opportunities created by FDI. (b) Discuss one challenge to Ireland's tax system arising from this reliance.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(a) Opportunity 1","(a) Opportunity 2","(b) Challenge"],"lines_per_label":[7,7,7]},"answer":[{"heading":"(a) A large share of corporation tax:","body":"FDI provides the bulk of Ireland's corporation tax. This funds public services such as healthcare and education.","bold_terms":[]},{"heading":"(a) Indirect local economic stimulus:","body":"Multinationals spend through their supply chains. Local catering, security and transport firms benefit from their presence.","bold_terms":[]},{"heading":"(b) Over-reliance on a few large taxpayers:","body":"A small number of firms pay a large share of corporation tax. An exit or downturn could open a major gap in the public finances. Commentators have repeatedly warned of this concentration risk.","bold_terms":[]}],"biz":null},{"code":"1.5-HL-29","strand":1,"chapter":"1.5","lo":"5.11","lo_text":"Outline the contribution of Foreign Direct Investment to the Irish economy","level":"HL","verb":"OUTLINE","qnum":"29","q":"Outline two opportunities and two challenges of Foreign Direct Investment (FDI) for Ireland.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Opportunities","1","2","Challenges","1","2"],"lines_per_label":[0,3,3,0,3,3]},"answer":[{"heading":"Opportunity: employment and regional development","body":"FDI has created hundreds of thousands of jobs, much of it outside Dublin. This stimulates regional towns and eases reliance on the capital.","bold_terms":[]},{"heading":"Opportunity: innovation and R&D","body":"Foreign firms invest heavily in research, often with universities. This deepens Ireland's innovation base and high-tech clusters.","bold_terms":[]},{"heading":"Challenge: infrastructure strain","body":"Rapid FDI growth strains housing, energy and transport. Housing shortages make it harder to keep skilled workers.","bold_terms":[]},{"heading":"Challenge: sustainability pressures","body":"Energy-intensive data centres raise sustainability concerns. Their electricity demand makes climate targets harder to meet.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-01","strand":1,"chapter":"1.5","lo":"5.11","lo_text":"Outline the contribution of Foreign Direct Investment to the Irish economy","level":"OL","verb":"STATE","qnum":"1","q":"(a) State one reason why trading blocs are important for Irish businesses. (b) Identify one trading bloc, other than the EU, that is relevant to Ireland.","stimulus":{"type":"business","business":"LO 5.1 / 5.2 — TRADING BLOCS AND WHY THEY MATTER","headline":null,"body":null},"fmt":{"type":"labelled_box","labels":["(a) Reason","(b) Trading bloc"],"lines_per_label":[5,2]},"answer":[{"heading":"(a) They reduce trade barriers:","body":"Trading blocs cut or remove tariffs between members. This helps Irish businesses export more easily and at lower cost.","bold_terms":[]},{"heading":"(b) USMCA:","body":"The United States-Mexico-Canada Agreement is relevant because the US is Ireland's biggest single export destination.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-02","strand":1,"chapter":"1.5","lo":"5.3","lo_text":"Evaluate Ireland’s membership of the EU from the perspective of the economy, businesses, and consumers","level":"OL","verb":"STATE","qnum":"2","q":"State one benefit of Ireland's EU membership for each of the following: (a) the Irish economy, (b) Irish businesses, (c) Irish consumers.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(a) Irish economy","(b) Irish businesses","(c) Irish consumers"],"lines_per_label":[2,2,2]},"answer":[{"heading":"(a) The Irish economy:","body":"Ireland can trade freely with other EU countries. This increases exports and supports economic growth.","bold_terms":[]},{"heading":"(b) Irish businesses:","body":"Firms can sell into the EU without tariffs. This lowers costs and increases sales.","bold_terms":[]},{"heading":"(c) Irish consumers:","body":"Shoppers can access more goods from other EU countries. These are often available at lower prices.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-03","strand":1,"chapter":"1.5","lo":"5.3","lo_text":"Evaluate Ireland’s membership of the EU from the perspective of the economy, businesses, and consumers","level":"OL","verb":"EXPLAIN","qnum":"3","q":"Ireland is a member of the European Union (EU). Explain two ways this membership helps Irish businesses and consumers.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"It helps businesses trade tariff-free:","body":"Firms can sell into other EU countries without extra costs like tariffs. This makes it easier to export and grow.","bold_terms":[]},{"heading":"It protects consumers through EU law:","body":"Shoppers are covered by EU rules on refunds and product safety. This lets them buy with more confidence, especially online.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-04","strand":1,"chapter":"1.5","lo":"5.3","lo_text":"Evaluate Ireland’s membership of the EU from the perspective of the economy, businesses, and consumers","level":"OL","verb":"IDENTIFY","qnum":"4","q":"Indicate whether each of the following statements is True or False by circling the correct option.","stimulus":{"type":"business","business":"LO 5.4 / 5.5 — TRADING INTERNATIONALLY","headline":null,"body":null},"fmt":{"type":"true_false_inline","statements":["(a) A business may need to translate packaging when selling products in another country. True / False","(b) All countries in the world use the euro, so exchange rates are not a concern for Irish exporters. True / False","(c) Tariffs can make Irish products more expensive in some international markets. True / False","(d) Cultural differences are not important if a business only sells online. True / False","(e) Transporting goods over long distances can increase business costs. True / False"]},"answer":[{"heading":"Answers:","body":"(a) True. (b) False. (c) True. (d) False. (e) True.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-05","strand":1,"chapter":"1.5","lo":"5.3","lo_text":"Evaluate Ireland’s membership of the EU from the perspective of the economy, businesses, and consumers","level":"OL","verb":"OUTLINE","qnum":"5","q":"Outline two benefits for an Irish business of selling products or services in other countries.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Access to more customers:","body":"Trading abroad reaches new markets with far more people. This can raise sales and profit.","bold_terms":[]},{"heading":"Spread of business risk:","body":"Overseas sales can balance out low sales at home. This makes the firm less dependent on the Irish economy.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-06","strand":1,"chapter":"1.5","lo":"5.6","lo_text":"Distinguish between balance of payments and balance of trade and calculate both based on figures given","level":"OL","verb":"CALCULATE","qnum":"6","q":"(a) Calculate the balance of trade. (b) State whether it is a surplus or a deficit.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["FIGURES PROVIDEDVisible exports:  €80bnVisible imports:  €95bn"],"lines_per_label":[0]},{"type":"labelled_box","labels":["(a) Balance of trade","(b) Surplus or deficit"],"lines_per_label":[5,2]}]},"answer":[{"heading":"(a) Balance of trade:","body":"Visible Exports − Visible Imports = €80bn − €95bn = −€15bn.","bold_terms":[]},{"heading":"(b) Result:","body":"This is a deficit of €15bn, because imports exceed exports.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-07","strand":1,"chapter":"1.5","lo":"5.6","lo_text":"Distinguish between balance of payments and balance of trade and calculate both based on figures given","level":"OL","verb":"IDENTIFY","qnum":"7","q":"Indicate whether each of the following statements is True or False by circling the correct option.","stimulus":null,"fmt":{"type":"true_false_inline","statements":["(a) The balance of trade includes only goods bought and sold between countries. True / False","(b) A surplus in the balance of payments means total exports are greater than total imports. True / False","(c) Invisible imports include goods such as food and cars. True / False","(d) If visible exports increase and imports stay the same, the balance of trade will improve. True / False","(e) The balance of payments includes both visible and invisible trade. True / False"]},"answer":[{"heading":"Answers:","body":"(a) True. (b) True. (c) False. (d) True. (e) True.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-08","strand":1,"chapter":"1.5","lo":"5.6","lo_text":"Distinguish between balance of payments and balance of trade and calculate both based on figures given","level":"OL","verb":"OUTLINE","qnum":"8","q":"Outline two positive effects of globalisation on Irish businesses.","stimulus":{"type":"business","business":"LO 5.7 / 5.8 — GLOBALISATION","headline":null,"body":null},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Access to new customers:","body":"Irish firms can sell their products in other countries. This increases sales and helps the business grow.","bold_terms":[]},{"heading":"Increased innovation:","body":"Firms can learn from other countries and improve how they work. This can lead to better products and new ideas.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-09","strand":1,"chapter":"1.5","lo":"5.6","lo_text":"Distinguish between balance of payments and balance of trade and calculate both based on figures given","level":"OL","verb":"OUTLINE","qnum":"9","q":"Outline two effects globalisation can have on Irish consumers.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"More choice:","body":"Consumers can buy goods from around the world, such as clothes and electronics. This gives them far more variety.","bold_terms":[]},{"heading":"Lower prices:","body":"Global competition and cheaper imports reduce costs. This means lower prices in Irish shops.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-10","strand":1,"chapter":"1.5","lo":"5.6","lo_text":"Distinguish between balance of payments and balance of trade and calculate both based on figures given","level":"OL","verb":"OUTLINE","qnum":"10","q":"Outline two negative impacts of globalisation for Irish businesses.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Increased competition:","body":"Irish firms may struggle against large global companies. These rivals can often offer lower prices.","bold_terms":[]},{"heading":"Supply chain problems:","body":"A problem abroad, such as a shipping delay, can stop supplies. This leaves Irish firms short of raw materials.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-11","strand":1,"chapter":"1.5","lo":"5.9","lo_text":"Evaluate the role of technology in globalisation","level":"OL","verb":"OUTLINE","qnum":"11","q":"Outline two ways technology has helped Irish businesses trade with other countries.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"E-commerce platforms:","body":"Firms can use websites and online marketplaces to sell abroad. This reaches customers outside Ireland easily.","bold_terms":[]},{"heading":"Digital communication tools:","body":"Email, video calls and messaging allow fast contact with partners abroad. This keeps communication quick and low-cost.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-12","strand":1,"chapter":"1.5","lo":"5.9","lo_text":"Evaluate the role of technology in globalisation","level":"OL","verb":"EXPLAIN","qnum":"12","q":"Explain two reasons why a company like Amazon might choose to locate in Ireland.","stimulus":{"type":"business","business":"LO 5.10 / 5.11 — FOREIGN DIRECT INVESTMENT","headline":null,"body":null},"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"A skilled workforce:","body":"Ireland has a highly educated workforce in areas like technology and logistics. This helps a firm like Amazon find the right staff.","bold_terms":[]},{"heading":"Access to the EU market:","body":"EU membership gives Amazon tariff-free access to over 400 million consumers. This lets it serve Europe efficiently from an Irish base.","bold_terms":[]}],"biz":null},{"code":"1.5-OL-13","strand":1,"chapter":"1.5","lo":"5.9","lo_text":"Evaluate the role of technology in globalisation","level":"OL","verb":"OUTLINE","qnum":"13","q":"Outline one opportunity and one challenge of Foreign Direct Investment in Ireland.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Opportunities","1","Challenges","1"],"lines_per_label":[0,3,0,3]},"answer":[{"heading":"Opportunity: job creation","body":"FDI creates many jobs in sectors like technology and pharma. This helps reduce unemployment and supports regional economies.","bold_terms":[]},{"heading":"Challenge: pressure on housing and infrastructure","body":"FDI growth strains housing, transport and energy. This makes it harder for workers to find affordable homes.","bold_terms":[]}],"biz":null},{"code":"2.1-HL-01","strand":2,"chapter":"2.1","lo":"6.1","lo_text":"Identify examples of innovation, intrapreneurship, and entrepreneurship in their local community, nationally and internationally, and explain the importance of innovation for business, the economy and society","level":"HL","verb":"STATE","qnum":"1","q":"State one example of innovation in each of the following: (i) your local community; (ii) an Irish business; (iii) an international business.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(i) Local community","(ii) Irish business","(iii) International business"],"lines_per_label":[5,5,5]},"answer":[{"heading":"(i) Local community: a cafe's click-and-collect app","body":"A local cafe introduced click-and-collect ordering during COVID-19. It let customers order ahead and reduced queues at the counter.","bold_terms":[]},{"heading":"(ii) Irish business: FoodCloud's surplus-food platform","body":"FoodCloud built a platform connecting supermarkets with charities. It redistributes surplus food and cuts waste nationwide.","bold_terms":[]},{"heading":"(iii) International business: Tesla's electric vehicles","body":"Tesla brought long-range electric cars into the mainstream. Its battery and software advances reshaped the wider car industry.","bold_terms":[]}],"biz":null},{"code":"2.1-HL-02","strand":2,"chapter":"2.1","lo":"6.1","lo_text":"Identify examples of innovation, intrapreneurship, and entrepreneurship in their local community, nationally and internationally, and explain the importance of innovation for business, the economy and society","level":"HL","verb":"EXPLAIN","qnum":"2","q":"Explain how innovation is important for (i) a business and (ii) society.","stimulus":{"type":"headline","business":null,"headline":"Innovation is not just about invention, it is about staying ahead in a competitive market (IBEC, 2024)","body":null},"fmt":{"type":"labelled_box","labels":["(i) Business","(ii) Society"],"lines_per_label":[7,7]},"answer":[{"heading":"(i) Business: innovation gives a competitive edge","body":"A new or improved product helps a firm stand out from its rivals. This attracts customers and strengthens the firm's brand reputation.","bold_terms":[]},{"heading":"(ii) Society: innovation helps solve social problems","body":"Fresh ideas tackle issues such as food waste and homelessness. This improves quality of life and strengthens local communities.","bold_terms":[]}],"biz":null},{"code":"2.1-HL-03","strand":2,"chapter":"2.1","lo":"6.1","lo_text":"Identify examples of innovation, intrapreneurship, and entrepreneurship in their local community, nationally and internationally, and explain the importance of innovation for business, the economy and society","level":"HL","verb":"OUTLINE","qnum":"3","q":"Outline two ways innovation contributes to the economy.","stimulus":{"type":"headline","business":null,"headline":"Ireland's innovation economy is driving exports, attracting investment and creating high-quality jobs (IDA Ireland, 2025)","body":null},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Innovation creates high-value jobs","body":"New industries such as medtech and AI need highly skilled workers. This raises employment and supports long-term economic growth.","bold_terms":[]},{"heading":"Innovation drives exports and investment","body":"Innovative firms compete more strongly abroad and attract foreign investment. This strengthens Ireland's position as a high-tech economy.","bold_terms":[]}],"biz":null},{"code":"2.1-HL-04","strand":2,"chapter":"2.1","lo":"6.2","lo_text":"Identify the competencies of innovators and outline why these are significant when starting a business","level":"HL","verb":"IDENTIFY","qnum":"4","q":"Identify four competencies that are important for innovators when starting a business.","stimulus":null,"fmt":{"type":"numbered_box","points":4,"lines_per_point":1},"answer":[{"heading":"Risk-taking","body":"Willing to take personal and financial risks despite uncertain outcomes.","bold_terms":[]},{"heading":"Creativity","body":"Able to generate new ideas and spot gaps in the market.","bold_terms":[]},{"heading":"Resilience","body":"Determined to push through setbacks and stay motivated.","bold_terms":[]},{"heading":"Decision-making","body":"Able to weigh options and choose quickly under pressure.","bold_terms":[]}],"biz":null},{"code":"2.1-HL-05","strand":2,"chapter":"2.1","lo":"6.2","lo_text":"Identify the competencies of innovators and outline why these are significant when starting a business","level":"HL","verb":"OUTLINE","qnum":"5","q":"Outline the importance of any two of these competencies when starting or expanding a business.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Resilience keeps a founder going through the hard early stage","body":"Setbacks such as low sales and unexpected costs are common at the start. A resilient founder is more likely to survive this period and keep trading.","bold_terms":[]},{"heading":"Creativity helps a business stand out and win customers","body":"A creative founder spots opportunities and offers something different. This helps the business attract customers from the very beginning.","bold_terms":[]}],"biz":null},{"code":"2.1-HL-06","strand":2,"chapter":"2.1","lo":"6.3","lo_text":"Investigate the role of government in fostering enterprise and supporting business development and growth","level":"HL","verb":"EXPLAIN","qnum":"6","q":"Explain three ways the Irish government supports business development locally and nationally.","stimulus":{"type":"headline","business":null,"headline":"Budget 2025 allocated 2.5 billion euro to support innovation, infrastructure and start-ups","body":null},"fmt":{"type":"numbered_box","points":3,"lines_per_point":5},"answer":[{"heading":"Investment in infrastructure supports business","body":"The government funds roads, broadband and other public infrastructure. This lowers business costs and helps firms reach customers and operate efficiently.","bold_terms":[]},{"heading":"A low corporation tax rate attracts investment","body":"Ireland's 12.5% rate lets firms retain more profit to reinvest. This draws investment and encourages entrepreneurs to set up here.","bold_terms":[]},{"heading":"State agencies provide funding, training and mentoring","body":"Agencies such as the LEOs and Enterprise Ireland support firms directly. This helps businesses plan, upskill staff and reach new markets.","bold_terms":[]}],"biz":null},{"code":"2.1-HL-07","strand":2,"chapter":"2.1","lo":"6.3","lo_text":"Investigate the role of government in fostering enterprise and supporting business development and growth","level":"HL","verb":"OUTLINE","qnum":"7","q":"Outline two ways Local Enterprise Offices (LEOs) support the development of enterprise in Ireland.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"LEOs provide financial support to small firms","body":"They offer grants and access to Microfinance Ireland loans. This helps start-ups cover early costs and reduces their financial risk.","bold_terms":[]},{"heading":"LEOs provide training and mentoring","body":"They run programmes and match owners with experienced advisors. This helps entrepreneurs make better decisions and grow with confidence.","bold_terms":[]}],"biz":null},{"code":"2.1-HL-08","strand":2,"chapter":"2.1","lo":"6.3","lo_text":"Investigate the role of government in fostering enterprise and supporting business development and growth","level":"HL","verb":"EXPLAIN","qnum":"8","q":"Explain two ways Enterprise Ireland fosters enterprise development and international growth for Irish businesses.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Enterprise Ireland provides funding and investment","body":"It offers grants and equity to firms with export or innovation potential. This lets them scale faster, hire staff and enter new markets.","bold_terms":[]},{"heading":"Enterprise Ireland opens access to international markets","body":"Its network of overseas offices supports Irish firms exporting abroad. This helps them find customers and navigate foreign regulations.","bold_terms":[]}],"biz":null},{"code":"2.1-HL-09","strand":2,"chapter":"2.1","lo":"6.3","lo_text":"Investigate the role of government in fostering enterprise and supporting business development and growth","level":"HL","verb":"EXPLAIN","qnum":"9","q":"Other than the Local Enterprise Office (LEO), explain one way the Irish government supports local businesses.","stimulus":null,"fmt":{"type":"plain_box","lines":6},"answer":[{"heading":"Microfinance Ireland lends to small firms that banks may refuse","body":"It is a government-funded lender offering low-interest, unsecured loans. This helps local start-ups get going or expand when they cannot access bank credit.","bold_terms":[]}],"biz":null},{"code":"2.1-OL-01","strand":2,"chapter":"2.1","lo":"6.1","lo_text":"Identify examples of innovation, intrapreneurship, and entrepreneurship in their local community, nationally and internationally, and explain the importance of innovation for business, the economy and society","level":"OL","verb":"EXPLAIN","qnum":"1","q":"Explain one way innovation is important for each of the following: (i) business; (ii) society; (iii) the economy.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(i) Business","(ii) Society","(iii) The economy"],"lines_per_label":[7,7,7]},"answer":[{"heading":"(i) Business: innovation attracts new customers","body":"A new or improved product helps a business stand out from competitors. This can win new customers and increase sales.","bold_terms":[]},{"heading":"(ii) Society: innovation helps solve community problems","body":"New ideas can improve healthcare access or reduce waste. This improves people's lives and supports those in need.","bold_terms":[]},{"heading":"(iii) The economy: innovation creates new jobs","body":"Businesses that grow through new ideas hire more workers. This boosts employment and the local economy.","bold_terms":[]}],"biz":null},{"code":"2.1-OL-02","strand":2,"chapter":"2.1","lo":"6.1","lo_text":"Identify examples of innovation, intrapreneurship, and entrepreneurship in their local community, nationally and internationally, and explain the importance of innovation for business, the economy and society","level":"OL","verb":"OUTLINE","qnum":"2","q":"Outline two reasons why a person might start a business.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"To be their own boss","body":"Some people want control over their working life instead of answering to an employer. Running their own business lets them make their own decisions.","bold_terms":[]},{"heading":"To earn more income","body":"Some believe they can earn more from their own business than from working for someone else. They want financial independence and the chance to grow their income.","bold_terms":[]}],"biz":null},{"code":"2.1-OL-03","strand":2,"chapter":"2.1","lo":"6.2","lo_text":"Identify the competencies of innovators and outline why these are significant when starting a business","level":"OL","verb":"IDENTIFY","qnum":"3","q":"Identify one competency an entrepreneur might have, and outline why it is important when starting or expanding a business.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Competency:","Reason:"],"lines_per_label":[5,5]},"answer":[{"heading":"Competency:","body":"Being proactive.","bold_terms":[]},{"heading":"Reason:","body":"A proactive entrepreneur takes action before problems arise. This helps them spot opportunities early and stay ahead of competitors when starting or growing.","bold_terms":[]}],"biz":null},{"code":"2.1-OL-04","strand":2,"chapter":"2.1","lo":"6.3","lo_text":"Investigate the role of government in fostering enterprise and supporting business development and growth","level":"OL","verb":"OUTLINE","qnum":"4","q":"Outline one way Local Enterprise Offices (LEOs) support business development.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"LEOs provide grants and mentoring to small businesses","body":"They offer financial supports such as grants and one-to-one mentoring. This helps local start-ups cover early costs and make better decisions.","bold_terms":[]}],"biz":null},{"code":"2.1-OL-05","strand":2,"chapter":"2.1","lo":"6.3","lo_text":"Investigate the role of government in fostering enterprise and supporting business development and growth","level":"OL","verb":"MATCH","qnum":"5","q":"Match each state agency to the correct description. Write the correct letter (A, B, C or D) in each box.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["OPTIONSA.  Local Enterprise Office (LEO)      B.  Microfinance Ireland      C.  Enterprise Ireland      D.  IDA Ireland"],"lines_per_label":[0]},{"type":"labelled_box","labels":["Description Letter","1.  Encourages foreign companies to set up and invest in Ireland.","2.  Provides small loans to start-ups that may not qualify for bank credit.","3.  Helps Irish businesses grow internationally through funding and export support.","4.  Provides mentoring and training to small businesses locally."],"lines_per_label":[0,0,0,0,0]}]},"answer":[{"heading":"Answer","body":"1 = D (IDA Ireland); 2 = B (Microfinance Ireland); 3 = C (Enterprise Ireland); 4 = A (Local Enterprise Office).","bold_terms":[]}],"biz":null},{"code":"2.1-OL-06","strand":2,"chapter":"2.1","lo":"6.3","lo_text":"Investigate the role of government in fostering enterprise and supporting business development and growth","level":"OL","verb":"OUTLINE","qnum":"6","q":"Outline one way Enterprise Ireland supports businesses in Ireland.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Enterprise Ireland helps firms grow internationally","body":"It provides funding, advice and market access to firms with export potential. This helps them expand into new countries and create jobs in Ireland.","bold_terms":[]}],"biz":null},{"code":"2.2-HL-01","strand":2,"chapter":"2.2","lo":"7.1","lo_text":"Determine the factors that impact on the development of business ideas","level":"HL","verb":"EXPLAIN","qnum":"1","q":"Explain three factors that may impact on the development of new business ideas at Deliveroo.","stimulus":{"type":"business","business":"Deliveroo","headline":"Food-delivery platform exploring new ideas for future growth","body":"Deliveroo operates in a highly competitive food-delivery market and wants to stay innovative and meet rising customer expectations. It has set up a dedicated team to explore potential new business ideas for future growth."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":5},"answer":[{"heading":"Operational data points to new opportunities","body":"Patterns in sales and customer queries reveal gaps a business can fill. Deliveroo can mine its ordering data to spot demand for new services.","bold_terms":[]},{"heading":"Customer feedback shapes which ideas progress","body":"Direct feedback highlights unmet needs and missing features. Deliveroo can use rider and diner reviews to refine an idea before investing.","bold_terms":[]},{"heading":"Competitor activity drives ideas to stand out","body":"Watching rivals shows where a business can offer something better. Deliveroo must develop ideas that set it apart from competitors such as Just Eat.","bold_terms":[]}],"biz":null},{"code":"2.2-HL-02","strand":2,"chapter":"2.2","lo":"7.1","lo_text":"Determine the factors that impact on the development of business ideas","level":"HL","verb":"EXPLAIN","qnum":"2","q":"Explain how two internal sources and two external sources can contribute to the generation of new business ideas.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Internal","1","2","External","1","2"],"lines_per_label":[0,4,4,0,4,4]},"answer":[{"heading":"Intrapreneurship turns staff insight into ideas","body":"Employees often spot customer needs and inefficiencies before management does. Firms with open communication capture these ideas from inside the business.","bold_terms":[]},{"heading":"Research and development creates new products","body":"Dedicated R&D teams use technical knowledge to develop or improve products. This produces innovations that give the business a competitive edge.","bold_terms":[]},{"heading":"Market trends reveal emerging needs","body":"Shifts in how people live and spend uncover gaps in the market. Tracking these trends lets a business design products that match new demand.","bold_terms":[]},{"heading":"Competitor observation highlights opportunities","body":"Studying what rivals do well or badly points to better alternatives. A business can then improve on what competitors already offer.","bold_terms":[]}],"biz":null},{"code":"2.2-HL-03","strand":2,"chapter":"2.2","lo":"7.2","lo_text":"Outline design thinking as an innovative approach to idea development and appreciate how the process is iterative and both solution- and person-centred","level":"HL","verb":"OUTLINE","qnum":"3","q":"Outline how BeanWave could use each of the four phases of design thinking to develop its new reusable cup.","stimulus":{"type":"business","business":"BeanWave","headline":"Small Irish coffee chain developing a reusable cup","body":"BeanWave, a small Irish coffee chain, wants to create a collapsible, reusable cup to meet growing demand for sustainable products. It plans to use design thinking to develop the new product."},"fmt":{"type":"labelled_box","labels":["Clarify:","Ideate:","Develop:","Implement:"],"lines_per_label":[5,5,5,5]},"answer":[{"heading":"Clarify: understand the problem from the customer's view","body":"This phase defines the real customer need before any design begins. BeanWave could survey regulars to learn what they value in a reusable cup.","bold_terms":[]},{"heading":"Ideate: generate a wide range of ideas","body":"This phase produces many creative options without early judgement. BeanWave could brainstorm cup shapes and sustainable materials with its baristas.","bold_terms":[]},{"heading":"Develop: turn ideas into prototypes and test them","body":"Selected ideas become prototypes that are trialled and refined. BeanWave could test biodegradable versions for durability and heat resistance.","bold_terms":[]},{"heading":"Implement: launch and refine on feedback","body":"The chosen solution is rolled out and improved using user feedback. BeanWave could trial the cup in a few stores before a national launch.","bold_terms":[]}],"biz":null},{"code":"2.2-HL-04","strand":2,"chapter":"2.2","lo":"7.2","lo_text":"Outline design thinking as an innovative approach to idea development and appreciate how the process is iterative and both solution- and person-centred","level":"HL","verb":"OUTLINE","qnum":"4","q":"Outline how a company could use the 'Clarify' and 'Implement' stages of design thinking to address falling customer satisfaction.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Clarify:","Implement:"],"lines_per_label":[5,5]},"answer":[{"heading":"Clarify: pinpoint the real causes of dissatisfaction","body":"This phase researches the problem from the customer's perspective. The company could use surveys and focus groups to find the main pain points, such as long waits.","bold_terms":[]},{"heading":"Implement: roll out and refine the solution","body":"This phase delivers the chosen fix and improves it on feedback. The company could trial faster ordering in some branches before expanding it.","bold_terms":[]}],"biz":null},{"code":"2.2-HL-05","strand":2,"chapter":"2.2","lo":"7.3","lo_text":"Appreciate the importance of conducting a feasibility study to evaluate a business idea","level":"HL","verb":"OUTLINE","qnum":"5","q":"Outline three types of feasibility Ballygowan should consider before launching its new biodegradable bottle.","stimulus":{"type":"business","business":"Ballygowan","headline":"Irish bottled water brand planning a biodegradable bottle","body":"Ballygowan, the Irish bottled water company, is considering launching a new plant-based biodegradable bottle. It wants to assess the idea fully before going ahead."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Market feasibility tests whether demand exists","body":"This checks the size of the target market and competitor activity. Ballygowan can gauge demand for eco-friendly packaging before committing.","bold_terms":[]},{"heading":"Production feasibility tests whether it can be made","body":"This checks whether the staff, equipment and suppliers are in place. It ensures Ballygowan does not commit to a bottle it cannot physically produce.","bold_terms":[]},{"heading":"Financial feasibility tests whether it will pay","body":"This weighs production costs, funding and the effect on cash flow. It stops Ballygowan pursuing a bottle that is too costly or unprofitable.","bold_terms":[]}],"biz":null},{"code":"2.2-HL-06","strand":2,"chapter":"2.2","lo":"7.3","lo_text":"Appreciate the importance of conducting a feasibility study to evaluate a business idea","level":"HL","verb":"EXPLAIN","qnum":"6","q":"Explain two reasons why it is important for a business to conduct a feasibility study before starting production.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"It reduces the risk of launching a product no one wants","body":"A study measures demand, market size and competition first. This helps a business avoid wasting time and money on a weak idea.","bold_terms":[]},{"heading":"It confirms the idea can be profitable","body":"A study weighs production costs, funding and expected returns. This ensures the business can afford to make the product and still earn a profit.","bold_terms":[]}],"biz":null},{"code":"2.2-OL-01","strand":2,"chapter":"2.2","lo":"7.1","lo_text":"Determine the factors that impact on the development of business ideas","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline one factor that can impact on the development of a business idea.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Access to finance can make or break an idea","body":"A business needs money to fund research, design and marketing. Without enough finance, an idea may never get past the concept stage.","bold_terms":[]}],"biz":null},{"code":"2.2-OL-02","strand":2,"chapter":"2.2","lo":"7.2","lo_text":"Outline design thinking as an innovative approach to idea development and appreciate how the process is iterative and both solution- and person-centred","level":"OL","verb":"LIST","qnum":"2","q":"List the four phases of the design thinking process.","stimulus":null,"fmt":{"type":"numbered_box","points":4,"lines_per_point":1},"answer":[{"heading":"Clarify","body":"Understand and define the problem from the user's perspective.","bold_terms":[]},{"heading":"Ideate","body":"Generate a wide range of creative ideas and possible solutions.","bold_terms":[]},{"heading":"Develop","body":"Build prototypes of the best ideas and refine them.","bold_terms":[]},{"heading":"Implement","body":"Launch the chosen solution and improve it on feedback.","bold_terms":[]}],"biz":null},{"code":"2.2-OL-03","strand":2,"chapter":"2.2","lo":"7.2","lo_text":"Outline design thinking as an innovative approach to idea development and appreciate how the process is iterative and both solution- and person-centred","level":"OL","verb":"MATCH","qnum":"3","q":"Match each phase of the design thinking process to its correct description. Write the correct letter (A, B, C or D) in each box.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["OPTIONSA.  Clarify      B.  Ideate      C.  Develop      D.  Implement"],"lines_per_label":[0]},{"type":"labelled_box","labels":["Description Letter","1.  Understanding and defining the problem from the user's point of view.","2.  Generating a wide range of creative ideas.","3.  Creating prototypes and refining the best ideas.","4.  Launching the chosen solution and making improvements based on feedback."],"lines_per_label":[0,0,0,0,0]}]},"answer":[{"heading":"Answer","body":"1 = A (Clarify); 2 = B (Ideate); 3 = C (Develop); 4 = D (Implement).","bold_terms":[]}],"biz":null},{"code":"2.2-OL-04","strand":2,"chapter":"2.2","lo":"7.3","lo_text":"Appreciate the importance of conducting a feasibility study to evaluate a business idea","level":"OL","verb":"OUTLINE","qnum":"4","q":"Outline one benefit to a business of carrying out a production feasibility study.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"It reduces the risk of business failure","body":"A feasibility study flags problems such as low demand or high costs before production. This saves the business from wasting time and money on a weak idea.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-01","strand":2,"chapter":"2.3","lo":"8.1","lo_text":"Appreciate the importance of having a business plan and outline the key functions of a business plan","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline two elements of the business plan that will be essential for Butler's Chocolates when launching this e-commerce venture.","stimulus":{"type":"business","business":"Butler's Chocolates","headline":"Irish handmade chocolate brand launching online for the first time","body":"Butler's Chocolates, famous for handmade Irish treats, is planning to sell its products online for the first time. It is preparing a business plan to support this new e-commerce venture."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"The marketing plan sets out how to win online customers","body":"It identifies the target market and how Butler's will position itself against rivals. It also estimates the size of the new online market in customers and revenue.","bold_terms":[]},{"heading":"The financial plan shows whether the venture will pay","body":"It sets out sales forecasts, costs and cash-flow projections for the online store. This shows whether the e-commerce launch is profitable and reassures lenders.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-02","strand":2,"chapter":"2.3","lo":"8.1","lo_text":"Appreciate the importance of having a business plan and outline the key functions of a business plan","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline how a business plan can support Bread 41 at this stage of development.","stimulus":{"type":"business","business":"Bread 41","headline":"Dublin bakery scaling its subscription bread boxes nationwide","body":"Bread 41, a Dublin bakery, wants to expand its subscription-based bread boxes nationwide. It is using a business plan to guide this stage of its development."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"It sets clear objectives for the expansion","body":"The plan gives Bread 41 targets such as subscriber numbers or new regions to reach. This provides a roadmap for growth and lets it measure progress.","bold_terms":[]},{"heading":"It identifies the resources the expansion needs","body":"The plan highlights the staff, vehicles, packaging and suppliers required. This prepares Bread 41 and reduces the chance of delays as it scales up.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-03","strand":2,"chapter":"2.3","lo":"8.1","lo_text":"Appreciate the importance of having a business plan and outline the key functions of a business plan","level":"HL","verb":"EXPLAIN","qnum":"3","q":"Explain the importance of a business plan to Wild Atlantic Way Tours when applying for funding.","stimulus":{"type":"business","business":"Wild Atlantic Way Tours","headline":"Irish adventure-travel firm seeking a loan to expand","body":"Wild Atlantic Way Tours, a small Irish adventure travel company, is seeking a 200,000 euro loan to expand its services. It must present a business plan to its bank."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"It shows the lender the loan can be repaid","body":"The plan presents projected income, costs and profits for the expansion. This gives the bank confidence that the 200,000 euro loan is financially viable.","bold_terms":[]},{"heading":"It reduces the risk the lender is taking on","body":"Market research and a detailed strategy show the firm understands its market. This lowers uncertainty and makes loan approval more likely.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-04","strand":2,"chapter":"2.3","lo":"8.1","lo_text":"Appreciate the importance of having a business plan and outline the key functions of a business plan","level":"HL","verb":"OUTLINE","qnum":"4","q":"Outline two ways a business plan can support effective operations for Patagonia's new Galway store.","stimulus":{"type":"business","business":"Patagonia","headline":"Global outdoor-clothing brand opening a flagship store in Galway","body":"Patagonia, the global outdoor clothing brand, is preparing to open a flagship store in Galway. It is using its business plan to guide the store's operations."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"It plans the resources the store needs to run","body":"The plan sets out staffing, stock levels and premises for the Galway store. This ensures resources are in place so operations run smoothly from opening day.","bold_terms":[]},{"heading":"It allows performance to be monitored","body":"The plan sets operational targets such as weekly sales or customer numbers. Managers can then measure results and act quickly if performance falls short.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-05","strand":2,"chapter":"2.3","lo":"8.1","lo_text":"Appreciate the importance of having a business plan and outline the key functions of a business plan","level":"HL","verb":"OUTLINE","qnum":"5","q":"Outline four key functions of a business plan.","stimulus":null,"fmt":{"type":"numbered_box","points":4,"lines_per_point":3},"answer":[{"heading":"It sets clear objectives for the business","body":"The plan gives the firm goals such as sales, market share or profit targets. Managers can then measure performance against these and stay focused on strategy.","bold_terms":[]},{"heading":"It helps attract finance","body":"The plan includes cash-flow forecasts, breakeven analysis and projected profits. Without these, lenders may see the business as too risky to fund.","bold_terms":[]},{"heading":"It reduces risk","body":"The plan identifies challenges such as competition or rising costs in advance. SWOT analysis and market research let the firm prepare contingency plans.","bold_terms":[]},{"heading":"It guides day-to-day operations","body":"The plan acts as a roadmap for allocating staff, materials and capital. This keeps daily decisions aligned with the firm's strategic objectives.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-06","strand":2,"chapter":"2.3","lo":"8.2","lo_text":"Outline the importance of ethics and sustainability when planning in business","level":"HL","verb":"OUTLINE","qnum":"6","q":"Outline four key benefits to a business of considering ethics and sustainability when planning.","stimulus":null,"fmt":{"type":"numbered_box","points":4,"lines_per_point":3},"answer":[{"heading":"It improves reputation and brand loyalty","body":"Sustainability goals in the marketing plan let a firm highlight ethical practices. This strengthens brand image and builds long-term customer loyalty.","bold_terms":[]},{"heading":"It attracts investment","body":"Sustainable practices can cut long-term costs and risks in the financial plan. Investors increasingly favour firms that meet ESG criteria.","bold_terms":[]},{"heading":"It ensures legal and regulatory compliance","body":"Operational plans can set out how the firm meets environmental and labour laws. This prevents fines, reputational damage and disruption.","bold_terms":[]},{"heading":"It supports long-term profitability","body":"Planning for challenges such as rising energy costs builds resilience. Resource efficiency and ethical sourcing create lasting value.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-07","strand":2,"chapter":"2.3","lo":"8.3","lo_text":"Explain what is meant by a business model and appreciate its role within the business plan","level":"HL","verb":"EXPLAIN","qnum":"7","q":"Explain what is meant by a 'business model'.","stimulus":null,"fmt":{"type":"plain_box","lines":6},"answer":[{"heading":"A business model sets out how a firm creates and captures value","body":"It is an element of the business plan describing how a company will operate, create, deliver and capture value. It links the plan together by showing how the business earns income and delivers value to customers.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-08","strand":2,"chapter":"2.3","lo":"8.3","lo_text":"Explain what is meant by a business model and appreciate its role within the business plan","level":"HL","verb":"EXPLAIN","qnum":"8","q":"Explain the role of a business model in the business plan for Gym+Coffee.","stimulus":{"type":"business","business":"Gym+Coffee","headline":"Irish athleisure brand growing international sales","body":"Gym+Coffee, an Irish athleisure brand, is reviewing how it can increase international sales while staying true to its community-focused values. It is examining the role of its business model within its plan."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"It explains how revenue will be generated","body":"The model would show whether Gym+Coffee earns mainly from online sales, stores or subscriptions. This links to the financial plan and supports profitability.","bold_terms":[]},{"heading":"It shows how value is created and delivered","body":"It identifies Gym+Coffee's community values and quality products as what makes it valuable. It then sets out how that value reaches customers in new markets.","bold_terms":[]}],"biz":null},{"code":"2.3-HL-09","strand":2,"chapter":"2.3","lo":"8.4","lo_text":"Identify the key elements of the business model canvas and outline the role of business models in successful enterprises","level":"HL","verb":"IDENTIFY","qnum":"9","q":"Identify three elements of the Business Model Canvas that are especially important for Nike's success.","stimulus":{"type":"business","business":"Nike","headline":"Global sportswear brand targeting multiple customer segments","body":"Nike targets different customer segments such as men, women and children with lifestyle and sport-specific clothing. Its success depends on how it manages key elements of its business model."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Customer Segments","body":"Nike divides its market into clear groups such as athletes, children and lifestyle buyers. This lets it target products and marketing more effectively.","bold_terms":[]},{"heading":"Value Proposition","body":"Nike offers strong USPs such as Air technology, premium branding and performance quality. These make customers choose Nike over rivals.","bold_terms":[]},{"heading":"Customer Relationships","body":"Nike builds loyalty through sponsorships, athlete endorsements and its apps. This stre
