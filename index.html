<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LC Business — Question Bank</title>
<style>
:root{
  --navy:#1A3A5C; --navy-deep:#14264C; --green:#2E6B4F; --red:#E4002B;
  --bg:#EEF1F6; --card:#FFFFFF; --ink:#1E2A38; --muted:#6B7684; --line:#DDE3EC;
  --stim:#F6F9FD; --ans:#F3F7FC; --rule:#C9D2DE;
  --serif:Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
header{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(20,38,76,.18)}
.brand{font-family:var(--serif);font-weight:700;letter-spacing:.5px;font-size:1.15rem;display:flex;align-items:baseline;gap:8px}
.brand .sub{font-family:var(--sans);font-weight:600;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;opacity:.72}
.brand .dot{color:var(--red)}
.prog{font-size:.72rem;opacity:.85;text-align:right;min-width:70px}
.prog b{display:block;font-size:.95rem}
.wrap{max-width:760px;margin:0 auto;padding:16px}
.filters{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px}
.frow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.frow:last-child{margin-bottom:0}
.flabel{font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);width:100%;margin-bottom:2px;font-weight:700}
.pill{border:1.5px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:7px 14px;font-size:.82rem;font-weight:600;transition:.12s}
.pill:hover{border-color:var(--navy)}
.pill.on{background:var(--navy);border-color:var(--navy);color:#fff}
select{flex:1;min-width:140px;border:1.5px solid var(--line);border-radius:10px;padding:9px 10px;font-size:.85rem;font-family:inherit;background:#fff;color:var(--ink)}
.count{width:100%;font-size:.78rem;color:var(--muted);margin-top:4px}
.count b{color:var(--navy)}
/* LO group header — book banner style */
.lohead{background:var(--navy);color:#fff;padding:9px 16px;margin:26px 0 0;
  font-size:.78rem;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;
  font-family:Arial,var(--sans)}
.lohead.ol{background:var(--green)}
.lohead .lvl{float:right;font-weight:600;opacity:.75;letter-spacing:2px}
/* paper sheet */
.card{background:#fff;border:1px solid #CBD2DC;border-radius:0;padding:26px 26px 20px;
  box-shadow:0 3px 14px rgba(30,42,56,.09);margin:14px 0 6px;font-family:var(--serif)}
.meta{display:flex;gap:10px;align-items:center;margin:14px 2px 0;font-family:var(--sans)}
.meta .ref{font-size:.7rem;color:var(--muted);letter-spacing:.5px}
.badge{font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.badge.hl{background:var(--navy);color:#fff}
.badge.ol{background:var(--green);color:#fff}
/* stimulus — exact book style */
.stim{border:2px solid var(--navy);background:#F7F9FC;padding:14px 18px;margin-bottom:16px}
.stim .biz{font-family:var(--serif);font-weight:700;color:var(--navy);font-size:1.25rem;margin-bottom:3px}
.stim .hl{font-weight:700;font-size:.9rem;margin-bottom:6px;color:#111}
.stim .bd{font-size:.9rem;color:#222;line-height:1.5}
.stim .news{font-size:.64rem;letter-spacing:2px;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:6px;font-family:var(--sans)}
.qnum{font-family:var(--serif);font-size:1.05rem;line-height:1.5;color:#111}
.qnum b{font-weight:700;margin-right:6px}
/* ===== answer spaces — book fidelity ===== */
.space{margin-top:14px}
.abox{border:1.5px solid #222}
.aseg{padding:5px 10px 0}
.aseg .n{font-size:.85rem;font-weight:700;color:#111;font-family:var(--serif)}
.aseg .lab{font-size:.88rem;font-weight:700;color:#111;padding-top:4px;font-family:var(--serif)}
.rl{height:30px;border-bottom:1px solid #B9C2CE}
.aseg .rl:last-child{margin-bottom:10px}
.aseg+.aseg{border-top:1.5px solid #222}
/* grid */
.pig{display:grid;grid-template-columns:64px 1fr 1fr;grid-template-rows:120px 120px 26px;gap:0;margin-top:4px}
.pig .yl{display:flex;align-items:center;justify-content:flex-end;padding-right:8px;
  font-size:.62rem;font-weight:800;color:var(--navy);letter-spacing:.5px;text-align:right;text-transform:uppercase;font-family:var(--sans)}
.pig .q{border:1.5px solid #222;padding:6px 9px;font-size:.8rem;font-weight:700;color:var(--navy);font-family:var(--serif)}
.pig .q.tl{border-bottom-width:.75px;border-right-width:.75px}
.pig .q.tr{border-bottom-width:.75px;border-left-width:.75px}
.pig .q.bl{border-top-width:.75px;border-right-width:.75px}
.pig .q.br{border-top-width:.75px;border-left-width:.75px}
.pig .xl{font-size:.62rem;font-weight:800;color:var(--navy);letter-spacing:.5px;text-transform:uppercase;
  display:flex;align-items:flex-end;justify-content:center;padding-top:6px;font-family:var(--sans)}
/* tables & lists */
.qtable{width:100%;border-collapse:collapse;margin-top:4px;font-size:.85rem;font-family:var(--serif)}
.qtable th,.qtable td{border:1px solid #222;padding:6px 9px;text-align:left}
.qtable th{background:#F1F4F9;color:var(--navy);font-weight:700}
.qtable td.blank{min-width:60px}
.qlist{margin:6px 0 0;padding-left:22px;font-size:.92rem;font-family:var(--serif)}
.qlist li{margin-bottom:8px}
.tfrow{display:flex;justify-content:space-between;align-items:center;gap:12px;border-bottom:1px solid #DDE3EC;padding:8px 0;font-size:.9rem;font-family:var(--serif)}
.tfrow:last-child{border-bottom:none}
.tfopt{display:flex;gap:6px;flex-shrink:0}
.tfopt span{border:1.5px solid #222;border-radius:2px;padding:2px 10px;font-size:.75rem;font-weight:700;font-family:var(--sans)}
.matchblank{display:inline-block;min-width:46px;border-bottom:1.5px solid #222;margin-left:8px}
/* reveal + answer live OUTSIDE the paper */
.below{margin:0 0 8px;font-family:var(--sans)}
.reveal{width:100%;background:var(--navy);color:#fff;border:none;border-radius:0 0 10px 10px;
  padding:12px;font-size:.85rem;font-weight:700;letter-spacing:.4px;transition:.15s}
.reveal:hover{background:var(--navy-deep)}
.reveal.open{background:#EAF0F7;color:var(--navy)}
.olv .reveal{background:var(--green)}
.olv .reveal:hover{background:#245640}
.olv .reveal.open{background:#EAF3EE;color:var(--green)}
.answer{border-left:4px solid var(--navy);background:var(--ans);padding:16px 18px;margin-top:10px}
.answer .lbl{font-size:.66rem;letter-spacing:3px;text-transform:uppercase;color:var(--navy);font-weight:800;margin-bottom:12px}
.answer.ol{border-left-color:var(--green);background:#F2F8F4}
.answer.ol .lbl{color:var(--green)}
.pt{margin-bottom:12px}.pt:last-child{margin-bottom:0}
.pt .h{font-weight:700;color:var(--navy);font-size:.92rem;margin-bottom:2px;font-family:var(--serif)}
.answer.ol .pt .h{color:var(--green)}
.pt .b{font-size:.9rem;color:#222;font-family:var(--serif)}
.pt .b b{color:var(--navy)}
.basedon{font-style:italic;font-size:.8rem;color:var(--muted);margin-top:6px;font-family:var(--serif)}
.rev{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:.78rem;color:var(--muted)}
.rev input{width:15px;height:15px;accent-color:var(--navy)}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:.9rem;background:#fff;border:1px solid var(--line);border-radius:16px}
.more{display:block;margin:20px auto;background:#fff;border:1.5px solid var(--navy);color:var(--navy);
  border-radius:999px;padding:11px 26px;font-weight:700;font-size:.85rem}
@media (prefers-reduced-motion:no-preference){
  .answer{animation:sl .22s ease} @keyframes sl{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
}
:focus-visible{outline:2.5px solid var(--red);outline-offset:2px}
@media(max-width:520px){ .wrap{padding:12px} .brand{font-size:1rem} .pig{grid-template-columns:52px 1fr 1fr} .card{padding:18px 16px 14px} }
footer{max-width:760px;margin:20px auto 40px;padding:0 16px;font-size:.72rem;color:var(--muted);text-align:center}
</style>
</head>

<script id="data" type="application/json">[{"code":"1.1-HL-01","strand":1,"chapter":"1.1","lo":"1.1","lo_text":"Identify key internal and external stakeholders","level":"HL","verb":"IDENTIFY","qnum":"1","q":"Identify four stakeholders in a business and explain the importance of each one.","stimulus":null,"fmt":{"type":"numbered_box","points":4,"lines_per_point":4},"answer":[{"heading":"Entrepreneurs (internal):","body":"Entrepreneurs set up the business and take the financial and personal risks. They make the key decisions on strategy, shaping whether the firm survives and grows.","bold_terms":[]},{"heading":"Employees (internal):","body":"Employees work in the business in return for wages. Their skills directly affect product quality and service, influencing reputation and sales.","bold_terms":[]},{"heading":"Consumers (external):","body":"Consumers buy the firm's goods or services and provide its revenue. Their preferences decide whether a product succeeds or fails.","bold_terms":[]},{"heading":"Suppliers (external):","body":"Suppliers provide the raw materials or stock the business needs to operate. Reliable suppliers keep quality and availability consistent, which protects the firm's brand.","bold_terms":[]}],"biz":null},{"code":"1.1-HL-02","strand":1,"chapter":"1.1","lo":"1.1","lo_text":"Identify key internal and external stakeholders","level":"HL","verb":"IDENTIFY","qnum":"2","q":"Identify three external stakeholders and outline one way each could influence a business.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Government:","body":"The government sets taxes, regulations and grants. A measure such as a new grant scheme can let a business expand or adapt in a way it could not otherwise afford.","bold_terms":[]},{"heading":"Local community:","body":"The local community provides custom and potential employees. Strong local support can help a business expand smoothly and build a loyal customer base.","bold_terms":[]},{"heading":"Investors:","body":"Investors provide capital and expect a return on investment. Their willingness to fund the business affects how quickly it can grow.","bold_terms":[]}],"biz":null},{"code":"1.1-HL-03","strand":1,"chapter":"1.1","lo":"1.1","lo_text":"Identify key internal and external stakeholders","level":"HL","verb":"IDENTIFY","qnum":"3","q":"Identify the needs and wants of four different stakeholders that Fresh Cuts should consider during this expansion.","stimulus":{"type":"business","business":"Fresh Cuts","headline":"Irish clothing brand plans major online expansion","body":"Fresh Cuts, an Irish clothing brand, has announced a major online expansion targeting international customers with sustainable fashion."},"fmt":{"type":"numbered_box","points":4,"lines_per_point":3},"answer":[{"heading":"Consumers:","body":"Consumers want a reliable, easy-to-use website with secure payment and fast delivery. They also expect sustainable packaging that matches the brand's values.","bold_terms":[]},{"heading":"Employees:","body":"Employees want training on the new order and stock systems as the firm moves online. They also want reassurance that their roles are secure.","bold_terms":[]},{"heading":"Suppliers:","body":"Suppliers want advance notice of stock changes and consistent, timely payment. Some may need to scale up to meet rising online demand.","bold_terms":[]},{"heading":"Investors:","body":"Investors want a clear return on the online growth strategy. They expect regular updates on web traffic, sales and customer reach to stay confident in the plan.","bold_terms":[]}],"biz":null},{"code":"1.1-HL-04","strand":1,"chapter":"1.1","lo":"1.1","lo_text":"Identify key internal and external stakeholders","level":"HL","verb":"IDENTIFY","qnum":"4","q":"Identify four key stakeholders that Pestle & Mortar should consider during this launch.","stimulus":{"type":"business","business":"Pestle & Mortar","headline":"Irish skincare brand launches global website","body":"Pestle & Mortar, an Irish skincare company known for high-quality, cruelty-free products, has launched a new global website and is investing in influencer marketing to reach international markets."},"fmt":{"type":"numbered_box","points":4,"lines_per_point":3},"answer":[{"heading":"Consumers:","body":"Consumers expect fast pages, clear product information and secure checkout. The site must reflect the brand's clean image so global customers order with confidence.","bold_terms":[]},{"heading":"Employees:","body":"Staff may take on new responsibilities in packaging, order management and online customer care. They will need training and support as workflows change and demand grows.","bold_terms":[]},{"heading":"Suppliers:","body":"The business depends on suppliers for ingredients, packaging and lab testing. As demand rises, suppliers must keep quality consistent while scaling up production.","bold_terms":[]},{"heading":"Investors:","body":"Investors want a return on the website launch and global strategy. They expect regular updates on web traffic, sales and the impact of digital marketing.","bold_terms":[]}],"biz":null},{"code":"1.1-HL-05","strand":1,"chapter":"1.1","lo":"1.2","lo_text":"Demonstrate stakeholder interactions and conflicts","level":"HL","verb":"EXPLAIN","qnum":"5","q":"Explain why it is important for a business to maintain a good relationship with its local community.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Community provides the support a business depends on:","body":"The local community supplies employees, customers and goodwill. A positive relationship strengthens reputation and reduces objections, making expansion easier.","bold_terms":[]}],"biz":null},{"code":"1.1-HL-06","strand":1,"chapter":"1.1","lo":"1.2","lo_text":"Demonstrate stakeholder interactions and conflicts","level":"HL","verb":"EXPLAIN","qnum":"6","q":"Explain the difference between a co-operative and a competitive relationship between business stakeholders. Use an example for each.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Co-operative","1","Competitive","1"],"lines_per_label":[0,5,0,5]},"answer":[{"heading":"Co-operative relationship:","body":"A co-operative relationship exists when two stakeholders share a goal and both benefit, a win-win. For example, a business and supplier agree a bulk discount: the supplier sells more and the business cuts unit costs.","bold_terms":[]},{"heading":"Competitive relationship:","body":"A competitive relationship exists when goals are mutually exclusive and one gains at the other's expense, a win-lose. For example, an owner cutting wages to save costs conflicts with employees wanting higher pay.","bold_terms":[]}],"biz":null},{"code":"1.1-HL-07","strand":1,"chapter":"1.1","lo":"1.2","lo_text":"Demonstrate stakeholder interactions and conflicts","level":"HL","verb":"OUTLINE","qnum":"7","q":"Outline one possible source of conflict that might arise between a manager and: (a) an investor (b) a supplier.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(a) Investor","(b) Supplier"],"lines_per_label":[5,5]},"answer":[{"heading":"(a) Investor:","body":"An investor may want higher dividends, while the manager prefers to reinvest profits for growth. Satisfying one means the other loses out, a win-lose conflict.","bold_terms":[]},{"heading":"(b) Supplier:","body":"A supplier may want quick payment, while the manager delays it to protect cash flow. Each prioritises its own finances, a win-lose conflict.","bold_terms":[]}],"biz":null},{"code":"1.1-HL-08","strand":1,"chapter":"1.1","lo":"1.2","lo_text":"Demonstrate stakeholder interactions and conflicts","level":"HL","verb":"IDENTIFY","qnum":"8","q":"Tick the box to indicate the type of stakeholder relationship and justify your answer. Then suggest one way this conflict might have been avoided.","stimulus":{"type":"business","business":"Ryanair","headline":"Cabin crew strike over pay and conditions","body":"In 2023, Ryanair faced strikes from cabin crew in Belgium over pay and working conditions. Ryanair said rising costs meant it could not offer increases, while staff said their pay had not kept up with inflation."},"fmt":{"type":"multi","parts":[{"type":"tick_options","options":["Co-operative","Competitive"]},{"type":"labelled_box","labels":["Justify","1","One way this conflict might have been avoided","1"],"lines_per_label":[0,3,0,3]}]},"answer":[{"heading":"Competitive:","body":"This is competitive because the two sides have mutually exclusive goals. Ryanair wants to hold pay down to control costs, while crew want rises to match inflation. Both cannot be satisfied, so it is win-lose.","bold_terms":[]},{"heading":"How it might have been avoided:","body":"Earlier, honest negotiation between management and staff could have prevented the strike. A phased pay rise linked to company performance would address crew concerns while protecting costs.","bold_terms":[]}],"biz":null},{"code":"1.1-HL-09","strand":1,"chapter":"1.1","lo":"1.3","lo_text":"Suggest ways to resolve stakeholder conflicts","level":"HL","verb":"SUGGEST","qnum":"9","q":"Suggest three ways that a business can resolve conflict between stakeholders. Refer to how each method helps both sides reach a fair outcome.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Negotiation:","body":"The parties meet directly to discuss their differences and seek a compromise. Because both set out their needs, they can agree a solution each sees as fair.","bold_terms":[]},{"heading":"Conciliation:","body":"An independent third party such as the WRC helps the sides communicate. The conciliator does not impose a decision, so the outcome stays voluntary.","bold_terms":[]},{"heading":"Mediation:","body":"A mediator listens to each side and suggests possible solutions. The parties keep the final decision, but the guidance helps balance the outcome.","bold_terms":[]}],"biz":null},{"code":"1.1-HL-10","strand":1,"chapter":"1.1","lo":"1.4","lo_text":"Conduct stakeholder mapping and prioritisation","level":"HL","verb":"CONDUCT","qnum":"10","q":"Conduct stakeholder mapping to identify and prioritise four stakeholders affected by this decision. Place each one in the Power-Interest Grid below.","stimulus":{"type":"business","business":"Solas Bites","headline":"Healthy meal-delivery firm plans subscription model","body":"Solas Bites, a growing Irish meal-delivery company focused on healthy, sustainable food, plans a new subscription model with exclusive meal bundles and partnerships with gyms and wellness centres. It will rely more on digital platforms and may restructure staff roles."},"fmt":{"type":"power_interest_grid","labelled":false},"answer":[{"heading":"Consumers (high interest, low power):","body":"Keep informed. Provide regular updates by email and social media to build trust and reduce the risk of customers leaving.","bold_terms":[]},{"heading":"Employees (high interest, high power):","body":"Manage closely. Involve staff in planning, offer retraining and communicate clearly to keep them engaged and reduce resistance to the restructure.","bold_terms":[]},{"heading":"Local community (low interest, low power):","body":"Monitor. Stay aware of public sentiment, but regular engagement is not essential at this stage.","bold_terms":[]},{"heading":"Government (low interest, high power):","body":"Keep satisfied. Ensure compliance with food-safety and advertising laws and engage as needed.","bold_terms":[]}],"biz":null},{"code":"1.1-OL-01","strand":1,"chapter":"1.1","lo":"1.1","lo_text":"Identify key internal and external stakeholders","level":"OL","verb":"LIST","qnum":"1","q":"List three groups who might benefit if a business opens a second outlet in a local town.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Jobseekers:","body":"More jobs become available locally.","bold_terms":[]},{"heading":"Consumers:","body":"Better access to goods or services.","bold_terms":[]},{"heading":"Local suppliers:","body":"Higher demand for their products.","bold_terms":[]}],"biz":null},{"code":"1.1-OL-02","strand":1,"chapter":"1.1","lo":"1.1","lo_text":"Identify key internal and external stakeholders","level":"OL","verb":"NAME","qnum":"2","q":"Name two stakeholders that could be affected by this expansion.","stimulus":{"type":"business","business":"Lidl","headline":"New store to create 30 jobs in Co. Cork","body":"Lidl has announced the opening of a new store in Carrigtwohill, Co. Cork, creating 30 new jobs."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Local community:","body":"They may benefit from new jobs, more shopping options and investment in the area.","bold_terms":[]},{"heading":"Suppliers:","body":"Irish producers may receive larger orders to supply the new store.","bold_terms":[]}],"biz":null},{"code":"1.1-OL-03","strand":1,"chapter":"1.1","lo":"1.2","lo_text":"Demonstrate stakeholder interactions and conflicts","level":"OL","verb":"IDENTIFY","qnum":"3","q":"A clothing store wants to delay payments to its suppliers to manage cash flow, while the suppliers want to be paid on time. Identify the type of relationship between these two stakeholders and explain your answer.","stimulus":null,"fmt":{"type":"plain_box","lines":3},"answer":[{"heading":"Competitive (conflict) relationship:","body":"This is competitive because the two sides have mutually exclusive goals. The store wants to delay payment to protect cash flow, while suppliers want paying on time. One gains at the other's expense, a win-lose.","bold_terms":[]}],"biz":null},{"code":"1.1-OL-04","strand":1,"chapter":"1.1","lo":"1.3","lo_text":"Suggest ways to resolve stakeholder conflicts","level":"OL","verb":"SUGGEST","qnum":"4","q":"Suggest one way this conflict could be resolved fairly between the business and the drivers.","stimulus":{"type":"business","business":"Just Eat & Deliveroo","headline":"Delivery drivers protest over pay and conditions","body":"In 2023, many delivery drivers working for online food platforms such as Just Eat and Deliveroo in Dublin protested for better pay and conditions."},"fmt":{"type":"plain_box","lines":3},"answer":[{"heading":"Meet and negotiate:","body":"The company and drivers could meet to discuss concerns and agree a solution that suits both. For example, better pay in busy periods in return for guaranteed availability at peak times.","bold_terms":[]}],"biz":null},{"code":"1.1-OL-05","strand":1,"chapter":"1.1","lo":"1.4","lo_text":"Conduct stakeholder mapping and prioritisation","level":"OL","verb":"CONDUCT","qnum":"5","q":"Place each of the four stakeholders below into the correct box of the Power-Interest Grid: Local government, Aldi customers, Local residents, Aldi employees.","stimulus":{"type":"business","business":"Aldi","headline":"New store planned for Tuam, Co. Galway","body":"In 2024, Aldi confirmed plans for a new store in Tuam, Co. Galway, with a 100-space car park, a delivery yard and around 30 new jobs. Some residents welcomed it while others raised traffic concerns. The project needs planning permission from the local council."},"fmt":{"type":"power_interest_grid","labelled":true},"answer":[{"heading":"Aldi customers (low power, low interest):","body":"They will shop at the store but do not influence how or when it is built.","bold_terms":[]},{"heading":"Local residents (low power, high interest):","body":"They live near the site and care about traffic and noise, but have little decision-making power.","bold_terms":[]},{"heading":"Local government (high power, low interest):","body":"They grant or reject planning permission and can delay or stop the project.","bold_terms":[]},{"heading":"Aldi employees (high power, high interest):","body":"They are directly affected by the new jobs and conditions and are essential to running the store.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-01","strand":1,"chapter":"1.2","lo":"2.1","lo_text":"Distinguish between public, private, and not for profit enterprises and analyse the contribution of each of these types of enterprise both locally and nationally","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline one way Stryker contributes to (a) the local economy and (b) the national economy.","stimulus":{"type":"business","business":"Stryker","headline":"Medical technology firm with major Irish operations","body":"Stryker, a leading medical technology company, operates several high-tech manufacturing facilities in Cork and Limerick. It continues to invest in research and community partnerships in Ireland."},"fmt":{"type":"labelled_box","labels":["(a) Local economy","(b) National economy"],"lines_per_label":[5,5]},"answer":[{"heading":"Local: high-skilled employment:","body":"Stryker's Cork and Limerick sites provide hundreds of well-paid engineering and research jobs. This raises household incomes and local spending.","bold_terms":[]},{"heading":"National: export revenue and GDP:","body":"Stryker exports high-value medical devices made in Ireland to international markets. This adds to national income and strengthens Ireland's trade balance.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-02","strand":1,"chapter":"1.2","lo":"2.1","lo_text":"Distinguish between public, private, and not for profit enterprises and analyse the contribution of each of these types of enterprise both locally and nationally","level":"HL","verb":"DISTINGUISH","qnum":"2","q":"Distinguish between public, private, and not-for-profit enterprises. In your answer, provide one example of each from the Irish economy.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Public","1","Private","1","Not-for-profit","1"],"lines_per_label":[0,4,0,4,0,4]},"answer":[{"heading":"Public enterprise:","body":"Public enterprises are owned and run by the government to provide essential services, not profit. Irish Rail, for example, runs national routes including less profitable ones.","bold_terms":[]},{"heading":"Private enterprise:","body":"Private enterprises are owned by individuals or shareholders and aim to make a profit. Supermac's, the Irish fast-food chain, is an example.","bold_terms":[]},{"heading":"Not-for-profit enterprise:","body":"Not-for-profit enterprises meet social needs and reinvest any surplus in their services. Focus Ireland, for example, supports homeless families with accommodation.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-03","strand":1,"chapter":"1.2","lo":"2.1","lo_text":"Distinguish between public, private, and not for profit enterprises and analyse the contribution of each of these types of enterprise both locally and nationally","level":"HL","verb":"ANALYSE","qnum":"3","q":"Analyse two implications this trend may have on the Irish national economy.","stimulus":{"type":"headline","business":null,"headline":"Tech start-ups in Ireland face increased closures due to global funding cuts","body":null},"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Decrease in corporation tax revenue:","body":"Tech firms such as Google and Meta pay large corporation tax in Ireland. If they downsize, tax income falls sharply, hitting public services. Because the tax base sits with a few multinationals, even one exit has an outsized effect.","bold_terms":[]},{"heading":"Reduced foreign investment confidence:","body":"Layoffs and closures make Ireland look less stable, discouraging future FDI. Over time this could push investors towards cheaper locations. A sustained dip can slow the project pipeline for years, not just during the downturn.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-04","strand":1,"chapter":"1.2","lo":"2.1","lo_text":"Distinguish between public, private, and not for profit enterprises and analyse the contribution of each of these types of enterprise both locally and nationally","level":"HL","verb":"ANALYSE","qnum":"4","q":"Analyse two ways this expansion may benefit the local economy.","stimulus":{"type":"headline","business":null,"headline":"SuperValu expands operations, opens new distribution centre in Sligo","body":null},"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Job creation boosts local income:","body":"The centre creates jobs in logistics, admin and management. This raises Sligo incomes and spending in other local firms. The multiplier effect means the gain exceeds the centre's direct wage bill.","bold_terms":[]},{"heading":"Support for local suppliers:","body":"SuperValu sources from Irish producers, so the centre may lift orders from western farmers and food makers. This stimulates local enterprise. Over time it can attract further suppliers, deepening the local supply chain.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-05","strand":1,"chapter":"1.2","lo":"2.2","lo_text":"Outline how business ownership differs between different types of organisations and how ownership can change over time","level":"HL","verb":"OUTLINE","qnum":"5","q":"Outline two reasons why Kora Organics Ltd might change its ownership structure from a private limited company to a public limited company.","stimulus":{"type":"business","business":"Kora Organics Ltd","headline":"Skincare firm considers a stock-market listing","body":"Kora Organics Ltd, an Irish skincare company, has grown rapidly in European markets. The founders are now considering listing the company on Euronext Dublin to access more investment."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Access to large-scale investment:","body":"Becoming a PLC lets Kora Organics raise capital by selling shares on the stock exchange. This could fund expansion or new product development.","bold_terms":[]},{"heading":"Increased profile and credibility:","body":"Listing on Euronext Dublin raises the company's reputation and visibility. It can attract more investor interest and consumer trust, especially in international markets.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-06","strand":1,"chapter":"1.2","lo":"2.2","lo_text":"Outline how business ownership differs between different types of organisations and how ownership can change over time","level":"HL","verb":"OUTLINE","qnum":"6","q":"Outline two reasons why the founder might have decided to expand the business using a franchise model.","stimulus":{"type":"business","business":"Camile Thai","headline":"Dublin restaurant grows through franchising","body":"Camile Thai, originally a small Dublin restaurant, now operates as a successful franchise with outlets across Ireland and the UK."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Rapid expansion with lower risk:","body":"Franchising lets the founder grow quickly without funding every outlet. Each franchisee invests their own money, reducing the owner's risk.","bold_terms":[]},{"heading":"Motivated local ownership:","body":"Franchisees have a direct stake in success, which tends to raise service quality. This builds brand loyalty and supports long-term growth.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-07","strand":1,"chapter":"1.2","lo":"2.2","lo_text":"Outline how business ownership differs between different types of organisations and how ownership can change over time","level":"HL","verb":"OUTLINE","qnum":"7","q":"Outline three reasons why a business might change its ownership structure as it develops over time.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"To access more funding:","body":"As a business grows it often needs more capital than a sole trader or partnership can raise. Changing to a limited company opens access to investors and bank loans.","bold_terms":[]},{"heading":"To limit financial risk:","body":"Owners may want to protect personal assets from business debts. Forming a limited company gives limited liability, reducing personal exposure.","bold_terms":[]},{"heading":"To ensure continuity:","body":"A sole trader business may end if the owner retires or dies. A company structure continues regardless, which reassures investors and customers.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-08","strand":1,"chapter":"1.2","lo":"2.2","lo_text":"Outline how business ownership differs between different types of organisations and how ownership can change over time","level":"HL","verb":"OUTLINE","qnum":"8","q":"Outline two advantages and one disadvantage for a sole trader changing to a private limited company.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Advantages","1","2","Disadvantages","1"],"lines_per_label":[0,3,3,0,3]},"answer":[{"heading":"Advantage: limited liability:","body":"The owner's personal assets are protected from business debts. This lowers financial risk and makes it safer to grow the business.","bold_terms":[]},{"heading":"Advantage: easier to raise finance:","body":"A private company can issue shares and is often seen as more secure by banks. This makes it easier to fund expansion, equipment or staff.","bold_terms":[]},{"heading":"Disadvantage: more regulation:","body":"The company must file financial statements and follow stricter rules, and the owner may have to share decisions with other directors or shareholders.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-09","strand":1,"chapter":"1.2","lo":"2.3","lo_text":"Outline the purpose of regulation in business and investigate how organisations are regulated both internally and externally","level":"HL","verb":"OUTLINE","qnum":"9","q":"Outline three purposes of business regulation and explain how each benefits stakeholders.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Consumer protection:","body":"Regulation ensures products meet safety and quality standards, protecting customers and building trust. The CCPC, for example, stops firms misleading consumers with false advertising.","bold_terms":[]},{"heading":"Fair treatment of employees:","body":"Laws require safe working conditions and fair pay, which protects workers' rights and wellbeing. The WRC enforces rules on fair wages and workplace equality.","bold_terms":[]},{"heading":"Financial integrity:","body":"Firms must keep honest records and avoid fraud, so investors can trust financial reports. External audits by firms such as KPMG help ensure accuracy.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-10","strand":1,"chapter":"1.2","lo":"2.3","lo_text":"Outline the purpose of regulation in business and investigate how organisations are regulated both internally and externally","level":"HL","verb":"EXPLAIN","qnum":"10","q":"Explain how a large Irish organisation, such as the ESB, is regulated both internally and externally. Use two examples of internal regulation and two examples of external regulation.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Internal","1","2","External","1","2"],"lines_per_label":[0,4,4,0,4,4]},"answer":[{"heading":"Internal: internal audits:","body":"ESB carries out internal audits to check its systems and identify risks, which helps it improve operations and follow best practice.","bold_terms":[]},{"heading":"Internal: risk management:","body":"ESB assesses operational, environmental and financial risks and acts to reduce the chance of accidents or losses.","bold_terms":[]},{"heading":"External: CRU:","body":"The Commission for Regulation of Utilities ensures ESB operates safely and in the public interest, enforcing rules on energy prices, safety and access.","bold_terms":[]},{"heading":"External: EPA:","body":"The Environmental Protection Agency monitors the environmental impact of ESB's activities and can issue fines or enforce changes if environmental laws are breached.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-11","strand":1,"chapter":"1.2","lo":"2.4","lo_text":"Explain what is meant by governance in an organisation","level":"HL","verb":"OUTLINE","qnum":"11","q":"Outline three steps an organisation like RTÉ might take to strengthen corporate governance.","stimulus":{"type":"headline","business":null,"headline":"In response to public and regulator scrutiny, RTÉ undertook a 2023 governance review to improve transparency and rebuild trust.","body":null},"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Strengthen the board:","body":"RTÉ can ensure its board has a diverse mix of skills and independent voices. Appointing non-executive directors would improve oversight and reduce conflicts of interest.","bold_terms":[]},{"heading":"Improve transparency and reporting:","body":"Clear, regular updates on spending and executive pay build stakeholder trust. RTÉ could, for example, publish quarterly governance updates.","bold_terms":[]},{"heading":"Enforce a code of ethics:","body":"A written set of values guides staff behaviour and helps prevent misconduct. A whistleblowing policy would let staff report concerns safely and confidentially.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-12","strand":1,"chapter":"1.2","lo":"2.5","lo_text":"Outline the three factors considered in an ESG report","level":"HL","verb":"OUTLINE","qnum":"12","q":"Outline the three factors typically considered in an ESG report.","stimulus":{"type":"headline","business":null,"headline":"Ryanair expands use of Sustainable Aviation Fuel and publishes updated ESG report","body":null},"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Environmental (E):","body":"This covers a firm's impact on the natural world, such as emissions, waste and energy use. Ryanair's use of Sustainable Aviation Fuel lowers flight emissions.","bold_terms":[]},{"heading":"Social (S):","body":"This covers how a firm treats employees, customers and the community, such as safety and diversity. Ryanair may report on staff training or community investment.","bold_terms":[]},{"heading":"Governance (G):","body":"This covers how a firm is managed and overseen, including board structure and ethical conduct. Ryanair's report may detail executive pay or board independence.","bold_terms":[]}],"biz":null},{"code":"1.2-HL-13","strand":1,"chapter":"1.2","lo":"2.5","lo_text":"Outline the three factors considered in an ESG report","level":"HL","verb":"OUTLINE","qnum":"13","q":"Outline two reasons why ESG reporting is important for modern businesses.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Attracts responsible investors:","body":"Investors increasingly favour firms that manage environmental and social risks, so clear ESG reports build trust. An Post's disclosures on emissions and gender balance appeal to ethical funds.","bold_terms":[]},{"heading":"Strengthens brand and loyalty:","body":"Consumers prefer firms that treat workers fairly and protect the environment, so strong ESG builds reputation. Flahavan's work on cutting plastic and sourcing oats locally enhances its image.","bold_terms":[]}],"biz":null},{"code":"1.2-OL-01","strand":1,"chapter":"1.2","lo":"2.1","lo_text":"Distinguish between public, private, and not for profit enterprises and analyse the contribution of each of these types of enterprise both locally and nationally","level":"OL","verb":"IDENTIFY","qnum":"1","q":"(i) Identify whether each of the following is public, private or not-for-profit: Ryanair, Irish Red Cross, An Post. (ii) Describe two contributions not-for-profit enterprises make to the Irish economy.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(i) Ryanair / Irish Red Cross / An Post","(ii) Contribution 1","(ii) Contribution 2"],"lines_per_label":[7,7,7]},"answer":[{"heading":"(i) Identify:","body":"Ryanair is a private enterprise. The Irish Red Cross is a not-for-profit enterprise. An Post is a public enterprise.","bold_terms":[]},{"heading":"(ii) Essential social supports:","body":"Not-for-profits like the Irish Red Cross provide emergency aid and relief that directly helps people in need, easing pressure on State services.","bold_terms":[]},{"heading":"(ii) Active citizenship:","body":"They offer volunteering and leadership roles, especially for young people. GAA clubs, for example, let teenagers coach teams, building skills and local pride.","bold_terms":[]}],"biz":null},{"code":"1.2-OL-02","strand":1,"chapter":"1.2","lo":"2.1","lo_text":"Distinguish between public, private, and not for profit enterprises and analyse the contribution of each of these types of enterprise both locally and nationally","level":"OL","verb":"NAME","qnum":"2","q":"Name one public and one private enterprise in Ireland.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Public","1","Private","1"],"lines_per_label":[0,3,0,3]},"answer":[{"heading":"Public enterprise:","body":"An Post.","bold_terms":[]},{"heading":"Private enterprise:","body":"Supermac's.","bold_terms":[]}],"biz":null},{"code":"1.2-OL-03","strand":1,"chapter":"1.2","lo":"2.2","lo_text":"Outline how business ownership differs between different types of organisations and how ownership can change over time","level":"OL","verb":"IDENTIFY","qnum":"3","q":"(a) Tick the box that shows the ownership structure of Bright Bites Ltd. (b) Choose the correct words to complete the sentence below.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"tick_options","options":["Sole Trader","Private Limited Company"]},{"type":"plain_box","lines":4}]},"answer":[{"heading":"(a):","body":"Private Limited Company.","bold_terms":[]},{"heading":"(b):","body":"Bright Bites Ltd is a private company. The owners have limited liability.","bold_terms":[]}],"biz":null},{"code":"1.2-OL-04","strand":1,"chapter":"1.2","lo":"2.2","lo_text":"Outline how business ownership differs between different types of organisations and how ownership can change over time","level":"OL","verb":"STATE","qnum":"4","q":"State whether each of the following statements is True or False.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Statement True / False","i.  A sole trader is personally responsible for business debts.","ii.  A public limited company can sell shares on the stock exchange.","iii.  A co-operative is owned and run by the government.","iv.  A franchisee owns the brand and sets the rules for the business."],"lines_per_label":[0,0,0,0,0]},"answer":[{"heading":"Answers:","body":"i True. ii True. iii False, because a co-operative is owned and run by its members, not the government. iv False, because the franchisor owns the brand and sets the rules, not the franchisee.","bold_terms":[]}],"biz":null},{"code":"1.2-OL-05","strand":1,"chapter":"1.2","lo":"2.2","lo_text":"Outline how business ownership differs between different types of organisations and how ownership can change over time","level":"OL","verb":"OUTLINE","qnum":"5","q":"Outline two differences between a sole trader and a private limited company.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Liability:","body":"A sole trader has unlimited liability, so personal assets are at risk. A private limited company has limited liability, so owners risk only what they invest.","bold_terms":[]},{"heading":"Access to finance:","body":"A sole trader relies on personal savings or small loans. A private limited company can raise finance by selling shares to a small group of people.","bold_terms":[]}],"biz":null},{"code":"1.2-OL-06","strand":1,"chapter":"1.2","lo":"2.2","lo_text":"Outline how business ownership differs between different types of organisations and how ownership can change over time","level":"OL","verb":"MATCH","qnum":"6","q":"Match each description to the correct type of ownership by writing the correct letter in the box.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["OPTIONSA.  Public sector organisation      B.  Public limited company      C.  Co-operative      D.  Sole trader"],"lines_per_label":[0]},{"type":"labelled_box","labels":["Description Letter","1.  Run by the government to provide public services","2.  Owned by shareholders who trade on the stock exchange","3.  Controlled by members who work together for mutual benefit","4.  Owned and run by one individual"],"lines_per_label":[0,0,0,0,0]}]},"answer":[{"heading":"Answers:","body":"1 → A Public sector organisation. 2 → B Public limited company. 3 → C Co-operative. 4 → D Sole trader.","bold_terms":[]}],"biz":null},{"code":"1.2-OL-07","strand":1,"chapter":"1.2","lo":"2.3","lo_text":"Outline the purpose of regulation in business and investigate how organisations are regulated both internally and externally","level":"OL","verb":"OUTLINE","qnum":"7","q":"Outline two ways a business can regulate itself internally.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Internal audits:","body":"These are checks a business carries out on its own systems to find problems and improve how it works, such as checking that staff follow safety rules.","bold_terms":[]},{"heading":"Risk management:","body":"The business identifies possible risks and plans how to deal with them, for example a shop having a fire-drill plan in case of emergency.","bold_terms":[]}],"biz":null},{"code":"1.2-OL-08","strand":1,"chapter":"1.2","lo":"2.5","lo_text":"Outline the three factors considered in an ESG report","level":"OL","verb":"IDENTIFY","qnum":"8","q":"(i) What do the letters E, S and G stand for in an ESG report? (ii) Give one example of something a business might report under each category.","stimulus":{"type":"headline","business":null,"headline":"ESG reporting is now a key part of business strategy, says Unilever CEO","body":null},"fmt":{"type":"labelled_box","labels":["(i) E, S, G","(ii) One example of each"],"lines_per_label":[2,5]},"answer":[{"heading":"(i):","body":"ESG stands for Environmental, Social and Governance.","bold_terms":[]},{"heading":"(ii) Examples:","body":"Environmental: pollution prevention. Social: employee wellbeing or community involvement. Governance: the structure of the board of directors.","bold_terms":[]}],"biz":null},{"code":"1.2-OL-09","strand":1,"chapter":"1.2","lo":"2.5","lo_text":"Outline the three factors considered in an ESG report","level":"OL","verb":"MATCH","qnum":"9","q":"Match each action to the correct ESG category by writing the correct letter in the box.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["OPTIONSA.  Environmental (E)      B.  Social (S)      C.  Governance (G)"],"lines_per_label":[0]},{"type":"labelled_box","labels":["Description Letter","1.  Using solar panels on factory roofs","2.  Providing safe working conditions","3.  Publishing executive pay details"],"lines_per_label":[0,0,0,0]}]},"answer":[{"heading":"Answers:","body":"1 → A Environmental. 2 → B Social. 3 → C Governance.","bold_terms":[]}],"biz":null},{"code":"1.3-HL-01","strand":1,"chapter":"1.3","lo":"3.1","lo_text":"Explain how economic indicators can impact on business development and growth","level":"HL","verb":"EXPLAIN","qnum":"1","q":"Explain the impact of three economic indicators on business growth.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":5},"answer":[{"heading":"Inflation:","body":"When inflation rises, the cost of materials and wages increases, making production dearer. This squeezes profit margins and can limit growth.","bold_terms":[]},{"heading":"Interest rates:","body":"Low interest rates reduce borrowing costs, encouraging businesses to take out loans to invest in new projects. This can lead to expansion and job creation.","bold_terms":[]},{"heading":"Employment rate:","body":"High employment means more people have disposable income, raising demand for goods and services. This boosts sales and supports business growth.","bold_terms":[]}],"biz":null},{"code":"1.3-HL-02","strand":1,"chapter":"1.3","lo":"3.1","lo_text":"Explain how economic indicators can impact on business development and growth","level":"HL","verb":"EXPLAIN","qnum":"2","q":"Explain two ways inflation can impact business development.","stimulus":{"type":"headline","business":null,"headline":"Inflation hits a 20-year high","body":null},"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Increased costs:","body":"Higher costs for wages, supplies and utilities reduce funds for expansion. Money that would fund growth goes on day-to-day running instead.","bold_terms":[]},{"heading":"Reduced consumer spending:","body":"As inflation rises, consumers cut back on non-essential purchases, lowering sales for many businesses. Weaker demand makes firms more cautious about expanding.","bold_terms":[]}],"biz":null},{"code":"1.3-HL-03","strand":1,"chapter":"1.3","lo":"3.1","lo_text":"Explain how economic indicators can impact on business development and growth","level":"HL","verb":"EXPLAIN","qnum":"3","q":"Explain two effects of falling interest rates on business growth in Ireland.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Cheaper borrowing:","body":"Businesses can access loans at lower interest, making it easier to invest in equipment, staff or new branches. This supports faster growth.","bold_terms":[]},{"heading":"Increased consumer spending:","body":"Lower rates reduce loan and mortgage repayments, leaving consumers with more disposable income. Higher spending boosts sales for retailers and other businesses.","bold_terms":[]}],"biz":null},{"code":"1.3-HL-04","strand":1,"chapter":"1.3","lo":"3.1","lo_text":"Explain how economic indicators can impact on business development and growth","level":"HL","verb":"EXPLAIN","qnum":"4","q":"Explain two ways falling exchange rates can impact growth for Irish exporting businesses.","stimulus":{"type":"headline","business":null,"headline":"Exchange rate changes are affecting Irish exporters","body":null},"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"More competitive pricing abroad:","body":"If the euro falls in value, Irish exports become cheaper for overseas customers, which can boost demand. Exporters may win more foreign orders as a result.","bold_terms":[]},{"heading":"Higher costs for imported materials:","body":"A weaker euro makes imported raw materials more expensive, raising production costs and squeezing margins. This can limit funds available for new product lines.","bold_terms":[]}],"biz":null},{"code":"1.3-HL-05","strand":1,"chapter":"1.3","lo":"3.1","lo_text":"Explain how economic indicators can impact on business development and growth","level":"HL","verb":"OUTLINE","qnum":"5","q":"Outline how high consumer confidence might encourage businesses to grow or expand.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Higher demand for goods and services:","body":"When consumers feel secure in their jobs and income, they spend more freely. This rise in spending gives businesses confidence that expansion will be profitable.","bold_terms":[]},{"heading":"More investment in new products:","body":"With stronger revenue from confident consumers, businesses are more willing to reinvest in new products or services. This helps them attract further sales.","bold_terms":[]}],"biz":null},{"code":"1.3-HL-06","strand":1,"chapter":"1.3","lo":"3.1","lo_text":"Explain how economic indicators can impact on business development and growth","level":"HL","verb":"EXPLAIN","qnum":"6","q":"Explain how falling economic growth can influence business revenue and investment.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Reduced consumer spending:","body":"When growth slows, incomes stagnate or fall, reducing demand for goods and services. Lower demand directly cuts business revenue.","bold_terms":[]},{"heading":"Decreased business confidence:","body":"Slower growth makes firms cautious about investing in new products, staff or equipment. Many delay spending until conditions improve.","bold_terms":[]}],"biz":null},{"code":"1.3-HL-07","strand":1,"chapter":"1.3","lo":"3.1","lo_text":"Explain how economic indicators can impact on business development and growth","level":"HL","verb":"IDENTIFY","qnum":"7","q":"A business is preparing a 3-year growth plan. Identify two economic indicators it should monitor and explain why.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Inflation:","body":"Tracking inflation helps a business plan for changes in supply and wage costs. This lets it price products competitively and protect its margins.","bold_terms":[]},{"heading":"Employment rate:","body":"Monitoring employment signals likely consumer spending and labour availability. A business can time expansion for when more people are earning.","bold_terms":[]}],"biz":null},{"code":"1.3-HL-08","strand":1,"chapter":"1.3","lo":"3.1","lo_text":"Explain how economic indicators can impact on business development and growth","level":"HL","verb":"EXPLAIN","qnum":"8","q":"Explain one way changes in the employment rate can affect business growth and development.","stimulus":null,"fmt":{"type":"plain_box","lines":3},"answer":[{"heading":"Higher employment raises consumer spending:","body":"When more people are in work, they earn wages and spend more on non-essential goods and services. This stronger demand encourages businesses to grow and invest.","bold_terms":[]}],"biz":null},{"code":"1.3-OL-01","strand":1,"chapter":"1.3","lo":"3.1","lo_text":"Explain how economic indicators can impact on business development and growth","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline one reason why a business might pay attention to employment rates when planning to grow.","stimulus":{"type":"business","business":"SCENARIO","headline":"A new pizza restaurant is thinking of expanding into another town. The owner has been checking local employment levels before deciding.","body":null},"fmt":{"type":"plain_box","lines":2},"answer":[{"heading":"Employment signals spending power:","body":"When employment is high, more people earn and spend, so demand rises. A business takes this as a sign that expanding is likely to succeed.","bold_terms":[]}],"biz":null},{"code":"1.3-OL-02","strand":1,"chapter":"1.3","lo":"3.1","lo_text":"Explain how economic indicators can impact on business development and growth","level":"OL","verb":"NAME","qnum":"2","q":"Name two economic indicators and outline one way each one can impact business growth or development.","stimulus":{"type":"business","business":"SCENARIO","headline":"Over the past year, businesses in Ireland have had to make decisions based on changes in the economy. Some are seeing more customers, while others face higher costs or delays in investment.","body":null},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Employment rate:","body":"If more people are working, they have money to spend, raising demand for goods and services. This higher demand helps businesses grow.","bold_terms":[]},{"heading":"Interest rates:","body":"If interest rates are low, it is cheaper for a business to borrow. This makes it easier to invest in equipment or open a new branch.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-01","strand":1,"chapter":"1.4","lo":"4.1","lo_text":"Outline three Irish government policies that impact on three different sectors of the economy in Ireland*","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline three Irish government policies that impact on three different sectors of the economy in Ireland.","stimulus":{"type":"headline","business":null,"headline":"Climate Action Plan 2024 targets Ireland's highest-emitting sectors","body":null},"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Climate Action Plan 2024 (agriculture):","body":"This policy pushes farmers towards low-emission methods through grants and subsidies. As the highest-emitting sector, agriculture also faces carbon taxes that cut profits.","bold_terms":[]},{"heading":"Housing for All (construction):","body":"The policy raises housing demand, boosting employment across construction trades. New homes must also meet stricter energy-efficiency rules.","bold_terms":[]},{"heading":"National Digital Strategy (services):","body":"SMEs can apply for grants to adopt technologies such as e-commerce. Automation also brings disruption risks, such as job losses in retail.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-02","strand":1,"chapter":"1.4","lo":"4.2","lo_text":"Explain the difference between government policy and legislation","level":"HL","verb":"EXPLAIN","qnum":"2","q":"Explain the difference between government policy and legislation.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":5},"answer":[{"heading":"Government policy:","body":"A government policy sets out how the government plans to tackle an economic or social issue. It sets targets but is not legally binding, so there are no penalties.","bold_terms":[]},{"heading":"Government legislation:","body":"Legislation is laws passed by the Oireachtas that are legally binding. It often gives a policy legal force by adding fines for non-compliance.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-03","strand":1,"chapter":"1.4","lo":"4.3","lo_text":"Outline the role played by business in the development of national policy","level":"HL","verb":"OUTLINE","qnum":"3","q":"Outline two ways in which a business or interest group can influence the development of national policy.","stimulus":{"type":"headline","business":null,"headline":"IBEC urges government to delay new employment law","body":null},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Direct engagement with government:","body":"Businesses can meet ministers or civil servants to put their views and propose changes. IBEC, for example, submits proposals during the Budget process.","bold_terms":[]},{"heading":"Public awareness campaigns:","body":"Interest groups can use the media to build public support and pressure politicians. The IFA has run high-profile campaigns on agricultural funding.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-04","strand":1,"chapter":"1.4","lo":"4.3","lo_text":"Outline the role played by business in the development of national policy","level":"HL","verb":"OUTLINE","qnum":"4","q":"Outline two methods the business owner could use to influence national policy.","stimulus":{"type":"business","business":"SCENARIO","headline":"A new government department is designing policies for the tourism sector. A business owner in the hotel industry wants to ensure their views are considered.","body":null},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Respond to public consultation:","body":"The owner could reply to a public consultation on how changes would affect their hotel. Raising concerns such as labour shortages makes the point harder to ignore.","bold_terms":[]},{"heading":"Work through an interest group:","body":"They could ask a body such as the Irish Hotels Federation to lobby for them. The IHF can push tourism-friendly policy with more weight than one firm.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-05","strand":1,"chapter":"1.4","lo":"4.3","lo_text":"Outline the role played by business in the development of national policy","level":"HL","verb":"IDENTIFY","qnum":"5","q":"Identify two interest groups and outline how each one influences national policy.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"IBEC:","body":"IBEC represents employers across many sectors. It lobbies government departments and submits Budget proposals on tax and employment law.","bold_terms":[]},{"heading":"IFA:","body":"The IFA represents farmers nationwide. It shapes policy through campaigns, media and direct talks with TDs, and can mobilise members for protests.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-06","strand":1,"chapter":"1.4","lo":"4.4","lo_text":"Identify the key decision-makers in European policy development","level":"HL","verb":"IDENTIFY","qnum":"6","q":"Identify three institutions involved in the development of EU policy.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":3},"answer":[{"heading":"Institution 1:","body":"European Commission.","bold_terms":[]},{"heading":"Institution 2:","body":"European Parliament.","bold_terms":[]},{"heading":"Institution 3:","body":"Council of the European Union.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-07","strand":1,"chapter":"1.4","lo":"4.4","lo_text":"Identify the key decision-makers in European policy development","level":"HL","verb":"IDENTIFY","qnum":"7","q":"Complete the table by identifying the correct EU institution based on the role described.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Description EU Institution","Drafts and proposes new EU legislation","Discusses, debates, and amends proposed legislation","Approves laws jointly with the Parliament (co-decision)","Implements laws through regulations and directives","Responsible for setting interest rates and controlling inflation","Oversees day-to-day running of the EU and allocates the EU budget"],"lines_per_label":[0,0,0,0,0,0,0]},"answer":[{"heading":"Answers:","body":"Drafts and proposes new EU legislation → European Commission. Discusses, debates and amends proposed legislation → European Parliament. Approves laws jointly with Parliament (co-decision) → Council of the European Union. Implements laws through regulations and directives → European Commission. Sets interest rates and controls inflation → European Central Bank. Oversees day-to-day running and allocates the EU budget → European Commission.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-08","strand":1,"chapter":"1.4","lo":"4.4","lo_text":"Identify the key decision-makers in European policy development","level":"HL","verb":"IDENTIFY","qnum":"8","q":"Complete the flowchart below using the correct EU institutions.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["__________________________drafts and proposes new legislation to the Parliament"],"lines_per_label":[0]},{"type":"labelled_box","labels":["__________________________discusses and debates the proposal and may suggest amendments"],"lines_per_label":[0]},{"type":"labelled_box","labels":["__________________________is the main decision-making body and adopts laws jointly with the Parliament"],"lines_per_label":[0]},{"type":"labelled_box","labels":["__________________________then implements the law through regulations and directives"],"lines_per_label":[0]}]},"answer":[{"heading":"Answers:","body":"1 European Commission drafts and proposes new legislation. 2 European Parliament discusses and debates the proposal. 3 Council of the European Union adopts the law jointly with Parliament. 4 European Commission then implements the law through regulations and directives.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-09","strand":1,"chapter":"1.4","lo":"4.5","lo_text":"Distinguish between European regulations, directives, and opinions","level":"HL","verb":"DISTINGUISH","qnum":"9","q":"Distinguish between an EU regulation, a directive, and an opinion.","stimulus":{"type":"headline","business":null,"headline":"New EU law requires USB-C chargers for all phones by 2025","body":null},"fmt":{"type":"numbered_box","points":3,"lines_per_point":4},"answer":[{"heading":"EU regulation:","body":"A regulation is a binding act that applies in full across all member states at once. It becomes law in Ireland automatically, with no national action needed.","bold_terms":[]},{"heading":"EU directive:","body":"A directive sets a goal every member state must achieve but lets each decide how. Ireland would pass its own law to meet the directive's aim.","bold_terms":[]},{"heading":"EU opinion:","body":"An opinion is a non-binding recommendation that needs no legal implementation. Ireland could choose to act on it voluntarily, but is under no obligation to do so.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-10","strand":1,"chapter":"1.4","lo":"4.6","lo_text":"Evaluate the effect of one EU regulation of their choice and one EU directive of their choice on business activity in Ireland","level":"HL","verb":"EVALUATE","qnum":"10","q":"(i) Name an EU regulation you have studied and explain how it has been implemented in Ireland. (ii) Evaluate the impact this regulation has had on business activity in Ireland, referring to different stakeholders.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["(i) Regulation and implementation"],"lines_per_label":[5]},{"type":"plain_box","lines":24}]},"answer":[{"heading":"(i) Digital Services Act:","body":"The DSA is an EU regulation creating a safer online environment. As a regulation it applied directly in Ireland in 2024, with Coimisiún na Meán appointed as coordinator.","bold_terms":[]},{"heading":"Consumers gain a safer environment:","body":"They face less exposure to harmful or illegal content. This builds trust in online services.","bold_terms":[]},{"heading":"Large platforms face heavy compliance costs:","body":"They must fund moderation teams and audits. Failure to comply risks large fines.","bold_terms":[]},{"heading":"Irish SMEs gain clearer rules:","body":"A single rulebook reduces uncertainty for smaller firms. This can strengthen consumer confidence in them.","bold_terms":[]},{"heading":"Evaluation","body":"In my opinion, the Digital Services Act has had a positive impact in Ireland. This is because stronger consumer safety outweighs the compliance costs placed on platforms. I would recommend phased support so smaller firms can absorb those costs.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-11","strand":1,"chapter":"1.4","lo":"4.6","lo_text":"Evaluate the effect of one EU regulation of their choice and one EU directive of their choice on business activity in Ireland","level":"HL","verb":"EVALUATE","qnum":"11","q":"Choose one EU directive you have studied. Evaluate how it has influenced business behaviour in Ireland, with reference to ethics, sustainability or technology adoption.","stimulus":null,"fmt":{"type":"plain_box","lines":28},"answer":[{"heading":"It strengthens consumer rights:","body":"USB-C standardisation removes the need to buy a new charger with each device. This cuts cost and inconvenience.","bold_terms":[]},{"heading":"It supports sustainability:","body":"Standard chargers reduce electronic waste. Fewer discarded chargers lower the environmental footprint.","bold_terms":[]},{"heading":"It forced product redesign:","body":"Firms had to adapt product lines to comply. This raised R&D costs short-term but drove standardisation.","bold_terms":[]},{"heading":"Evaluation","body":"I believe the Common Charger Directive is a positive development. This is because cutting e-waste and consumer cost outweighs the short-term redesign burden on firms. I would recommend that manufacturers treat the single standard as a chance to innovate.","bold_terms":[]}],"biz":null},{"code":"1.4-HL-12","strand":1,"chapter":"1.4","lo":"4.6","lo_text":"Evaluate the effect of one EU regulation of their choice and one EU directive of their choice on business activity in Ireland","level":"HL","verb":"EVALUATE","qnum":"12","q":"(i) Name one EU directive or regulation you have studied and explain the purpose of this legislation. (ii) Evaluate how it has impacted business activity in Ireland, referring to different stakeholders and to sustainability, ethics or technology.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["(i) Name and purpose"],"lines_per_label":[5]},{"type":"plain_box","lines":24}]},"answer":[{"heading":"(i) Digital Services Act:","body":"The DSA aims to create a safer, more transparent online environment in the EU. Its purpose is to protect users from illegal content and set clear duties for platforms.","bold_terms":[]},{"heading":"Consumers gain safer platforms:","body":"They are better protected from illegal content. Greater algorithm transparency builds trust.","bold_terms":[]},{"heading":"Large platforms face new duties:","body":"They must run risk assessments and appoint compliance officers. This adds significant cost.","bold_terms":[]},{"heading":"Regulators gain wider oversight:","body":"Bodies such as Coimisiún na Meán supervise compliance. This strengthens enforcement in Ireland.","bold_terms":[]},{"heading":"Evaluation","body":"In my opinion, the Digital Services Act benefits Ireland overall. This is because stronger user protection and oversight outweigh the new costs on platforms. I would recommend phased support so smaller operators can comply without strain.","bold_terms":[]}],"biz":null},{"code":"1.4-OL-01","strand":1,"chapter":"1.4","lo":"4.1","lo_text":"Outline three Irish government policies that impact on three different sectors of the economy in Ireland*","level":"OL","verb":"IDENTIFY","qnum":"1","q":"Identify one government policy and describe the impact this policy may have on any sector of the Irish economy.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Policy","1","Impacts","1","2"],"lines_per_label":[0,5,0,5,5]},"answer":[{"heading":"Policy and sector:","body":"Climate Action Plan 2024, affecting the agriculture sector.","bold_terms":[]},{"heading":"Encourages sustainable farming:","body":"The government offers grants and funding to help farmers buy cleaner equipment and use greener methods.","bold_terms":[]},{"heading":"Increases costs for farmers:","body":"Because farming is high-emission, farmers may face carbon taxes and have to invest in changing practices, which can raise costs and lower profits.","bold_terms":[]}],"biz":null},{"code":"1.4-OL-02","strand":1,"chapter":"1.4","lo":"4.2","lo_text":"Explain the difference between government policy and legislation","level":"OL","verb":"MATCH","qnum":"2","q":"Match each description with either Policy or Legislation by writing the correct word in the right-hand column.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Description Policy / Legislation","A non-binding plan that guides government decisions","A law that must be followed by all individuals and businesses","Developed in consultation with stakeholders","Passed by the Oireachtas","Sets out the government's goals and intentions","Can result in penalties if not followed","Example: Climate Action Plan 2024","Example: Climate Action and Low Carbon Development Act 2021"],"lines_per_label":[0,0,0,0,0,0,0,0,0]},"answer":[{"heading":"Answers:","body":"Non-binding plan that guides decisions → Policy. Law that must be followed by all → Legislation. Developed in consultation with stakeholders → Policy. Passed by the Oireachtas → Legislation. Sets out the government's goals and intentions → Policy. Can result in penalties if not followed → Legislation. Climate Action Plan 2024 → Policy. Climate Action and Low Carbon Development Act 2021 → Legislation.","bold_terms":[]}],"biz":null},{"code":"1.4-OL-03","strand":1,"chapter":"1.4","lo":"4.2","lo_text":"Explain the difference between government policy and legislation","level":"OL","verb":"IDENTIFY","qnum":"3","q":"Complete the sentences using the correct word from the list below. Use each word only once.","stimulus":null,"fmt":{"type":"complete_sentences","lines":["Word bank: policy, legislation, Oireachtas, targets, penalties, guidance, law, non-binding","A government __________ outlines plans and goals but is not legally enforceable.","__________ must be passed by the __________ to become legally binding.","A policy provides __________ and sets __________ for different sectors.","Legislation creates __________ for non-compliance and becomes part of Irish __________.","The Climate Action Plan is a __________; it is __________, meaning businesses are not forced to follow it."]},"answer":[{"heading":"Answers:","body":"A government policy outlines plans and goals but is not legally enforceable. Legislation must be passed by the Oireachtas to become legally binding. A policy provides guidance and sets targets for different sectors. Legislation creates penalties for non-compliance and becomes part of Irish law. The Climate Action Plan is a policy; it is non-binding, meaning businesses are not forced to follow it.","bold_terms":[]}],"biz":null},{"code":"1.4-OL-04","strand":1,"chapter":"1.4","lo":"4.3","lo_text":"Outline the role played by business in the development of national policy","level":"OL","verb":"IDENTIFY","qnum":"4","q":"Name one Irish interest group and explain one way it can influence government policy.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Interest group","1","How it can influence government policy","1"],"lines_per_label":[0,5,0,5]},"answer":[{"heading":"Interest group:","body":"IBEC (Irish Business and Employers Confederation).","bold_terms":[]},{"heading":"How it influences policy:","body":"IBEC meets government ministers and submits policy proposals, especially before the Budget, to shape decisions on tax, employment law and economic growth.","bold_terms":[]}],"biz":null},{"code":"1.4-OL-05","strand":1,"chapter":"1.4","lo":"4.3","lo_text":"Outline the role played by business in the development of national policy","level":"OL","verb":"IDENTIFY","qnum":"5","q":"(a) What is meant by the term lobbying? (b) Identify two interest groups in Ireland that represent businesses. (c) Explain how one of these tries to influence government decisions.","stimulus":null,"fmt":{"type":"labelled_box","labels":["(a) Lobbying","(b) Two interest groups","(c) How one influences policy"],"lines_per_label":[7,7,7]},"answer":[{"heading":"(a) Lobbying:","body":"Lobbying means trying to influence government decisions or laws. Businesses and interest groups do it to support their members' interests.","bold_terms":[]},{"heading":"(b) Two interest groups:","body":"IBEC and the IFA (Irish Farmers' Association).","bold_terms":[]},{"heading":"(c) How the IFA influences:","body":"The IFA represents farmers and lobbies through campaigns, meetings and protests. It aims to shape policy on farm payments and rural development.","bold_terms":[]}],"biz":null},{"code":"1.4-OL-06","strand":1,"chapter":"1.4","lo":"4.4","lo_text":"Identify the key decision-makers in European policy development","level":"OL","verb":"NAME","qnum":"6","q":"Name two institutions involved in making policy in the European Union.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Institution 1:","body":"European Commission.","bold_terms":[]},{"heading":"Institution 2:","body":"European Parliament.","bold_terms":[]}],"biz":null},{"code":"1.4-OL-07","strand":1,"chapter":"1.4","lo":"4.4","lo_text":"Identify the key decision-makers in European policy development","level":"OL","verb":"MATCH","qnum":"7","q":"Match each EU institution to its correct role by writing the correct letter in the box.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["OPTIONSA.  European Parliament      B.  Council of the EU      C.  European Commission"],"lines_per_label":[0]},{"type":"labelled_box","labels":["Description Letter","1.  Represents the governments of EU countries and helps pass laws","2.  Proposes new laws and makes sure they are implemented","3.  Debates and votes on EU laws proposed by the Commission"],"lines_per_label":[0,0,0,0]}]},"answer":[{"heading":"Answers:","body":"1 Represents the governments of EU countries → B Council of the EU. 2 Proposes new laws and ensures they are implemented → C European Commission. 3 Debates and votes on EU laws proposed by the Commission → A European Parliament.","bold_terms":[]}],"biz":null},{"code":"1.4-OL-08","strand":1,"chapter":"1.4","lo":"4.4","lo_text":"Identify the key decision-makers in European policy development","level":"OL","verb":"IDENTIFY","qnum":"8","q":"Complete the sentences using the correct EU institution.","stimulus":null,"fmt":{"type":"complete_sentences","lines":["Word bank: European Commission, European Parliament, Council of the European Union","The __________ is the main decision-making body of the EU.","The __________ proposes new laws and implements EU policy.","The __________ is elected by citizens of EU member states and debates new legislation."]},"answer":[{"heading":"Answers:","body":"The Council of the European Union is the main decision-making body of the EU. The European Commission proposes new laws and implements EU policy. The European Parliament is elected by citizens of EU member states and debates new legislation.","bold_terms":[]}],"biz":null},{"code":"1.4-OL-09","strand":1,"chapter":"1.4","lo":"4.5","lo_text":"Distinguish between European regulations, directives, and opinions","level":"OL","verb":"DISTINGUISH","qnum":"9","q":"Circle the correct option in each of the following statements.","stimulus":null,"fmt":{"type":"circle_inline","statements":["(a) An EU directive / regulation becomes law immediately in all EU member states.","(b) An EU opinion / regulation is non-binding and does not require action by the Irish government."]},"answer":[{"heading":"Answers:","body":"(a) An EU regulation becomes law immediately in all member states. (b) An EU opinion is non-binding and does not require action by the Irish government.","bold_terms":[]}],"biz":null},{"code":"1.4-OL-10","strand":1,"chapter":"1.4","lo":"4.5","lo_text":"Distinguish between European regulations, directives, and opinions","level":"OL","verb":"IDENTIFY","qnum":"10","q":"(a) What type of EU legal instrument requires member states to achieve a result by a deadline, but allows them to choose how to do it? (b) Outline one way the Irish government would respond differently to a regulation compared to a directive.","stimulus":{"type":
