ta on an app exposes consumers to fraud and hacking. A lost phone or weak password can give criminals access to their accounts.","bold_terms":[]}],"biz":null},{"code":"4.2-HL-05","strand":4,"chapter":"4.2","lo":"18.5","lo_text":"Outline how a person’s credit rating is established, the factors that impact it, and consequences of a poor rating","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline three factors that can affect a person's credit rating.","stimulus":{"type":"business","business":"Permanent TSB","headline":"Bank assesses applicants before approving loans","body":"Permanent TSB checks an applicant's financial history before approving a personal loan or mortgage. Lenders use this information to decide how likely the person is to repay."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":2},"answer":[{"heading":"Repayment history:","body":"Paying loans and bills on time builds a strong record over the years. Missed or late payments lower the rating and signal greater risk to lenders.","bold_terms":[]},{"heading":"Level of existing debt:","body":"Owing large amounts relative to income can weaken a rating. Lenders treat high existing debt as a sign that the borrower may struggle to repay any more.","bold_terms":[]},{"heading":"Recent credit applications:","body":"Making many loan or card applications in a short period can lower a rating. Lenders may read it as a sign that the person is under financial pressure.","bold_terms":[]}],"biz":null},{"code":"4.2-HL-06","strand":4,"chapter":"4.2","lo":"18.6","lo_text":"Investigate how the financial services industry is regulated and discuss potential consequences of under-regulation","level":"HL","verb":"DISCUSS","qnum":"1","q":"Discuss two possible consequences of an under-regulated financial sector.","stimulus":{"type":"business","business":"Central Bank of Ireland","headline":"Regulator oversees banks, insurers and fintechs","body":"The Central Bank of Ireland licenses and supervises the firms that operate in the financial sector. Its role is to protect consumers and keep the financial system stable."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":4},"answer":[{"heading":"Higher consumer risk:","body":"Weak oversight lets firms sell unsuitable products and hide fees, leaving consumers exposed. With no one enforcing standards, harm often goes unchecked until money is lost. For example, victims of unregulated investment scams rarely recover their funds.","bold_terms":[]},{"heading":"System instability:","body":"Without proper supervision, reckless lending can build up across the sector and trigger a wider crisis. Problems at one institution can spread quickly to others. For example, the 2008 financial crisis was driven partly by weak oversight of bank lending.","bold_terms":[]}],"biz":null},{"code":"4.2-HL-07","strand":4,"chapter":"4.2","lo":"18.7","lo_text":"Outline a range of financial fraud activities and discuss how consumers can protect themselves","level":"HL","verb":"OUTLINE","qnum":"1","q":"(i) Outline two common types of financial fraud.","stimulus":{"type":"business","business":"N26","headline":"Digital bank warns customers about rising scams","body":"N26 is an online-only bank used widely across Europe. It regularly alerts customers to new scams that target people through messages and fake websites."},"fmt":{"type":"multi","parts":[{"type":"numbered_box","points":2,"lines_per_point":2},{"type":"numbered_box","points":2,"lines_per_point":4}]},"answer":[{"heading":"(i) Phishing:","body":"Fraudsters send fake emails or texts pretending to be a bank to trick people into sharing details. They then use those details to access the victim's accounts.","bold_terms":[]},{"heading":"Card skimming:","body":"Devices fitted to ATMs or card machines copy a card's details. These are often paired with a hidden camera that captures the PIN.","bold_terms":[]},{"heading":"(ii) Verify before you act:","body":"Consumers should never log in or share details from an unexpected message or call. Contacting the provider directly on a trusted number confirms whether a request is genuine. For example, ringing the number printed on your card exposes most phishing attempts.","bold_terms":[]},{"heading":"Secure your accounts:","body":"Consumers should use strong, unique passwords and turn on two-factor authentication. They should never share full PINs or one-time codes with anyone. For example, two-factor authentication means a stolen password alone is not enough to get in.","bold_terms":[]}],"biz":null},{"code":"4.2-HL-08","strand":4,"chapter":"4.2","lo":"18.8","lo_text":"Describe Central Bank Digital Currency (CBDC) and examine the impact of digital currency on consumers and businesses","level":"HL","verb":"DESCRIBE","qnum":"1","q":"Describe two differences between a Central Bank Digital Currency (CBDC) and a cryptocurrency.","stimulus":{"type":"business","business":"Coinbase","headline":"Crypto exchange sees prices swing sharply","body":"Coinbase is one of the largest platforms for buying and selling cryptocurrencies. The value of the assets traded on it can rise or fall dramatically over short periods."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":4},"answer":[{"heading":"Regulation:","body":"A CBDC is issued and regulated by a central bank, making it official, protected money. A cryptocurrency is decentralised and unregulated, with no authority standing behind it. For example, a digital euro would be backed by the ECB, while Bitcoin has no such backing.","bold_terms":[]},{"heading":"Stability of value:","body":"A CBDC holds a fixed value equal to cash, so one digital euro always equals one euro. A cryptocurrency can swing sharply in value over a short time. For example, Bitcoin can rise or fall by thousands in a single day.","bold_terms":[]}],"biz":null},{"code":"4.2-HL-09","strand":4,"chapter":"4.2","lo":"18.9","lo_text":"Appreciate the importance of making informed financial decisions and use this to discuss finance-related stories in the news and media","level":"HL","verb":"EXPLAIN","qnum":"1","q":"Explain two reasons why making informed financial decisions is important for consumers.","stimulus":{"type":"business","business":"RTÉ","headline":"Broadcaster reports rising losses to financial scams","body":"RTÉ has reported that consumers are losing significant sums to scams and poor financial choices each year. Coverage like this highlights why financial decisions matter in everyday life."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"It protects their money:","body":"Informed choices help consumers avoid scams, hidden fees, and products that do not suit them. Checking the terms and using trusted sources keeps more of their money in their own pocket.","bold_terms":[]},{"heading":"It helps them reach their goals:","body":"Matching products to their goals and budget means their money works towards what they actually want. A clear decision today, such as starting to save, makes a larger goal realistic later.","bold_terms":[]}],"biz":null},{"code":"4.2-OL-01","strand":4,"chapter":"4.2","lo":"18.1","lo_text":"Examine the factors to be considered with saving, investing, and borrowing","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline two factors a person should consider before borrowing money.","stimulus":{"type":"business","business":"Credit Union","headline":"Local lenders offer personal loans to members","body":"Credit unions across Ireland provide savings accounts and personal loans to their members. A member is thinking about taking out a loan to buy a car."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":2},"answer":[{"heading":"Interest rate (APR):","body":"The APR shows the true yearly cost of a loan, including fees. A lower APR means cheaper repayments, so it is worth comparing lenders.","bold_terms":[]},{"heading":"Ability to repay:","body":"A borrower should be sure the monthly repayments fit their income. Borrowing more than they can repay risks missed payments and a damaged credit rating.","bold_terms":[]}],"biz":null},{"code":"4.2-OL-02","strand":4,"chapter":"4.2","lo":"18.4","lo_text":"Explain how technology impacts financial products and outline the benefits and challenges of fintech","level":"OL","verb":"IDENTIFY","qnum":"1","q":"Identify two examples of fintech (financial technology) used by consumers.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":1},"answer":[{"heading":"","body":"1. Mobile banking apps that let people manage money from a phone.","bold_terms":[]},{"heading":"","body":"2. Contactless and mobile payments such as tapping a card or phone to pay.","bold_terms":[]}],"biz":null},{"code":"4.2-OL-03","strand":4,"chapter":"4.2","lo":"18.5","lo_text":"Outline how a person’s credit rating is established, the factors that impact it, and consequences of a poor rating","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline what is meant by a credit rating.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Credit rating:","body":"A credit rating is a score that shows how reliably a person repays borrowed money, based on their financial history. Lenders use it to decide whether to lend and at what interest rate.","bold_terms":[]}],"biz":null},{"code":"4.2-OL-04","strand":4,"chapter":"4.2","lo":"18.6","lo_text":"Investigate how the financial services industry is regulated and discuss potential consequences of under-regulation","level":"OL","verb":"INDICATE TRUE OR FALSE","qnum":"1","q":"Indicate whether each of the following statements is True (T) or False (F).","stimulus":null,"fmt":{"type":"labelled_box","labels":["Statement True / False","(a)  The Central Bank of Ireland is responsible for regulating financial firms in Ireland.","(b)  Under-regulation of the financial sector has no effect on consumers.","(c)  EU bodies such as the European Central Bank help set rules for financial institutions."],"lines_per_label":[0,0,0,0]},"answer":[{"heading":"","body":"(a) True   (b) False   (c) True","bold_terms":[]}],"biz":null},{"code":"4.2-OL-05","strand":4,"chapter":"4.2","lo":"18.7","lo_text":"Outline a range of financial fraud activities and discuss how consumers can protect themselves","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline two ways a consumer can protect themselves from financial fraud.","stimulus":{"type":"business","business":"An Garda Síochána","headline":"Gardai warn public about online scams","body":"An Garda Síochana regularly warns the public about scams that target people through fake texts, emails, and websites. Many people lose money before realising the contact was not genuine."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":2},"answer":[{"heading":"Verify before you act:","body":"Never share details or log in from an unexpected message or call. Contact the provider directly on a trusted number to check the request is genuine.","bold_terms":[]},{"heading":"Secure your accounts:","body":"Use strong, unique passwords and turn on two-factor authentication. Never share full PINs or one-time codes with anyone.","bold_terms":[]}],"biz":null},{"code":"4.2-OL-06","strand":4,"chapter":"4.2","lo":"18.8","lo_text":"Describe Central Bank Digital Currency (CBDC) and examine the impact of digital currency on consumers and businesses","level":"OL","verb":"MATCH THE TERM","qnum":"1","q":"Match each term in Column 1 to its correct description in Column 2. Write your answer in the grid below.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"labelled_box","labels":["Term Description","1.  CBDC A.  Technology that delivers financial services through apps and online platforms.","2.  Stablecoin B.  A digital currency issued and backed by a central bank.","3.  Cryptocurrency C.  A decentralised digital currency with no central authority and a value that can swing sharply.","4.  Fintech D.  Private digital money usually pegged to a currency or asset to keep its value steady."],"lines_per_label":[0,0,0,0,0]},{"type":"labelled_box","labels":["1 2 3 4"],"lines_per_label":[1]}]},"answer":[{"heading":"","body":"1 = B    2 = D    3 = C    4 = A","bold_terms":[]}],"biz":null},{"code":"4.2-OL-07","strand":4,"chapter":"4.2","lo":"18.9","lo_text":"Appreciate the importance of making informed financial decisions and use this to discuss finance-related stories in the news and media","level":"OL","verb":"EXPLAIN","qnum":"1","q":"Explain one reason why it is important for a consumer to make informed financial decisions.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"It protects their money:","body":"Informed choices help a consumer avoid scams, hidden fees, and products that do not suit them. Checking the terms and using trusted sources keeps more of their money safe.","bold_terms":[]}],"biz":null},{"code":"4.3-HL-01","strand":4,"chapter":"4.3","lo":"19.1","lo_text":"Examine how employees are protected both legislatively and non-legislatively in the workplace","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline two non-legislative ways a workplace disagreement at Lidl Ireland could be resolved.","stimulus":{"type":"business","business":"Lidl Ireland","headline":"Resolving a workplace disagreement","body":"Lidl is a discount supermarket chain with stores and warehouses across Ireland, employing thousands of workers in a fast-paced retail environment."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":2},"answer":[{"heading":"Meet and talk:","body":"The employee and employer speak directly in an informal, respectful setting to sort the issue out quickly and privately. At Lidl, a worker could raise a roster concern with their store manager and settle it before it grows.","bold_terms":[]},{"heading":"Grievance procedure:","body":"The worker follows the company's formal internal process for raising a complaint in writing. Lidl could use its grievance procedure to investigate the issue and respond fairly without involving any outside body.","bold_terms":[]}],"biz":null},{"code":"4.3-HL-02","strand":4,"chapter":"4.3","lo":"19.1","lo_text":"Examine how employees are protected both legislatively and non-legislatively in the workplace","level":"HL","verb":"EXPLAIN","qnum":"2","q":"Explain two services provided by the Workplace Relations Commission (WRC) that help resolve workplace disputes.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Mediation:","body":"A WRC mediator helps both sides talk through a dispute and reach their own agreement. The process is private and voluntary, so the parties keep control of the outcome rather than having a decision imposed on them.","bold_terms":[]},{"heading":"Adjudication:","body":"If no agreement is reached, a WRC Adjudication Officer holds a formal hearing where both sides present their case. The officer then issues a decision, which is binding unless it is appealed to the Labour Court.","bold_terms":[]}],"biz":null},{"code":"4.3-HL-03","strand":4,"chapter":"4.3","lo":"19.2","lo_text":"Investigate how the rights and responsibilities of both employees and employers are set out in current employment legislation","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline two rights an employee has in relation to working conditions under employment legislation.","stimulus":{"type":"business","business":"Dalata Hotel Group","headline":"Long shifts in a busy hotel group","body":"Dalata is Ireland's largest hotel group, operating the Maldron and Clayton brands and employing thousands of staff in hotels around the country."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":2},"answer":[{"heading":"Right to reasonable working hours:","body":"Under the Organisation of Working Time Act 1997, an employee cannot be required to work more than an average of 48 hours per week. A Dalata hotel must roster its staff so their hours stay within this legal limit.","bold_terms":[]},{"heading":"Right to rest breaks:","body":"Employees are entitled to a 15-minute break after four and a half hours, plus daily and weekly rest periods. Hotel staff must be given these breaks rather than working straight through busy shifts.","bold_terms":[]}],"biz":null},{"code":"4.3-HL-04","strand":4,"chapter":"4.3","lo":"19.2","lo_text":"Investigate how the rights and responsibilities of both employees and employers are set out in current employment legislation","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline two responsibilities an employer has in relation to health and safety in the workplace.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":2},"answer":[{"heading":"Provide a safe workplace:","body":"Under the Safety, Health and Welfare at Work Act 2005, the employer must carry out risk assessments and remove or reduce hazards. This protects employees from harm while they work.","bold_terms":[]},{"heading":"Prepare a safety statement:","body":"The employer must identify workplace dangers and set out in a written safety statement how they will be controlled. This gives staff clear guidance on how to stay safe.","bold_terms":[]}],"biz":null},{"code":"4.3-HL-05","strand":4,"chapter":"4.3","lo":"19.3","lo_text":"Describe the role of trade unions in the workplace","level":"HL","verb":"DESCRIBE","qnum":"1","q":"Describe two roles a trade union plays in supporting workers at a business like Dublin Bus.","stimulus":{"type":"business","business":"Dublin Bus","headline":"Drivers seek a stronger voice","body":"Dublin Bus is a State-owned public transport company employing thousands of drivers and staff, many of whom belong to trade unions such as SIPTU and the NBRU."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Representation:","body":"A trade union speaks for its members in disputes with management over pay, hours or discipline, giving an individual worker a stronger collective voice. At Dublin Bus, SIPTU could represent drivers in talks over rosters or pay.","bold_terms":[]},{"heading":"Collective bargaining:","body":"The union negotiates with the employer on behalf of a whole group of workers, who together hold more influence than one person alone. At Dublin Bus, this could mean negotiating a pay increase for all drivers at once.","bold_terms":[]}],"biz":null},{"code":"4.3-HL-06","strand":4,"chapter":"4.3","lo":"19.3","lo_text":"Describe the role of trade unions in the workplace","level":"HL","verb":"IDENTIFY","qnum":"2","q":"(i) Identify one Irish trade union. (ii) Explain one benefit of trade union membership for an employee.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":2},{"type":"numbered_box","points":1,"lines_per_point":3}]},"answer":[{"heading":"(i)","body":"SIPTU (Services, Industrial, Professional and Technical Union).","bold_terms":[]},{"heading":"(ii) Stronger bargaining power:","body":"A union negotiates collectively for all its members, so an employee has far more influence over pay and conditions than they would have acting alone. This makes outcomes a single worker could not secure, such as an across-the-board pay rise, achievable.","bold_terms":[]}],"biz":null},{"code":"4.3-HL-07","strand":4,"chapter":"4.3","lo":"19.4","lo_text":"Discuss the role of the gig-based economy and identify the opportunities and challenges for workers","level":"HL","verb":"DISCUSS","qnum":"1","q":"Discuss the gig economy from the point of view of a worker, using a platform like Deliveroo as an example.","stimulus":{"type":"business","business":"Deliveroo","headline":"Earning per delivery","body":"Deliveroo is a food-delivery platform that connects restaurants with couriers, who choose their own hours and are paid for each delivery they complete as self-employed riders."},"fmt":{"type":"numbered_box","points":4,"lines_per_point":2},"answer":[{"heading":"Opportunity – Greater flexibility:","body":"Gig workers choose when and how much they work instead of being tied to fixed shifts. A Deliveroo rider can log on and off whenever it suits them.","bold_terms":[]},{"heading":"Opportunity – Quick access to work:","body":"Joining a platform is faster than a usual application and interview, so a worker can start earning quickly when they need income.","bold_terms":[]},{"heading":"Challenge – No employment rights:","body":"Most gig workers are self-employed, so they receive no sick pay, holiday pay or pension. A Deliveroo rider who is ill or injured earns nothing while off.","bold_terms":[]},{"heading":"Challenge – Unpredictable income:","body":"Earnings rise and fall with demand, so pay can swing sharply from week to week rather than arriving as a steady wage.","bold_terms":[]}],"biz":null},{"code":"4.3-HL-08","strand":4,"chapter":"4.3","lo":"19.4","lo_text":"Discuss the role of the gig-based economy and identify the opportunities and challenges for workers","level":"HL","verb":"EXPLAIN","qnum":"2","q":"(i) Explain the term ‘gig economy’. (ii) Outline two challenges faced by gig workers.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":3},{"type":"numbered_box","points":2,"lines_per_point":2}]},"answer":[{"heading":"(i)","body":"The gig economy is the part of the labour market built on temporary, on-demand and freelance work, usually found through digital platforms, where people are paid per task rather than a fixed wage.","bold_terms":[]},{"heading":"No job security:","body":"With no contract or guaranteed hours, a gig worker can lose access to work at any time and has little protection if the platform changes its terms.","bold_terms":[]},{"heading":"Isolation and pressure:","body":"Gig workers often work alone and feel constant pressure to chase the next job, with no colleagues or manager to turn to for support.","bold_terms":[]}],"biz":null},{"code":"4.3-HL-09","strand":4,"chapter":"4.3","lo":"19.5","lo_text":"Investigate how the government budget impacts workers","level":"HL","verb":"EXPLAIN","qnum":"1","q":"Explain two ways a change in the annual Budget could affect a business like Supermac's and its workers.","stimulus":{"type":"business","business":"Supermac's","headline":"Budget night and the wage bill","body":"Supermac's, founded by Pat McDonagh, is an Irish fast-food chain with restaurants nationwide, employing many staff in entry-level roles paid at or near the minimum wage."},"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"A higher minimum wage:","body":"When the Budget raises the minimum wage, the hourly pay of Supermac's many entry-level staff increases, lifting their take-home pay. It also raises the company's wage bill, which may push it to control costs in other areas.","bold_terms":[]},{"heading":"A lower VAT rate for hospitality:","body":"If the Budget cuts the VAT rate on food, Supermac's costs ease and customer demand may rise. Stronger demand can protect existing jobs and support the business in hiring more staff.","bold_terms":[]}],"biz":null},{"code":"4.3-HL-10","strand":4,"chapter":"4.3","lo":"19.5","lo_text":"Investigate how the government budget impacts workers","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline two ways the annual Budget can change a worker's take-home pay.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":2},"answer":[{"heading":"Changing tax credits:","body":"A tax credit is taken straight off the tax a worker owes, so raising credits increases take-home pay, while freezing them as prices rise reduces it in real terms.","bold_terms":[]},{"heading":"Changing the USC:","body":"The Universal Social Charge is a tax on gross income, so cutting a USC rate or widening a lower-rate band means less is deducted and the worker keeps more of their pay.","bold_terms":[]}],"biz":null},{"code":"4.3-HL-11","strand":4,"chapter":"4.3","lo":"19.6","lo_text":"Appreciate the importance of making informed decisions as an employee and use this understanding to discuss workplace-related news and media","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline two reasons why it is important to be an informed employee.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":3},"answer":[{"heading":"Knowing your rights protects you at work","body":"An informed employee checks their contract and entitlements before accepting a job. This helps them avoid unfair treatment and claim what they are owed.","bold_terms":[]},{"heading":"Using reliable sources leads to better decisions","body":"An informed employee turns to trustworthy sources such as Citizens Information and the WRC. This helps them judge workplace news and make sound decisions about their job.","bold_terms":[]}],"biz":null},{"code":"4.3-OL-01","strand":4,"chapter":"4.3","lo":"19.1","lo_text":"Examine how employees are protected both legislatively and non-legislatively in the workplace","level":"OL","verb":"IDENTIFY","qnum":"1","q":"(i) Name one way Aoife could try to resolve the disagreement informally. (ii) Outline one service the Workplace Relations Commission (WRC) provides.","stimulus":{"type":"business","business":"Aoife at Lidl","headline":"A disagreement over rosters","body":"Aoife works in a busy Lidl store. She and her manager disagree about a change to her weekly roster."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":2},{"type":"numbered_box","points":1,"lines_per_point":2}]},"answer":[{"heading":"(i) Meet and talk:","body":"Aoife could speak directly with her manager in an informal way to sort out the roster issue quickly.","bold_terms":[]},{"heading":"(ii) Mediation:","body":"A WRC mediator helps both sides talk through a dispute and reach their own agreement. The process is private and voluntary.","bold_terms":[]}],"biz":null},{"code":"4.3-OL-02","strand":4,"chapter":"4.3","lo":"19.1","lo_text":"Examine how employees are protected both legislatively and non-legislatively in the workplace","level":"OL","verb":"MATCH","qnum":"2","q":"Match each workplace protection to its description.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["Column 1:  Workplace protection","Column 2:  Description"],"rows":[["A","Grievance procedure","1","A trade union representative who speaks for workers in the workplace."],["B","Shop steward","2","A formal internal process for making a complaint at work."],["C","Mediation","3","A WRC service where both sides talk through a dispute to reach agreement."]]},{"type":"match","descriptions":["A"]}]},"answer":[{"heading":"","body":"A = 2   ·   B = 1   ·   C = 3","bold_terms":[]}],"biz":null},{"code":"4.3-OL-03","strand":4,"chapter":"4.3","lo":"19.2","lo_text":"Investigate how the rights and responsibilities of both employees and employers are set out in current employment legislation","level":"OL","verb":"IDENTIFY","qnum":"1","q":"(i) Name two pieces of employment legislation. (ii) Outline one right an employee has under employment law.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":2},{"type":"numbered_box","points":1,"lines_per_point":2}]},"answer":[{"heading":"(i)","body":"1. The National Minimum Wage Act 2000   2. The Organisation of Working Time Act 1997.","bold_terms":[]},{"heading":"(ii) Right to the minimum wage:","body":"Most employees aged 20 and over are entitled to be paid at least the national minimum wage, which is €14.15 per hour in 2026.","bold_terms":[]}],"biz":null},{"code":"4.3-OL-04","strand":4,"chapter":"4.3","lo":"19.2","lo_text":"Investigate how the rights and responsibilities of both employees and employers are set out in current employment legislation","level":"OL","verb":"TRUE/FALSE","qnum":"2","q":"Indicate whether each of the following statements is True or False by ticking (✓) the correct column.","stimulus":null,"fmt":{"type":"true_false","rows":["Statement","Every employee must receive a written payslip on payday.","Employees are entitled to four weeks of paid annual leave each year.","The national minimum wage in 2026 is €14.15 per hour.","An employer can dismiss an employee without any valid reason."]},"answer":[{"heading":"","body":"1. True    2. True    3. True    4. False","bold_terms":[]}],"biz":null},{"code":"4.3-OL-05","strand":4,"chapter":"4.3","lo":"19.3","lo_text":"Describe the role of trade unions in the workplace","level":"OL","verb":"IDENTIFY","qnum":"1","q":"(i) What is a trade union? (ii) Outline one way a trade union supports workers like Conor.","stimulus":{"type":"business","business":"Conor at Dublin Bus","headline":"Backed by a union","body":"Conor drives for Dublin Bus and is a member of a trade union. The union is negotiating with management about pay."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":2},{"type":"numbered_box","points":1,"lines_per_point":2}]},"answer":[{"heading":"(i)","body":"A trade union is an organisation formed by workers to protect their pay, conditions and interests in the workplace.","bold_terms":[]},{"heading":"(ii) Representation:","body":"The union speaks for Conor in disputes with management over pay, hours or discipline, giving him a stronger collective voice than he would have alone.","bold_terms":[]}],"biz":null},{"code":"4.3-OL-06","strand":4,"chapter":"4.3","lo":"19.3","lo_text":"Describe the role of trade unions in the workplace","level":"OL","verb":"MATCH","qnum":"2","q":"Match each trade union role to its description.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["Column 1:  Trade union role","Column 2:  Description"],"rows":[["A","Representation","1","Negotiating with the employer for a whole group of workers at once."],["B","Collective bargaining","2","Speaking for a member in a dispute with management."],["C","Protecting jobs","3","Pushing for fair procedures during redundancies."]]},{"type":"match","descriptions":["A"]}]},"answer":[{"heading":"","body":"A = 2   ·   B = 1   ·   C = 3","bold_terms":[]}],"biz":null},{"code":"4.3-OL-07","strand":4,"chapter":"4.3","lo":"19.4","lo_text":"Discuss the role of the gig-based economy and identify the opportunities and challenges for workers","level":"OL","verb":"EXPLAIN","qnum":"1","q":"(i) Explain the term ‘gig economy’. (ii) Outline one challenge a gig worker like Jack may face.","stimulus":{"type":"business","business":"Jack at Deliveroo","headline":"Earning per delivery","body":"Jack is a courier for Deliveroo. He chooses his own hours and is paid for each delivery he completes."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":2},{"type":"numbered_box","points":1,"lines_per_point":2}]},"answer":[{"heading":"(i)","body":"The gig economy is the part of the labour market made up of temporary, on-demand and freelance work, usually found through online platforms, where people are paid per job.","bold_terms":[]},{"heading":"(ii) No employment rights:","body":"As a self-employed rider, Jack gets no sick pay, holiday pay or pension, so he earns nothing if he is unable to work.","bold_terms":[]}],"biz":null},{"code":"4.3-OL-08","strand":4,"chapter":"4.3","lo":"19.4","lo_text":"Discuss the role of the gig-based economy and identify the opportunities and challenges for workers","level":"OL","verb":"TRUE/FALSE","qnum":"2","q":"Indicate whether each of the following statements is True or False by ticking (✓) the correct column.","stimulus":null,"fmt":{"type":"true_false","rows":["Statement","Most gig workers are employees with full employment rights.","Gig work often offers workers flexible hours.","Gig workers usually receive sick pay and holiday pay.","Income from gig work can be unpredictable."]},"answer":[{"heading":"","body":"1. False    2. True    3. False    4. True","bold_terms":[]}],"biz":null},{"code":"4.3-OL-09","strand":4,"chapter":"4.3","lo":"19.5","lo_text":"Investigate how the government budget impacts workers","level":"OL","verb":"OUTLINE","qnum":"1","q":"(i) Outline one way the Budget can increase a worker's take-home pay. (ii) Outline one way it can reduce it.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":2},{"type":"numbered_box","points":1,"lines_per_point":2}]},"answer":[{"heading":"(i) Increasing tax credits:","body":"A tax credit is taken off the tax a worker owes, so raising it means less tax is deducted and take-home pay rises.","bold_terms":[]},{"heading":"(ii) Increasing PRSI:","body":"A higher PRSI rate means more is deducted from a worker's wages, reducing their take-home pay.","bold_terms":[]}],"biz":null},{"code":"4.3-OL-10","strand":4,"chapter":"4.3","lo":"19.5","lo_text":"Investigate how the government budget impacts workers","level":"OL","verb":"TRUE/FALSE","qnum":"2","q":"Indicate whether each of the following statements is True or False by ticking (✓) the correct column.","stimulus":null,"fmt":{"type":"true_false","rows":["Statement","An increase in tax credits increases a worker's take-home pay.","An increase in the USC rate increases take-home pay.","Lowering the VAT rate for hospitality can help protect jobs.","A higher minimum wage always guarantees more jobs."]},"answer":[{"heading":"","body":"1. True    2. False    3. True    4. False","bold_terms":[]}],"biz":null},{"code":"4.3-OL-11","strand":4,"chapter":"4.3","lo":"19.6","lo_text":"Appreciate the importance of making informed decisions as an employee and use this understanding to discuss workplace-related news and media","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline one reason why it is important to be an informed employee.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Knowing your rights protects you at work","body":"An informed employee checks their contract and entitlements before starting a job. This helps them avoid unfair treatment and know what they are owed.","bold_terms":[]}],"biz":null}]</script>
<script>
const ALL=JSON.parse(document.getElementById('data').textContent);
const strands=[1,2,3,4];
const PAGE=30;
const state={strand:'ALL',level:'ALL',chapter:'ALL',lo:'ALL',shown:PAGE};
let mem={};
const store={get:k=>{try{return localStorage.getItem(k)}catch(e){return mem[k]||null}},
             set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}};
const isRev=c=>store.get('rev:'+c)==='1', setRev=(c,v)=>store.set('rev:'+c,v?'1':'0');
const doneCount=()=>ALL.filter(r=>isRev(r.code)).length;

const sp=document.getElementById('strandPills');
[['ALL','All']].concat(strands.map(s=>[String(s),'S'+s])).forEach(([v,l])=>{
  const b=document.createElement('button');b.className='pill'+(v==='ALL'?' on':'');b.textContent=l;b.dataset.st=v;
  b.onclick=()=>{state.strand=v;state.chapter='ALL';state.lo='ALL';state.shown=PAGE;syncPills();buildChapters();apply();};
  sp.appendChild(b);});
function syncPills(){document.querySelectorAll('[data-st]').forEach(b=>b.classList.toggle('on',b.dataset.st===state.strand));}
document.querySelectorAll('[data-lv]').forEach(b=>b.onclick=()=>{state.level=b.dataset.lv;state.shown=PAGE;
  document.querySelectorAll('[data-lv]').forEach(x=>x.classList.toggle('on',x===b));apply();});
const chapSel=document.getElementById('chapSel'),loSel=document.getElementById('loSel');
const chaptersFor=s=>[...new Set(ALL.filter(r=>s==='ALL'||String(r.strand)===s).map(r=>r.chapter))].sort();
const losFor=c=>[...new Set(ALL.filter(r=>c==='ALL'||r.chapter===c).map(r=>r.lo))]
  .sort((a,b)=>(+a.split('.')[0]-+b.split('.')[0])||(+a.split('.')[1]-+b.split('.')[1]));
function buildChapters(){chapSel.innerHTML='<option value="ALL">All chapters</option>'+chaptersFor(state.strand).map(c=>`<option value="${c}">Chapter ${c}</option>`).join('');chapSel.value=state.chapter;buildLOs();}
function buildLOs(){loSel.innerHTML='<option value="ALL">All learning outcomes</option>'+losFor(state.chapter).map(l=>`<option value="${l}">LO ${l}</option>`).join('');loSel.value=state.lo;}
chapSel.onchange=()=>{state.chapter=chapSel.value;state.lo='ALL';state.shown=PAGE;
  if(state.chapter!=='ALL')state.strand=state.chapter.split('.')[0];syncPills();buildLOs();apply();};
loSel.onchange=()=>{state.lo=loSel.value;state.shown=PAGE;apply();};

const filtered=()=>ALL.filter(r=>
  (state.strand==='ALL'||String(r.strand)===state.strand)&&
  (state.level==='ALL'||r.level===state.level)&&
  (state.chapter==='ALL'||r.chapter===state.chapter)&&
  (state.lo==='ALL'||r.lo===state.lo));
const esc=s=>(s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function boldTerms(body,terms){let out=esc(body);(terms||[]).forEach(t=>{if(!t)return;const e=esc(t);out=out.replace(e,'<b>'+e+'</b>');});return out;}
const rl=n=>'<div class="rl"></div>'.repeat(n);

/* ---------- answer-space renderers ---------- */
function spGrid(f){
  const lab=f.labelled;
  const q=(cls,txt)=>`<div class="q ${cls}">${lab?txt:''}</div>`;
  return `<div class="pig">
    <div class="yl">High<br>Power</div>${q('tl','Keep Satisfied')}${q('tr','Manage Closely')}
    <div class="yl">Low<br>Power</div>${q('bl','Monitor')}${q('br','Keep Informed')}
    <div></div><div class="xl">Low Interest</div><div class="xl">High Interest</div>
  </div>`;
}
function spNumbered(f){
  const n=f.points||3;
  const lp=f.lines_per_point;
  const lineFor=i=>Array.isArray(lp)?(lp[i]??4):(lp||4);
  let s='';for(let i=0;i<n;i++)s+=`<div class="aseg"><span class="n">${i+1}</span>${rl(lineFor(i))}</div>`;
  return `<div class="abox">${s}</div>`;
}
function spPlain(f){return `<div class="abox"><div class="aseg">${rl((f&&f.lines)||6)}</div></div>`;}
function spLabelled(f){
  const labs=f.labels||[];
  if(!labs.length)return spPlain(f);
  const lp=f.lines_per_label||[];
  return `<div class="abox">${labs.map((l,i)=>`<div class="aseg"><div class="lab">${esc(l)}</div>${rl(lp[i]??2)}</div>`).join('')}</div>`;
}
function spTable(f){
  if(!f.headers)return'';
  const h='<tr>'+f.headers.map(x=>`<th>${esc(x)}</th>`).join('')+'</tr>';
  const rows=(f.rows||[]).map(r=>'<tr>'+r.map(c=>`<td class="${c?'':'blank'}">${esc(c)||'&nbsp;'}</td>`).join('')+'</tr>').join('');
  return `<table class="qtable">${h}${rows}</table>`;
}
function spMatch(f){
  return '<ol class="qlist">'+(f.descriptions||[]).map(d=>`<li>${esc(d)}<span class="matchblank">&nbsp;</span></li>`).join('')+'</ol>';
}
function spTF(items){
  return '<div>'+items.map(s=>`<div class="tfrow"><span>${esc(s)}</span><span class="tfopt"><span>True</span><span>False</span></span></div>`).join('')+'</div>';
}
function spList(items){return '<ul class="qlist">'+items.map(s=>`<li>${esc(s)}</li>`).join('')+'</ul>';}
function spTick(f){return '<div style="display:flex;gap:22px;flex-wrap:wrap;padding:6px 2px;font-size:.9rem">'+(f.options||[]).map(o=>`<span><span style="display:inline-block;width:15px;height:15px;border:1.5px solid var(--ink);border-radius:3px;vertical-align:-2px;margin-right:7px"></span>${esc(o)}</span>`).join('')+'</div>';}
function space(f){
  if(!f||f.type==='none')return'';
  switch(f.type){
    case 'power_interest_grid':return spGrid(f);
    case 'tick_options':return spTick(f);
    case 'numbered_box':return spNumbered(f);
    case 'plain_box':return spPlain(f);
    case 'labelled_box':return spLabelled(f);
    case 'data_table': case 'tick_table':return spTable(f);
    case 'match':return spMatch(f);
    case 'true_false':return spTF(f.rows||[]);
    case 'true_false_inline':return spTF(f.statements||[]);
    case 'circle_inline':return spList(f.statements||[]);
    case 'complete_sentences':return spList(f.lines||[]);
    case 'multi':return (f.parts||[]).map(space).join('<div style="height:10px"></div>');
    default:return'';
  }
}
/* ---------- card ---------- */
function cardHTML(r,i){
  const lv=r.level==='OL'?'ol':'hl';
  let stim='';
  if(r.stimulus){const s=r.stimulus;
    stim = s.type==='headline'
      ? `<div class="stim"><div class="news">In the news</div><div class="bd">${esc(s.headline||'')}</div></div>`
      : `<div class="stim">${s.business?`<div class="biz">${esc(s.business)}</div>`:''}${s.headline?`<div class="hl">${esc(s.headline)}</div>`:''}${s.body?`<div class="bd">${esc(s.body)}</div>`:''}</div>`;}
  const sp=space(r.fmt);
  return `<div class="${lv==='ol'?'olv':''}" data-code="${r.code}">
    <div class="card">
      ${stim}
      <div class="qnum"><b>${esc(r.qnum||'')}.</b>${esc(r.q||'')}</div>
      ${sp?`<div class="space">${sp}</div>`:''}
      <div class="meta"><span class="badge ${lv}">${r.level}</span><span class="ref">Ch ${esc(r.chapter)} · LO ${esc(r.lo)}</span></div>
    </div>
    <div class="below">
      <button class="reveal" data-i="${i}">Reveal sample answer</button>
      <div class="ansSlot"></div>
      <div class="rev"><input type="checkbox" id="rv${i}" ${isRev(r.code)?'checked':''}><label for="rv${i}">Mark reviewed</label></div>
    </div>
  </div>`;
}
function answerHTML(r){
  const lv=r.level==='OL'?'ol':'hl';
  let a=`<div class="answer ${lv}"><div class="lbl">Sample Answer</div>`;
  (r.answer||[]).forEach(p=>{a+=`<div class="pt">${p.heading?`<div class="h">${esc(p.heading)}</div>`:''}<div class="b">${boldTerms(p.body,p.bold_terms)}</div></div>`;});
  if(r.biz)a+=`<div class="basedon">Based on ${esc(r.biz)}</div>`;
  return a+'</div>';
}
/* ---------- render (grouped by LO, all visible) ---------- */
function render(){
  const stage=document.getElementById('stage');
  const L=filtered();
  document.getElementById('count').innerHTML=`<b>${L.length}</b> question${L.length!==1?'s':''} in this selection`;
  if(!L.length){stage.innerHTML='<div class="empty">No questions match these filters yet. Try widening your selection.</div>';return;}
  const show=L.slice(0,state.shown);
  let html='',lastKey='';
  show.forEach((r,i)=>{
    const key=r.lo+'|'+r.level;
    if(key!==lastKey){
      html+=`<div class="lohead ${r.level==='OL'?'ol':''}">LO ${esc(r.lo)} — ${esc(r.lo_text||'')}<span class="lvl">${r.level}</span></div>`;
      lastKey=key;}
    html+=cardHTML(r,i);
  });
  if(L.length>state.shown)html+=`<button class="more" id="moreBtn">Show ${Math.min(PAGE,L.length-state.shown)} more (${L.length-state.shown} remaining)</button>`;
  stage.innerHTML=html;
  stage.querySelectorAll('.reveal').forEach(btn=>{
    btn.onclick=()=>{
      const slot=btn.parentElement.querySelector('.ansSlot');
      const r=show[+btn.dataset.i];
      if(slot.innerHTML){slot.innerHTML='';btn.textContent='Reveal sample answer';btn.classList.remove('open');}
      else{slot.innerHTML=answerHTML(r);btn.textContent='Hide sample answer';btn.classList.add('open');}
    };});
  stage.querySelectorAll('.rev input').forEach(chk=>{
    chk.onchange=()=>{const code=chk.closest('[data-code]').dataset.code;setRev(code,chk.checked);
      document.getElementById('pDone').textContent=doneCount();};});
  const mb=document.getElementById('moreBtn');
  if(mb)mb.onclick=()=>{state.shown+=PAGE;render();};
}
function apply(){render();}
buildChapters();apply();document.getElementById('pDone').textContent=doneCount();
</script>
</body>
</html>
