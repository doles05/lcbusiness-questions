ecisions.","bold_terms":[]},{"heading":"2. Arbitration:","body":"An independent third party listens to both sides and makes a recommendation, which may be binding or non-binding.","bold_terms":[]}],"biz":null},{"code":"3.1-OL-15","strand":3,"chapter":"3.1","lo":"13.6","lo_text":"Outline different external approaches to conflict resolution","level":"OL","verb":"EXPLAIN","qnum":"2","q":"Explain what is meant by 'arbitration' as an external approach to conflict resolution.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Arbitration:","body":"Arbitration is where an independent third party listens to both sides of a dispute and then issues a formal recommendation. The recommendation can be binding (both sides must accept it) or non-binding (the parties choose whether to follow it).","bold_terms":[]}],"biz":null},{"code":"3.2-HL-01","strand":3,"chapter":"3.2","lo":"14.1","lo_text":"Discuss the internal and external factors that impact on workforce planning","level":"HL","verb":"DISCUSS","qnum":"1","q":"Discuss two internal factors and two external factors that may have influenced Google’s workforce planning.","stimulus":{"type":"business","business":"Google","headline":"2023 — global job cuts announced","body":"In 2023, Google announced major global job cuts, explaining that the company needed to adapt its workforce to changing circumstances while still pursuing long-term growth opportunities. (The Guardian)"},"fmt":{"type":"labelled_box","labels":["Internal","External"],"lines_per_label":[9,8]},"answer":[{"heading":"Internal factors","body":"","bold_terms":[]},{"heading":"1. Corporate objectives:","body":"Workforce planning is shaped by the long-term goals of a business. Google’s shift towards AI and cloud services meant reducing staff in less profitable divisions and hiring in growth areas.","bold_terms":[]},{"heading":"2. Skills and capabilities:","body":"The existing skills inside the business determine where gaps need to be filled. Google identified gaps in areas such as machine learning, leading to redundancies in outdated roles and new hires with specialist expertise.","bold_terms":[]},{"heading":"External factors","body":"","bold_terms":[]},{"heading":"3. Labour market conditions:","body":"The supply of skilled workers in the wider labour market affects recruitment. A global shortage of AI engineers means Google must expand international hiring or invest heavily in upskilling current staff.","bold_terms":[]},{"heading":"4. Economic indicators and trends:","body":"Changes in the economy affect how many employees a business can afford. Rising costs and economic uncertainty pressured Google in 2023 to cut jobs while still funding priority projects.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-02","strand":3,"chapter":"3.2","lo":"14.1","lo_text":"Discuss the internal and external factors that impact on workforce planning","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline two external factors, other than labour market conditions, that could impact workforce planning for a business in this sector.","stimulus":{"type":"business","business":"Fáilte Ireland","headline":"2025 Tourism Careers research","body":"Fáilte Ireland’s 2025 Tourism Careers research reported that 52% of Irish hospitality employers had considerable difficulty recruiting chefs, pushing many businesses to offer work permits to staff from outside the EU. (Fáilte Ireland)"},"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Economic indicators and trends:","body":"Economic conditions such as high interest rates or high inflation may lead a hospitality business to downsize its workforce. If consumer spending on eating out falls during a recession, restaurants and hotels may cut staff numbers to match lower demand.","bold_terms":[]},{"heading":"2. Government decisions:","body":"Laws and regulations around employment impact staffing costs and decisions. Increases to the Irish national minimum wage (rising to €14.15 per hour from January 2026) have led some small hospitality businesses to review staffing levels and rosters to manage wage costs.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-03","strand":3,"chapter":"3.2","lo":"14.1","lo_text":"Discuss the internal and external factors that impact on workforce planning","level":"HL","verb":"TICK-BOX","qnum":"3","q":"For each of the following factors that can influence workforce planning, indicate whether it is an Internal or External factor by placing a tick (✓) in the correct column.","stimulus":null,"fmt":{"type":"data_table","headers":["Statement","Internal","External"],"rows":[["1. A shortage of skilled data scientists in the labour market.","☐","☐"],["2. A business restructures its departments to focus on e-commerce.","☐","☐"],["3. A new government policy raising the minimum wage.","☐","☐"],["4. A skilled manager leaves the business, creating a gap in expertise.","☐","☐"],["5. A recession reduces consumer spending in the economy.","☐","☐"],["6. The corporate objective of expanding into new European markets.","☐","☐"]]},"answer":[{"heading":"","body":"1. External   ·   2. Internal   ·   3. External   ·   4. Internal   ·   5. External   ·   6. Internal","bold_terms":[]}],"biz":null},{"code":"3.2-HL-04","strand":3,"chapter":"3.2","lo":"14.2","lo_text":"Outline the key stages in the recruitment process and suggest how organisations might adopt ethical approaches to recruitment","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline the three key stages in the recruitment process.","stimulus":null,"fmt":{"type":"labelled_box","labels":["1. Identification","2. Application","3. Selection"],"lines_per_label":[5,5,4]},"answer":[{"heading":"1. Identification:","body":"The business identifies that a vacancy exists and decides what type of employee is required. It develops a job description outlining duties and responsibilities, and a person specification listing qualifications, skills and experience needed.","bold_terms":[]},{"heading":"2. Application:","body":"The business advertises the vacancy and invites applications. This may be done internally (intranet, noticeboards) or externally (recruitment websites such as IrishJobs.ie, LinkedIn, agencies). Applications are reviewed and the strongest candidates are shortlisted.","bold_terms":[]},{"heading":"3. Selection:","body":"The business evaluates shortlisted applicants through interviews, aptitude tests, presentations or work simulations. The successful candidate is offered the role and unsuccessful candidates are informed respectfully.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-05","strand":3,"chapter":"3.2","lo":"14.2","lo_text":"Outline the key stages in the recruitment process and suggest how organisations might adopt ethical approaches to recruitment","level":"HL","verb":"SUGGEST","qnum":"2","q":"Suggest three ways Microsoft Ireland might adopt ethical approaches to recruitment. Refer to equality, diversity, and inclusion in your answer.","stimulus":{"type":"business","business":"Microsoft Ireland","headline":"2023 — inclusive hiring commitments","body":"In 2023, Microsoft Ireland announced new recruitment initiatives to make its hiring process more inclusive. The company stated that it is committed to equality, diversity, and inclusion when hiring new staff. (The Irish Times)"},"fmt":{"type":"labelled_box","labels":["1. Equality","2. Diversity","3. Inclusion"],"lines_per_label":[5,5,4]},"answer":[{"heading":"1. Equality — standardised selection:","body":"Microsoft Ireland can assess all candidates using the same structured interviews and scoring systems. Under the Employment Equality Acts 1998–2015, it is illegal to discriminate on grounds such as gender, age or race, so merit-based selection ensures fair treatment of all applicants.","bold_terms":[]},{"heading":"2. Diversity — widening the talent pool:","body":"Microsoft Ireland can actively advertise through universities, community groups and professional networks to reach underrepresented groups. Following IHREC guidance on inclusive advertising broadens the mix of experiences and perspectives within the organisation.","bold_terms":[]},{"heading":"3. Inclusion — accessible recruitment:","body":"Microsoft Ireland can make its application system accessible for candidates with disabilities and offer flexible interview options. The Disability Act 2005 and IHREC Codes of Practice encourage employers to make reasonable adjustments so every applicant can participate fully.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-06","strand":3,"chapter":"3.2","lo":"14.2","lo_text":"Outline the key stages in the recruitment process and suggest how organisations might adopt ethical approaches to recruitment","level":"HL","verb":"OUTLINE","qnum":"3","q":"Outline two ways an organisation could ensure equality in its recruitment process.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Non-discriminatory job adverts:","body":"Job descriptions and adverts should be written to avoid bias or discouraging certain groups from applying. This ensures all applicants, regardless of gender, age or background, have an equal chance to apply under the Employment Equality Acts 1998–2015.","bold_terms":[]},{"heading":"2. Merit-based selection methods:","body":"Using the same structured interview questions and scoring system for all applicants promotes fairness. This ensures candidates are assessed on skills and qualifications, not on personal characteristics.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-07","strand":3,"chapter":"3.2","lo":"14.3","lo_text":"Evaluate how digital technologies influence the process of recruitment and selection","level":"HL","verb":"EVALUATE","qnum":"1","q":"Evaluate how digital technologies can influence the recruitment and selection process for businesses.","stimulus":null,"fmt":{"type":"plain_box","lines":20},"answer":[{"heading":"1. Identification stage:","body":"Platforms such as LinkedIn and IrishJobs.ie allow businesses to advertise vacancies instantly and headhunt suitable candidates. This widens reach and makes recruitment more targeted. However, premium features can be expensive and competition for top talent is intense.","bold_terms":[]},{"heading":"2. Application stage:","body":"Applicant Tracking Systems (ATS) such as Greenhouse automatically scan CVs for keywords, filtering candidates before human review. This saves significant time and cost when processing high volumes of applications. A drawback is that rigid keyword matching may exclude strong candidates and raise GDPR concerns.","bold_terms":[]},{"heading":"3. Selection stage:","body":"Tools such as Zoom, Microsoft Teams and HireVue allow businesses to conduct remote interviews and video-based assessments. This cuts costs and opens access to a global talent pool. However, remote interviews may miss interpersonal skills and disadvantage candidates less comfortable with technology.","bold_terms":[]},{"heading":"Evaluation","body":"","bold_terms":[]},{"heading":"Preference:","body":"Digital technologies have had an overall positive impact on the recruitment and selection process.","bold_terms":[]},{"heading":"Justification:","body":"They have made recruitment faster, more global and more cost-effective, giving businesses access to far wider candidate pools than traditional methods.","bold_terms":[]},{"heading":"Recommendation:","body":"Businesses should combine ATS and video tools with human judgement at the shortlisting and final interview stages, to protect against automated bias and GDPR risks.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-08","strand":3,"chapter":"3.2","lo":"14.3","lo_text":"Evaluate how digital technologies influence the process of recruitment and selection","level":"HL","verb":"EVALUATE","qnum":"2","q":"Evaluate how Dexcom could use digital technologies to support the identification and application stages of this large recruitment drive.","stimulus":{"type":"business","business":"Dexcom","headline":"1,000 high-tech roles at Athenry plant","body":"Dexcom, the US medical-device maker, has announced plans to create up to 1,000 high-tech roles at its Athenry, Co. Galway plant, including graduate engineers, technicians, and data specialists."},"fmt":{"type":"plain_box","lines":16},"answer":[{"heading":"1. Online recruitment platforms (identification):","body":"Dexcom can use LinkedIn to target graduate engineers and technicians directly, and advertise open roles on IrishJobs.ie and university job boards. This is faster and far wider-reaching than traditional newspaper advertising.","bold_terms":[]},{"heading":"2. Applicant Tracking Systems (application):","body":"An ATS can scan hundreds of CVs for specific qualifications and engineering experience, passing only strong candidates to a human recruiter. This speeds up processing but needs care to avoid rejecting candidates who use different CV terminology.","bold_terms":[]},{"heading":"Evaluation","body":"","bold_terms":[]},{"heading":"Preference:","body":"Digital tools are essential for a recruitment drive on this scale — hiring 1,000 staff using traditional methods would be extremely slow and costly.","bold_terms":[]},{"heading":"Justification:","body":"LinkedIn and ATS dramatically cut time-to-hire and allow Dexcom to manage a very large candidate pipeline efficiently.","bold_terms":[]},{"heading":"Recommendation:","body":"Dexcom should always combine digital screening with human review at shortlist stage to avoid GDPR issues and ensure no strong candidates are excluded unfairly.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-09","strand":3,"chapter":"3.2","lo":"14.3","lo_text":"Evaluate how digital technologies influence the process of recruitment and selection","level":"HL","verb":"EVALUATE","qnum":"3","q":"Evaluate how digital technology has influenced the application stage of recruitment.","stimulus":null,"fmt":{"type":"plain_box","lines":16},"answer":[{"heading":"1. Online applications:","body":"Digital platforms allow candidates to submit CVs and forms instantly through websites such as IrishJobs.ie or LinkedIn. This speeds up the process and increases the size of the applicant pool. However, it can also lead to a large volume of unsuitable applications, increasing the burden of screening.","bold_terms":[]},{"heading":"2. Applicant Tracking Systems (ATS):","body":"ATS software automatically scans CVs for keywords, filtering candidates before any human review. This saves significant time and cost. A drawback is that strong candidates may be unfairly rejected if their CV does not include the correct keywords, creating the risk of bias.","bold_terms":[]},{"heading":"3. Chatbots and AI screening:","body":"Some firms use chatbots to interact with applicants or AI systems to assess suitability before a human reviews the file. This increases efficiency and provides a consistent candidate experience, but may make the process feel impersonal and raise ethical concerns.","bold_terms":[]},{"heading":"Evaluation","body":"","bold_terms":[]},{"heading":"Preference:","body":"Digital technology has made the application stage faster and more efficient overall.","bold_terms":[]},{"heading":"Justification:","body":"Online applications and ATS handle volumes of CVs that would be impossible to process manually.","bold_terms":[]},{"heading":"Recommendation:","body":"Businesses should always combine automated systems with human judgement to protect fairness and comply with GDPR.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-10","strand":3,"chapter":"3.2","lo":"14.4","lo_text":"Investigate the factors that impact on employee motivation","level":"HL","verb":"INVESTIGATE","qnum":"1","q":"Investigate three factors (apart from pay) that could improve employee motivation at Lidl Ireland.","stimulus":{"type":"business","business":"Lidl Ireland","headline":"2023 — expansion and staff motivation","body":"In 2023, Lidl Ireland announced plans to expand its operations and open new stores across the country. Management stated that keeping staff motivated would be essential to delivering high-quality customer service during the expansion. (RTÉ News)"},"fmt":{"type":"numbered_box","points":3,"lines_per_point":[5,5,4]},"answer":[{"heading":"1. Career progression opportunities:","body":"Clear pathways to promotion and leadership training motivate staff to work hard and stay with the business. Lidl Ireland runs an award-winning 18-month Graduate Management Programme, accredited by City & Guilds / ILM, which is the only one of its kind in Ireland and motivates ambitious staff to progress.","bold_terms":[]},{"heading":"2. Recognition and praise:","body":"Acknowledging employees’ efforts makes them feel valued and reinforces good performance. Lidl can use Employee of the Month schemes, certificates and public recognition in team meetings to boost morale during a demanding expansion.","bold_terms":[]},{"heading":"3. Flexible working and work-life balance:","body":"Flexibility supports staff with family or study commitments. Lidl can offer part-time shifts, job-sharing and flexible start times to accommodate personal needs, which improves morale and reduces absenteeism.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-11","strand":3,"chapter":"3.2","lo":"14.4","lo_text":"Investigate the factors that impact on employee motivation","level":"HL","verb":"IDENTIFY","qnum":"2","q":"Identify two financial rewards and two non-financial rewards a business could use to motivate employees.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Financial rewards","Non-financial rewards"],"lines_per_label":[5,4]},"answer":[{"heading":"Financial rewards","body":"","bold_terms":[]},{"heading":"1. Bonus:","body":"A payment awarded for reaching a specific target, such as producing units above an agreed limit or achieving set performance goals.","bold_terms":[]},{"heading":"2. Commission:","body":"Employees receive a percentage of the total sales they achieve, usually in addition to a base wage. This directly encourages staff to increase sales performance.","bold_terms":[]},{"heading":"Non-financial rewards","body":"","bold_terms":[]},{"heading":"3. Flexi-time:","body":"Employers allow employees to decide their work hours to suit their lifestyles, covering childcare, hobbies, or working from home.","bold_terms":[]},{"heading":"4. Job enlargement and rotation:","body":"Giving employees extra responsibilities, wider roles and teamwork satisfies social needs and increases job satisfaction.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-12","strand":3,"chapter":"3.2","lo":"14.4","lo_text":"Investigate the factors that impact on employee motivation","level":"HL","verb":"OUTLINE","qnum":"3","q":"Outline three factors (other than pay) that can improve employee motivation in the workplace.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[5,5,4]},"answer":[{"heading":"1. Positive working conditions and contracts:","body":"A comfortable, supportive work environment and a secure contract make employees feel settled and able to focus on their job rather than worrying about their situation. Proper equipment, long-term contracts and a safe workplace all play a part.","bold_terms":[]},{"heading":"2. Recognition and praise:","body":"Acknowledging employees’ efforts reinforces the behaviours the business wants to see. Regular praise, awards and public recognition of good work boost morale and encourage continued high performance.","bold_terms":[]},{"heading":"3. Career progression opportunities:","body":"Employees are motivated when they see clear career development and promotion opportunities. Offering leadership training and personal development plans makes employees feel invested in and committed to the organisation.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-13","strand":3,"chapter":"3.2","lo":"14.5","lo_text":"Describe what is meant by effective employee appraisal","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline three features of an effective employee appraisal.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[5,5,4]},"answer":[{"heading":"1. Clear feedback:","body":"Employees should leave an appraisal understanding exactly how they are doing, what they are doing well, and where they can improve. Feedback should be specific and honest rather than vague, so employees can act on it.","bold_terms":[]},{"heading":"2. Goal setting:","body":"The appraisal should set clear targets for the period ahead, so both the employee and the manager know what success looks like. Goals should be agreed together so the employee feels ownership of them.","bold_terms":[]},{"heading":"3. Two-way communication:","body":"The process should not be a one-way lecture. Employees should feel safe to share views and give feedback to their manager, which builds trust and morale and gives managers a better perspective on how staff feel.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-14","strand":3,"chapter":"3.2","lo":"14.5","lo_text":"Describe what is meant by effective employee appraisal","level":"HL","verb":"DESCRIBE","qnum":"2","q":"Describe two ways an effective employee appraisal can increase motivation in the workplace.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Recognition of effort:","body":"Appraisals give employees a chance to be praised for their hard work. When staff feel recognised, they are more likely to stay motivated and keep performing well. For example, a manager acknowledging a strong quarter in an appraisal reinforces positive behaviour.","bold_terms":[]},{"heading":"2. Clear goals and support:","body":"Appraisals help set SMART goals and offer feedback on how to improve. This gives employees direction and confidence, which increases motivation. For example, agreeing measurable targets makes it easier to see real progress between reviews.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-15","strand":3,"chapter":"3.2","lo":"14.5","lo_text":"Describe what is meant by effective employee appraisal","level":"HL","verb":"DESCRIBE","qnum":"3","q":"Describe three ways a business can make the appraisal process more effective.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[5,5,4]},"answer":[{"heading":"1. Hold appraisals regularly:","body":"Managers should give ongoing positive and constructive feedback throughout the year rather than relying on a single annual review. This means nothing comes as a surprise at the formal appraisal and issues can be corrected early.","bold_terms":[]},{"heading":"2. Encourage open communication:","body":"Employees should feel that their views are welcome and that it is safe to provide them. Two-way feedback builds trust and morale, and gives managers a better perspective on how staff feel about working for the business.","bold_terms":[]},{"heading":"3. Set SMART goals with employees:","body":"Goals should be Specific, Measurable, Achievable, Relevant and Time-bound. This ensures the employee is clear on expectations, and contribution is measured against clear outcomes rather than vague impressions.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-16","strand":3,"chapter":"3.2","lo":"14.6","lo_text":"Identify a number of approaches to appraisal and analyse how these approaches might contribute to employee motivation","level":"HL","verb":"ANALYSE","qnum":"1","q":"Analyse how three different types of employee appraisal can contribute to employee motivation.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[6,6,5]},"answer":[{"heading":"1. Formative appraisal:","body":"This is ongoing informal feedback from the manager throughout the year, like a coach giving tips during the match. Employees feel supported rather than judged, which builds trust and drives sustained effort over the long term because issues are addressed early rather than held until a formal review.","bold_terms":[]},{"heading":"2. Self-appraisal:","body":"The employee rates their own performance before meeting their manager, identifying strengths and areas to improve. Because the employee has taken responsibility for spotting their own development needs, they feel greater ownership of the goals agreed afterwards, which drives real commitment.","bold_terms":[]},{"heading":"3. 360-degree appraisal:","body":"Feedback is gathered from managers, peers and reports to build a rounded picture of performance. Being recognised by the full circle of colleagues is a powerful motivator and pushes employees to perform consistently across every working relationship, not just in front of the manager.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-17","strand":3,"chapter":"3.2","lo":"14.6","lo_text":"Identify a number of approaches to appraisal and analyse how these approaches might contribute to employee motivation","level":"HL","verb":"IDENTIFY","qnum":"2","q":"(i) Identify the type of appraisal used in this case.","stimulus":{"type":"business","business":"Louise","headline":"Weekly team check-in","body":"Every Friday, Louise’s team meets for a short check-in. Her manager gives feedback on that week’s work and helps set small goals for the next."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":2},{"type":"plain_box","lines":4}]},"answer":[{"heading":"(i) Type of appraisal","body":"","bold_terms":[]},{"heading":"","body":"Formative appraisal.","bold_terms":[]},{"heading":"(ii) How it supports motivation","body":"","bold_terms":[]},{"heading":"","body":"Formative appraisal supports motivation by offering regular, informal feedback throughout the year rather than a single annual review. Louise feels noticed and guided rather than only judged at fixed points, which builds confidence and allows for quick improvements. This ongoing support helps her stay engaged and motivated week by week.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-18","strand":3,"chapter":"3.2","lo":"14.6","lo_text":"Identify a number of approaches to appraisal and analyse how these approaches might contribute to employee motivation","level":"HL","verb":"MATCH","qnum":"3","q":"Column 1 is a list of appraisal approaches. Column 2 is a list of descriptions. (One description does not match any of the approaches.)","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["","Column 1:  Approaches","","Column 2:  Descriptions"],"rows":[["1","Self-appraisal","A","Ongoing informal feedback given regularly during day-to-day work."],["2","Formative appraisal","B","Formal review, usually at the end of the year, tied to promotion or pay."],["3","Summative appraisal","C","Feedback gathered from managers, peers, and reports to give a full picture."],["4","360-degree appraisal","D","Employee rates their own performance and sets goals before the review."],["5","Peer-to-peer appraisal","E","Feedback given only by colleagues at the same level, not by the manager."],["","","F","The manager sets all targets for the employee without discussion."]]},{"type":"labelled_box","labels":["1 2 3 4 5"],"lines_per_label":[1]}]},"answer":[{"heading":"","body":"1 = D   ·   2 = A   ·   3 = B   ·   4 = C   ·   5 = E","bold_terms":[]},{"heading":"","body":"Option F is the one that does not match (a manager setting all targets without discussion is the opposite of an effective appraisal — it is top-down control).","bold_terms":[]}],"biz":null},{"code":"3.2-HL-19","strand":3,"chapter":"3.2","lo":"14.7","lo_text":"Explain what is meant by human capital management and outline how the organisational environment is a factor in its development","level":"HL","verb":"EXPLAIN","qnum":"1","q":"(i) Explain what is meant by human capital management (HCM).","stimulus":{"type":"business","business":"Google","headline":"2024 — investments in staff training and wellness","body":"In 2024, Google announced major investments in employee training and wellness programmes, aiming to strengthen staff skills while supporting work–life balance. Analysts note that Google’s culture of innovation and open communication plays a key role in the success of these initiatives."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":5},{"type":"numbered_box","points":2,"lines_per_point":[5,4]}]},"answer":[{"heading":"(i) Human Capital Management","body":"","bold_terms":[]},{"heading":"","body":"HCM is the strategic process of planning, recruiting, developing, motivating and retaining employees so they can contribute effectively to the organisation’s goals. It treats employees as assets whose skills and capabilities should be developed, rather than just costs to the business.","bold_terms":[]},{"heading":"","body":"For example, Google invests in training, career development and wellness programmes to maximise staff productivity and innovation.","bold_terms":[]},{"heading":"(ii) Two environmental factors","body":"","bold_terms":[]},{"heading":"1. Culture:","body":"A culture built on openness and trust encourages employees to engage fully with HCM activities such as training and appraisal. At Google, an innovative culture supports the rollout of new HCM initiatives because staff feel safe to try, learn and share ideas.","bold_terms":[]},{"heading":"2. Leadership:","body":"Strong, committed leadership provides the direction and resources HCM strategies need to succeed. When leaders visibly back employee development, HCM initiatives gain credibility across the business — at Google, management backing for wellness programmes strengthens commitment.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-20","strand":3,"chapter":"3.2","lo":"14.7","lo_text":"Explain what is meant by human capital management and outline how the organisational environment is a factor in its development","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline two features of an organisation’s environment, other than culture, that support effective human capital management.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Structure and communication:","body":"An organisation with open communication and strong cross-departmental collaboration can roll out HCM practices smoothly and consistently. Clear internal communication ensures employees understand the goals of HCM programmes and their own role in achieving them.","bold_terms":[]},{"heading":"2. Openness to innovation:","body":"A flexible, innovation-friendly environment can quickly adopt new HCM tools and methods such as digital learning platforms or wellness apps. This responsiveness keeps HCM relevant to a changing workforce rather than resisting digital transformation.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-21","strand":3,"chapter":"3.2","lo":"14.7","lo_text":"Explain what is meant by human capital management and outline how the organisational environment is a factor in its development","level":"HL","verb":"EXPLAIN","qnum":"3","q":"Explain two reasons why human capital management is important for a modern business.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Builds a skilled and adaptable workforce:","body":"HCM keeps employees’ skills current and prepared for new technologies and industry changes. This means the business can respond quickly to change rather than being left behind, and stays competitive in its market.","bold_terms":[]},{"heading":"2. Improves motivation and retention:","body":"When a business invests in its people through training, appraisal and wellness, employees feel valued and are more motivated to stay. This reduces staff turnover, protects the organisation’s human capital, and cuts the cost of constantly replacing and retraining people.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-22","strand":3,"chapter":"3.2","lo":"14.8","lo_text":"Investigate the different types of training and professional development that may be offered to employees and outline why ongoing training and professional development is an important aspect of human capital management","level":"HL","verb":"DISTINGUISH","qnum":"1","q":"Distinguish between induction training and professional development.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Induction training","Professional development"],"lines_per_label":[5,4]},"answer":[{"heading":"Induction training:","body":"This is training given to new employees when they first start, introducing them to the workplace culture, policies, and structure. The aim is to help them settle in quickly and become productive in their new role.","bold_terms":[]},{"heading":"Professional development:","body":"This is a longer-term approach focused on building broader skills such as leadership, communication, and decision-making to support future career progression. Unlike training, which targets a specific task, professional development is about growing the whole employee over time.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-23","strand":3,"chapter":"3.2","lo":"14.8","lo_text":"Investigate the different types of training and professional development that may be offered to employees and outline why ongoing training and professional development is an important aspect of human capital management","level":"HL","verb":"IDENTIFY","qnum":"2","q":"(i) Identify two different training or development approaches being used at Lidl Ireland.","stimulus":{"type":"business","business":"Lidl Ireland","headline":"Award-winning training across stores and management","body":"Lidl Ireland runs a week-long induction for new store staff covering company policies, customer service and health and safety. Alongside this, it operates an 18-month Graduate Management Development Programme, the only City & Guilds / ILM accredited graduate programme in Ireland, which trains future store and regional managers."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":2},{"type":"plain_box","lines":8}]},"answer":[{"heading":"(i) Two approaches","body":"","bold_terms":[]},{"heading":"","body":"1. Induction training   ·   2. Professional development (Graduate Management Programme)","bold_terms":[]},{"heading":"(ii) Justification","body":"","bold_terms":[]},{"heading":"Induction training:","body":"New store staff need to quickly understand Lidl’s systems, customer service standards and health and safety rules. Induction training helps them settle in faster and become productive in a fast-paced retail environment.","bold_terms":[]},{"heading":"Professional development:","body":"The 18-month Graduate Management Programme develops leadership, communication and decision-making skills in future managers. This strengthens Lidl Ireland’s internal talent pipeline and builds a more capable management team.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-24","strand":3,"chapter":"3.2","lo":"14.8","lo_text":"Investigate the different types of training and professional development that may be offered to employees and outline why ongoing training and professional development is an important aspect of human capital management","level":"HL","verb":"OUTLINE","qnum":"3","q":"Outline two reasons why ongoing training and professional development are important aspects of human capital management.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Builds a more skilled and adaptable workforce:","body":"Regular training keeps employees’ skills current and introduces them to new technologies and industry standards. This means the business can respond quickly to change rather than being left behind.","bold_terms":[]},{"heading":"2. Higher morale and retention:","body":"When a business invests in its people, employees feel valued and are more motivated to stay. This reduces staff turnover, protects the organisation’s human capital, and cuts the cost of constantly replacing and retraining people.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-25","strand":3,"chapter":"3.2","lo":"14.9","lo_text":"Appreciate the opportunities and challenges associated with working in teams for both employees and employers","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline three challenges that employees may face when working in teams.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[5,5,4]},"answer":[{"heading":"1. Conflict between members:","body":"Clashes in personality or working style can create tension and damage working relationships. For example, on marketing teams with tight deadlines, members can clash over creative direction, slowing work down and lowering morale.","bold_terms":[]},{"heading":"2. Free-riders:","body":"Some employees may not pull their weight, leaving the rest of the team frustrated and overworked. In workplaces this reduces the quality of the team’s output and can cause resentment among engaged team members.","bold_terms":[]},{"heading":"3. Reliance on others:","body":"A team’s success depends on every member delivering on time. One person’s weak contribution can damage the whole outcome — for example, a designer missing a deadline on a product launch delays the whole team.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-26","strand":3,"chapter":"3.2","lo":"14.9","lo_text":"Appreciate the opportunities and challenges associated with working in teams for both employees and employers","level":"HL","verb":"OUTLINE","qnum":"2","q":"(a) Outline two benefits of teamwork for an employee.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":6},{"type":"plain_box","lines":6}]},"answer":[{"heading":"(a) Benefits for an employee","body":"","bold_terms":[]},{"heading":"1. Higher job satisfaction:","body":"Working in a team meets employees’ social needs and helps them feel recognised for what they contribute. This boosts morale and motivation at work.","bold_terms":[]},{"heading":"2. Builds interpersonal skills:","body":"Working with different personalities helps employees improve their communication, leadership and conflict-resolution skills.","bold_terms":[]},{"heading":"(b) Benefits for an employer","body":"","bold_terms":[]},{"heading":"1. Better creativity and problem-solving:","body":"Combining different skills and perspectives produces stronger solutions than any one person could find alone.","bold_terms":[]},{"heading":"2. Higher productivity:","body":"Work can be divided according to each person’s strengths, so tasks get done faster and to a higher standard.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-27","strand":3,"chapter":"3.2","lo":"14.9","lo_text":"Appreciate the opportunities and challenges associated with working in teams for both employees and employers","level":"HL","verb":"IDENTIFY","qnum":"3","q":"(i) Identify two opportunities teamwork offers for NovaTech.","stimulus":{"type":"business","business":"NovaTech","headline":"Software firm introduces project teams","body":"NovaTech is a growing software company that has introduced project teams to improve innovation and speed up product development. Since the change, some employees feel more engaged, but others have experienced tension with colleagues."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":6},{"type":"plain_box","lines":8}]},"answer":[{"heading":"(i) Opportunities","body":"","bold_terms":[]},{"heading":"1. Faster development through task sharing:","body":"By dividing tasks according to employees’ strengths, projects can be completed more quickly. This allows NovaTech to get products to market faster and gain a competitive advantage.","bold_terms":[]},{"heading":"2. Increased innovation from shared problem-solving:","body":"Different perspectives within teams generate more creative ideas. This helps NovaTech design better software and respond more effectively to customer needs.","bold_terms":[]},{"heading":"(ii) Challenges","body":"","bold_terms":[]},{"heading":"1. Managing conflict between members:","body":"Employees may disagree on priorities or approaches, leading to personality clashes. For example, engineers and designers at NovaTech could clash over product features, harming productivity and team morale unless a manager intervenes.","bold_terms":[]},{"heading":"2. Ensuring fair contribution from all members:","body":"“Free-riders” can emerge where some staff contribute less than others. This frustrates engaged team members and reduces the overall effectiveness of the team on projects.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-28","strand":3,"chapter":"3.2","lo":"14.10","lo_text":"Outline how employers and employees can work together to create a more sustainable workplace","level":"HL","verb":"OUTLINE","qnum":"1","q":"Outline three ways employers and employees can work together to create a more sustainable workplace.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[5,5,4]},"answer":[{"heading":"1. Environmental sustainability practices:","body":"Employers introduce eco-friendly policies such as energy reduction, waste minimisation and green commuting schemes. Employees support these through recycling, conserving energy and choosing sustainable transport — this covers the environmental pillar of sustainability.","bold_terms":[]},{"heading":"2. Wellbeing and inclusion initiatives:","body":"Employers provide strong health and safety standards, mental-health supports and fair hiring practices that value diversity. Employees act with integrity, support colleagues and report safety risks promptly — this covers the social pillar.","bold_terms":[]},{"heading":"3. Ongoing training and responsible practice:","body":"Employers pay fair wages, source ethically from suppliers and invest in continuous learning. Employees engage with training, use company resources responsibly and suggest efficiency improvements — this covers the economic pillar.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-29","strand":3,"chapter":"3.2","lo":"14.10","lo_text":"Outline how employers and employees can work together to create a more sustainable workplace","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline how employers and employees can contribute to the environmental pillar of a sustainable workplace.","stimulus":null,"fmt":{"type":"labelled_box","labels":["Employer","Employee"],"lines_per_label":[5,4]},"answer":[{"heading":"Employer:","body":"Employers can lead on green policies by cutting energy use, reducing waste and encouraging remote working or green commuting to reduce the organisation’s carbon footprint. For example, a business might install solar panels, switch to LED lighting and introduce a cycle-to-work scheme.","bold_terms":[]},{"heading":"Employee:","body":"Employees can support green habits day to day by conserving energy, recycling properly, and suggesting eco-friendly improvements to everyday processes. Small actions such as switching off devices and reporting waste contribute to the business’s overall environmental goals.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-30","strand":3,"chapter":"3.2","lo":"14.10","lo_text":"Outline how employers and employees can work together to create a more sustainable workplace","level":"HL","verb":"MATCH","qnum":"3","q":"Column 1 is a list of pillars of a sustainable workplace. Column 2 is a list of actions a business could take. (One action does not match any of the pillars.)","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["","Column 1:  Pillars","","Column 2:  Actions"],"rows":[["1","Environmental pillar","A","Installing solar panels to reduce energy use at the office."],["2","Social pillar","B","Providing mental health supports and fair hiring practices."],["3","Economic pillar","C","Paying fair wages and investing in long-term staff learning."],["4","Wellbeing and work-life balance","D","Introducing a four-day working week to reduce employee burnout."],["5","Ethical supply-chain practices","E","Sourcing raw materials only from certified fair-trade suppliers."],["","","F","Offering extra bonuses for reaching monthly sales targets."]]},{"type":"labelled_box","labels":["1 2 3 4 5"],"lines_per_label":[1]}]},"answer":[{"heading":"","body":"1 = A   ·   2 = B   ·   3 = C   ·   4 = D   ·   5 = E","bold_terms":[]},{"heading":"","body":"Option F is the one that does not match (it is a short-term financial incentive, not a sustainability action).","bold_terms":[]}],"biz":null},{"code":"3.2-HL-31","strand":3,"chapter":"3.2","lo":"14.11","lo_text":"Investigate how digital technology impacts on the workplace","level":"HL","verb":"INVESTIGATE","qnum":"1","q":"Investigate how digital technology has impacted the workplace at Ryanair.","stimulus":{"type":"business","business":"Ryanair","headline":"Digital technology across the airline","body":"In recent years, Ryanair has increased its use of digital technology across different areas of the business. Management say these changes are influencing both operations and the experience of employees. (RTÉ Business)"},"fmt":{"type":"plain_box","lines":16},"answer":[{"heading":"1. Communication and collaboration:","body":"Digital platforms make communication faster across teams in different locations. At Ryanair, tools like Microsoft Teams let management and staff across multiple European bases hold daily meetings without costly travel.","bold_terms":[]},{"heading":"2. Training and professional development:","body":"E-learning platforms allow consistent training materials to be delivered at scale. At Ryanair, cabin crew complete safety refreshers online, ensuring compliance across all flight crews regardless of location.","bold_terms":[]},{"heading":"3. Data and decision-making:","body":"AI and data analytics help businesses predict demand and manage resources. At Ryanair, AI-driven systems forecast passenger bookings and help plan staff rosters, improving scheduling accuracy.","bold_terms":[]},{"heading":"4. Where and how we work:","body":"Self-service kiosks and cloud systems have changed the roles of staff. At Ryanair, self-service check-in kiosks mean fewer staff are needed at check-in desks, with employees reallocated to customer assistance roles.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-32","strand":3,"chapter":"3.2","lo":"14.11","lo_text":"Investigate how digital technology impacts on the workplace","level":"HL","verb":"EVALUATE","qnum":"2","q":"Evaluate the impact of digital technology on the modern workplace.","stimulus":null,"fmt":{"type":"plain_box","lines":20},"answer":[{"heading":"1. Communication and collaboration:","body":"Tools such as Microsoft Teams, Slack and Zoom allow employees to communicate and share work instantly, no matter where they are based. This has made collaboration faster and opened the door to remote and hybrid working. A downside is information overload and constant notifications blurring work-life boundaries.","bold_terms":[]},{"heading":"2. Data and decision-making:","body":"Businesses now use HR analytics, performance dashboards and AI tools to make staffing and management decisions based on evidence rather than intuition. This improves consistency and speeds up processes like recruitment, but raises privacy concerns around employee monitoring.","bold_terms":[]},{"heading":"3. Where and how we work:","body":"Cloud platforms and video tools have made remote and blended working standard in many industries. Employees gain flexibility around where and when they work, and employers can hire from a wider talent pool. However, remote workers can feel isolated and team culture can weaken.","bold_terms":[]},{"heading":"Evaluation","body":"","bold_terms":[]},{"heading":"Preference:","body":"Digital technology has had an overall positive impact on the modern workplace.","bold_terms":[]},{"heading":"Justification:","body":"It has made businesses faster, more flexible and more evidence-based, giving employers and employees tools that simply did not exist twenty years ago.","bold_terms":[]},{"heading":"Recommendation:","body":"Businesses should continue to invest in digital tools, but also train managers to use them responsibly so that the human side of work is not lost.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-33","strand":3,"chapter":"3.2","lo":"14.11","lo_text":"Investigate how digital technology impacts on the workplace","level":"HL","verb":"TICK-BOX","qnum":"3","q":"For each of the following digital technologies, tick the workplace area it mostly impacts.","stimulus":null,"fmt":{"type":"data_table","headers":["Statement","Communication","Training","Data","Remote work"],"rows":[["1. Microsoft Teams","☐","☐","☐","☐"],["2. LinkedIn Learning","☐","☐","☐","☐"],["3. HR analytics dashboard","☐","☐","☐","☐"],["4. Google Workspace","☐","☐","☐","☐"],["5. AI recruitment screening tool","☐","☐","☐","☐"]]},"answer":[{"heading":"","body":"1. Communication   ·   2. Training   ·   3. Data   ·   4. Remote work   ·   5. Data","bold_terms":[]}],"biz":null},{"code":"3.2-HL-34","strand":3,"chapter":"3.2","lo":"14.12","lo_text":"Identify the opportunities and challenges associated with remote and blended working arrangements for both employees and employers","level":"HL","verb":"IDENTIFY","qnum":"1","q":"(i) Identify two opportunities for employees in ByteHub’s blended model.","stimulus":{"type":"business","business":"ByteHub","headline":"Dublin-based tech firm adopts hybrid model","body":"ByteHub, a Dublin-based tech firm, adopted a hybrid working model where staff spend three days at home and two days in the office. Management says productivity has improved, but some employees miss the office atmosphere."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":5},{"type":"plain_box","lines":6}]},"answer":[{"heading":"(i) Opportunities for employees","body":"","bold_terms":[]},{"heading":"1. Greater flexibility:","body":"Remote days make it easier for employees to balance work with personal life, such as childcare or avoiding long commutes. At ByteHub, this improves job satisfaction and reduces stress levels.","bold_terms":[]},{"heading":"2. Reduced commuting costs:","body":"Working from home cuts travel time and expenses. For ByteHub staff, this means saving money on transport while gaining extra time each week.","bold_terms":[]},{"heading":"(ii) Challenges for the company","body":"","bold_terms":[]},{"heading":"1. Monitoring productivity:","body":"It can be harder for managers to track performance when employees are not in the office every day. At ByteHub, this may cause concerns about whether all staff are meeting deadlines consistently.","bold_terms":[]},{"heading":"2. Maintaining team cohesion:","body":"Less face-to-face contact can weaken workplace relationships and make it harder to manage remote teams effectively. At ByteHub, managers may struggle to keep team spirit strong across both home and office days.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-35","strand":3,"chapter":"3.2","lo":"14.12","lo_text":"Identify the opportunities and challenges associated with remote and blended working arrangements for both employees and employers","level":"HL","verb":"IDENTIFY","qnum":"2","q":"Identify three opportunities that remote and blended working create for employees in modern workplaces.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[4,4,3]},"answer":[{"heading":"1. Better work-life balance:","body":"Remote working allows staff to manage their schedules more easily, reducing stress and improving overall wellbeing.","bold_terms":[]},{"heading":"2. Increased autonomy:","body":"Employees have more control over how and when they complete tasks, so they can work when they feel most productive.","bold_terms":[]},{"heading":"3. Access to wider job opportunities:","body":"Employees can apply for jobs outside their immediate location and work remotely, which opens up opportunities they could not have considered before.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-36","strand":3,"chapter":"3.2","lo":"14.12","lo_text":"Identify the opportunities and challenges associated with remote and blended working arrangements for both employees and employers","level":"HL","verb":"IDENTIFY","qnum":"3","q":"(i) From an employee perspective, identify two potential benefits of hybrid working at AIB.","stimulus":{"type":"business","business":"AIB","headline":"2022 — permanent hybrid working","body":"AIB (Allied Irish Banks) announced in 2022 that it would permanently adopt a hybrid working model for thousands of employees. Staff typically spend two or three days working from home and the rest in the office. Management believe this supports flexibility, but they also recognise challenges in maintaining collaboration and staff engagement. (RTÉ Business)"},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":5},{"type":"plain_box","lines":6}]},"answer":[{"heading":"(i) Benefits for employees","body":"","bold_terms":[]},{"heading":"1. Improved work-life balance:","body":"Hybrid working gives employees more control over how they divide their time. At AIB, this flexibility helps staff manage family responsibilities alongside work.","bold_terms":[]},{"heading":"2. Reduced commuting costs:","body":"Fewer office days lower transport expenses. At AIB, employees save money while reducing time spent travelling.","bold_terms":[]},{"heading":"(ii) Challenges for the employer","body":"","bold_terms":[]},{"heading":"1. Maintaining collaboration:","body":"Hybrid arrangements reduce in-person interaction among staff. At AIB, this makes it harder to coordinate teamwork and sustain close communication across teams.","bold_terms":[]},{"heading":"2. Protecting company culture:","body":"With less face-to-face contact, values and team spirit may weaken. At AIB, this creates a risk of lower engagement and weaker staff loyalty over time.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-37","strand":3,"chapter":"3.2","lo":"14.13","lo_text":"Analyse the ethical and sustainability issues associated with remote and blended working","level":"HL","verb":"ANALYSE","qnum":"1","q":"Analyse the ethical and sustainability issues of this decision for Microsoft.","stimulus":{"type":"business","business":"Microsoft","headline":"Global hybrid working rollout","body":"Microsoft introduced a hybrid working model where employees spend part of the week working remotely and part in the office. The company has rolled out this approach across multiple countries, supported by digital tools such as Teams and cloud systems. (BBC News)"},"fmt":{"type":"plain_box","lines":16},"answer":[{"heading":"Ethical issues","body":"","bold_terms":[]},{"heading":"1. Data privacy and protection:","body":"Employees access sensitive company data from home on personal devices and home networks, creating real data-protection risks. For Microsoft, a single breach could damage customer trust and trigger heavy GDPR penalties.","bold_terms":[]},{"heading":"2. Equal access and fairness:","body":"Not every employee has the same home set-up — some have quiet rooms and strong broadband, others do not. Offering remote working only to those with the right environment creates unequal opportunities and possible breach of equality legislation.","bold_terms":[]},{"heading":"Sustainability issues","body":"","bold_terms":[]},{"heading":"1. Lower long-term employee engagement:","body":"Remote workers can feel disconnected from Microsoft’s culture and colleagues. Without regular in-person contact, loyalty and team identity tend to weaken, resulting in higher staff turnover which damages long-term business stability.","bold_terms":[]},{"heading":"2. Environmental impact:","body":"Hybrid working cuts daily commutes and reduces energy use in large offices, supporting Microsoft’s sustainability commitments. However, some saving is offset by higher energy use in employees’ homes, meaning remote work is only genuinely greener when employers help staff with efficient home equipment.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-38","strand":3,"chapter":"3.2","lo":"14.13","lo_text":"Analyse the ethical and sustainability issues associated with remote and blended working","level":"HL","verb":"ANALYSE","qnum":"2","q":"Analyse two ethical issues associated with remote and blended working arrangements.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[6,5]},"answer":[{"heading":"1. Data privacy and protection:","body":"Employees working from home access sensitive company data on personal devices and home networks, creating real data-protection risks. The impact is that a single breach can damage customer trust and trigger heavy GDPR penalties for the business.","bold_terms":[]},{"heading":"2. Mental health and work-life balance:","body":"Remote working blurs the boundaries between work and home life. Digital tools mean staff can be reached almost 24/7, creating an “always-on” culture. The impact is higher employee burnout, stress-related absences and rising staff turnover.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-39","strand":3,"chapter":"3.2","lo":"14.13","lo_text":"Analyse the ethical and sustainability issues associated with remote and blended working","level":"HL","verb":"OUTLINE","qnum":"3","q":"Outline two sustainability issues associated with remote and blended working.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Lower long-term employee engagement:","body":"Remote workers can feel disconnected from their company’s culture and colleagues. Without regular in-person contact, loyalty and team identity weaken, leading to higher staff turnover which damages long-term business stability.","bold_terms":[]},{"heading":"2. Environmental impact:","body":"Remote working cuts daily commutes and reduces energy use in large offices. However, some of that saving is offset by higher energy use in employees’ homes, so remote working is only genuinely greener when employers help staff with efficient home equipment.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-40","strand":3,"chapter":"3.2","lo":"14.14","lo_text":"Outline the importance of corporate wellness* and investigate the impact of corporate wellness on employee motivation and organisational culture","level":"HL","verb":"DISCUSS","qnum":"1","q":"Discuss two ways these initiatives could impact:","stimulus":{"type":"business","business":"LinkedIn","headline":"Wellbeing initiatives for staff","body":"LinkedIn offers staff wellbeing initiatives such as mental health days, flexible working options, and access to fitness centres."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":8},{"type":"plain_box","lines":8}]},"answer":[{"heading":"(i) Employee motivation","body":"","bold_terms":[]},{"heading":"1. Feeling valued and supported:","body":"When employees see investment in their wellbeing through mental health days and fitness centres, they feel valued beyond their job role. At LinkedIn, this boosts motivation and commitment as staff recognise the company cares about their overall wellbeing.","bold_terms":[]},{"heading":"2. Reduced stress and work-life balance:","body":"Flexible working options help employees balance personal and professional responsibilities, reducing stress. At LinkedIn, this balance can increase focus and productivity during working hours.","bold_terms":[]},{"heading":"(ii) Organisational culture","body":"","bold_terms":[]},{"heading":"1. Culture of care and loyalty:","body":"Wellness initiatives show leadership is committed to supporting employees’ health. At LinkedIn, this fosters a positive culture where mutual respect and loyalty are strengthened across the workplace.","bold_terms":[]},{"heading":"2. Stronger teamwork and collaboration:","body":"Group wellness activities and team events create stronger social bonds and improve communication skills. At LinkedIn, this promotes collaboration and reduces barriers between teams across the organisation.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-41","strand":3,"chapter":"3.2","lo":"14.14","lo_text":"Outline the importance of corporate wellness* and investigate the impact of corporate wellness on employee motivation and organisational culture","level":"HL","verb":"OUTLINE","qnum":"2","q":"Outline three ways corporate wellness initiatives can shape an organisation’s culture.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[5,5,4]},"answer":[{"heading":"1. Builds a culture of care and loyalty:","body":"When staff see real investment in their wellbeing, they feel that the employer cares about them beyond their job role. This builds long-term loyalty and mutual respect across the workplace.","bold_terms":[]},{"heading":"2. Strengthens teamwork and collaboration:","body":"Wellness activities such as team events, group challenges or community volunteering create stronger social bonds and improve the communication skills needed for day-to-day teamwork.","bold_terms":[]},{"heading":"3. Supports an inclusive environment:","body":"A focus on equality, diversity and inclusion helps every employee feel safe to contribute and be themselves. This broadens the range of ideas in the business and reduces conflict.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-42","strand":3,"chapter":"3.2","lo":"14.14","lo_text":"Outline the importance of corporate wellness* and investigate the impact of corporate wellness on employee motivation and organisational culture","level":"HL","verb":"OUTLINE","qnum":"3","q":"Outline four reasons why corporate wellness is important to a business.","stimulus":null,"fmt":{"type":"numbered_box","points":4,"lines_per_point":[4,4,4,3]},"answer":[{"heading":"1. Healthier, happier employees:","body":"Wellness initiatives support employees’ physical and mental health, reducing stress and absenteeism. This gives the business a workforce that is focused and able to perform at their best.","bold_terms":[]},{"heading":"2. Attracts and retains talent:","body":"Strong wellness offerings help a business stand out to skilled candidates in a competitive hiring market. They also give existing staff fewer reasons to leave, lowering costly staff turnover.","bold_terms":[]},{"heading":"3. Builds an inclusive culture:","body":"Corporate wellness extends beyond physical health into equality and diversity. An inclusive workplace helps every employee feel they belong, strengthening loyalty and teamwork.","bold_terms":[]},{"heading":"4. Improves business performance:","body":"When staff feel supported, they are more motivated, engaged and productive. This feeds directly into better customer service, higher quality work, and stronger business results.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-43","strand":3,"chapter":"3.2","lo":"14.15","lo_text":"Identify the role of leadership in promoting corporate wellness","level":"HL","verb":"IDENTIFY","qnum":"1","q":"Identify three ways a leader can promote corporate wellness in an organisation.","stimulus":null,"fmt":{"type":"numbered_box","points":3,"lines_per_point":[4,4,3]},"answer":[{"heading":"1. Model healthy behaviour themselves:","body":"Leaders set the tone by visibly using wellness supports themselves, such as taking proper breaks, switching off after hours, and using flexible working. This signals to employees that wellbeing is genuinely valued, not just talked about.","bold_terms":[]},{"heading":"2. Communicate openly about wellbeing:","body":"Good leaders check in regularly with staff and make it safe to talk about mental health, workload and stress. Open conversations normalise wellbeing and help leaders spot problems early, before they escalate.","bold_terms":[]},{"heading":"3. Champion wellness initiatives:","body":"Leaders actively introduce and promote programmes such as fitness facilities, mental health supports and flexible working. Their visible backing gives these programmes credibility and encourages staff to engage.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-44","strand":3,"chapter":"3.2","lo":"14.15","lo_text":"Identify the role of leadership in promoting corporate wellness","level":"HL","verb":"IDENTIFY","qnum":"2","q":"Identify three ways Ava, as a new leader, could actively promote corporate wellness in her team.","stimulus":{"type":"business","business":"Ava","headline":"Newly promoted manager in a Dublin agency","body":"Ava has just been promoted to manage a team of 12 designers at a Dublin-based marketing agency. Morale has been low since the previous manager left, and staff have not engaged with the company’s existing wellness programme."},"fmt":{"type":"numbered_box","points":3,"lines_per_point":[4,4,3]},"answer":[{"heading":"1. Model healthy behaviour herself:","body":"Ava can set the tone by visibly taking proper breaks, switching off after hours and using flexible working. This signals to her team that wellbeing is genuinely valued, not just talked about.","bold_terms":[]},{"heading":"2. Communicate openly about wellbeing:","body":"Ava can hold regular check-ins and make it safe for staff to talk about workload and stress. Open conversations build trust and help her spot morale problems early.","bold_terms":[]},{"heading":"3. Recognise and respect staff:","body":"Ava can praise good work, treat staff fairly and act on feedback. This builds the psychological safety central to corporate wellness and re-engages the team with the existing programme.","bold_terms":[]}],"biz":null},{"code":"3.2-HL-45","strand":3,"chapter":"3.2","lo":"14.15","lo_text":"Identify the role of leadership in promoting corporate wellness","level":"HL","verb":"OUTLINE","qnum":"3","q":"Outline two actions a leader could take to build trust around wellness initiatives in the workplace.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Recognise and respect staff:","body":"Leaders who praise good work, treat staff fairly and act on feedback create a culture where employees feel valued. This psychological safety is central to corporate wellness and builds the trust needed for staff to raise concerns honestly.","bold_terms":[]},{"heading":"2. Champion wellness initiatives visibly:","body":"Leaders should not just announce wellness programmes but actively take part in them — joining fitness sessions, attending mental health workshops, or using flexible working options themselves. Employees can tell when wellness is genuine versus tick-the-box, and visible backing gives programmes credibility.","bold_terms":[]}],"biz":null},{"code":"3.2-OL-01","strand":3,"chapter":"3.2","lo":"14.1","lo_text":"Discuss the internal and external factors that impact on workforce planning","level":"OL","verb":"IDENTIFY","qnum":"1","q":"Identify one internal factor that can impact workforce planning and explain how it affects a business.","stimulus":null,"fmt":{"type":"plain_box","lines":4},"answer":[{"heading":"Staff turnover:","body":"If many employees leave a business, management must constantly recruit replacements. This increases recruitment costs and makes it harder to plan for future staff needs.","bold_terms":[]}],"biz":null},{"code":"3.2-OL-02","strand":3,"chapter":"3.2","lo":"14.1","lo_text":"Discuss the internal and external factors that impact on workforce planning","level":"OL","verb":"DISCUSS","qnum":"2","q":"Discuss two external factors that can impact workforce planning.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Government policy:","body":"Changes in laws or regulations, such as an increase in the minimum wage, affect workforce planning. Businesses may need to reduce staff numbers or adjust working hours to manage higher costs.","bold_terms":[]},{"heading":"2. Labour market conditions:","body":"The availability of skilled workers in the economy impacts how easy it is to hire. If skills are in short supply, businesses may need to offer more training or recruit from abroad.","bold_terms":[]}],"biz":null},{"code":"3.2-OL-03","strand":3,"chapter":"3.2","lo":"14.2","lo_text":"Outline the key stages in the recruitment process and suggest how organisations might adopt ethical approaches to recruitment","level":"OL","verb":"SUGGEST","qnum":"1","q":"Suggest two ways Workday could adopt ethical approaches to recruitment.","stimulus":{"type":"business","business":"Workday","headline":"2024 — Dublin workforce expansion","body":"In 2024, Workday (a tech company based in Dublin) announced that it was expanding its workforce and said it would focus on fairness and accessibility when hiring new staff. (RTÉ News)"},"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Equality — fair selection process:","body":"Workday could make sure all applicants are asked the same questions and marked on the same criteria. This means candidates are chosen based on ability, not on personal characteristics such as gender or age.","bold_terms":[]},{"heading":"2. Inclusion — accessible applications:","body":"Workday could make its online application system accessible for people with disabilities. This ensures all candidates can apply fairly and feel included in the process.","bold_terms":[]}],"biz":null},{"code":"3.2-OL-04","strand":3,"chapter":"3.2","lo":"14.3","lo_text":"Evaluate how digital technologies influence the process of recruitment and selection","level":"OL","verb":"OUTLINE","qnum":"1","q":"Outline two impacts of digital technology on the process of recruitment and selection.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Wider pool of candidates:","body":"Online recruitment platforms such as LinkedIn allow businesses to advertise jobs instantly and reach a much larger pool of applicants. This increases the chances of finding suitable candidates quickly.","bold_terms":[]},{"heading":"2. Faster screening of applicants:","body":"Applicant Tracking Systems (ATS) can scan CVs for keywords and filter out unsuitable applications. This saves businesses time and reduces the cost of the recruitment process.","bold_terms":[]}],"biz":null},{"code":"3.2-OL-05","strand":3,"chapter":"3.2","lo":"14.5","lo_text":"Describe what is meant by effective employee appraisal","level":"OL","verb":"EXPLAIN","qnum":"1","q":"(i) Explain the term effective employee appraisal.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":3},{"type":"numbered_box","points":2,"lines_per_point":[5,4]}]},"answer":[{"heading":"(i) Effective employee appraisal","body":"","bold_terms":[]},{"heading":"","body":"An effective employee appraisal is when a business reviews an employee’s performance, progress, and contribution in a fair and helpful way. It helps staff know how they are doing and what they can improve.","bold_terms":[]},{"heading":"(ii) Two ways to make it more effective","body":"","bold_terms":[]},{"heading":"1. Regular feedback:","body":"Giving feedback throughout the year keeps employees informed and helps them improve before problems build up. It also shows the business values their work.","bold_terms":[]},{"heading":"2. Two-way communication:","body":"Employees should be able to share their views and feel listened to. This builds trust and helps managers understand what support the employee might need.","bold_terms":[]}],"biz":null},{"code":"3.2-OL-06","strand":3,"chapter":"3.2","lo":"14.6","lo_text":"Identify a number of approaches to appraisal and analyse how these approaches might contribute to employee motivation","level":"OL","verb":"MATCH","qnum":"1","q":"Match each type of appraisal to its description. Write the correct letter in the space beside each number.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["","Column 1:  Types","","Column 2:  Descriptions"],"rows":[["A","Formative","1","Review that gathers feedback from peers, managers, and customers."],["B","Summative","2","Employee rates their own performance and sets goals."],["C","Self-appraisal","3","Informal feedback given regularly during day-to-day work."],["D","360-degree","4","Formal review, usually every few months or at the end of a project."]]},{"type":"match","descriptions":["A"]}]},"answer":[{"heading":"","body":"A = 3   ·   B = 4   ·   C = 2   ·   D = 1","bold_terms":[]}],"biz":null},{"code":"3.2-OL-07","strand":3,"chapter":"3.2","lo":"14.6","lo_text":"Identify a number of approaches to appraisal and analyse how these approaches might contribute to employee motivation","level":"OL","verb":"IDENTIFY","qnum":"2","q":"(i) Identify the type of appraisal being used.","stimulus":{"type":"business","business":"Emma","headline":"Before her performance review","body":"Before her performance review, Emma fills out a form about how she feels she has progressed this year. She lists what went well and what she would like to improve."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":2},{"type":"plain_box","lines":4}]},"answer":[{"heading":"(i) Type of appraisal","body":"","bold_terms":[]},{"heading":"","body":"Self-appraisal.","bold_terms":[]},{"heading":"(ii) How it supports motivation","body":"","bold_terms":[]},{"heading":"","body":"Self-appraisal helps motivate employees because they are trusted to assess their own work. It builds confidence and encourages responsibility for personal growth. Emma feels her employer trusts her judgement, which can increase her commitment and effort.","bold_terms":[]}],"biz":null},{"code":"3.2-OL-08","strand":3,"chapter":"3.2","lo":"14.8","lo_text":"Investigate the different types of training and professional development that may be offered to employees and outline why ongoing training and professional development is an important aspect of human capital management","level":"OL","verb":"MATCH","qnum":"1","q":"Match each type of training to its description.","stimulus":null,"fmt":{"type":"multi","parts":[{"type":"data_table","headers":["","Column 1:  Types of training","","Column 2:  Descriptions"],"rows":[["A","On-the-job training","1","Helps employees build long-term skills like leadership and teamwork."],["B","Induction training","2","Learning while doing tasks at work, with help from a supervisor."],["C","Professional development","3","Given to new employees when starting a job to help them settle in."]]},{"type":"match","descriptions":["A"]}]},"answer":[{"heading":"","body":"A = 2   ·   B = 3   ·   C = 1","bold_terms":[]}],"biz":null},{"code":"3.2-OL-09","strand":3,"chapter":"3.2","lo":"14.8","lo_text":"Investigate the different types of training and professional development that may be offered to employees and outline why ongoing training and professional development is an important aspect of human capital management","level":"OL","verb":"IDENTIFY","qnum":"2","q":"(i) What type of training is Sarah receiving?","stimulus":{"type":"business","business":"Sarah","headline":"New hotel role","body":"When Sarah started her new job in a hotel, she was shown around by her manager and introduced to the team. She also learned about the company’s rules and health and safety policies."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":2},{"type":"plain_box","lines":4}]},"answer":[{"heading":"(i) Type of training","body":"","bold_terms":[]},{"heading":"","body":"Induction training.","bold_terms":[]},{"heading":"(ii) How it helps","body":"","bold_terms":[]},{"heading":"","body":"Induction training helps new staff feel more comfortable in a new job. It teaches them how things work, who they will be working with, and what rules they must follow. This helps them get started quickly and safely.","bold_terms":[]}],"biz":null},{"code":"3.2-OL-10","strand":3,"chapter":"3.2","lo":"14.9","lo_text":"Appreciate the opportunities and challenges associated with working in teams for both employees and employers","level":"OL","verb":"IDENTIFY","qnum":"1","q":"(i) Identify two opportunities teamwork gave to Liam’s group.","stimulus":{"type":"business","business":"Liam","headline":"New role in a marketing company","body":"When Liam joined a new marketing company, he was placed into a team with five others. The group shared ideas for a new campaign, but disagreements sometimes slowed down progress."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":5},{"type":"plain_box","lines":4}]},"answer":[{"heading":"(i) Two opportunities","body":"","bold_terms":[]},{"heading":"1. Improved creativity and problem-solving:","body":"By sharing ideas, the group could develop more original and effective marketing campaigns.","bold_terms":[]},{"heading":"2. Increased productivity:","body":"Tasks could be divided among the team, helping the campaign to be completed faster and to a higher standard.","bold_terms":[]},{"heading":"(ii) One challenge","body":"","bold_terms":[]},{"heading":"Conflicts and disagreements:","body":"Disagreements within the team may slow down progress. This could reduce efficiency and make it harder to meet deadlines or deliver a high-quality campaign.","bold_terms":[]}],"biz":null},{"code":"3.2-OL-11","strand":3,"chapter":"3.2","lo":"14.12","lo_text":"Identify the opportunities and challenges associated with remote and blended working arrangements for both employees and employers","level":"OL","verb":"IDENTIFY","qnum":"1","q":"(i) Identify one opportunity that blended working gives Mary.","stimulus":{"type":"business","business":"Mary","headline":"Blended role in financial services","body":"Mary works for a financial services company. She spends three days a week working from home and two days in the office. She enjoys the flexibility, but her manager finds it harder to monitor her progress."},"fmt":{"type":"multi","parts":[{"type":"plain_box","lines":3},{"type":"plain_box","lines":3}]},"answer":[{"heading":"(i) Opportunity for Mary","body":"","bold_terms":[]},{"heading":"Flexibility:","body":"Blended working allows Mary to organise her work around personal commitments such as childcare. This makes her job more manageable and improves her work-life balance.","bold_terms":[]},{"heading":"(ii) Challenge for her manager","body":"","bold_terms":[]},{"heading":"Monitoring performance:","body":"It is harder for the manager to track Mary’s daily progress when she is working from home. This can create uncertainty about her productivity and meeting targets.","bold_terms":[]}],"biz":null},{"code":"3.2-OL-12","strand":3,"chapter":"3.2","lo":"14.12","lo_text":"Identify the opportunities and challenges associated with remote and blended working arrangements for both employees and employers","level":"OL","verb":"EXPLAIN","qnum":"2","q":"Explain two benefits of remote working for employees.","stimulus":null,"fmt":{"type":"numbered_box","points":2,"lines_per_point":[5,4]},"answer":[{"heading":"1. Work-life balance:","body":"Remote working helps employees manage their personal and professional responsibilities more effectively. This reduces stress and increases job satisfaction.","bold_terms":[]},{"heading":"2. Cost savings:","body":"Employees spend less money on commuting and meals outside the home. This increases their disposable income and makes working arrangements more attractive.","bold_terms":[]}],"biz":null},{"code":"3.3-HL-01","strand":3,"chapter":"3.3","lo":"15.1","lo_text":"Explain the importance of communication in an organisation","level":"HL","verb":"EXPLAIN","qnum":"1","q":"Explain three ways effective communication supported Kerry Group during the product recall.","stimulus":{"type":"business","business":"Kerry Group","headline":"2024 — managing a product recall","body":"Kerry Group, the Tralee-headquartered global taste and nutrition business, issued a precautionary product recall on a small batch of dairy ingredients in 2024. The recall was managed through coordinated internal briefings to staff, written notices to customers, and a clear public statement. Operations resumed within days with no reported incidents. (company announcement, 2024)"},"fmt":{"type":"numbered_box","points":3,"lines_per_point":6},"answe
